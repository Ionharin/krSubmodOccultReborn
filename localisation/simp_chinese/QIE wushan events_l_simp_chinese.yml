l_simp_chinese:
  QIE_ws_god_circle_events.1.t: "燕京纯阳宫内"
  QIE_ws_god_circle_events.1.desc: "救世新教的乩坛再开了。"
  QIE_ws_god_circle_events.1.a: "尊道贵德"
  QIE_ws_god_circle_events.2.t: "儒祖线第一条事件"
  QIE_ws_god_circle_events.2.desc: "大家听说要尊孔子都感到奇怪，大家已经都很尊重儒家道德了，为什么还需要继续尊儒。"
  QIE_ws_god_circle_events.2.a: "孔子已经是个死人了"
  QIE_ws_god_circle_events.3.t: "儒祖线第二条事件"
  QIE_ws_god_circle_events.3.desc: "乡间组织人们去曲阜孔林参拜儒祖，儒祖在乩坛上降下旨意。要求大家遵守规则。"
  QIE_ws_god_circle_events.3.a: "孔子一直没死，何谈复活？"
  QIE_ws_god_circle_events.4.t: "道祖线第一阶段"
  QIE_ws_god_circle_events.4.desc: "听说救世新教开始重新遵奉道祖，努力会的胡适写了一篇贼赃说的文章批评这一现象。"
  QIE_ws_god_circle_events.4.a: "为何维护旧宗教，舍弃新文明？"
  QIE_ws_god_circle_events.5.t: "道祖线第二阶段"
  QIE_ws_god_circle_events.5.desc: "杨荫杭写了一篇讨胡适大博士檄文，刊登在报纸上批评胡适是资产阶级走狗。"
  QIE_ws_god_circle_events.5.a: "胡博士如此毁我珠玉，夸人瓦砾，其心可诛。"
  QIE_ws_god_circle_events.6.t: "佛祖线第一阶段"
  QIE_ws_god_circle_events.6.desc: "河南乡间的一户人家正在破败的佛教庙宇中烧香，为他们新出生的孩子祈求平安幸福。"
  QIE_ws_god_circle_events.6.a: "愿佛祖保佑。"
  QIE_ws_god_circle_events.7.t: "佛祖线第二阶段"
  QIE_ws_god_circle_events.7.desc: "由于重新开始遵奉佛祖，现在寺庙重新获得了土地的权力。之前那家贫苦人家如今成为了寺庙的雇佣农，为寺庙种地工作。在一个暴雨的深夜，他们的孩子因为传染病夭折了。"
  QIE_ws_god_circle_events.7.a: "我来这里是为你们道喜，因你们的孩子已脱离苦海。"
  QIE_ws_god_circle_events.8.t: "耶祖线第一阶段"
  QIE_ws_god_circle_events.8.desc: "人们之前就浅浅听闻过耶稣基督的名字，但是人们对洋神仙不感兴趣。只是听说来救世新教拜耶稣基督就给发米面，他们才来了。"
  QIE_ws_god_circle_events.8.a: "这里只有稻米基督徒。"
  QIE_ws_god_circle_events.9.t: "耶祖线第二阶段"
  QIE_ws_god_circle_events.9.desc: "救世新教宣称只要对外传播耶稣的乩语，就能领到更多米面，甚至还有鸡蛋和其它新奇的洋吃食。如果能够将其他人介绍加入崇拜耶稣基督的行列，还能得到两份奖励。"
  QIE_ws_god_circle_events.9.a: "为了香蕉搬运炸弹的猴子们。"
  QIE_ws_god_circle_events.10.t: "回祖线第一阶段"
  QIE_ws_god_circle_events.10.desc: "一支从宁夏沙沟门宦东逃到华北平原的哲合忍耶家庭目睹了在北京城内摇头晃脑的救世新教乩手请“教祖”过程。"
  QIE_ws_god_circle_events.10.a: "这不是我们认识的他。"
  QIE_ws_god_circle_events.11.t: "达加勒"
  QIE_ws_god_circle_events.11.desc: "这支家族消失在了北京城的暮色之中，在第二天，人们依然聆听着救世新教对这一切经文的解释。以及呼吁人们为了国家和民族，向所有敌人发动战争。"
  QIE_ws_god_circle_events.11.a: "他们所称之为天园的，实则是火狱。"
  QIE_ws_leader_stories_jiang_increase: "§C江朝宗的政治权力得到了§R增强§C！§!§!§!"
  QIE_ws_leader_stories_jiang_decrease: "§C江朝宗的政治权力受到了§R削弱§C！§!§!§!"
  QIE_ws_leader_stories_wu_decrease: "§C吴佩孚的政治权力受到了§R削弱§C！§!§!§!"
  QIE_ws_leader_stories_wu_increase: "§C吴佩孚的政治权力得到了§R增强§C！§!§!§!"
  QIE_ws_leader.1.t: "在书房中"
  QIE_ws_leader.1.desc: "自江朝宗在世界媒体面前大放厥词，救世新教掌控政府权力，已经过去快两周了。吴佩孚也早已苏醒，据说他醒来后的第一件事就是问护士曹锟在哪里。在得知曹锟在那天的政变之中被宗社党人的流弹射死之后，这位强硬的军阀再也忍不住泪水，为自己的伯乐与恩师痛哭一场。然而很快，当他得知曹锟在外界被污名为“刺杀皇帝”的凶手之后，他的悲伤变成了愤怒。\n\n是的，他可以理解这是为了保全自己，也是为了保全局势所做出的妥协，但他无法接受这个选择。更何况，谁能证明江朝宗真的是来解围，而不是算计了他们所有人？这两周他把自己关在书房里，将过去九年江朝宗寄来的每一封信，每一封信都一一拆开，仔细阅读。一直到丙子年六月的那最后一封。他几乎可以肯定，是江朝宗故意放任那些保皇派杀了曹锟。但是已经到现在这个局面了，谁会相信他？那家伙特意叫刘玉春在记者会上站在身边，自己名义上又是救世新教的教院院长。如果就这样贸然指控，人们会怀疑是吴佩孚自己的苦肉计，在背后授意了这场“反政变”，千秋万代，以后所有经学家都会戳自己的脊梁骨。\n\n吴佩孚一拳把台灯从桌子上砸下去，试图舒缓压力。钝击的疼痛从他的指尖传进心脏，然而这疼痛似乎启迪了他什么——至少自己名义上还是救世新教的教院院长，过去只是一个慈善交谊会里的虚职，但在今天的北京城内却已成为了权力的象征。\n\n“只要能证明地位……”他喃喃着，一个大胆的计划在他胸中成型，说到底救世新教的“教”只是皮囊，它的本质和其它之前的北京政权毫无不同。如果他能光复自己作为教统的地位，那么或许他就能为曹锟沉冤昭雪——不对，那个他曾在开平武备学堂里幻想过的，复兴儒家礼仪之国的梦想或许也能成为现实。\n\n他起身披上大衣，推门走出了书房。门外等候已久的年轻卫兵立刻惊醒过来。"
  QIE_ws_leader.1.a: "玉帅，您好点了吗？"
  QIE_ws_leader.2.t: "在丰泽园里"
  QIE_ws_leader.2.desc: "自江朝宗在世界媒体面前大出风头，救世新教掌控政府权力，已经过去快两周了。在这段时间里，江朝宗正忙着向他昔日的政治盟友们兑现诺言。政治家和骗子的区别在于，前者能证明自己是个言而有信的人——当然所证明的仅限于自己许诺的东西，不包含对方听到许诺之后幻想的东西。\n\n今天的江朝宗在丰泽园里邀请了邓邦述等人，表面上同邓闲聊，痛陈教育之重要性，希望邓邦述能为北京研究院再捐献一些珍贵善本。实质上是探听对方是否愿意在这个新政府出任一官半职。可惜，邓邦述年事已高，谢绝了江朝宗的邀请，于是二人便只能聊些家长里短的闲话，再顺道赞赏一下丰泽园的葱烧海参。丁巳复辟失败之后，张勋仓皇逃往使馆城市，而江朝宗因自身与政军界人士之间的良好关系，被段祺瑞所忌惮，到最后也只是段大总统被夺去了九门提督的职务，转而当上了“迪威上将军”。\n\n人情关系和共同利益就是他取胜的法宝，向这些老人许诺有个大蛋糕可以切，就能轻易地将他们联合起来。而吴佩孚显然不懂这一点，不论是“好人内阁”还是宗社党叛乱，这个理想主义者总是容易被昔日友谊左右。作为元帅来说他的这种性格是个好上司，但想在北京政府中呼风唤雨——他还差得多。\n\n尽管嘴上还在应承着邓邦述，但江朝宗已在脑中为拜访下一家谋划说辞了。就在这时，一个神色紧张的年轻人闯进了丰泽园的雅间，他的衣服版型明显和身材不符，俯身到江朝宗身旁耳语了几句。"
  QIE_ws_leader.2.a: "看起来吴小鬼儿找到回家的路了？"
  QIE_ws_leader.3.t: "令仙舟老人胃痛的一晚"
  QIE_ws_leader.3.desc: "龚心湛叹了口气，六十岁的他弃桌上的文件于不顾，在办公室的地板上躺了下来。拼花木地板硌得他脑袋疼，就像他家里那张床一样不舒服。但是这一切都比不上自己看过的那些电报——华东混战已接近尾声，但八省联合的难民们每天都在越过边界，进入华北政府控制的区域，救世新教救灾人手严重不足；另一方面，四川那脆弱的农业结构终于随着一场大旱带来了大饥荒，如果对饥荒无所作为，又会损害到救世新教自身的社会地位。\n\n人和资源，什么都缺。\n然而偏偏是这时，江朝宗和吴佩孚两人却开始为了那个“领袖”之位各自较劲了。他们两个都想统治这艘正在漏水下沉的大船，却对制止下沉这件事兴致缺缺——这可是最令人胃痛的情况。\n\n“两个混蛋，就在这里哈搞。”\n\n他突然想起十几年前，就在这间屋子里他被人骂了同样的话，自己一气之下辞职要去使馆城市。那时钱能训尚未作古，派人去请他回来，他要和钱能训约法三章的事情。"
  QIE_ws_leader.3.a: "“武人不能骂人”吗……"
  QIE_ws_leader.4.t: "新国新教，新领袖呢？"
  QIE_ws_leader.4.desc: "在紫禁城宗社党人发动的叛乱（或者维新革命，取决于你怎么称呼）最终被江朝宗利用，这些满清勋贵的尸骨成为了这位北洋老将和他的“大帐篷”——救世新教通向权力的台阶。教团虽然已掌握权力，但它的领袖仍悬而未决——毕竟这不再是一个带有神秘主义性质的慈善兄弟会，而是一个真正在掌控国家的宗教或政党。想必接下来各方势力都会为了北京政府里领袖的宝座大打出手吧。\n\n您可以在国策树中看到江朝宗和吴佩孚各自的国策，您无权插手他们的行动，这些国策会随着时间推进由他们自己依次完成，而您所能做的就是在命运的分歧点轻轻拨动纺车，让胜利垂青其中一方，或谁都不垂青——这或许会影响他们各自达成国策的速度和结果，并决定了谁会胜出。\n\n我们为这条路线编写了大量由“人类生成”（Human-Generated，既不是AI-Generated也不是God-Generated）的事件，会随着您选择支持的一方而有不同视角的体验：当然！您可以选择体验江朝宗的故事，却如同在救世新教乩坛上显现的，喜怒无常的神灵那样，因自己的一时玩心就把胜利的桂冠赐给吴佩孚，这样您就可以收集到江朝宗的“战败事件”。但我们依然劝您选择您想游玩路线的视角，因为这个政权对于那些吞下苦果的败者可没有太多好脸色……"
  QIE_ws_leader.4.a: "让我跟随江朝宗将军一起切蛋糕。"
  QIE_ws_leader.4.a.tt: "§C您将以§Y江朝宗§C的视角体验整个斗争事件链，并且可能会影响未来的剧情发展。§!"
  QIE_ws_leader.4.b: "带我去玉帅吴佩孚构想孔孟新国家的书房。"
  QIE_ws_leader.4.b.tt: "§C您将以§Y吴佩孚§C的视角体验整个斗争事件链，并且可能会影响未来的剧情发展。§!"
  QIE_ws_leader.4.c: "有没有不选这两个神经病的安静一点的选项？"
  QIE_ws_leader.4.c.tt: "§C您将以§Y隐藏的第三方§C视角体验整个斗争事件链，并且可能会影响未来的剧情发展。§!"
  QIE_ws_leader.5.t: "1923年之邂逅"
  QIE_ws_leader.5.desc: "1923年关东大地震发生之后，救世新教成员就前往日本对当地进行慰问和赈灾。这一方面提高了救世新教的国际形象，另一方面也使得教团与日本当地的一支宗教团体建立了联系——大本教，由出口王仁三郎领导的日本民间宗教团体。在进行互派使者和友好的交流之后，大本教在北京设立了分会，而救世新教也在日本吸纳了一些外籍会员，并在奈良同样建立了分会。但随着几次直奉战争的爆发与结束，两边的联络处最终还是停止运行了。\n\n江朝宗身穿里衣，身边全是揉成团的废纸，坐在床上想着要如何扳倒归来的玉帅——他错误地估计了吴佩孚能够动员起来的政治资本和社会力量，如果在乾清宫多留一颗子弹给他，或许就没有这么多事情了。作为直系头目的吴佩孚就算再被那些知识分子攻击，和自己这样一个曾追随张勋，还在北京城内主持神秘学活动的北洋遗老一比，他们也立刻就知道谁才是最大的反动派。他急需一些能够证明吴佩孚不值得相信，不值得追随的证据。\n\n和德国人交易？路边的小娃娃都知道直系在干这种事。\n个子矮？拿这种理由攻击落水狗还可以，对尚有威胁的对手只会招人耻笑。\n和日本人有秘密盟约？这几乎不可能——但事实，或者说要让人们知道的“事实”并非如此。正是因此，他才会反复酝酿自己想说的话，发给救世新教在日本的盟友。\n\n如果找不到证据可以伪造一个证据，一封来自日本某家实业公司的信，信中应该要暗示吴佩孚与他们之间达成了某种“密约”，这封信一定要足以让报馆兴奋、却又难以立刻证伪——而信件被某个人截获，由投递员“错误”投递给了报社，如此一来就足够引发一场骚动，削弱这位“民族强人”的政治信用。那些报社只在乎明天能卖多少报纸，不在乎真相。\n\n但问题在于，这种招数真的能奏效吗？恐怕只有神仙能给出答案。"
  QIE_ws_leader.5.a: "而不幸的是，我尚还没有变成神仙。"
  QIE_ws_leader.6.t: "风言风语"
  QIE_ws_leader.6.desc: "位于北京地区的《华北之星》报社今天收到了一封奇怪的信件，内容是日本的一位轮船经理写给吴佩孚的信，信中多次提醒吴佩孚要“记住前次磋商之事”，似乎生怕阅读者不知道他们之间存在什么秘密交易似的。\n\n《华北之星》的记者们很快意识到，这封信与其说是一份揭露吴佩孚恶劣过去的线索，不如说是一份伪造的黑材料，目的是在当前尚未明朗的北京局势之中打击潜在的竞争对手。若按照幕后主使的意思将之直接刊登，恐怕会导致报社也成为被攻击的对象。他们在新一期的报纸上隐晦地警告了那些想要利用报社对政敌进行攻击的人士，指出报社对未经证实之材料一贯抱有审慎态度，并呼吁读者勿轻信相关流言。\n\n伪造日本人和吴佩孚存在私下勾结的黑材料反而导致吴佩孚本人的声望在民间有所上升，一些摇摆不定的中间派更倾向于支持玉帅的势力。更坏的消息是，人们开始怀疑这份黑材料可能出自那些与吴佩孚争夺权力的竞争者之手——最大的嫌疑对象是迪威上将军江朝宗，此人与日本关系密切，说不定是他说服了日本人来损害玉帅的名誉。再没有比这更糟的情况了。"
  QIE_ws_leader.6.a: "搬起石头砸到了自己的脚。"
  QIE_ws_leader.6.b: "小丑般的的争权伎俩。"
  QIE_ws_leader.7.t: "云阳丸号事件"
  QIE_ws_leader.7.desc: "位于北京地区的《华北之星》报社今天收到了一封奇怪的信件，内容涉及到吴佩孚和日本一位轮船事务经理。尽管一开始报社记者们认为这是在这个时期出现的任何“外国密信”都大概率是打击政敌的黑材料，但记者们对旧档案的翻检却发现了令人意外的收获。\n\n这封信件内容涉及到1923年吴佩孚与日本日清汽船公司之间达成的一系列秘密协议，吴佩孚向日本方面输送利益，以通过两艘日本货轮“云阳丸”和“宜阳丸”向四川武备系头目杨森提供军火，从而尝试结束川系军阀之间的内斗。尽管吴佩孚的目的是恢复四川的稳定，但他与日本人在台下相互勾结，做了交易这件事似乎已经是板上钉钉的事实。\n\n这封信件全文和相关证据被披露之后立刻在华北社会和世界上都引起了轩然大波，使得那些支持吴佩孚的人群发生了进一步分裂。在旧政学系的一些成员的煽动下，出现了一批激进的知识分子在他们自办的小报上抨击吴佩孚是“伪君子”，“不敢光明正大做事的小人”。无论如何，看起来吴佩孚长期以来向外人建立的“民族强人”的印象正在逐渐崩解……"
  QIE_ws_leader.7.a: "玉帅之短，原来不止在身量。"
  QIE_ws_leader.7.b: "命运与偶然之神向其中一方展露了微笑。"
  QIE_ws_leader.8.t: "有人在试图抹黑"
  QIE_ws_leader.8.desc: "吴佩孚读着送来的《华北之星》报纸翻译稿哑然失笑，从各种角度上来讲，这都是一步昏招。《华北之星》的记者们刊登了一封日本轮船招商经理写给吴佩孚的信。通读下来，这封信漏洞百出，措辞也刻意得近乎可笑，几乎恨不得把自己“暗通日本”的罪名写在每一行里。\n\n“他给我戴的帽子可太大了，”吴佩孚一边读着这篇拙劣的伪证，一边饶有兴趣地拿起朱笔，在信上圈出了几个字，他当然知道这封信是谁伪造的，想不到江朝宗最后竟和他玩这一套——攻击自己的爱国主义形象，可惜这些攻击不起作用，还要被刊登在报刊上为社会人士所耻笑。吴佩孚看了看桌上的另外几张民间小报，那些是北京的知识分子们为吴佩孚正名的文章，这些人本来还在观望，没想到这封信一经刊登，他们立刻就加入了自己的阵营。江朝宗想凭借黑材料攻击自己，但他可算失策了，因为他这么做反而使整个北京城里的人都开始支持他了。真可谓是害人终害己，恶人有恶报啊。\n\n想到这里，他惬意地合上了双眼，后靠在椅背上，几乎已经能想象出江朝宗被自己的卑鄙狡诈反噬时那张气急败坏的脸。"
  QIE_ws_leader.8.a: "他们不会真以为能找到什么吧。"
  QIE_ws_leader.9.t: "清算旧账"
  QIE_ws_leader.9.desc: "吴佩孚读着送来的《华北之星》报纸翻译稿面色凝重，他完全没有想到自己为了支持杨森，干涉四川内战的旧事被这群鬣狗一般的记者发现了。更让他感到头疼的是，随这桩旧事一同刊登的是一份由一个不知道哪里来的日本轮船经理，写给吴佩孚自己的添油加醋的信件。\n\n在报纸上，记者们宣称找到了吴佩孚干涉四川内战时与日本人达成协议的证据。根据报道，吴佩孚和日清汽船公司达成了一系列协议，通过日本的货轮，雇佣日本的护卫押送一批日本武器前往四川，向直系的武备系盟友杨森提供支援。这是事实，自己确实这样做了。但后半段的那封信件里却说了更多吴佩孚自己干都没干过的事情，其中最恶劣的一桩莫过于这位经理说“吴佩孚许诺在中华统一之后日本汽船于长江地带的合法利益”，这几乎使他暴怒地捶打桌子，把右手边为了彰显“秀才”身份的毛笔都震到了地上。\n\n他吴佩孚看起来真的很像一个向日本人摇尾乞怜的汉奸吗？然而由于前半段内容的证据实在太过确凿，反而让很多人怀疑后半段的指控也确有其事，只是玉帅巧妙地隐藏了证据，继续向外人展示他作为“民族强人”的形象。\n\n不管怎么说，北京知识界和政治界都发生了巨大的震动，一向和直系对着干的旧政学系在黄郛的带领下，开始大力炒作自己是个“伪君子”，是“假民族主义之名、行私相授受之实”。自己的政治资本被极大地削弱了，而这一切的起因都要怪那些记者太过多事。"
  QIE_ws_leader.9.a: "他们怎么还真能查出来东西？"
  QIE_ws_leader.10.t: "玉帅的一击"
  QIE_ws_leader.10.desc: "从北京城的东便门出去，沿着通惠河的方向一路走下去来到高碑店村，就是北京的老闸口了。再多走几步来到略显破败的龙王庙里，吴佩孚在山门殿前迟疑了一下，是某种愧疚还是踌躇吗？但他最终还是在青龙白虎两位大将军的注视下踏了进去——吴佩孚已经九年没有出席过救世新教的会议，而他自然也九年没有拜访过这里了——这里正是北京明经学会的聚会地点，其成员几乎全是唯吴佩孚马首是瞻的救世新教成员。可是这么多年过去了，还会有多少人留在这里呢？\n\n令吴佩孚感到意外的是，当他迈入东厢殿后，竟还有七八人正在其间围炉煮茶，可惜吴佩孚一概都不认得他们的脸。见到吴佩孚的到来，这群人先是一愣，随后手上的动作开始忙乱了起来，显然是未预料到会发生这种事。如今，活生生的玉帅就出现在他们面前。经过一番解释，吴佩孚方才知道这九年间，明经学会的旧人已走的七七八八，留下的就是他们这群与自己在教内素未谋面，但却十分仰慕自己的“追随者”。\n\n然而吴佩孚此行却并非为了找学会的故人叙旧，也不是为了受几个后进信徒的奉承。他深知江朝宗是个在北洋政坛摸爬滚打多年的人物，权衡利益，笼络人心自然是手到擒来，这样的人不可能行事光明磊落，一定会做一些灰色领域的事情。他之前已经打听到，过去九年中教内接收到的捐赠善款虽然名义上是龚心湛在管理，但拨款与否拨款多少则要依靠江朝宗定夺。在宗社党人政变之前，江朝宗又是拉拢各党派人士吃饭听戏，又是安抚各家势力，还要购置走私各种军火，他从哪里掏出来这么多钱？如果能查出什么东西，或许就能迫使江朝宗在斗争中有所退让，这也是他吴佩孚出现在这里的原因。他已经远离救世新教的事务太久太久了，所以才需要这些长期参与的人为他提供一些风声——为此，他努力露出一副文人秀才一样和蔼的面孔，慢悠悠地对自己的这些仰慕者讲话：\n\n“我有一件事，想劳烦诸位替我打听打听……”"
  QIE_ws_leader.10.a: "这近些年的善款去向，你们可曾听过什么风声？"
  QIE_ws_leader.11.t: "一个滴水不漏的人"
  QIE_ws_leader.11.desc: "北京明经学会的那些年轻后生们传回了消息，他们多方打听也没有找到任何足以证明江朝宗挪用教内善款的确凿证据。这件事或许根本就不存在，又或者说江朝宗十分小心，已经把所有证据打扫干净。此外，这些学会成员行事作风实在太过张扬，他们四处探听善款使用的情况已被教内许多人得知。\n\n在最近的例会上，一些成员对教内近期出现的“不正之风”进行了严厉申斥。他们强调说仅凭一时疑心便怀疑社内同袍，是相当失礼也相当危险的行为。与此同时，这些人也隐晦地点到了那些年轻人背后的吴佩孚。他们批评说其在九年间从未过问过教内大小事务，如今重返救世新教，所做的第一件事竟是暗中搜罗把柄、争夺权位。这并不是他们愿意看到的景象。\n\n如此看来，试图从教内行政角度扳倒江朝宗的计划失败了，更糟的是，这次鲁莽的试探反而让教内那些摇摆不定的中间派开始怀疑吴佩孚实际上是个难以信任的争权夺利之人，事情显然没有向着好的方向发展……"
  QIE_ws_leader.11.a: "为什么他们不能再小心一点？"
  QIE_ws_leader.12.t: "敲诈勒索"
  QIE_ws_leader.12.desc: "北京明经学会的那些年轻后生们传回了消息，他们并没有找到能证明江朝宗挪用善款的证据，但他们得到了另一个有趣的消息——在救世新教控制北京之后，江朝宗多方串联拜访，借救世新教的名义对京城内的富有者进行恐吓欺骗，以“保护”之名收取财富。\n\n他选择性地进行敲诈，对于那些之前并未支持他的政变计划的实业家与清室贵族，他就暗示对方上供“社会维持费”；而对于那些在之前的北京乱局中或多或少站在他一边的富有者，他就以所谓前途与社会地位为许诺，怂恿对方“自愿”为救世新教捐款。一位学会成员联系到了这些“捐款”的实业家之一，他所捐的数目与救世新教善功簿上的数目有所出入，看来江朝宗确实在玩雁过拔毛的把戏。\n\n吴佩孚委托这些年轻人在教内例会上谈到了这件可耻的腐败，引起了教内大多数中立派——他们主要来自负责财政的龚心湛所处的鸾务院-慈院势力——的愤慨，他们已经联名要求江朝宗亲自出席下次会议解释这件事。如今八省联合的难民问题尚未解决，赈济四川饥荒又急需要用钱，在这个时候引爆这件丑闻极大地削弱了他在救世新教内部的影响力，看来他不得不远离权力的宝座了。"
  QIE_ws_leader.12.a: "沦丧道德之辈，莫碰道德之位。"
  QIE_ws_leader.12.b: "致命一击。"
  QIE_ws_leader.13.t: "急功冒进"
  QIE_ws_leader.13.desc: "吴佩孚想必是圣贤书和演义小说读多了，居然会以为江朝宗自己若真要挪用社内资金，就会大大方方地从账面上支取。更令江朝宗大跌眼镜的是，他居然敢授意让北京明经学会的那帮追随者去替他搞。这些人查又查不出什么东西，反而还会招致教团内其他人的不满——因为总有人还没打理好身后的那条尾巴。学会成员在例行会议上被围攻是意料之中，而吴佩孚会因为这次调查引火上身更是不用多想就能得到的事实。归根结底还是吴佩孚缺乏政治头脑，而他的追随者又是一群血气方刚，毫无城府的年轻人。至少这一次——是他江朝宗赢了。"
  QIE_ws_leader.13.a: "玉帅需要一个称职的政治参谋。"
  QIE_ws_leader.14.t: "忘记分出去的蛋糕渣"
  QIE_ws_leader.14.desc: "这帮北京明经学会的后生们就像一群莽汉一样横冲直撞，丝毫不懂得尊重社会上的社交原则。他们怎么能想到直接拿着善功册去找那些给救世新教捐赠的实业家的——这一下子可把江朝宗从中捞钱的事实全都败露出来了。现在可好，那群负责运作赈灾的人知道自己揩了油，一个个都化身成冤亲债主一般，好像是自己上辈子欠了他们一笔钱似的。这种几乎无法遮掩的丑闻暴露出来，教内那些人也不敢站出来为自己张目了，毕竟这时候跳出来就相当于声明他也从江朝宗手里拿了一份。这下自己可真是在整个救世新教内部都孤立无援了，而更让人头疼的还在后面——龚心湛纠集了一群人要求自己把这件事解释清楚，并计划在吕祖阁中开沙问乩，弹劾他作为事院掌院的职位。近些日子也有一些小报记者闻风而动，如果这件事最后在社会上被曝光，救世新教必然要把他推出去牺牲掉以保全整体形象。自己这次可算是要大出血了，这群只知道落井下石的小人。"
  QIE_ws_leader.14.a: "之前应该分他们一份的。"
  QIE_ws_leader.15.t: "李思浩的回归"
  QIE_ws_leader.15.desc: "由于目前教内的权力斗争仍在继续，江吴二人都互不服输地各自施展神通，计划扳倒对方，整个北京最上层的政治结构实质上是空白的。不过江朝宗还算识相，他给龚心湛大开方便之门，要他只要为救灾可随意支取教内以及政府账户上的资金。但为了改善瘫痪的行政机制，龚心湛还是牵头成立了一个由四位救世新教成员组成的暂时委员会。\n\n“我们现在什么都缺，”龚心湛再一次说了这几天已经对这些实干派强调过很多次的话，“就如各位知道的，现在智玄和慧济正为了北京城的宝座打的不可开交，能平定北京乱局的，恐怕只有在座的我们了。我今天召集各位，就是想请大家一起出谋划策，想想该怎么办才能解决这件事。”听到这里，其他人也开始各自发表自己的意见了:有说像社会富翁强制征收社会责任费的，有说把印钞机用出火星子大量印钞渡过危机的，还有人提议说去把慈禧太后的坟掘开，找老佛爷借钱的——净是些天马行空，做了恐怕会有损救世新教统治根基的事情。\n\n“我们为什么不重新搞之前的北京慈善银行?”这个建议从上到下贯穿了龚心湛，他之前确实没想到这个——这是段祺瑞政府还执掌北京时，由当时的财务总长李思浩帮助救世新教设计，目的是通过信贷和金融对社会资金进行利用，并从净息差和非息收入中获取持续运营资金。然而段祺瑞政府因直皖战争而倒台，李思浩也被直系通缉，此后辗转于湖南和奉天，目前仍寓居于使馆城市天津地区。“当然可以，而且是个好方略啊。”龚心湛的眼睛放出光来，“既然我们已经掌权了，为什么不撤销他的通缉令——让这位建立者回来继续他的工作呢？”"
  QIE_ws_leader.15.a: "皖系政府的复活？"
  QIE_ws_leader.16.t: "李思浩回到了北京"
  QIE_ws_leader.16.desc: "我们收到消息，前皖系政府官员，财政总长兼盐务省督办兼币制局总裁李思浩的通缉令已被撤销，他目前已返回北京。自皖系战败之后，他先后辗转于奉天、湖南与使馆城市之间，始终未能重返北京政坛。\n\n他的这次回归似乎是为了解决救世新教当前面临的赈灾问题，因为撤销了他的通缉令的人是龚心湛。为了确保赈灾工作的有序高效进行，龚心湛已经在政府内部组织了一个由四名救世新教成员组成的临时委员会，随着李思浩回京，这个委员会实际扩展为五人。如此赤裸裸的结党行为本应受到谴责，但考虑到目前只有他们在处理相关问题，对这件事的处理或许可以先暂缓执行。\n\n在李思浩的主持下，救世新教十几年前的“北京慈善救济银行”已经重新开始运营，正在从社会上吸纳闲散资金用于相关工作。"
  QIE_ws_leader.16.a: "财政总长？我不关心这种事。"
  QIE_ws_leader.16.b: "龚心湛有什么权力这样做？"
  QIE_ws_leader.16.c: "欢迎回来，老朋友。"
  QIE_ws_leader.17.t: "江朝宗登临教统之位"
  QIE_ws_leader.17.desc: "自古以来，中华大地之上只能有一位共主，京城也只能有一把龙椅——而如今这个位置已落入了江朝宗手中。在前几日的教内例会上，一些成员针对先前吴佩孚的“通日”行为做了报告：一开始是温情脉脉的场面话，这些在政教两界摸爬滚打了几十年的人精，自然不缺这样的本事。直到那声拖长了的“但是”落下之后，这些人的代表指出吴佩孚目前面临的是极为严重的社会信誉危机，为了维护救世新教“承担社会责任”的这层身份，他们希望吴佩孚能够自行辞去救世新教教统的身份，然后对外宣称将“闭门思过，痛定思痛”。如果不这样做的话，恐怕教内就将问乩请示吕洞宾，寻求更进一步的措施了。\n\n当然，既然风向已变，落井下石也成了顺理成章的事，他们还称吴佩孚长期缺席救世新教会议，虽然名义上还是教统，但实际上已经自愿放弃了该职位。有一些人推举近期治理流民问题相当出色的龚心湛出任教统之职，但遭到了对方的拒绝。龚心湛反而支持江朝宗担任教统职位，理由是在这几年期间，大小事务皆由江依规打理，按各种道理，都是江朝宗该坐在这个位置上。\n\n江朝宗毫不怀疑自己能登临教统之位，因此根本没出席这次会议，而是让他一直维持的那支家伶来给他唱戏。等到与会的其他人向他来宣布这个消息的时候，这几个人正在丝竹乐师的伴乐下上演《南极增辉》——这可是自1927年溥仪复辟之后再也没有演过的剧目。"
  QIE_ws_leader.17.a: "稽首拜龙轩，祝圣皇德治同乾健，"
  QIE_ws_leader.17.b: "享升平受福无边，抚华夷垂衣端冕，"
  QIE_ws_leader.17.c: "绵宝祚亿万斯年。"
  QIE_ws_leader.18.t: "萧瑟之秋"
  QIE_ws_leader.18.desc: "吴佩孚没去救世新教的例会，他坐在书房里，倚在自己那张皱巴巴的虎皮靠背上。只是坐在那里。\n\n救世新教此前派来信使，通知了他例会结果：在会上一些人建议他辞去救世新教的教统职务，专心思过。至于空出来的教统之位，大多数人都主张应该由这九年间实质上控制教团的江朝宗出任。这个结果毫不意外，在北京城乃至整个华北的舆论场中，自己已经从那个登上美国《时代》周刊，带领中国人民“重整山河”的强人变成了一个心口不一的小人。他曾视乔治·华盛顿为自己的榜样，然而如今看来，他已失去了在中华大地上建立同样丰功伟绩的机会。\n\n这个消息让玉帅的参谋们大为震动，李济臣指出，明明是玉帅为华北带来了这十余年的和平，但如今他们却想卸磨杀驴。目前的社会局势仍处于混乱状态，只要玉帅一声令下，他李济臣就会带领直系官兵冲击政府，清除那些道貌岸然之辈。然而他，吴佩孚，“中国最强者”，只是抬手止住了他。在这种时期发动军事政变，只会进一步破坏民众对他的信任，并且更加坐实他“阴谋败露，恼羞成怒”的动机。\n\n即便政变成功，生前自己或许能凭滔天的权力压制民众的议论，可百年之后，千年之后，当他已作古，而中国仍立于大地之上时，人们又会怎么称呼他呢？\n\n正因如此，不能为今日一时之利，断送千古儒将清名。至少如此一来，百年之后仍或许有文人大儒替他翻案，可政变之后，人们只会记住他是个与其他人无异的大军阀。"
  QIE_ws_leader.18.a: "三人成市虎，浸渍解胶漆。"
  QIE_ws_leader.19.t: "吴佩孚登临教统之位"
  QIE_ws_leader.19.desc: "君子与君主的区别在哪里？对吴佩孚来说，后者不一定拥有前者所具有的美德，前者不一定拥有后者所具有的权力——他相信自己早已具备君子的德行，而如今他也终于得到了君主的权力。在前几日的教内例会上，一些成员针对先前江朝宗的贪污行为做了报告，似乎是在长久的沉默与回避之后，救世新教终于打算解决这起教内丑闻了。因为有一些多事的小报记者不知道从哪里听闻了风声，开始四处散播类似的流言。这对救世新教一以贯之的“慈善”面目相当不利。\n\n江朝宗受到了处罚，他仍被允许保留教内名籍，但被剥夺了事院掌院的职务，并且今后无权再过问与控制教内资金。据参加了会议的人说，当教团宣布这件事的时候，出席会议的江朝宗尽管尽力维持仪态，但还是看起来很震惊和不安。另外还有一个消息，以龚心湛为首的，这段时间一直负责赈灾活动的成员主张应该由吴佩孚继续作为教统领导救世新教。尽管吴佩孚连续九年未出席救世新教的会议，只是一个名誉上的教统，但现在既然他已经回来，那么重新承担起相关职责是应该的。\n\n吴佩孚能听懂里面隐藏的意思，经过这段时间的救灾，百姓们其实已经接受了救世新教的统治，而以龚心湛为首的这群人想利用自己在社会中的威望进一步巩固救世新教的地位——他当然不会拒绝，并且这一次，他终于能让中国回到它本该走上的道路，回到那条曾被中国人如瓦砾般舍弃的传统道路上了。"
  QIE_ws_leader.19.a: "曾经伯乐识长鸣，不似龙行不敢行。"
  QIE_ws_leader.19.b: "早晚飞黄引同皂，碧云天上作鸾鸣。"
  QIE_ws_leader.20.t: "败渭南"
  QIE_ws_leader.20.desc: "坐在救世新教的会议席中，听着对自己一条又一条的指控，江朝宗只觉得天旋地转。自己并非是没有给过他们足够的好处，但现在这些白眼狼为了和自己撇清关系，竟一个个地都装模做样地当起圣人来了。这群人为了自保，最后一致做出了一个决定——剥夺他作为事院掌院的权力，并且将他排除出了整个财务体系。这意味着他今后只能在教团里当个边缘人，虽然并非没有东山再起的机会，但自己还有多少年可以利用呢？\n\n江朝宗从鼠年的新春就开始谋划，试图通过北京城内的混乱攫取权力，明明只差最后一步，却因为“贪污”——这种对大多数人来说根本算不上什么大事的罪名被扳倒了。迄今为止所做的一切，都给他人做了嫁衣。而且更重要的是，这群见风使舵，恃强凌弱的小人，在把脚踏在自己身上之后，转过去巴结起吴佩孚了。他们一致推选吴佩孚重归教统之位，全然不提他过去九年对教内事务的漠视。\n\n这漫长的例会终究结束了，走在北京城的街道上，以往数不胜数的乞讨流民也已被整治干净，穿过正阳门箭楼，竟还有一伙撂地唱戏的民间戏班尚未收场，正演的是《战冀州》，只见那长靠武生一把抓住长枪，如同天将下凡："
  QIE_ws_leader.20.a: "银枪一举追尔命，食尔之肉方称心。"
  QIE_ws_leader.21.t: "死者归来"
  QIE_ws_leader.21.desc: "救世新教的例会几乎陷入了失控：吴佩孚在社会上被指控和日本人有私下密约，江朝宗则经过教内举报被发现有贪污善款的行为，这次例会的目的就是解决这两个人的问题。虽然在座的成员都清楚，这一切都是二人缠斗，相互较劲的结果，但最后他们二人却落了个两败俱伤的结局。假使忽视民意，让吴佩孚继续担任教统，那只会让救世新教的合法性变得进一步糟糕透顶；假使对江朝宗的那些行为默不作声，一旦未来一天有哪个气不过的北京明经学会的直性子在外面说漏了嘴，那救世新教可就连慈善组织都当不成了。\n\n玉帅仍居于他的书房，江朝宗倒是来到了会议现场，一副要吃了所有人的样子。就在这个尴尬的时刻，最先打破寂静的人是龚心湛：\n\n“既然目前还没有任何推进，那就允许我汇报一下近期的工作。”他清了清嗓子，向其他人汇报了社会危机治理的情况——这本不需要过多汇报，只要走到大街上看一看，就能知道问题已经基本解决了。正因如此救世新教组成的新政府在北京城内的名声也变好了不少。也有不少人觉得，龚心湛或许能担起教统/领导人的位置。\n\n“至于诸位讨论的教统问题，我另有一条信息要汇报，”十几双眼睛看向了龚心湛，江朝宗也死盯着他，那眼中似乎露出了一丝希望的光亮——他好像觉得龚心湛会为自己说话似的——“我已同另外四人于燕京吕祖阁中请示过孚佑帝君，帝君不愿看我教中人沦落于世俗，沉迷于荣华。警告绝不可选吴佩孚或江朝宗二人执掌教内大权。”他展开两张纸，一张上是开沙扶乩后得到信息的原像，另一张则是工整抄写的乩语。“帝君感念慈悲，特求太一老祖，遣派能训先天普化正明钱真人下降，指导我等以礼治国，以伦育人。钱真人有旨：凡大事，需先请问钱真人再作决定；凡小事，皆由慧澈、悟真、弼谛、慧义、玄一五人自行定夺。此外，帝君感念慧济与智玄之苦劳，特命二人尽心辅佐，戴罪立功。”\n\n没人能想到龚心湛竟能说出这样的话，钱能训是北京政府1919年内阁的国务总理，也是救世新教的首任教统。他死后教中人士曾扶乩请示，得知他已飞升玄都紫府，受封为“先天普化正明真人”了。\n\n然而面对这一切，最先暴起的是江朝宗：“你们还在胡搞？钱能训已经死了！”\n\n“难道江掌院是要置疑孚佑帝君谕旨不成？而且——”龚心湛自上而下，俯视着江朝宗，脑子里突然蹦出来了一句颇有意思的话："
  QIE_ws_leader.21.a: "武人不许骂人。"
  QIE_ws_leader.22.t: "生者侍候，真人落座"
  QIE_ws_leader.22.desc: "事情正朝着诡异的方向发展。又或者，从1936年开始的所有事情都足够诡异。在救世新教的控制之下，北京政府的会议上，坐在大总统之位上的并非是一位活人，取而代之的是一张黑白照片。照片上的人正是钱能训，1919年的国务总理，同时也是救世新教的首任教统。自他死后，救世新教成员曾在吕祖阁中扶乩求问儒、释、道、耶、回五教祖师，得到回复称他已化为神仙，永享安乐。\n\n但如今，这位“神仙”坐在会议中最高贵的位置，在他左侧站立的乃是救世新教夺权的大功臣，迪威上将军江朝宗；在他右侧站立的则是长久以来都未曾出席过救世新教会议的前任教统，孚威上将军吴佩孚。没有大总统的命令，二人都不敢落座，可一张照片要怎么开口讲话呢？直到龚心湛、王锦蕖等人走进来开口宣读今日议程，二人方才能够坐下。\n\n而这漫长的政府会议也终于就此开始……"
  QIE_ws_leader.22.a: "向钱总统问好。"

