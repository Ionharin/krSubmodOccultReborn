l_simp_chinese:
  QIE_ws_god_circle_events.1.t: "至圣先天"
  QIE_ws_god_circle_events.1.desc: "位于北京北城半壁街的吕祖阁建于清朝初年，1920年，当从河南广善坛而来的三位悟善社社员来北京寻求资金援助时，正是江朝宗为他们置办下了这处土地作为悟善社的活动据点。等到后来悟善社改组为救世新教，他们依然在这里处理教内事务。\n\n自从宣统复辟，和谐社团出现，清政府设立了国会之后，由于社会舆论多被进步知识分子与新式报刊所掌握，救世新教便一直尽量维持低调，以免遭受到社会人士对他们的神秘学和迷信活动——“扶乩”的攻击。这些活动在吕祖阁中转入更加隐秘的状态，以至于吕祖阁的大门长年以来并未对外人开放。\n\n救世新教从天地之间独一无二的至高神——至圣先天太一老祖手中得到了《太乙北极真经》，这卷真经是世间一切宗教的起源经文，其上有儒、释、道、耶、回五教教祖所赐的五道法印，以证明个中内容真实不虚。然而今时不同往日，教团既然已经掌握了华北政府的控制权，那就没必要再对他们的行为遮遮掩掩。就在今日，一向大门紧闭的吕祖阁再一次打开殿门，其中香火缭绕，诵经声不绝于耳。救世新教的普通信徒们从中涌出，斜挎着小包，手拿着传单，向北京城中的人们宣传五教教祖的德行与太一老祖的尊贵。并呼吁人们快快回心转意，多行善事，皈依救世新教。\n\n“当此文化凌夷，纪纲失坠，残贼人道，重困民生，本教应时势而出，引儒释道耶回五教精义，五教者悉引予同化，以臻宗教之大同。故而能纳天下世界民族于一教大统之下。”成员们一边这样喊着，一边把传单塞给每一个他们看到的人。\n\n但凡有救世新教成员传教的地方，都有一到两名军警负责维持秩序，迫于军警的威慑力，人们不敢不接传单，但他们是否能够接受这种宗教形式，仍还需一段时间的观察……"
  QIE_ws_god_circle_events.1.a: "尊道贵德。"
  QIE_ws_god_circle_events.2.t: "堕三都"
  QIE_ws_god_circle_events.2.desc: "“诸位，诸位，甭管您是烧锅的庄田的，教书的治病的，剃头的擦背的，抹油的卖糖的都麻烦你老请听我讲嘞！”\n\n“别瞧着要饭耷拉头，它要饭不在下九流。我念过诗书开过讲，懂得三纲并五常，尧舜皇帝且不论，咱讲讲民国它怎么亡。蒙元且为夷狄朝，犹知尊孔又礼孟；大明定鼎得天下，应天府中设学堂，特讲《大学》并《中庸》，圣人经文亦不轻；清皇虽为满族后，尊礼重经它也没有忘。”\n\n“您瞧瞧这怎么着，且讲民国成立后，礼教倾颓沧海倒，不畏天来不怀德，只把政法科学念，男倡公妻女多夫，名教扫地泰山折。历代总统多轮替，不久于位皆遭难。末劫将来末劫至，上无道揆下无法，惟复衍圣重归位，大经大法救世敝——这教训说了老半天，老板您得给点咱，要省您从大处省，省它十顷带八顷，要算您从大处算，算个十万带八万。您要真说囊中紧，两枚铜子也算缘！”"
  QIE_ws_god_circle_events.2.a: "赏他两分钱买个馒头。"
  QIE_ws_god_circle_events.3.t: "乡愿"
  QIE_ws_god_circle_events.3.desc: "随着吕祖阁中传出的孔子神谕越来越多，这些神谕大有在整个北方扩散的趋势——这当然也包括山东。有传闻说曲阜孔府的现任衍圣公，孔德成在看到了所谓的“孔子降笔”后私下批评了北京；也有人说年轻的孔德成大发雷霆，把府里好多东西都砸了。但这些只算得上是流言，公开场合中孔府对这一切都出奇的沉默。他们甚至派了两个人来北京，参加这次孔子的降乩会。\n\n除了他们和一些政府官员之外，这里更多的是围观的群众。现在孔子开始说话了，只见扶乩者颤动乩笔，在沙盘之上笔走龙蛇，而一旁负责记录抄写的人也是一样地笔走龙蛇，不消一会儿，乩语就被记下来了。主持扶乩的官员推了推眼镜，开始念记下来的字：“古道远矣，吾生求之，盖如邱壑之与泰山，行潦之与大海也。为学老弗辍，所言惟述古圣而已，未敢有所作也。”他又推了推眼镜，开始继续替孔子这位古代圣人念大家半懂不懂的古话。幸运的是，有另一个官员会负责把这些话说成大家都能听懂的意思。\n\n“我所尊奉的太一老祖，他上承玄真之宗旨，派救世新教阐发一部真经，《大学》和《中庸》都不过是这部真经的注解。只是世人未能深入探求。但即便是不理解注解也不要担心，我今天告诉你们儒的精义，它全在‘尊王攘夷’四个字上，王就是礼仪道德，国家和先贤的教化；夷就是邪说，即便是生于华夏的，如果是背离国家教化、破坏礼义秩序的思想，也是夷。掌握了这个，就能成为有德行的人。”\n\n宣讲已毕，陪同孔府人员的官员微微弓下身子，头转向二人，似乎在寻求什么回应。"
  QIE_ws_god_circle_events.3.a: "是啊是啊，孔子说得对。"
  QIE_ws_god_circle_events.4.t: "化胡"
  QIE_ws_god_circle_events.4.desc: "这几月北京城里颇有一种新空气。城里城外的观庙，纷纷刷墙补殿；某处设讲经坛，某处办祈禳会。有人看了很高兴，说这是民族精神复活的征象。我看了却不能不说一句扫兴的话：这不是民族精神的复活，乃是民族病根的复发。我去年考《真诰》，曾说过一个意思：道教许多经典，里面大半是拼凑来的东西。它偷凑成一部大仓库，然后挂一个“道”字的匾额，便说是中国固有的宗教。我那时说这是“贼赃”，并非骂人，乃是指出它的来历不清，账目不明。如今北京某些人若还要拿这一仓库旧货出来开张，便不能不先问一句：这些货究竟经过盘点没有？\n\n有人说：这宗教现在也办慈善，施粥、施棺、救济穷人，何必一概攻击？我并不反对施粥，也不反对救济穷人。但慈善若靠神权作招牌，便容易变成另一种买卖。今日施一碗粥，明日劝人捐一炉香；今日发一口棺材，明日叫人相信城隍、东岳、十殿阎王都在那里记账。这种慈善，是用人的贫穷来维持人的迷信。真正的慈善，是使穷人少受穷；假的慈善，是使穷人受了穷还要感谢神明。\n\n北京尤其不可轻言宗教复兴。北京是大学、图书馆、研究所、报馆汇聚的地方；这里应当给全国做一个理智生活的榜样。\n\n若故都的青年还相信扶乩可以问国事，商人还相信符箓可以保买卖，那么北京的城墙虽古，脑筋却未免太旧了。中国今日最需要的，不是更多的神仙，乃是更多的常识；不是更多的天尊宝诰，乃是更多的科学教育。一个民族若真要自救，第一步便是敢把自己的旧货拿出来清查。好的保存，坏的淘汰。\n\n我愿意劝北京的青年说：不要怕人说你不敬祖宗。我们若把鬼话当作国粹，那才是真正侮辱祖宗；我们若敢把鬼话认作鬼话，把赃物认作赃物，把学术还给学术，把信仰赶出骗人的市场，那才是给中国文化开一条生路。"
  QIE_ws_god_circle_events.4.a: "为何维护旧宗教，舍弃新文明？"
  QIE_ws_god_circle_events.5.t: "莫知其终"
  QIE_ws_god_circle_events.5.desc: "胡大博士近日又有一篇文字，仍袭其旧说，谓道教诸书多为“贼赃”，又借此讥刺北京近来宗教复兴之风。其文笔固轻快，譬喻固新奇，然而细读之下，不过仍是十余年来新派学人惯用的一套办法：凡中国所有，先疑为伪；凡民间所信，先斥为愚；凡足以维持伦常、安定人心者，便一概归入“迷信”二字，扫而空之。\n\n胡先生把“来源复杂”说成“来路不明”，把“会通众教”说成“偷窃拼凑”，这乃是讼棍最爱之笔法。譬如一家贫弱，数代经营，既有祖产，又有婚姻往来所得之器物。若忽来一位洋服先生，站在门口指点说：此桌似邻家式样，此椅似外省工艺，此灯又似外洋舶来，故此家全是贼赃。天下有这样断案的法官么？\n\n更可怪者，胡先生一面责宗教为“国粹旧货”，一面又拿鸦片裹脚相比。夫鸦片戕身，裹脚害体，皆有显害；而敬天法祖、尊师重道、劝人为善、戒人悖伦，其害何在？\n\n胡先生以为凡事皆可交予学校医院，此诚近代制度所应有；然而制度之外，仍须有信仰维系其本。无信仰之学校，只造浮薄之士；无道德之医院，只成买卖之场。\n\n胡先生又把扶乩斥为妖妄。吾人不必为一切乩语作呆板辩护，亦不必谓凡降笔皆字字天成。然自古圣贤设教，或寓言，或象数，或礼乐，皆所以感发愚夫愚妇之良心。孔子删诗书，未尝不取民间歌谣；佛氏说因果，未尝不假天堂地狱；西教宣福音，亦有圣迹奇事以动听闻。独至中国民众所熟悉之扶乩，胡先生便必欲除之而后快。此非爱真理，乃是爱其自己那一套新名词而已。吾人并非谓旧物皆善，亦非谓宗教中无弊。庙祝骗财，术士惑众，江湖符水，皆应严禁。若如胡先生一般，先把祖宗神圣斥为盗贼，再把民间信众骂作愚夫，然后自居文明审判官，挥笔一判：中国固有宗教皆可入废纸篓。\n\n吾愿奉劝胡先生及诸新派学人：少一点轻薄，多一点悲悯；少一点讥笑，多一点担当。中国今日不是没有聪明人，正是聪明人太多而笃实人太少。若救世新教能以五教之义收拾人心，以慈善之行救济困苦，以礼教之纲重整社会，则其功过自有天下后世公论。报馆文字可以一时哗众，讥刺尖语可以博得青年拍案，然民族之命脉，不系于几句漂亮白话，而系于万民是否仍知天地祖宗，国家人伦。毁道者易，立道者难。胡先生若愿做毁道之才，吾人便不敢苟同。"
  QIE_ws_god_circle_events.5.a: "胡博士如此毁我珠玉，夸人瓦砾，其心可诛。"
  QIE_ws_god_circle_events.6.t: "弥兰王之问"
  QIE_ws_god_circle_events.6.desc: "即便救世新教已得到了近乎于国教的地位，还是有许多传统的信徒要为捍卫自己而挑战它——这也是为什么今天要在吕祖阁外设这个讲坛。\n\n讲坛右侧坐的乃是觉生寺的僧人，与之论战的则是广济寺的现明法师，1935年广济寺失火，正是救世新教为寺庙汇了一大笔修缮款，如今现明法师愿意来此讲经论辩，多少也有为昔日恩情说几句公道话的意思。\n\n辩论先从最基础的内容开始，何为我？何为国？觉生寺僧人认为救世新教混淆二者，现明法师则指出“我国一体”：我不过五蕴暂聚，国亦为众缘和合。若执此身为实我，固然是迷；若执一时一地之名相为永恒国家，也同样是迷。救世新教所言国家乃是众生共业、礼法秩序与救劫事业所暂成之国土。\n\n又问救世新教虽言救灾，但每时每刻依然有百姓受苦，何以为善？现明法师答曰救苦非一日可尽，亦非一法可尽。若见一人仍苦，便谓一切救济皆伪，则世间无一善行可立。救世新教今日施粥工赈，劝人修德，虽未能顿灭天下诸苦，却也是可行的方便法门。\n\n再问救灾为何要依救世新教而行？答曰众生迷途，各执一端。儒执名教，道执清静，佛执解脱，耶回亦各守其门。若五教各自为政，则善心虽多，终难成力。今救世新教以五教合流之义，使施救之事有纲有纪。\n\n几番交手下来，双方难解难分。但现明法师的一番辩护无疑打动了一些仍在摇摆的宗教界中间人士支持我们。"
  QIE_ws_god_circle_events.6.a: "尊者，我将以智者而非王者的言辞而对论。"
  QIE_ws_god_circle_events.7.t: "提婆达多"
  QIE_ws_god_circle_events.7.desc: "“今日西方三圣降鸾，燃灯，准提，接引皆已到坛，凡有求问会众，且上前一步，左侧排队！”吕祖阁内，负责维持秩序的成员喊出了今天降临在乩坛上的神仙的名字。那些人群之中不是看热闹的，而是真正有所求的人便挤出来，一路走到左侧排队等待。\n\n今日持笔的乩手站立在沙盘右侧，他双眼打开，也未进入所谓“附身”的恍惚状态，只是拿笔在沙盘上极快地挥写。凡是对神仙有所求的人，排到他时都要先在乩坛前的垫子上跪下磕头九次，之后给神仙献一份香花，然后说出自己所求的事情，再磕头九次，之后去到队尾。等下负责念乩语的报字员会说出神谕的首句，其中必有对应人的姓名。听见自己的名字之后，也要再叩首九次，才能得到乩语。\n\n那个排在队伍中间的矮小女人走到垫子前叩头九次，又掏出了包浆的几分钱充作香花钱：“我所求的乃是我的儿子，他上周吃草鱼后害了肚子痛的病，最后竟痛死了，已经埋了。我想求问阿弥陀佛，他是不是被你接引走了，还是已经投胎了。”说完问题，她便按照规则又叩首，就回到队尾去了。\n\n“张瑶梅接准提乩谕！”她颤巍巍的从队伍中又跑了出来，卖力地磕了九个响头。\n\n“可怜慈亲寸草心，泪洒尘寰问夙因。此子前生多造业，网罟江湖害水鳞。杀机既重成今苦，旧债将消未尽尘。还须数度人间转，他日莲台可接身。若欲速偿前世果，须将十尾买来陈。九归江海随波去，一献坛前证宿因。又可长斋修善念，代儿忏悔洗冤亲。心诚自有慈航渡，西土莲开引故人。”\n\n乩语既已宣毕，张瑶梅又给了报字的人几分感谢费，便继续摇着她的小脚颤巍巍地买鱼去了。"
  QIE_ws_god_circle_events.7.a: "我于我既定，乃发大愿，愿为大业，救诸天众生，同出尘轮。"
  QIE_ws_god_circle_events.8.t: "撒玛利亚城"
  QIE_ws_god_circle_events.8.desc: "“你要想象这样一个画面，”米肖诺倚躺在长椅上开始讲话，“你还没进城，就被一群中国人团团围住。他们爬到，跪到你面前，把那粘上了干泥和别的什么东西的手托起来，对你说：”\n\n“‘大菩萨，请你发发慈悲！’他们说的菩萨是中国人所信奉的一种仁慈的神灵，而他们所向你讨要的不过是一些食物而不是钱。还有一些人来到公署或者座堂，对他们所看到的每一个外国人都说要归于基督。这就是我在1921年所体验到的中国。”\n\n“以我之见，这些寻求皈依的中国人只是稻米基督徒，他们是为了好处，而不是受到了感召。”我这样回答他。\n\n而米肖诺只是笑了笑，然后继续说：“现在我们再看看1936年的情况。就像你知道的，一支中国人的土著宗教现在控制了北京政府，他们在城市外面把锅和棚子支起来，就像我们做过很多次的那样开始赈济那些苦难的人。”\n\n“更不同的是，他们宣称自己具有权柄，能够行使奇术。这些食物是耶稣基督赐给他们的，并且如果他们能信仰他们的新宗教——一种具有中国特色的，罗马万神殿式的宗教，就能得到更多米面。”\n\n“这也就是说，政府不仅承担起了社会救灾职能，还承担起了传教职能。请你告诉我，政府是出于什么目的，需要这些‘稻米基督徒’皈依他们的土著宗教？这些为了利益，为了食物而来的中国人，对他们的事业有什么用处呢？”"
  QIE_ws_god_circle_events.8.a: "主，你愿意我们叫火自天降下，焚毁他们吗？"
  QIE_ws_god_circle_events.9.t: "行奇术的西门"
  QIE_ws_god_circle_events.9.desc: "说到中国的神仙，大家当然认识很多，但说到外国的洋神仙，大家也就是庚子的时候听过洋人的那个，还有他儿子。\n\n而洋大神的儿子今天就降临在吕祖阁的沙盘之上，这可勾起了不少人的兴趣，把吕祖阁围了个水泄不通。\n\n之前救世新教的人说了，是这个“耶稣”晓谕救世新教，说太一老祖有好生之德，派他给大家发米发面，度过难关。而前几天耶稣又说今天要宣布别的事情，凡来的人，能领米面，甚至还有鸡蛋和其它新奇的洋烛和火柴。大家只看那负责扶乩的乩手摇头晃脑，手里的笔摇头晃脑，而负责抄乩的人也一起摇头晃脑。不论中外，这神仙的传讯大略是没有什么差别的。\n\n等抄完就该念了，一个人拿过纸来，开始大声念洋文。有一个负责扶乩的官员说了，这是因为耶稣是外国神仙，所以说的是英语。等他念完一遍，耶稣在乩盘上说没有错漏，就再用中文宣一次。\n\n耶稣的意思大略是说，如今先天太一老祖亲自在人间显化传经指明迷惑，剖析先天玄理。上等智慧之人能借此达至最高境界，中等之人可修养其德行，下等愚昧之人也能解除苦难、迷途知返。而他今天要揭示给人群的就是生死。\n\n所谓的生都是从先天而来的，而先天又是从老祖所居的“玄”而来的。成圣成佛、为鬼为聻，并无第二条路。玄界有线相交：交于下者，称为下界，即普通人；交于上者，居于上天，即天人。最恶者，沉入这无间的下交点中，进退不得，上不能达天界，下不能生死，其痛苦万状，不可言喻。而对于这些固执于恶的人，所唯一能解脱的法门就是服从天地大主太一老祖的命令，不从圣教圣令之人，恐怕再也无法可救。\n\n既然宣讲完了，耶稣也愿为来参观的人答疑解惑，当然他也没忘了让吕祖阁里的人把说好的米面发给这些听众。"
  QIE_ws_god_circle_events.9.a: "把这权柄也给我，叫我手按着谁，谁就可以受圣灵。"
  QIE_ws_god_circle_events.10.t: "登霄"
  QIE_ws_god_circle_events.10.desc: "马文庆一开始只是为了带着家人逃避西北地区的蒙古盗匪越境袭击，在向东迁徙的路上，他们听说北京城里换了新统治者，新统治者对回族大开方便之门，为了尊重他们的信仰，甚至给他们专门设立了用于祈祷的地点。所以才来了北京，但这都是什么——\n\n在香烟缭绕，人头攒动的吕祖阁中，市民们好奇地观看着这些“救世新教”成员的表演，且看他们手持一个木架子，在沙盘上画来画去，发出令人不安的刺耳声。这绘画不多时就结束了，然后静待一旁的抄写员将沙盘上的内容抄到纸上，几人再一起对着沙盘上香感谢，之后便开始念上面的内容：“我乃回祖穆罕默德，所谓世间一切，不过都困于一无空无实，无虚无有的环中，这环的名字就是清净真宰，也就是我所崇拜的太一老祖，我从他那里掌握关于这世间的诸多奥秘和真理，太一老祖将这智慧教给了老子，老子教给了孔子，孔子教给了释迦牟尼，而释迦牟尼又传给了我。因而如此，我回教才凭清净真宰，成就无数仙人和圣者。这一切则全仰赖太一老祖的教诲，若你们这些人也阅读，护持，甚至是将经文放在家中，都有极大的利益和福报——”\n\n马文庆再也听不下去了，他只觉得在东逃的路上遭了旅人的欺骗，才带着家里人来到了这么个鬼地方。"
  QIE_ws_god_circle_events.10.a: "这不是我们认识的他。"
  QIE_ws_god_circle_events.11.t: "达贾勒"
  QIE_ws_god_circle_events.11.desc: "马文庆最后还是决定离开北京了，不管是向东走继续进入使馆城市，还是向北前往奉天，去哪里都好，北京城中有着一股让他喘不过气来的空气。\n\n一些人听说他是回族，都向他报以羡慕和夹杂着嫉妒的眼光。人们都了解现在北京政府为了展示自己对回族的包容力——这一方面可能是做给其他国家看，一方面可能是为了减少西北马家对自己的反感——实际上颁布了许多不成文的回族优待政策。先前还有人询问他，说知道他现在赋闲，是否要来燕京吕祖阁打一份能糊口工作。且不论他们是怎么知道自己住在哪里，姓甚名谁有没有工作的，他马文庆是绝不可能再踏入那个地方一步。\n\n他知道有些居住在北京的同族人已经接受了现政府的好意，但作为哲合忍耶的他不行，这一切就像一块石头压在他的心口，唯有离开这里才能缓解。然而救世新教的乩坛绝不是为一个人而设的，就算他走了，这一切难道还能为他取消？\n\n今日照例是穆罕默德降笔讲法，替回祖发言的扶乩人员可能是害了什么过敏的病，右眼肿了一块，不过倒不影响他看纸然后宣读乩语。回祖先是同来听的民众讲了如今末劫将至，唯有挽回社会颓风，方能消弭劫难。随后又讲到眼下虽是末劫，但正如佛祖所言，若是能消弭这末劫，就能将之转化成更大的福报。而消弭劫难，唯一的方法便是让人心重回礼法，重回太一老祖所宣传的《真经》。\n\n回祖揭示说，世界上存在着极为浓厚的秽祟之气，由那些放弃了道德礼义的人所发出，只要能减少这种邪气，不论用什么方法减少，都能助长世间的正气，从而在人世间实现大同之境界。念到这里，回祖所开示的内容也就算结束了。"
  QIE_ws_god_circle_events.11.a: "他们所称之为天园的，实则是火狱。"
  QIE_ws_leader_stories_jiang_increase: "§C江朝宗的政治权力得到了§R增强§C！§!§!§!"
  QIE_ws_leader_stories_jiang_decrease: "§C江朝宗的政治权力受到了§R削弱§C！§!§!§!"
  QIE_ws_leader_stories_wu_decrease: "§C吴佩孚的政治权力受到了§R削弱§C！§!§!§!"
  QIE_ws_leader_stories_wu_increase: "§C吴佩孚的政治权力得到了§R增强§C！§!§!§!"
  QIE_ws_leader.1.t: "在书房中"
  QIE_ws_leader.1.desc: "自江朝宗在世界媒体面前大放厥词，救世新教掌控政府权力，已经过去快两周了。吴佩孚也早已苏醒，据说他醒来后的第一件事就是问护士曹锟在哪里。在得知曹锟在那天的政变之中被宗社党人的流弹射死之后，这位强硬的军阀再也忍不住泪水，为自己的伯乐与恩师痛哭一场。然而很快，当他得知曹锟在外界被污名为“刺杀皇帝”的凶手之后，他的悲伤变成了愤怒。\n\n是的，他可以理解这是为了保全自己，也是为了保全局势所做出的妥协，但他无法接受这个选择。更何况，谁能证明江朝宗真的是来解围，而不是算计了他们所有人？这两周他把自己关在书房里，将过去九年江朝宗寄来的每一封信，每一封信都一一拆开，仔细阅读。一直到丙子年六月的那最后一封。他几乎可以肯定，是江朝宗故意放任那些保皇派杀了曹锟。但是已经到现在这个局面了，谁会相信他？那家伙特意叫刘玉春在记者会上站在身边，自己名义上又是救世新教的教院院长。如果就这样贸然指控，人们会怀疑是吴佩孚自己的苦肉计，在背后授意了这场“反政变”，千秋万代，以后所有经学家都会戳自己的脊梁骨。\n\n吴佩孚一拳把台灯从桌子上砸下去，试图舒缓压力。钝击的疼痛从他的指尖传进心脏，然而这疼痛似乎启迪了他什么——至少自己名义上还是救世新教的教院院长，过去只是一个慈善交谊会里的虚职，但在今天的北京城内却已成为了权力的象征。\n\n“只要能证明地位……”他喃喃着，一个大胆的计划在他胸中成型，说到底救世新教的“教”只是皮囊，它的本质和其它之前的北京政权毫无不同。如果他能光复自己作为教统的地位，那么或许他就能为曹锟沉冤昭雪——不对，那个他曾在开平武备学堂里幻想过的，复兴儒家礼仪之国的梦想或许也能成为现实。\n\n他起身披上大衣，推门走出了书房。门外等候已久的年轻卫兵立刻惊醒过来。"
  QIE_ws_leader.1.a: "玉帅，您好点了吗？"
  QIE_ws_leader.2.t: "在丰泽园里"
  QIE_ws_leader.2.desc: "自江朝宗在世界媒体面前大出风头，救世新教掌控政府权力，已经过去快两周了。在这段时间里，江朝宗正忙着向他昔日的政治盟友们兑现诺言。政治家和骗子的区别在于，前者能证明自己是个言而有信的人——当然所证明的仅限于自己许诺的东西，不包含对方听到许诺之后幻想的东西。\n\n今天的江朝宗在丰泽园里邀请了邓邦述等人，表面上同邓闲聊，痛陈教育之重要性，希望邓邦述能为北京研究院再捐献一些珍贵善本。实质上是探听对方是否愿意在这个新政府出任一官半职。可惜，邓邦述年事已高，谢绝了江朝宗的邀请，于是二人便只能聊些家长里短的闲话，再顺道赞赏一下丰泽园的葱烧海参。丁巳复辟失败之后，张勋仓皇逃往使馆城市，而江朝宗因自身与政军界人士之间的良好关系，被段祺瑞所忌惮，到最后也只是段大总统被夺去了九门提督的职务，转而当上了“迪威上将军”。\n\n人情关系和共同利益就是他取胜的法宝，向这些老人许诺有个大蛋糕可以切，就能轻易地将他们联合起来。而吴佩孚显然不懂这一点，不论是“好人内阁”还是宗社党叛乱，这个理想主义者总是容易被昔日友谊左右。作为元帅来说他的这种性格是个好上司，但想在北京政府中呼风唤雨——他还差得多。\n\n尽管嘴上还在应承着邓邦述，但江朝宗已在脑中为拜访下一家谋划说辞了。就在这时，一个神色紧张的年轻人闯进了丰泽园的雅间，他的衣服版型明显和身材不符，俯身到江朝宗身旁耳语了几句。"
  QIE_ws_leader.2.a: "看起来吴小鬼儿找到回家的路了？"
  QIE_ws_leader.3.t: "令仙舟老人胃痛的一晚"
  QIE_ws_leader.3.desc: "龚心湛叹了口气，六十岁的他弃桌上的文件于不顾，在办公室的地板上躺了下来。拼花木地板硌得他脑袋疼，就像他家里那张床一样不舒服。但是这一切都比不上自己看过的那些电报——华东混战已接近尾声，但八省联合的难民们每天都在越过边界，进入华北政府控制的区域，救世新教救灾人手严重不足；另一方面，四川那脆弱的农业结构终于随着一场大旱带来了大饥荒，如果对饥荒无所作为，又会损害到救世新教自身的社会地位。\n\n人和资源，什么都缺。\n然而偏偏是这时，江朝宗和吴佩孚两人却开始为了那个“领袖”之位各自较劲了。他们两个都想统治这艘正在漏水下沉的大船，却对制止下沉这件事兴致缺缺——这可是最令人胃痛的情况。\n\n“两个混蛋，就在这里哈搞。”\n\n他突然想起十几年前，就在这间屋子里他被人骂了同样的话，自己一气之下辞职要去使馆城市。那时钱能训尚未作古，派人去请他回来，他要和钱能训约法三章的事情。"
  QIE_ws_leader.3.a: "“武人不能骂人”吗……"
  QIE_ws_leader.4.t: "新国新教，新领袖呢？"
  QIE_ws_leader.4.desc: "在紫禁城宗社党人发动的叛乱（或者维新革命，取决于你怎么称呼）最终被江朝宗利用，这些满清勋贵的尸骨成为了这位北洋老将和他的“大帐篷”——救世新教通向权力的台阶。教团虽然已掌握权力，但它的领袖仍悬而未决——毕竟这不再是一个带有神秘主义性质的慈善兄弟会，而是一个真正在掌控国家的宗教或政党。想必接下来各方势力都会为了北京政府里领袖的宝座大打出手吧。\n\n您可以在国策树中看到江朝宗和吴佩孚各自的国策，您无权插手他们的行动，这些国策会随着时间推进由他们自己依次完成，而您所能做的就是在命运的分歧点轻轻拨动纺车，让胜利垂青其中一方，或谁都不垂青——这或许会影响他们各自达成国策的速度和结果，并决定了谁会胜出。\n\n我们为这条路线编写了大量由“人类生成”（Human-Generated，既不是AI-Generated也不是God-Generated）的事件，会随着您选择支持的一方而有不同视角的体验：当然！您可以选择体验江朝宗的故事，却如同在救世新教乩坛上显现的，喜怒无常的神灵那样，因自己的一时玩心就把胜利的桂冠赐给吴佩孚，这样您就可以收集到江朝宗的“战败事件”。但我们依然劝您选择您想游玩路线的视角，因为这个政权对于那些吞下苦果的败者可没有太多好脸色……"
  QIE_ws_leader.4.a: "让我跟随江朝宗将军一起切蛋糕。"
  QIE_ws_leader.4.a.tt: "§C您将以§Y江朝宗§C的视角体验整个斗争事件链，并且可能会影响未来的剧情发展。§!"
  QIE_ws_leader.4.b: "带我去玉帅吴佩孚构想孔孟新国家的书房。"
  QIE_ws_leader.4.b.tt: "§C您将以§Y吴佩孚§C的视角体验整个斗争事件链，并且可能会影响未来的剧情发展。§!"
  QIE_ws_leader.4.c: "有没有不选这两个神经病的安静一点的选项？"
  QIE_ws_leader.4.c.tt: "§C您将以§Y隐藏的第三方§C视角体验整个斗争事件链，并且可能会影响未来的剧情发展。§!"
  QIE_ws_leader.5.t: "1923年之邂逅"
  QIE_ws_leader.5.desc: "1923年关东大地震发生之后，救世新教成员就前往日本对当地进行慰问和赈灾。这一方面提高了救世新教的国际形象，另一方面也使得教团与日本当地的一支宗教团体建立了联系——大本教，由出口王仁三郎领导的日本民间宗教团体。在进行互派使者和友好的交流之后，大本教在北京设立了分会，而救世新教也在日本吸纳了一些外籍会员，并在奈良同样建立了分会。但随着几次直奉战争的爆发与结束，两边的联络处最终还是停止运行了。\n\n江朝宗身穿里衣，身边全是揉成团的废纸，坐在床上想着要如何扳倒归来的玉帅——他错误地估计了吴佩孚能够动员起来的政治资本和社会力量，如果在乾清宫多留一颗子弹给他，或许就没有这么多事情了。作为直系头目的吴佩孚就算再被那些知识分子攻击，和自己这样一个曾追随张勋，还在北京城内主持神秘学活动的北洋遗老一比，他们也立刻就知道谁才是最大的反动派。他急需一些能够证明吴佩孚不值得相信，不值得追随的证据。\n\n和德国人交易？路边的小娃娃都知道直系在干这种事。\n个子矮？拿这种理由攻击落水狗还可以，对尚有威胁的对手只会招人耻笑。\n和日本人有秘密盟约？这几乎不可能——但事实，或者说要让人们知道的“事实”并非如此。正是因此，他才会反复酝酿自己想说的话，发给救世新教在日本的盟友。\n\n如果找不到证据可以伪造一个证据，一封来自日本某家实业公司的信，信中应该要暗示吴佩孚与他们之间达成了某种“密约”，这封信一定要足以让报馆兴奋、却又难以立刻证伪——而信件被某个人截获，由投递员“错误”投递给了报社，如此一来就足够引发一场骚动，削弱这位“民族强人”的政治信用。那些报社只在乎明天能卖多少报纸，不在乎真相。\n\n但问题在于，这种招数真的能奏效吗？恐怕只有神仙能给出答案。"
  QIE_ws_leader.5.a: "而不幸的是，我尚还没有变成神仙。"
  QIE_ws_leader.6.t: "风言风语"
  QIE_ws_leader.6.desc: "位于北京地区的《华北之星》报社今天收到了一封奇怪的信件，内容是日本的一位轮船经理写给吴佩孚的信，信中多次提醒吴佩孚要“记住前次磋商之事”，似乎生怕阅读者不知道他们之间存在什么秘密交易似的。\n\n《华北之星》的记者们很快意识到，这封信与其说是一份揭露吴佩孚恶劣过去的线索，不如说是一份伪造的黑材料，目的是在当前尚未明朗的北京局势之中打击潜在的竞争对手。若按照幕后主使的意思将之直接刊登，恐怕会导致报社也成为被攻击的对象。他们在新一期的报纸上隐晦地警告了那些想要利用报社对政敌进行攻击的人士，指出报社对未经证实之材料一贯抱有审慎态度，并呼吁读者勿轻信相关流言。\n\n伪造日本人和吴佩孚存在私下勾结的黑材料反而导致吴佩孚本人的声望在民间有所上升，一些摇摆不定的中间派更倾向于支持玉帅的势力。更坏的消息是，人们开始怀疑这份黑材料可能出自那些与吴佩孚争夺权力的竞争者之手——最大的嫌疑对象是迪威上将军江朝宗，此人与日本关系密切，说不定是他说服了日本人来损害玉帅的名誉。再没有比这更糟的情况了。"
  QIE_ws_leader.6.a: "搬起石头砸到了自己的脚。"
  QIE_ws_leader.6.b: "小丑般的的争权伎俩。"
  QIE_ws_leader.7.t: "云阳丸号事件"
  QIE_ws_leader.7.desc: "位于北京地区的《华北之星》报社今天收到了一封奇怪的信件，内容涉及到吴佩孚和日本一位轮船事务经理。尽管一开始报社记者们认为这是在这个时期出现的任何“外国密信”都大概率是打击政敌的黑材料，但记者们对旧档案的翻检却发现了令人意外的收获。\n\n这封信件内容涉及到1923年吴佩孚与日本日清汽船公司之间达成的一系列秘密协议，吴佩孚向日本方面输送利益，以通过两艘日本货轮“云阳丸”和“宜阳丸”向四川武备系头目杨森提供军火，从而尝试结束川系军阀之间的内斗。尽管吴佩孚的目的是恢复四川的稳定，但他与日本人在台下相互勾结，做了交易这件事似乎已经是板上钉钉的事实。\n\n这封信件全文和相关证据被披露之后立刻在华北社会和世界上都引起了轩然大波，使得那些支持吴佩孚的人群发生了进一步分裂。在旧政学系的一些成员的煽动下，出现了一批激进的知识分子在他们自办的小报上抨击吴佩孚是“伪君子”，“不敢光明正大做事的小人”。无论如何，看起来吴佩孚长期以来向外人建立的“民族强人”的印象正在逐渐崩解……"
  QIE_ws_leader.7.a: "玉帅之短，原来不止在身量。"
  QIE_ws_leader.7.b: "命运与偶然之神向其中一方展露了微笑。"
  QIE_ws_leader.8.t: "有人在试图抹黑"
  QIE_ws_leader.8.desc: "吴佩孚读着送来的《华北之星》报纸翻译稿哑然失笑，从各种角度上来讲，这都是一步昏招。《华北之星》的记者们刊登了一封日本轮船招商经理写给吴佩孚的信。通读下来，这封信漏洞百出，措辞也刻意得近乎可笑，几乎恨不得把自己“暗通日本”的罪名写在每一行里。\n\n“他给我戴的帽子可太大了，”吴佩孚一边读着这篇拙劣的伪证，一边饶有兴趣地拿起朱笔，在信上圈出了几个字，他当然知道这封信是谁伪造的，想不到江朝宗最后竟和他玩这一套——攻击自己的爱国主义形象，可惜这些攻击不起作用，还要被刊登在报刊上为社会人士所耻笑。吴佩孚看了看桌上的另外几张民间小报，那些是北京的知识分子们为吴佩孚正名的文章，这些人本来还在观望，没想到这封信一经刊登，他们立刻就加入了自己的阵营。江朝宗想凭借黑材料攻击自己，但他可算失策了，因为他这么做反而使整个北京城里的人都开始支持他了。真可谓是害人终害己，恶人有恶报啊。\n\n想到这里，他惬意地合上了双眼，后靠在椅背上，几乎已经能想象出江朝宗被自己的卑鄙狡诈反噬时那张气急败坏的脸。"
  QIE_ws_leader.8.a: "他们不会真以为能找到什么吧。"
  QIE_ws_leader.9.t: "清算旧账"
  QIE_ws_leader.9.desc: "吴佩孚读着送来的《华北之星》报纸翻译稿面色凝重，他完全没有想到自己为了支持杨森，干涉四川内战的旧事被这群鬣狗一般的记者发现了。更让他感到头疼的是，随这桩旧事一同刊登的是一份由一个不知道哪里来的日本轮船经理，写给吴佩孚自己的添油加醋的信件。\n\n在报纸上，记者们宣称找到了吴佩孚干涉四川内战时与日本人达成协议的证据。根据报道，吴佩孚和日清汽船公司达成了一系列协议，通过日本的货轮，雇佣日本的护卫押送一批日本武器前往四川，向直系的武备系盟友杨森提供支援。这是事实，自己确实这样做了。但后半段的那封信件里却说了更多吴佩孚自己干都没干过的事情，其中最恶劣的一桩莫过于这位经理说“吴佩孚许诺在中华统一之后日本汽船于长江地带的合法利益”，这几乎使他暴怒地捶打桌子，把右手边为了彰显“秀才”身份的毛笔都震到了地上。\n\n他吴佩孚看起来真的很像一个向日本人摇尾乞怜的汉奸吗？然而由于前半段内容的证据实在太过确凿，反而让很多人怀疑后半段的指控也确有其事，只是玉帅巧妙地隐藏了证据，继续向外人展示他作为“民族强人”的形象。\n\n不管怎么说，北京知识界和政治界都发生了巨大的震动，一向和直系对着干的旧政学系在黄郛的带领下，开始大力炒作自己是个“伪君子”，是“假民族主义之名、行私相授受之实”。自己的政治资本被极大地削弱了，而这一切的起因都要怪那些记者太过多事。"
  QIE_ws_leader.9.a: "他们怎么还真能查出来东西？"
  QIE_ws_leader.10.t: "玉帅的一击"
  QIE_ws_leader.10.desc: "从北京城的东便门出去，沿着通惠河的方向一路走下去来到高碑店村，就是北京的老闸口了。再多走几步来到略显破败的龙王庙里，吴佩孚在山门殿前迟疑了一下，是某种愧疚还是踌躇吗？但他最终还是在青龙白虎两位大将军的注视下踏了进去——吴佩孚已经九年没有出席过救世新教的会议，而他自然也九年没有拜访过这里了——这里正是北京明经学会的聚会地点，其成员几乎全是唯吴佩孚马首是瞻的救世新教成员。可是这么多年过去了，还会有多少人留在这里呢？\n\n令吴佩孚感到意外的是，当他迈入东厢殿后，竟还有七八人正在其间围炉煮茶，可惜吴佩孚一概都不认得他们的脸。见到吴佩孚的到来，这群人先是一愣，随后手上的动作开始忙乱了起来，显然是未预料到会发生这种事。如今，活生生的玉帅就出现在他们面前。经过一番解释，吴佩孚方才知道这九年间，明经学会的旧人已走的七七八八，留下的就是他们这群与自己在教内素未谋面，但却十分仰慕自己的“追随者”。\n\n然而吴佩孚此行却并非为了找学会的故人叙旧，也不是为了受几个后进信徒的奉承。他深知江朝宗是个在北洋政坛摸爬滚打多年的人物，权衡利益，笼络人心自然是手到擒来，这样的人不可能行事光明磊落，一定会做一些灰色领域的事情。他之前已经打听到，过去九年中教内接收到的捐赠善款虽然名义上是龚心湛在管理，但拨款与否拨款多少则要依靠江朝宗定夺。在宗社党人政变之前，江朝宗又是拉拢各党派人士吃饭听戏，又是安抚各家势力，还要购置走私各种军火，他从哪里掏出来这么多钱？如果能查出什么东西，或许就能迫使江朝宗在斗争中有所退让，这也是他吴佩孚出现在这里的原因。他已经远离救世新教的事务太久太久了，所以才需要这些长期参与的人为他提供一些风声——为此，他努力露出一副文人秀才一样和蔼的面孔，慢悠悠地对自己的这些仰慕者讲话：\n\n“我有一件事，想劳烦诸位替我打听打听……”"
  QIE_ws_leader.10.a: "这近些年的善款去向，你们可曾听过什么风声？"
  QIE_ws_leader.11.t: "一个滴水不漏的人"
  QIE_ws_leader.11.desc: "北京明经学会的那些年轻后生们传回了消息，他们多方打听也没有找到任何足以证明江朝宗挪用教内善款的确凿证据。这件事或许根本就不存在，又或者说江朝宗十分小心，已经把所有证据打扫干净。此外，这些学会成员行事作风实在太过张扬，他们四处探听善款使用的情况已被教内许多人得知。\n\n在最近的例会上，一些成员对教内近期出现的“不正之风”进行了严厉申斥。他们强调说仅凭一时疑心便怀疑社内同袍，是相当失礼也相当危险的行为。与此同时，这些人也隐晦地点到了那些年轻人背后的吴佩孚。他们批评说其在九年间从未过问过教内大小事务，如今重返救世新教，所做的第一件事竟是暗中搜罗把柄、争夺权位。这并不是他们愿意看到的景象。\n\n如此看来，试图从教内行政角度扳倒江朝宗的计划失败了，更糟的是，这次鲁莽的试探反而让教内那些摇摆不定的中间派开始怀疑吴佩孚实际上是个难以信任的争权夺利之人，事情显然没有向着好的方向发展……"
  QIE_ws_leader.11.a: "为什么他们不能再小心一点？"
  QIE_ws_leader.12.t: "敲诈勒索"
  QIE_ws_leader.12.desc: "北京明经学会的那些年轻后生们传回了消息，他们并没有找到能证明江朝宗挪用善款的证据，但他们得到了另一个有趣的消息——在救世新教控制北京之后，江朝宗多方串联拜访，借救世新教的名义对京城内的富有者进行恐吓欺骗，以“保护”之名收取财富。\n\n他选择性地进行敲诈，对于那些之前并未支持他的政变计划的实业家与清室贵族，他就暗示对方上供“社会维持费”；而对于那些在之前的北京乱局中或多或少站在他一边的富有者，他就以所谓前途与社会地位为许诺，怂恿对方“自愿”为救世新教捐款。一位学会成员联系到了这些“捐款”的实业家之一，他所捐的数目与救世新教善功簿上的数目有所出入，看来江朝宗确实在玩雁过拔毛的把戏。\n\n吴佩孚委托这些年轻人在教内例会上谈到了这件可耻的腐败，引起了教内大多数中立派——他们主要来自负责财政的龚心湛所处的鸾务院-慈院势力——的愤慨，他们已经联名要求江朝宗亲自出席下次会议解释这件事。如今八省联合的难民问题尚未解决，赈济四川饥荒又急需要用钱，在这个时候引爆这件丑闻极大地削弱了他在救世新教内部的影响力，看来他不得不远离权力的宝座了。"
  QIE_ws_leader.12.a: "沦丧道德之辈，莫碰道德之位。"
  QIE_ws_leader.12.b: "致命一击。"
  QIE_ws_leader.13.t: "急功冒进"
  QIE_ws_leader.13.desc: "吴佩孚想必是圣贤书和演义小说读多了，居然会以为江朝宗自己若真要挪用社内资金，就会大大方方地从账面上支取。更令江朝宗大跌眼镜的是，他居然敢授意让北京明经学会的那帮追随者去替他搞。这些人查又查不出什么东西，反而还会招致教团内其他人的不满——因为总有人还没打理好身后的那条尾巴。学会成员在例行会议上被围攻是意料之中，而吴佩孚会因为这次调查引火上身更是不用多想就能得到的事实。归根结底还是吴佩孚缺乏政治头脑，而他的追随者又是一群血气方刚，毫无城府的年轻人。至少这一次——是他江朝宗赢了。"
  QIE_ws_leader.13.a: "玉帅需要一个称职的政治参谋。"
  QIE_ws_leader.14.t: "忘记分出去的蛋糕渣"
  QIE_ws_leader.14.desc: "这帮北京明经学会的后生们就像一群莽汉一样横冲直撞，丝毫不懂得尊重社会上的社交原则。他们怎么能想到直接拿着善功册去找那些给救世新教捐赠的实业家的——这一下子可把江朝宗从中捞钱的事实全都败露出来了。现在可好，那群负责运作赈灾的人知道自己揩了油，一个个都化身成冤亲债主一般，好像是自己上辈子欠了他们一笔钱似的。这种几乎无法遮掩的丑闻暴露出来，教内那些人也不敢站出来为自己张目了，毕竟这时候跳出来就相当于声明他也从江朝宗手里拿了一份。这下自己可真是在整个救世新教内部都孤立无援了，而更让人头疼的还在后面——龚心湛纠集了一群人要求自己把这件事解释清楚，并计划在吕祖阁中开沙问乩，弹劾他作为事院掌院的职位。近些日子也有一些小报记者闻风而动，如果这件事最后在社会上被曝光，救世新教必然要把他推出去牺牲掉以保全整体形象。自己这次可算是要大出血了，这群只知道落井下石的小人。"
  QIE_ws_leader.14.a: "之前应该分他们一份的。"
  QIE_ws_leader.15.t: "李思浩的回归"
  QIE_ws_leader.15.desc: "由于目前教内的权力斗争仍在继续，江吴二人都互不服输地各自施展神通，计划扳倒对方，整个北京最上层的政治结构实质上是空白的。不过江朝宗还算识相，他给龚心湛大开方便之门，要他只要为救灾可随意支取教内以及政府账户上的资金。但为了改善瘫痪的行政机制，龚心湛还是牵头成立了一个由四位救世新教成员组成的暂时委员会。\n\n“我们现在什么都缺，”龚心湛再一次说了这几天已经对这些实干派强调过很多次的话，“就如各位知道的，现在智玄和慧济正为了北京城的宝座打的不可开交，能平定北京乱局的，恐怕只有在座的我们了。我今天召集各位，就是想请大家一起出谋划策，想想该怎么办才能解决这件事。”听到这里，其他人也开始各自发表自己的意见了:有说像社会富翁强制征收社会责任费的，有说把印钞机用出火星子大量印钞渡过危机的，还有人提议说去把慈禧太后的坟掘开，找老佛爷借钱的——净是些天马行空，做了恐怕会有损救世新教统治根基的事情。\n\n“我们为什么不重新搞之前的北京慈善银行?”这个建议从上到下贯穿了龚心湛，他之前确实没想到这个——这是段祺瑞政府还执掌北京时，由当时的财务总长李思浩帮助救世新教设计，目的是通过信贷和金融对社会资金进行利用，并从净息差和非息收入中获取持续运营资金。然而段祺瑞政府因直皖战争而倒台，李思浩也被直系通缉，此后辗转于湖南和奉天，目前仍寓居于使馆城市天津地区。“当然可以，而且是个好方略啊。”龚心湛的眼睛放出光来，“既然我们已经掌权了，为什么不撤销他的通缉令——让这位建立者回来继续他的工作呢？”"
  QIE_ws_leader.15.a: "皖系政府的复活？"
  QIE_ws_leader.16.t: "李思浩回到了北京"
  QIE_ws_leader.16.desc: "我们收到消息，前皖系政府官员，财政总长兼盐务省督办兼币制局总裁李思浩的通缉令已被撤销，他目前已返回北京。自皖系战败之后，他先后辗转于奉天、湖南与使馆城市之间，始终未能重返北京政坛。\n\n他的这次回归似乎是为了解决救世新教当前面临的赈灾问题，因为撤销了他的通缉令的人是龚心湛。为了确保赈灾工作的有序高效进行，龚心湛已经在政府内部组织了一个由四名救世新教成员组成的临时委员会，随着李思浩回京，这个委员会实际扩展为五人。如此赤裸裸的结党行为本应受到谴责，但考虑到目前只有他们在处理相关问题，对这件事的处理或许可以先暂缓执行。\n\n在李思浩的主持下，救世新教十几年前的“北京慈善救济银行”已经重新开始运营，正在从社会上吸纳闲散资金用于相关工作。"
  QIE_ws_leader.16.a: "财政总长？我不关心这种事。"
  QIE_ws_leader.16.b: "龚心湛有什么权力这样做？"
  QIE_ws_leader.16.c: "欢迎回来，老朋友。"
  QIE_ws_leader.17.t: "江朝宗登临教统之位"
  QIE_ws_leader.17.desc: "自古以来，中华大地之上只能有一位共主，京城也只能有一把龙椅——而如今这个位置已落入了江朝宗手中。在前几日的教内例会上，一些成员针对先前吴佩孚的“通日”行为做了报告：一开始是温情脉脉的场面话，这些在政教两界摸爬滚打了几十年的人精，自然不缺这样的本事。直到那声拖长了的“但是”落下之后，这些人的代表指出吴佩孚目前面临的是极为严重的社会信誉危机，为了维护救世新教“承担社会责任”的这层身份，他们希望吴佩孚能够自行辞去救世新教教统的身份，然后对外宣称将“闭门思过，痛定思痛”。如果不这样做的话，恐怕教内就将问乩请示吕洞宾，寻求更进一步的措施了。\n\n当然，既然风向已变，落井下石也成了顺理成章的事，他们还称吴佩孚长期缺席救世新教会议，虽然名义上还是教统，但实际上已经自愿放弃了该职位。有一些人推举近期治理流民问题相当出色的龚心湛出任教统之职，但遭到了对方的拒绝。龚心湛反而支持江朝宗担任教统职位，理由是在这几年期间，大小事务皆由江依规打理，按各种道理，都是江朝宗该坐在这个位置上。\n\n江朝宗毫不怀疑自己能登临教统之位，因此根本没出席这次会议，而是让他一直维持的那支家伶来给他唱戏。等到与会的其他人向他来宣布这个消息的时候，这几个人正在丝竹乐师的伴乐下上演《南极增辉》——这可是自1927年溥仪复辟之后再也没有演过的剧目。"
  QIE_ws_leader.17.a: "稽首拜龙轩，祝圣皇德治同乾健，"
  QIE_ws_leader.17.b: "享升平受福无边，抚华夷垂衣端冕，"
  QIE_ws_leader.17.c: "绵宝祚亿万斯年。"
  QIE_ws_leader.18.t: "萧瑟之秋"
  QIE_ws_leader.18.desc: "吴佩孚没去救世新教的例会，他坐在书房里，倚在自己那张皱巴巴的虎皮靠背上。只是坐在那里。\n\n救世新教此前派来信使，通知了他例会结果：在会上一些人建议他辞去救世新教的教统职务，专心思过。至于空出来的教统之位，大多数人都主张应该由这九年间实质上控制教团的江朝宗出任。这个结果毫不意外，在北京城乃至整个华北的舆论场中，自己已经从那个登上美国《时代》周刊，带领中国人民“重整山河”的强人变成了一个心口不一的小人。他曾视乔治·华盛顿为自己的榜样，然而如今看来，他已失去了在中华大地上建立同样丰功伟绩的机会。\n\n这个消息让玉帅的参谋们大为震动，李济臣指出，明明是玉帅为华北带来了这十余年的和平，但如今他们却想卸磨杀驴。目前的社会局势仍处于混乱状态，只要玉帅一声令下，他李济臣就会带领直系官兵冲击政府，清除那些道貌岸然之辈。然而他，吴佩孚，“中国最强者”，只是抬手止住了他。在这种时期发动军事政变，只会进一步破坏民众对他的信任，并且更加坐实他“阴谋败露，恼羞成怒”的动机。\n\n即便政变成功，生前自己或许能凭滔天的权力压制民众的议论，可百年之后，千年之后，当他已作古，而中国仍立于大地之上时，人们又会怎么称呼他呢？\n\n正因如此，不能为今日一时之利，断送千古儒将清名。至少如此一来，百年之后仍或许有文人大儒替他翻案，可政变之后，人们只会记住他是个与其他人无异的大军阀。"
  QIE_ws_leader.18.a: "三人成市虎，浸渍解胶漆。"
  QIE_ws_leader.19.t: "吴佩孚登临教统之位"
  QIE_ws_leader.19.desc: "君子与君主的区别在哪里？对吴佩孚来说，后者不一定拥有前者所具有的美德，前者不一定拥有后者所具有的权力——他相信自己早已具备君子的德行，而如今他也终于得到了君主的权力。在前几日的教内例会上，一些成员针对先前江朝宗的贪污行为做了报告，似乎是在长久的沉默与回避之后，救世新教终于打算解决这起教内丑闻了。因为有一些多事的小报记者不知道从哪里听闻了风声，开始四处散播类似的流言。这对救世新教一以贯之的“慈善”面目相当不利。\n\n江朝宗受到了处罚，他仍被允许保留教内名籍，但被剥夺了事院掌院的职务，并且今后无权再过问与控制教内资金。据参加了会议的人说，当教团宣布这件事的时候，出席会议的江朝宗尽管尽力维持仪态，但还是看起来很震惊和不安。另外还有一个消息，以龚心湛为首的，这段时间一直负责赈灾活动的成员主张应该由吴佩孚继续作为教统领导救世新教。尽管吴佩孚连续九年未出席救世新教的会议，只是一个名誉上的教统，但现在既然他已经回来，那么重新承担起相关职责是应该的。\n\n吴佩孚能听懂里面隐藏的意思，经过这段时间的救灾，百姓们其实已经接受了救世新教的统治，而以龚心湛为首的这群人想利用自己在社会中的威望进一步巩固救世新教的地位——他当然不会拒绝，并且这一次，他终于能让中国回到它本该走上的道路，回到那条曾被中国人如瓦砾般舍弃的传统道路上了。"
  QIE_ws_leader.19.a: "曾经伯乐识长鸣，不似龙行不敢行。"
  QIE_ws_leader.19.b: "早晚飞黄引同皂，碧云天上作鸾鸣。"
  QIE_ws_leader.20.t: "败渭南"
  QIE_ws_leader.20.desc: "坐在救世新教的会议席中，听着对自己一条又一条的指控，江朝宗只觉得天旋地转。自己并非是没有给过他们足够的好处，但现在这些白眼狼为了和自己撇清关系，竟一个个地都装模做样地当起圣人来了。这群人为了自保，最后一致做出了一个决定——剥夺他作为事院掌院的权力，并且将他排除出了整个财务体系。这意味着他今后只能在教团里当个边缘人，虽然并非没有东山再起的机会，但自己还有多少年可以利用呢？\n\n江朝宗从鼠年的新春就开始谋划，试图通过北京城内的混乱攫取权力，明明只差最后一步，却因为“贪污”——这种对大多数人来说根本算不上什么大事的罪名被扳倒了。迄今为止所做的一切，都给他人做了嫁衣。而且更重要的是，这群见风使舵，恃强凌弱的小人，在把脚踏在自己身上之后，转过去巴结起吴佩孚了。他们一致推选吴佩孚重归教统之位，全然不提他过去九年对教内事务的漠视。\n\n这漫长的例会终究结束了，走在北京城的街道上，以往数不胜数的乞讨流民也已被整治干净，穿过正阳门箭楼，竟还有一伙撂地唱戏的民间戏班尚未收场，正演的是《战冀州》，只见那长靠武生一把抓住长枪，如同天将下凡："
  QIE_ws_leader.20.a: "银枪一举追尔命，食尔之肉方称心。"
  QIE_ws_leader.21.t: "死者归来"
  QIE_ws_leader.21.desc: "救世新教的例会几乎陷入了失控：吴佩孚在社会上被指控和日本人有私下密约，江朝宗则经过教内举报被发现有贪污善款的行为，这次例会的目的就是解决这两个人的问题。虽然在座的成员都清楚，这一切都是二人缠斗，相互较劲的结果，但最后他们二人却落了个两败俱伤的结局。假使忽视民意，让吴佩孚继续担任教统，那只会让救世新教的合法性变得进一步糟糕透顶；假使对江朝宗的那些行为默不作声，一旦未来一天有哪个气不过的北京明经学会的直性子在外面说漏了嘴，那救世新教可就连慈善组织都当不成了。\n\n玉帅仍居于他的书房，江朝宗倒是来到了会议现场，一副要吃了所有人的样子。就在这个尴尬的时刻，最先打破寂静的人是龚心湛：\n\n“既然目前还没有任何推进，那就允许我汇报一下近期的工作。”他清了清嗓子，向其他人汇报了社会危机治理的情况——这本不需要过多汇报，只要走到大街上看一看，就能知道问题已经基本解决了。正因如此救世新教组成的新政府在北京城内的名声也变好了不少。也有不少人觉得，龚心湛或许能担起教统/领导人的位置。\n\n“至于诸位讨论的教统问题，我另有一条信息要汇报，”十几双眼睛看向了龚心湛，江朝宗也死盯着他，那眼中似乎露出了一丝希望的光亮——他好像觉得龚心湛会为自己说话似的——“我已同另外四人于燕京吕祖阁中请示过孚佑帝君，帝君不愿看我教中人沦落于世俗，沉迷于荣华。警告绝不可选吴佩孚或江朝宗二人执掌教内大权。”他展开两张纸，一张上是开沙扶乩后得到信息的原像，另一张则是工整抄写的乩语。“帝君感念慈悲，特求太一老祖，遣派能训先天普化正明钱真人下降，指导我等以礼治国，以伦育人。钱真人有旨：凡大事，需先请问钱真人再作决定；凡小事，皆由慧澈、悟真、弼谛、慧义、玄一五人自行定夺。此外，帝君感念慧济与智玄之苦劳，特命二人尽心辅佐，戴罪立功。”\n\n没人能想到龚心湛竟能说出这样的话，钱能训是北京政府1919年内阁的国务总理，也是救世新教的首任教统。他死后教中人士曾扶乩请示，得知他已飞升玄都紫府，受封为“先天普化正明真人”了。\n\n然而面对这一切，最先暴起的是江朝宗：“你们还在胡搞？钱能训已经死了！”\n\n“难道江掌院是要置疑孚佑帝君谕旨不成？而且——”龚心湛自上而下，俯视着江朝宗，脑子里突然蹦出来了一句颇有意思的话："
  QIE_ws_leader.21.a: "武人不许骂人。"
  QIE_ws_leader.22.t: "生者侍候，真人落座"
  QIE_ws_leader.22.desc: "事情正朝着诡异的方向发展。又或者，从1936年开始的所有事情都足够诡异。在救世新教的控制之下，北京政府的会议上，坐在大总统之位上的并非是一位活人，取而代之的是一张黑白照片。照片上的人正是钱能训，1919年的国务总理，同时也是救世新教的首任教统。自他死后，救世新教成员曾在吕祖阁中扶乩求问儒、释、道、耶、回五教祖师，得到回复称他已化为神仙，永享安乐。\n\n但如今，这位“神仙”坐在会议中最高贵的位置，在他左侧站立的乃是救世新教夺权的大功臣，迪威上将军江朝宗；在他右侧站立的则是长久以来都未曾出席过救世新教会议的前任教统，孚威上将军吴佩孚。没有大总统的命令，二人都不敢落座，可一张照片要怎么开口讲话呢？直到龚心湛、王锦蕖等人走进来开口宣读今日议程，二人方才能够坐下。\n\n而这漫长的政府会议也终于就此开始……"
  QIE_ws_leader.22.a: "向钱总统问好。"
  QIE_ws_leader.23.t: "旱"
  QIE_ws_leader.23.desc: "自从入春之后，地上就没落过雨，那地和我的嘴一样裂开了，我跑过去看，就有些苗挺起来了，长得尺把高。大家给龙神摆了香坛，还挨家挨户都去给龙王爷磕了三个响头。香也上了，头也磕了，第二天一早就开始飞蚂蚱，把地里勉强活了的也给吃了。后来大家就收拾东西，把被子什么的拿上,又拉了根棍就走。我问人去哪儿，他们都说不知道——是嫌我烦不肯告诉我。\n\n大前天半夜路边睡着特冷，我醒了，然后发现姥姥突然支起个身子，开始讲末日什么的听上去怪害怕的话。再后来到了城外有了粥厂，我就拿着盆去打粥，回来路上遇到个戴眼镜的蓝眼先生，手里拿着洋盒子对我咔嚓了几张，又同我讲饿死许多人。\n\n他说这话我也不懂——年年都会饿死了许多人，他讲这个又做什么呢？后来那先生就不见了。我搞不清楚他为什么这么做，就像我搞不清楚为什么大家为啥要这么着急地要继续继续向北走一样。"
  QIE_ws_leader.23.a: "我只知道我饿了。"
  QIE_ws_leader.24.t: "向北"
  QIE_ws_leader.24.desc: "要是问德三具体是怎么跑出来的，他可是已经记得迷迷糊糊的了。只知道一开始是自己常去的那条街已经不好得手了，问了一起混的其它野孩子，似乎他们的地盘也是多了许多带枪的官兵。还有人不怕这些官兵，结果被当场抓了起来，不知道扭到哪里去了。\n\n后来城里有的人说赤匪从南边山里打回来了，有的人说孙大帅被杀了，还有的人说官兵们在江边开枪杀人了，想要去武汉的都被杀了，狗日的兵全都杀红了眼云云。一开始他还不信，毕竟这么多事怎么可能同时发生。直到半夜两拨人在合肥城里交火，他心里害怕，觉得之前的传言都是真的，自己现在还来得及，就直接扒火车走了。\n\n可火车要去哪儿，他不识字，也不了解，问一起扒火车的人，有人说是去湖北；有人骂他放屁，说车早就拐到北边去了；乱糟糟的根本搞不清楚，路上还有个女的没抓好孩子，把孩子卷进火车轮子里了。谁叫他投胎不好呢，要是生下来是孙大帅的公子，那必然是没有火车这一劫的。\n\n不过那女人也很漠然，天天坐街边的人，最懂看谁神情轻松，好下手摸皮包。这孩子死了之后，这女的就是那种好摸皮包的状态。\n\n最后他们大概就被扔在了北方的某个地方吧，这地方和合肥长得差不多，或许天下的城市都长得差不多，都是一块地方有高楼、有穿得考究的人；然后周围是矮屋子，一群和他差不多的大的孩子，想到这里，他还得去拜个码头，不然在别人的地盘上做事指定要挨一顿揍。"
  QIE_ws_leader.24.a: "重操旧业。"
  QIE_ws_leader.25.t: "上京"
  QIE_ws_leader.25.desc: "来回打听了一番，德三才知道自己到的是信阳。至于在这里找个老大接着跟着混的想法也泡汤了——拜了几家老板，都觉得他这个合肥来的剪绺的说话入声太浓，听不懂他在讲什么。再加上这行当在信阳也是越来越多人干，僧多粥少，最末难免要为势力划分打上几架。\n\n与其如此，倒不如继续北上。德三听人讲了，说是京城里皇帝把大军阀曹锟枪毙了——军阀，就是在这个世界上混的，领着更多人的，能拿枪的街面老板——皇帝正让一群大善人给八省来的人发粮，但凡是去的都能喝上热粥，还给管解决睡觉。要是没读过书也管读书，教说洋语。说到读书的好处他不太懂，就知道穿的靓丽的有钱人都读书而且会说洋人话，所以读了书就能变有钱人这一点，他是不太怀疑的。\n\n于是乎，他就接着扒那些车头朝北的车。要说扒车他现在已经得心应手了，首先是不要待久了，要是半夜冻僵，手没握力了，就指定要从车厢顶摔下来；其二是跳车的时候要沿着前进的方向，瞅准落脚点跳，跳下去还得借着惯性再跑几步。这第二点是从一个“扒车师傅”那儿学的，不巧这师傅在快到直隶跳车的时候，脚被什么东西挂住了，那腿骨就像折断的玉米杆，又像摔碎的值钱玉镯子，疼得他一直嚎。他上辈子估计是干了什么伤天害理的事情，这辈子才要这样还债。"
  QIE_ws_leader.25.a: "人有失手，马有失蹄。"
  QIE_ws_leader.26.t: "安全了——"
  QIE_ws_leader.26.desc: "真是操他妈的，北京是中国天底下最好的城市。还远远的没进城，就能看到大排长龙，拿着自家祖传的锅盆打粥的人。有个糟老头子双腿张开坐在黄土道上，拿他那张没牙的嘴一口一口地嘬，好像他发出的声音够大，这顿就相当于吃了更多东西下去。德三到这里后也再没做过什么街上的生意了，天天就是挤在棚屋里面，到点了出门喝粥，偶尔打点手工，会有人来收然后给工钱。至于到了晚上，就有人问他要不要去上夜校，夜校教的是识字，算术还有洋文的笔画。\n\n不过读书这活真是煎熬，恐怕是世间最难熬的酷刑。当初纣王怎么想到挖比干的心，而不是让他念书学习呢?"
  QIE_ws_leader.26.a: "如入仙境……"
  QIE_ws_leader.27.t: "披星戴月"
  QIE_ws_leader.27.desc: "“你今天吃到多少？”看到那个粗脖子的汉子进来，德三立刻就凑上去问。\n\n那汉子从上往下瞥了他一眼，然后拿鼻子猛喷一口气：“他娘的，还能和你不一样？”随后短哼一声在棚屋里找了个角落躺下。\n\n最开始来的一周，粥底还能沉着厚厚一层米，然后就越来越薄，越来越薄，现在变得和浑汤一样。看来天底下所有好日子都有终结的时候。\n\n有个从城里出来的报社先生看了，说这是政府里那些官发现流民吃得要比有工作的伙计好，他们心里立刻就升起对劳动者的悲悯心来，于是就削减了对难民的救济。\n\n不过那夜校倒是依旧照常开，而且似乎人数越来越多，年纪也越来越大了。只是德三并不很爱学习，况且吃也没得吃的话，怕是还没学成有钱人，自己先饿死了。\n\n又过了几天，有个穿洋服，系洋绳子的人来了，应该是政府官员，大概就是老大手底下的军师，或是传话的那种人。这位军师僵硬地笑着跟他们讲“政策”和“道德”，大略意思就是：有人前几周领了粥喝，喝完便睡，整日休息，是懒惰的体现。而政府不能助长不劳而获的风气，所以打今儿起，粥厂要取消了，以后做工够一定时间才有饭吃，不然就只能饿着。\n\n这做工安排是一部分人从早上八点做到晚上八点，然后吃饭睡觉；另一部分人从晚上八点做到早上八点，然后白天吃饭睡觉。这颠三倒四的安排让一部分人抱怨起来，不过不做就没饭吃，大家最后只好接受。但对德三来说，这正好给他翘了夜校的理由。"
  QIE_ws_leader.27.a: "“古有不食嗟来之食，列位诸君不觉惭愧吗？”"
  QIE_ws_leader.28.t: "仿佛漫无止境"
  QIE_ws_leader.28.desc: "“你今天吃到多少？”看到那个粗脖子的汉子进来，德三立刻就凑上去问。\n\n那汉子从上往下瞥了他一眼，然后拿鼻子猛喷一口气：“他娘的，还能和你不一样？”随后短哼一声在棚屋里找了个角落躺下。\n\n最开始来的一周，粥底还能沉着厚厚一层米，然后就越来越薄，越来越薄，现在变得和浑汤一样。看来天底下所有好日子都有终结的时候。\n\n有个从城里出来的报社先生看了，说这是政府里那些官发现流民吃得要比有工作的伙计好，他们心里立刻就升起对劳动者的悲悯心来，于是就削减了对难民的救济。\n\n不过那夜校倒是依旧照常开，而且似乎人数越来越多，年纪也越来越大了。只是德三并不很爱学习，况且吃也没得吃的话，怕是还没学成有钱人，自己先饿死了。\n\n又过了几天，有个穿洋服，系洋绳子的人来了，应该是政府官员，大概就是老大手底下的军师，或是传话的那种人。这位军师僵硬地笑着跟他们讲“政策”和“道德”，大略意思就是：有人前几周领了粥喝，喝完便睡，整日休息，是懒惰的体现。而政府不能助长不劳而获的风气，所以打今儿起，粥厂要取消了，以后每天都要做工，至于这做工时间是不定的，取决于当天计划是什么。只有完成了当天计划的份额才有饭吃，不然就只能饿着。\n\n听到这做工安排是做完了才许吃饭，而至于做多少事先是不知道的，人群就骚动起来。谁也没法打包票说自己能按时干完。\n\n“他娘的，要是老子干一天一夜还没干完，岂不是直接饿一天？”人群里有个又粗又浑厚的声音，说完这话还用鼻子发出喷气的声音。至于那笑面的政府官员点了点头，说大体就是如此。不过按时做完总有饭吃；若是不做工，则一定没饭吃。大家最后只好接受。但对德三来说，这正好给他翘了夜校的理由。"
  QIE_ws_leader.28.a: "“夫民生在勤，勤则不匮；劳形以修德，忍饥以明义。”"
  QIE_ws_leader.29.t: "大开发"
  QIE_ws_leader.29.desc: "几个月前，他还躺在棚屋之中嘬着赈济的粥。但今天，他已经来到了这里，为了一口吃的把自己卖给了这个荒芜的地方。昨天夜里下了一场雨，这沟已变成了半泥半水的泥坑。\n\n他用尽全身的力气，把铲子狠狠插入到厚厚的湿土中，然后深吸气，凭着刚刚缓过来的力量，将这些土举起来丢到沟的外面。吸饱了雨水的土已变成了沉重的泥，使得他每一次动作都消耗了极大的力量，而他之前所吃的也不过是一个馍和一些米汤。但他不能停下手里的动作，因为一旦被监工发现，恐怕馍和米汤也要没得吃了，更重要的是，那原定要交到他手里的辛苦钱，也要一并被扣掉不少。\n\n他那赤裸的双脚已有一半陷入到沟里，他被钉在那里动弹不得，并且随着自己每一次挖掘，都向下沉入一分——这条深沟就如同一只神秘的怪物一般，死死抓住他的双脚，而随着他的每一次挣扎都将他再吞下一分。这条长到消失在地平线尽头的深沟，正是由不知道多少个和他一样的人合力挖出来的。而它最终究竟会变成什么样子的一条新路，他尚且还无法想象。只是那条路应当不会是泥泞的，沾满泥水的，逐渐下沉的路。\n\n当那些负责进行换填砂石的流民到来的时候，他，以及许多和他一样的人就不得不离开去另一个地方，寻得下一条把他们的双腿吞下的深沟。"
  QIE_ws_leader.29.a: "以工代赈初见成效。"
  QIE_ws_leader.30.t: "欧文·拉铁摩尔的造访"
  QIE_ws_leader.30.desc: "外交系收到消息，一位长期活跃于华北、满蒙与新疆边疆研究的美国学者欧文·拉铁摩尔不日将到访北京。拉铁摩尔热衷于中国历史和社会研究，曾在1926年的孙文党人叛乱期间从北京出发前往归化，最终抵达乌鲁木齐。在三次直奉战争结束之后，他也曾前往热河省地区对满蒙民族的历史进行研究。招待好这样一位民族学和边疆学者对我们来说有百利而无一害，我们或许可以从拉铁摩尔口中了解奉天伪政府在关外的民族政策与交通状况，继而对他们的地方军政动向进行推断，还可以向世界展现[ROOT.GetName]积极尝试融入他们的形象，博取更多外国政府的好感。"
  QIE_ws_leader.30.a: "让我们欢迎我们的国际友人！"
  QIE_ws_leader.30.b: "一个文人不值得我们这么对待。"
  QIE_ws_leader.31.t: "夜半"
  QIE_ws_leader.31.desc: "冷，饿，然后还是荒地。大家继续向北走了一段时间。听领头的说，我们已经快出四川了。大人们也说，说是穿过了眼前这片树林，再翻过一片山，就能到江边了，只要过了江，就有粮食吃了。好多人都拿刀，把树上的树皮剜下来做饭吃，我也吃了，不好吃，但至少暂时不饿了。这路上发生的另一件事，则是玉儿她们家半夜睡觉太不小心，居然全都睡死过去，等到醒了就发现自己从家里带出来的东西全被不知道谁卷走了。这向北移动的长队中不止有熟人，还有许多陌生人，而且每天都有人消失，究竟是谁干了这件事，大家也没有办法，只能劝他们别着急。\n\n幸运的是又走了一段路，就遇到了一群好心的先生，似乎是一番交涉，给玉儿找到了工作，那群先生付了她父母四元钱，我想大抵是预支的第一个月工钱什么的，就这样让玉儿工作去了，而他们家则继续带着三个较小的弟弟继续跟队伍北上。怪的是玉儿有地方歇脚了，可她父母倒不是很高兴。"
  QIE_ws_leader.31.a: "但他们为什么不为这件事高兴呢？"
  QIE_ws_leader.32.t: "泥泞"
  QIE_ws_leader.32.desc: "走到了江边的时候，我爹把姥姥埋了。\n\n从森林里吃树皮的那几天，她身体就很不好，我想是因为食物太苦，让她害了病。等到了江边就死了。大家都很悲伤，但是不痛苦。既然大家都不痛苦，那我也就不痛苦了。\n\n而且我们已经到了江边，等到了对岸就能进城了，进了城就有吃的了。我曾听以前住在对面的舅舅讲过，说城里的女学生白天也不做正经事，只知道唱歌，打球，花钱。她们一年用的钱就可以买下十六头水牛。在学校里男女一起上课，熟了便随意同男人睡觉，她们管这个叫自由。可是那舅舅自从在路上和他老婆散开了之后就失心疯了，所以没法再讲更多城里的故事。\n\n江水很急很急，大家都在等能够渡过去的船，所以现在这里安营一天。就在夜里，从江的另一边来了许多大船，打着很亮很亮的灯，向着岸这边照来照去，把大家都照醒了，从江上能听到有人细微的喊话声，大家一开始都还在骂街，但忽然又不说话了。\n\n这一定是政府或者是大官的船来接我们过去——"
  QIE_ws_leader.32.a: "所以我就站在这里。"
  QIE_ws_leader.33.t: "巴中通讯"
  QIE_ws_leader.33.desc: "《新民报》讯\n\n巴中县第一区贫农曾明国夫妇煮吃人肉充饥，经县府于近日抓获审讯，据曾明国及妻刘氏同供：\n\n金宝寨人，年50岁，有小子女各一，佃张姓山地耕种。半年不雨，野无青草，饿殍在途，我家只得沿门求吃，不得一饱，饥寒交迫，奄奄待毙，因见路边饥毙乞丐中，有白姓二小孩，想前人有荒年吃人之说，是夜取回屋，去其肠胃头骨，煮肉作食，藉以充饥肠。\n\n不数日，饥毙一张姓小孩，复行取回，如法煮吃，嗣将年终，窃见赖姓埋有已毙之小女孩，我就先后刨回，仍如法炮制，收贮两桶，存作过年度岁之需，忽被团正查出，说我吃的活小孩，解送我来案。我实固生计断绝，没有办法，所以偷吃死尸，请调查施恩等语。\n\n县府以其饥寒所迫，亦甚怜悯，惟前后煮吃四小孩，究系乘其将毙而食之，抑或盗取死尸煮吃，候派员查勘真实后再行核办。\n\n\n\n下版附《曾明国饥饿吃人图》。"
  QIE_ws_leader.33.a: "此非一县之灾，乃末劫之征。"
  QIE_ws_leader.34.t: "劳碌命"
  QIE_ws_leader.34.desc: "德三还是找机会跑了，他丢下那些政府里的体面人发给他的推车跑了。\n\n从南方到北方，从合肥到北京，从满是尿味和臭味的死胡同到棚屋，以及最后到直隶省的某个鸟不拉屎的乡下地方。他最后还是发现，自己似乎讨厌这样的生活——比讨厌孙大帅，陈大帅乃至周吴郑王大帅更甚。所以他跑了，趁着某个没人注意到的深夜，抄起两条腿，穿过那片到他膝盖高的草地，一路小跑。他本来不知道自己该去哪里，不过他很快就想起来夜校之前教过他怎么看星星判断方位——要是能再在夜校多待一段时间，估计还能学到怎么看星星直接判断合肥或者北京在哪里的方法。\n\n老天爷一直是眷顾他的，他是这样想。老天爷拿星星指引着他，让他跑到了某个不如北京气派的城里。至于之前北京城里的人说老天爷派了那些人治理中国这一点则证明老天爷是个混蛋。这两件事要分开算，至少现在他还是挺感激的。\n\n总而言之，他又重新干起了自己过去在合肥城干的事情。人生地不熟，给当地老板磕俩头，当小弟就成了。又因为自己有经验，所以很快又混成了小领袖，带着一个从四川来的小子一起混。自己走了这一遭，德三已确信这辈子就是当剪绺的命了，至于什么读书，发大财，当公子，可以留到投胎后的下一生再说。\n\n想到这里，他也便心满意足地躺在街边，呼呼大睡起来。"
  QIE_ws_leader.34.a: "安睡于繁华美好之梦中。"
  QIE_ws_leader.35.t: "洞房花烛"
  QIE_ws_leader.35.desc: "“老爷，那女的不肯，还一直要寻短见。我们几个给按住了。”张善人正搞不清楚这新婚之夜，为什么新娘还迟迟不从后房出来呢？家里的老仆去了一趟，带回来了这个消息。\n\n这可把张善人急得够呛。要知道，这老婆可是他花了九元从那个男人手里替儿子“娶”回来的，怎么偏偏到了拜堂前，才在这里哭哭啼啼寻短见？况且，这当时已说好了是“绝卖”，是交了聘金之后不赎回，不退货的。他张善人虽然比不上夏津县的县长，但在整个村子乃至镇子里还是说得上话的。今天这几桌应酬的酒菜虽然简单，但来的都是熟人宾客，要是回头一个不小心，自己管不住儿媳妇的闲话被传出去了，那自己可算是在这乡亲们中间丢大人了。\n\n想到这里，他也顾不得什么“爱人者，人恒爱之”之类的圣贤教导了，毕竟圣贤不是还说过“女子难养”吗？他直接三步并作两步，来到后房，穿过一众像废物一样，只会“哎呀哎呀”和探头观看的女仆，抬手便给了那个不识大体，折煞他面子的蠢女人两巴掌。随后，他吩咐仆人们把人收拾妥当，换上符合今日喜庆日子的红衣——当然别忘了给她嘴也塞上，叫她无论如何也别在前院乱喊乱叫。\n\n既然事情都处理好了，就让两个女仆一左一右把她搀到前院去，此刻，这场全家人都开心的新婚典礼终于能够体体面面地开始了。"
  QIE_ws_leader.35.a: "恭喜张公子，新婚志喜！"
  QIE_ws_leader.36.t: "茶馆"
  QIE_ws_leader.36.desc: "每到黄包车夫拉不到客人的时候，他们大多要找些别的方法打发闲暇时间。这马路牙子虽然是免费的，但难免硌得慌；而茶馆可谓是歇脚的更好选择，有座位，解渴的水，还有解闷的人。\n\n“五十二！”那个老车夫把右手举到脸前，伸出五根手指，对着问他年龄的年轻车夫，“我五十二了啊今年，还不知道能再拉几年呢！”\n\n“我这也快四十了，不瞒您说啊，这拉一月是一月，拉一年是一年的，全是凑活事。家里还有小的要养呢，只能指望着这腿再多撑两年。”老车夫抿了口水，继续说道，“我儿子倒是很争气，呦嗬！那可是大兵，军爷！”\n\n这解乏的聊天，既可以攀比，也可以借着一个话头，扩展出许多别的话题。年轻的车夫一边夸赞老车夫的儿子有出息，一边又捕捉了关键词，接着聊别的话题：“你说这外国人，就是吴佩孚老崇拜的那个，叫花生豆的，多厉害威风啊，美国的皇帝！秦始皇！”说到这里，他一只脚踏在长凳上，仿佛是在夸耀自己的功绩，“一路把别人打得丢盔卸甲，结果呢，光顾着打仗了，儿子也没有一个，最后皇位落到别人手里了。”\n\n“人家那叫共和制，没有皇帝了！人家也不叫花生豆叫华盛顿。”茶馆之中，有个刺耳又带着笑意的声音响起来，有点像是在嘲笑年轻的车夫没见识，不过车夫可满不在乎。“是是是，您老见多识广！共和制是你参谋的！”他转过头，又对老车夫说道：“咱就是说啊，你看这花生这么厉害，结果到死了也没人传宗接代，这不就是断子绝孙了吗？死了，嘛都没落着。哪像您老有个有出息的儿子。”老车夫点了点头，似乎是很赞同这番奉承。"
  QIE_ws_leader.36.a: "对！这洋人再怎么厉害，还是断子绝孙了嘛~"
  QIE_ws_leader.37.t: "舶来的尖端手术"
  QIE_ws_leader.37.desc: "本报北京讯\n\n顷闻北京协和医院，于本周初施行西医新术一例，手法精审，措置周详，颇称成功。此项手术，向为欧美医界所矜重，今由我国医家亲为施行，足证新医学之术，非西人所独擅，亦为吾国医学进步之一端，社会闻者亦多以为吾国新医学日进有征，实足为邦人增一番信心焉。\n\n据医界人士言，此术系施治于素有暴戾冲动、妄为伤人之倾向者。凡此等病人，往往性情乖戾，动辄逞凶，家属束手，邻里惊惶。自经新术治疗后，其躁妄之气多能渐就平宁，悍戾之性亦可稍归调伏，俾其不复轻易伤人，庶几得以重返社会，免为家庭之忧，亦免为国家之累。此中利济，诚非浅鲜。\n\n查此术为葡萄牙医家安东尼奥·埃加斯·莫尼斯氏于一九三五年所创，名曰前额叶白质截断新术。问世以来，欧美医界颇加注意，美国诸医院亦相继试行，视为精神治疗之一新途径。\n\n近岁社会风气陵夷，泼皮无赖、屡犯不悛之徒，滋扰市廛，良民苦之久矣。政府若为社会治安及人民安宁计，对于顽梗成性、反复为害之社会犯，或可审慎参酌医界新法，以除其暴戾之根，化害群之人而归于秩序。此于国家、于人民，诚非无补也。\n\n当然，新术之行，关系人身，非可轻率。凡施治与否，必当有医家之精审判断，有家属与公议之慎重参酌，有机关之严密监督，庶免流于滥用。然因噎废食，亦非进步民族所宜。欧美所以能日新月异者，正在敢于实验，敢于任事；吾国今日欲振弱图强，亦须破除因循畏葸之习，于有益民生、有裨治安之新知新术，择善而从，审慎而行。"
  QIE_ws_leader.37.a: "我国医学的又一进展！"
  QIE_ws_leader.38.t: "旧道德不必全焚"
  QIE_ws_leader.38.desc: "在过去数周中，政府频繁邀请报界主笔、医生、商会代表以及大学教员参与各类闭门座谈。《新声报》近日发布社论，主张缓和当前知识分子与政府政策之间的紧张关系，社论内容摘录如下：\n\n近世新派之论，每一及孔孟，则疾首蹙额，若睹仇雠；每一闻礼义，则辄疑其为复古专制之先声。此种愤激，固非无因。数千年来，官僚乡绅，假纲常以鱼肉小民；父权族权，借圣贤之言以羁縻妇女青年。凡此旧礼教之流毒，本报向不为之曲讳，亦绝不为之张目。\n\n然则孔孟之书，果遂一无足取，必须尽付秦火乎？吾人以为，此论亦未免过当。旧文化之可恶，在顽固派以之为束缚人民之铁锁；然铁锁之成，未必即证明其材质悉为鸩毒。孔子有言曰：“己所不欲，勿施于人。”孟子有言曰：“民为贵，君为轻。”此虽未可遽称现代民主，而其间同情民瘼、裁抑强权之意，固未尝全无也。\n\n吾人所反对者，乃将孔孟铸为金像，强使天下跪拜；吾人所不取者，亦在将古书悉画鬼面，惟恐人不唾弃。新社会之建设，固须科学，须平等，须民主；然亦须有足以说服多数国民之精神根柢。\n\n故本报之主张甚明：取其仁义，而去其专制；取其民本，而进为民主；取其修身，而化为公民责任。古道固不可奉为今日宪法，然亦不必悉投废纸篓中。今日进步之士，当夺回解释古书之权，使孔孟不复为顽固派所独占，而能为新社会之建设，稍尽其可用之力焉。"
  QIE_ws_leader.38.a: "还算他们看得懂风向，让他们刊得更广些。"
  QIE_ws_leader.39.t: "可疑的仙丹"
  QIE_ws_leader.39.desc: "“他妈的，你小子会不会吃？”老六伸手拍了一下小庆子的后背，不过这完全是熟人之间的打闹，其中毫无恶意，“这么多年了，咱也是当上大师兄了。”说完这句话，他就把这周那颗“仙丹”放进嘴，也没嚼就直接吞进到肚子里了。\n\n前几周有个骑兵来到村子里，传达了政府的命令，要各个村子组织起一支民兵队来“保护庙宇祠社与中华传统”。每支民兵队都将得到政府的一些补贴，这笔钱立刻让各村的乡绅、团首和庙祝都热心起来，极大程度地动员了各地进行组织的积极性。\n\n对这些直隶地区上了年纪的人来说，他们心中产生了当年“义和团”时期同样的不安；而对于那些在田野间除了干活无事可做的年轻人来说，这则单纯只意味着一项有意思的活动。\n\n更有意思的是现在政府开始发一些“仙丹”，据说吃了能够强身健体，增长力量，是颜色微微发红，混入了一些符灰的中药丸子，出乎意料地苦，遮盖了一切其它的气味。所以他们已经学会怎么吃了——不要在嘴里嚼，直接吞下去。小庆子从来没吃过能让他变得这么力大无比，精力充沛的东西，吃了之后就算是耕地都更有劲，其效力远远超过了自己听说当初义和团的“大师兄”们的版本。只是有个小小的副作用，那就是第二天有点头疼和使不上力，但这多半是前一天自己做事情太多导致的。至于老六，他倒是吃了之后第二天会安静不少，对他来说像是成了安神药。"
  QIE_ws_leader.39.a: "仙丹进腹，刀枪不入。"
  QIE_ws_leader.40.t: "把杏坛设在军队中"
  QIE_ws_leader.40.desc: "正如同我们所预期的那样，在经教督察们进驻军队之后，士兵们立刻意识到了这并非是一项“建议”，而是“命令”。\n\n我们已确保每个营中都有一位救世新教派出的督察负责监督相关工作的落实情况，他们在军队中的工作也和预期一样展开——一方面是每周的思想教育，另一方面是每个月的省过会与会后心得。我们现阶段遇到的问题依然是一个系统性的问题——许多士兵的受教育水平不足以进行有效的学习，这使得一些营中的督察不得不将会后心得改为口头提交，这极大地浪费了时间；另一方面则是一些士兵无法准确理解经文礼教之中的细微含义，现阶段这些督察尝试尽可能简单地将之解释成忠于长官，信靠袍泽，热爱国家。但如果我们想要在军队中开展更广泛的礼教教育，额外开办识字班和文化课将是必须的，这一职责将在未来由经教督察们执行。"
  QIE_ws_leader.40.a: "一步一步慢慢来。"
  QIE_ws_leader.41.t: "新一座工厂"
  QIE_ws_leader.41.desc: "他擦了擦汗，把铁锹丢到一边，倚在土墙根上大口喘气。他的活计算完成了，这洋灰翻炒的如此均匀，可以说是非常符合要求，以至于或许月末了还能多拿几角的表扬钱。他抬头去寻自己妻子，应该是在某个地方正推砂土——“嘶……”那溅落的洋灰咬着他的手发疼——也许就是这因疼痛闭眼的一刻，她就快速地出现又消失了？\n\n但就算是二人一起卖力气，拿半块到一元的薪水，可还是填不上这一天天都在翻的债，而且这钱还有一部分要拿去吃饭打牌吸烟，怎能全都还债去了？\n\n夜晚的棚屋是独属于这些人的休息时间，棚屋各自独立，所以他最后还是鼓起勇气同她讲了这件事，就是他已决定把她借给当地陈家的这件事。已经讲好了，只出借四年，是五十元钱。如果出借的日子里养了个儿子，就可以三年后回来——当然那孩子自然要留在陈家——还可以再多带十元的喜钱。这钱不仅能填上家里的债，还能余下很大一笔，使彼此四年后不再过这苦日子了。\n\n既然已经和盘托出，他妻子只是颤抖着问：“你为什么不早对我说这件事呢？”而他也只好据实照答：“我上周拿着锹，在你面前转了三圈，可是说不出口。但我仔细想，除了从你的身子做文章外，确再没有办法了。”\n\n至于挨得很近的另一间棚屋，临时拼凑的木头窗户吱呀呀地摇，几个工人正一边玩着斗混江，一边东拉西扯。“你听说这厂子是给谁的了吗？”“怎么，还能是给你的？”“我听他们说啊，是集成三酸厂，做炸药的。我说这话是告诉你，”那人猛吸一口自己手卷的烟，“这厂子要求杂七杂八，还有一堆小工厂，哥几个恐怕要在这儿建个四五年了。”"
  QIE_ws_leader.41.a: "如同孕育婴儿。"
  QIE_ws_leader.42.t: "化肥"
  QIE_ws_leader.42.desc: "一些关于各地“流民治理成果”的消息传回北京，许多地方实业家都对[ROOT.GetName]向他们提供的补贴以及低廉的劳动力致以感谢。还有更多一开始观望的企业也开始联系我们的财政系寻求加入进来。关于这项政策圆满开展，取得丰硕成果的庆功会就这样在东兴楼饭庄举办了。\n\n“这基本上是我们的盟友，德意志的模式。”发言人看上去很自豪，向坐在角落里那寥寥几个繁荣联盟成员举杯，尽管救世新教自上台之后连连向这些亲德游说团体释放善意，但这些德国的说客就像是见了瘟神一样，对政府的示好连连拒绝。为了缓解尴尬，他顿了一下接着说：“我们的做法是一方面是让这些农民去赎买土地，另一方面动员地方上的地主乡绅，他们有大量的粮食，大量的钱。都放在他们的仓库里。买一袋补贴的化肥，就能产出之前三倍的粮食，并且解雇掉十二个长工。这些长工又自然而然地流向城市里的工厂，或者是成为我们广泛建设大军的一部分。”\n\n说到这里，他从礼服的口袋里掏出来了一张皱巴巴的纸，“这是范旭东先生主持的永利化学产出的化肥，是中国人自己的化肥。感谢我们德国朋友的技术帮助。范先生和我们达成了协议，因为华东日益严峻的社会状况，我们决定帮助他在直隶设置永利化学新厂，而这些因化肥来建厂的原农业工人，会因为建设化肥厂带来更多农业工人。”\n\n“我们所做的并不是孙文党人在搞的土地革命，而是真正能够有益于这个国家力量的土地改良。”"
  QIE_ws_leader.42.a: "圣人不仁，以百姓为刍狗。"
  QIE_ws_leader.43.t: "七一四研究所的开幕"
  QIE_ws_leader.43.desc: "长期以来我国虽有若干兵工厂与军械修造机关，却缺乏专门负责军械技术试验、改良与研发的研究机构。林建章向政府提议，应该设立一个相关研究所以开发军事技术。经过一番讨论之后，[QIE.GetLeader]最终敲定在洛阳设置。由于林建章的提议落款为七月十四日，故定名为714研究所，主要有两方面考量。其一是作为军工研究所，应该选择军工体系完备的地方，那就只能在洛阳与保定之间选择；其二是政府不愿意看到保定地区一家独大，现在我们已经有保定陆军军官学校了，如果将研究所继续设立在那里，恐怕会打破平衡。我们正好可以借机敲打以蒋百里为首的保定军学圈。尽管研究所当前规模较小，但假使有一天我们一统全国之后，这个小小的军事研究所或许将成长为一个巨人……"
  QIE_ws_leader.43.a: "今日草创，来日成器。"

  QIE_ws_leader.44.t: "结束所有血海的血海"
  QIE_ws_leader.44.desc: "人欲恶塞，乃不流行。不流故堕，故曰沉沦。人恶居多，天地为坏，皆缘不空，不自修玄。（《先天混元玄玄秘箓救世界真经》第七章论玄空）\n\n这不是寻常的战争，这是向所有参与共谋的杀害者讨取血的战争。我们的情报分析显示，在汤尔和主席被暗杀之前，有几箱来自法兰西公社和不列颠联盟的奇怪货物通过上海地区进入到了北京。进一步调查发现，这些最终寄到了离枪手住所很近的区域，我们有理由怀疑，这是国内残余的工团势力和海外赤色乱党巢穴联合起来，试图干涉我国的一场最终得逞的邪恶阴谋。\n\n如今，我们已经把那些国内的破坏分子一一正法，而他们的外国主子还安坐在自己的宫殿里——“没有神！没有皇帝！没有命运！”他们这样可耻地叫嚣着，从而用恐惧和阴谋支配着千千万万无辜的人，把这些人变成他们手下听话的，只知道工作，进食，休息和死亡的机器。\n\n[ROOT.GetLeader]以及[ROOT.GetName]的人民已经立下了复仇的誓言，他们将摧毁所有破坏，以及计划破坏他们美好复兴的敌人，这绝非虚言。流着血泪，寻求复仇的哀悼的军队已经从东方崛起，这将是一次终结所有血泪的进军，一次带来永久的和平和大同世界的进军。在社会主义的瘟疫被彻底治愈、其散播病菌的尸体焚烧殆尽之前，我们的孩子，[ROOT.GetName]的后嗣们绝不会收起手中的武器。"
  QIE_ws_leader.44.a: "我们将先实现那血海。"
  QIE_ws_leader.45.t: "人弃我取"
  QIE_ws_leader.45.desc: "昨日上午，现政府接受了本报的采访要求，本报记者对吴佩孚先生进行了采访，内容如下：\n\n王：今日救世新教定北京于骚乱，拯社会于流民，可谓是大功一件，百姓无不交口称赞现政府之爱民如子。然而坊间亦有传闻，说吴先生素来信佛，因此现政府才如此重视慈善救济。此说是否属实？\n吴：我岂止信佛，儒释道耶回者各有所长，我都信。\n\n王：然而宗教鬼神之说，虚无缥缈。唯人善心为实际，吴先生，意见如何？\n吴：所谓鬼神就是人的精神，怎么没有？聪明正直的就是神，卑鄙龌龊的就是鬼！人能与天地合体，死了当然就永远存在。只有小学生才不信鬼神哩。\n\n王：但科学界人，皆斥鬼神之说为迷信。吴先生意见如何？\n吴：迷信，什么叫迷信？我没有上楼，我就说没有楼。有人说楼上好玩，我就说没有楼，都是迷信！丢不丢人！天地间的学问很多，西人只研究到哲学，不知道什么玄学，因为他们不懂，就说鬼神是迷信。你要是做了坏事，晚上就做噩梦。所以曾子说：吾日，三省吾身。这就是怕获罪于神。\n\n王：但现今科学世界，一谈鬼神，即被人讪笑，吴先生以为何如？\n吴：你懂不懂什么叫人弃我取？孔子作《春秋》，口诛笔伐。孟子讲道德说仁义，是因为那时候没人口诛笔伐，所以孔子来做；没人讲道德仁义，所以孟子来做。要是唐虞之世，谁也是仁义道德的人，你要诛谁伐谁？孔孟要是生在唐虞时代，他们也不口诛笔伐，也不讲道德，说仁义了。"
  QIE_ws_leader.45.a: "《字林西报》特约记者王敏讯。"
  QIE_ws_leader.46.t: "江四先生的自白"
  QIE_ws_leader.46.desc: "太阳刚刚落山，香厂新市区的东方饭店便迎来了一大批贵客——他们大多是如今[ROOT.GetName]的政府高官以及社会名流，偶尔还有小轿车把从外地来的宾客送到这里。正是江朝宗邀请他们于这家中国人运营的高级餐厅中庆祝。一是为了祝贺政府“治理流民有方”，二是为了祝贺自己掌握教统之位，借机敲打一下政府和地方上的要员名流。\n\n要说东方饭店最有名的菜品的话，那自然是法式烧猪了，据说所用的材料都是专门喝牛奶养大的猪。不过显然每一场江朝宗主导的宴请，关键点都不在吃什么上。等到人都到齐入座，江朝宗本人才脚步缓慢地现身。他先是祝贺了政府完美解决了先前面对的危机，称赞“列位诸君并肩作战，赈济游民有方”；随后又不忘向大家宣示自己的绝对地位，说自己既然身为国家之元首，政府之总持，就应当为国鞠躬尽瘁。\n\n演讲已毕，官员们也依次为江朝宗献上祝词，这场宴席的大部分目的已经达到了。\n\n等到江朝宗走进席间，与人碰杯寒暄，握手相谈时，王克敏便同江朝宗讲了自己当前最顾虑的问题，也就是李思浩回归是否会影响到他自己作为中国银行总裁的位置。“叔鲁啊，”江朝宗拍了拍他的手背，“这个位置你坐得稳。李思浩嘛，让他继续当他的财政次长就是了。”\n\n至于与张燕卿互相道喜的时候，谈论的则是今后的外交方向。张燕卿并非救世新教中人，而是相对灵活的保皇派，他的问题是[ROOT.GetName]今后究竟在世界上要以什么面目示人——所谓的“五教合一”，这种宗教内容究竟要如何处理。“宗教之说，不过是使流民不暴动，盗贼不作乱的法子，对外则暂且不谈。”江朝宗转了转头，“你只消作出对外开放的大略样子，证明我们是个心胸宽广的政府便差不多了。”\n\n“江先生，该拍照了！”正巧此时，雇的摄影师也架设好了仪器，该拍一张照片，好上明天各大报社的头条了。"
  QIE_ws_leader.46.a: "“一，二，三：华北政府万岁。”"
  QIE_ws_leader.47.t: "二仙降坛"
  QIE_ws_leader.47.desc: "近日救世新教的乩坛之上发生了另一件奇事。自我们控制政府之后，军事人员便一直头疼于如何把我们这支混杂的部队转化为有组织的军事力量。为此，一些救世新教成员便来到乩坛前焚香叩问孚佑帝君。\n\n然而帝君并未下降，前来的乃是弘农太守景纯郭真人。郭真人降谕宣称太一老祖体恤教内成员全心全力筑固国防之赤胆忠心，特派他下降相助，传我等救世救国之法。随他一道来的，是德国知名的军事理论家卡尔·冯·克劳塞维茨——郭公既能通幽明，邀来西洋兵圣同降一坛，自然也不足为怪。\n\n此后郭璞与克劳塞维茨接连三日在乩坛前讲兵。郭璞言山川形势，道路津梁，不可只作风水观，而应视作兵站、纵深与退却线；克劳塞维茨则言兵者政事之余波，军中之勇怯、道路之阻滞、号令之迟疑，皆为战场摩擦。若欲求胜，必先明我军之重心，集兵力于要害，以一击破敌之胆气。\n\n二仙亦晓明单凭乩笔，诸多细碎之事难以言明，还另指示去参考阅读一些特定书籍，以战止战，继而扬救国救民救世之善心。"
  QIE_ws_leader.47.a: "真人降兵法，佑护我中华。"


  QIE_wushan_events.24.t: "光复中华"
  QIE_wushan_events.24.desc: "这一天还是到来了，在将军庙中，[ROOT.GetLeader]作为救世新教的教统举行了极为庄重的正式仪式，以拜请军神关圣帝君显灵并且回答关于中国分裂现状的问题。\n\n在扶乩仪式中，关羽宣布统一中国的时机已到，并且中国历史上的诸位伟大的将军：王翦，卫青，班超，刘裕，柴荣，徐达等人也一并显灵，将和[ROOT.GetName]的军队并肩作战。在仪式过程中，北京城忽然被一大片乌云覆盖，有雷声从云中发出来，一些居民说看到了金色的龙在云中游走怒吼。还有几位神职人员宣称在过程中看到了神秘的灵兽白泽，传说它只会出现在真正仁德的中华之主面前。这些关于祥瑞的传闻无不鼓舞了我们民众的士气。我们的军队已磨亮宝剑，士气前所未有地高昂。只待[ROOT.GetLeader]一声令下，就能撕碎所有阻挡在我们面前的割据势力，实现我们恢复中华统一的战争了。"
  QIE_wushan_events.24.a: "列祖列宗保佑。"
  QIE_wushan_events.25.t: "忘恩负义的拉铁摩尔先生"
  QIE_wushan_events.25.desc: "近日，美利坚合众国的所谓“资深中华学家”欧文·拉铁摩尔先生在国际上出版了一本书，宣传了一种叫做“内亚边疆论”的错误思想，否认存在数千年传承下来的灿烂中华文明，而将之抹黑为草原、边疆与商路之间偶然互动的产物。令人痛心的是，数年前北京还曾以礼相待此忘恩负义之人，甚至对他大开方便之门。然而最令本报惊愕和可耻的是，在北京乃至全国，都有知识分子为这种愚昧而危害国家的思想摇旗呐喊。\n\n所谓“内亚边疆论”，不过是以欧文·拉铁摩尔为首的宵小之辈，为瓦解中华自秦汉时期传承下来的大一统文明框架而进行的一场阴谋，其目的是用这些否定过去、割裂传统、推翻祖宗的说法毒害中国人的精神，使中国人陷入混乱，好被他们支配而永永远远做洋人的奴隶。\n\n但我们已不是奴隶了，在[ROOT.GetLeader]的带领下，人民们已经自豪地复兴了传承千年的中华文化，这是世间独一无二，从未断绝的真正的智慧，正是因为外国人羡慕我们拥有这样的宝物，所以才想毁灭它。\n\n拉铁摩尔先生早有预谋，他于1926年间，就趁我国混乱之时自北京出发，花费多年走遍我国各地，秘密进行土地测绘和资源考察，为的就是搞清楚中国的弱点，以便于在未来摧毁中国，可惜他的阴谋和许多外国侵略者的阴谋都要落空了。我们必须警惕像欧文·拉铁摩尔这样在外部摇唇鼓舌的敌人，也要小心在内部为拉铁摩尔助威的那些心怀叵测的知识分子。只有这样，我们才能真正复兴中华，我们才能真正保卫国家，我们才能真正实现统一。"
  QIE_wushan_events.25.a: "拉铁摩尔一个外国人，也有权评论中国？"
  QIE_wushan_events.26.t: "大阴谋家拉铁摩尔先生"
  QIE_wushan_events.26.desc: "近日，美利坚合众国的所谓“资深中华学家”欧文·拉铁摩尔先生在国际上出版了一本书，宣传了一种叫做“内亚边疆论”的错误思想，否认存在数千年传承下来的灿烂中华文明，而将之抹黑为草原、边疆与商路之间偶然互动的产物。当年政府中便有人看出此人居心叵测，反对给予礼遇。今日事实证明这种警惕并非杞人忧天。然而最令本报惊愕和可耻的是，在北京乃至全国，都有知识分子为这种愚昧而危害国家的思想摇旗呐喊。\n\n所谓“内亚边疆论”，不过是以欧文·拉铁摩尔为首的宵小之辈，为瓦解中华自秦汉时期传承下来的大一统文明框架而进行的一场阴谋，其目的是用这些否定过去、割裂传统、推翻祖宗的说法毒害中国人的精神，使中国人陷入混乱，好被他们支配而永永远远做洋人的奴隶。\n\n但我们已不是奴隶了，在[ROOT.GetLeader]的带领下，人民们已经自豪地复兴了传承千年的中华文化，这是世间独一无二，从未断绝的真正的智慧，正是因为外国人羡慕我们拥有这样的宝物，所以才想毁灭它。\n\n拉铁摩尔先生早有预谋，他于1926年间，就趁我国混乱之时自北京出发，花费多年走遍我国各地，秘密进行土地测绘和资源考察，为的就是搞清楚中国的弱点，以便于在未来摧毁中国，可惜他的阴谋和许多外国侵略者的阴谋都要落空了。我们必须警惕像欧文·拉铁摩尔这样在外部摇唇鼓舌的敌人，也要小心在内部为拉铁摩尔助威的那些心怀叵测的知识分子。只有这样，我们才能真正复兴中华，我们才能真正保卫国家，我们才能真正实现统一。"
  QIE_wushan_events.26.a: "拉铁摩尔一个外国人，也有权评论中国？"
  QIE_wushan_events.27.t: "《青年要志》创刊号"
  QIE_wushan_events.27.desc: "窃以喜新厌旧，近世浮薄之恒言也；温故知新，中华圣贤之遗训也。年少而轻躁，未必为可贵；年长而笃厚，乃足为可师。西人相勖，曰进步自由，曰科学民主，词旨煌煌，若日月之新悬；吾国先哲相传，曰仁义礼乐，曰忠恕孝弟，义理渊渊，如江河之不废。此岂中西民族涉想不同、趋向相反之一端欤？\n\n青年者，非徒血气方刚、筋骨未衰之谓也。青年之可贵，不在其敢毁成法，不在其喜逐新声，乃在其能继往圣之绝学，守先民之遗范，以方寸之心，承数千年文化之命脉。譬诸乔木，其枝叶之荣，必本于深根；譬诸大河，其波澜之壮，必源于远泉。根拔则木槁，源塞则流竭。中国者，礼义之邦也；中国青年者，礼义之苗裔也。舍其根而慕他木，塞其源而引异流，虽一时葱茏奔放，其终也不过漂萍断梗，随风而靡耳。\n\n准斯以谈，吾国今日之青年，其能自立于天地之间耶？抑将委身于欧风美雨之中而不自知耶？非予之所忍言者。夫西方之学术器械，固有可资采用者；然近世青年，往往不辨本末，不分体用，闻人言科学，则以为圣经贤传皆可焚也；闻人言民主，则以为君亲师友皆可慢也；闻人言自由，则以为礼法廉耻皆可弃也。噫！以器物之便利，而坏心术之端方；以制度之新名，而乱伦常之大本；以一时之嚣竞，而易万世之纲维，此所谓买椟而还珠，得舟而失水者也。\n\n吾见夫今日青年，口称文明，而不知敬其父母者有之；手执新书，而不知读其经史者有之；高谈科学，而不知正其心术者有之；侈言民主，而不知守其礼分者有之。衣冠则效西人，言语则杂洋音，举止则弃端庄而尚轻佻，思想则逐时髦而忘本根。其始也未尝无赤子之心，寖假而为新学浮辞所迷惑者有之；寖假而畏世俗嘲笑守旧二字，遂不敢明目张胆尊孔孟、崇礼义者有之。于是社会之间，长幼无序，男女无防，义利倒置，廉耻扫地。\n\n欲救此病，非徒奔走呼号、袭取外名之所能济也。是在一二笃于自觉、勇于守道之青年，毅然以中华道统自任，发挥吾民族固有之精神，决择今世种种之思想。孰为本根，而不可一日或离？孰为枝叶，而可因时制宜？孰为礼义之正途？孰为放纵之邪说？孰为有益之器用？孰为伤心败俗之毒焰？皆当明辨而审择之。不可见洋字而遽拜，不可闻新名而遽从，不可因一时贫弱遂疑祖宗无灵，不可因外邦富强遂谓圣贤无用。\n\n谨陈六义，以告青年。一曰尊经史。二曰明孝弟。三曰崇礼仪。四曰正心术。五曰辨体用。六曰守国魂。"
  QIE_wushan_events.27.a: "敬告青年。"
  QIE_wushan_events.28.t: "外国教官"
  QIE_wushan_events.28.desc: "我们已经计划接纳目前世界前沿的机动化作战理论，但我国实在缺乏能够指导部队进行机动化作战的军事人才。或许我们可以从使馆城市寻找合适的教官，但如果我们能够直接雇佣理论的提出者呢？约翰·弗雷德里克·查尔斯·富勒少将，自从他随英国一同流亡到加拿大之后，目前已经退役。据我们所知，外交系的顾维钧或许能够联系上他，将他邀请到我国从事军事指导——顾维钧的妻子黄蕙兰曾与一位著名的英国神秘学家，郭礼雅，有所交流。郭礼雅本身也很热爱我国传统文化，正是他在云南期间将《道德经》和《清净经》翻译成英语。\n\n但关键点并不在于一个洋道士，而在于郭礼雅是富勒少将的“上师”与“偶像”，他们隶属于同一个海外神秘学组织。如果他能出面帮我们传递消息，就再好不过了。"
  QIE_wushan_events.28.a: "我们自己的将领也能学会这些。"
  QIE_wushan_events.28.b: "接顾维钧，我们可以试一试。"
  QIE_wushan_events.29.t: "好消息"
  QIE_wushan_events.29.desc: "顾维钧为我们带回来了好消息，约翰·弗雷德里克·查尔斯·富勒少将已接受了我们的邀请，他非常乐意来指导我们的军队按照他的军事理论进行训练。这位在西方世界被称为“伯尼”的军事家已抵达北京，但我们最好看好他，因为据称他本人依然与海外神秘学团体之间存在着某种千丝万缕的联系。"
  QIE_wushan_events.29.a: "你将帮助我们建成一支前所未有的军队。"
  QIE_wushan_events.30.t: "给奉天的电报"
  QIE_wushan_events.30.desc: "我们现在已经掌握了华北政府的控制权，我们之中的那些前北洋政府要人都已加入到了我们的内阁中。然而仍有一些老朋友在斗争失败后，心灰意冷地离开了华北地区。“慧牟”曹汝霖与“慧依”陆宗舆，他们二人目前正在[FNG.GetName]为其效力。或许我们可以向他们发送一封电报，邀请他们重归我们的政府——曹汝霖是新交通系的首领，手中掌握着大量财政资源；而陆宗舆曾担任中国驻日本全权公使，有他在中间润滑，或许我们可以缓和与日本之间的紧张关系，从而为我们的军备扩张争取更多时间。"
  QIE_wushan_events.30.a: "发电报过去。"
  QIE_wushan_events.30.b: "此事需从长计议。"
  QIE_wushan_events.31.t: "来自[QIE.GetName]的消息"
  QIE_wushan_events.31.desc: "自从北京政治局势发生变化之后，我们就密切关注着他们的动向。我们截获了一封来自北京的电报，具体内容是邀请曹汝霖与陆宗舆返回北京担任职务的。新交通系在奉天几乎和“日本人的走狗”是同义词，如果我们放任他们离开也不会招致民间太多的反感；但假如他们真的走了，我们在未来或许更难从日本人手中得到好处。"
  QIE_wushan_events.31.a: "一个也不许走，密切监视他们。"
  QIE_wushan_events.31.b: "放他们两人离开。"
  QIE_wushan_events.32.t: "发起突袭？"
  QIE_wushan_events.32.desc: "我们收到消息，[FNG.GetName]对曹汝霖和陆宗舆开展了严密的监视，看来我们邀请二人前往北京的电报被他们截获了。但如果我们能组织起一场突袭行动的话，或许就能将二人从奉天带出——现在的问题是，对于这两人是否有我们这样做的价值。"
  QIE_wushan_events.32.a: "准备发动突袭。"
  QIE_wushan_events.32.b: "这不值得我们冒险。"
  QIE_wushan_events.33.t: "老朋友的回归"
  QIE_wushan_events.33.desc: "向您报告，曹汝霖与陆宗舆已平安抵达。二人乘坐火车经承德抵达北京，尽管[FNG.GetLeader]似乎发现了他们的动向，但只是象征性地进行了追击，没有更多动作。"
  QIE_wushan_events.33.a: "我们又一次见面了。"
  QIE_wushan_events.34.t: "汤尔和离开南京"
  QIE_wushan_events.34.desc: "南京金陵学院教授汤尔和坐上了北上的火车，现在已离开我们的地区。有人报告说在早上收到了一封信后就匆匆收拾行李离开了，更多讯息需要进一步调查。"
  QIE_wushan_events.34.a: "一个文人，随他去吧。"
  QIE_wushan_events.35.t: "林建章前往北京"
  QIE_wushan_events.35.desc: "烟台海军将领林建章坐上了前往北京的火车，现在已离开我们的地区。有人报告说在早上收到了一封信后就匆匆收拾行李离开了，更多讯息需要进一步调查。"
  QIE_wushan_events.35.a: "这啥情况呢？"

  QIE_ws_normal_events.1.t: "与前国会在野党合作"
  QIE_ws_normal_events.1.desc: "[QIE.GetLeader]现在控制住了北京政府和救世新教，权力斗争终于告一段落。而现在我们要面临的问题则是在民众眼中的合法性——民众当然把我们的赈灾成果看在眼里，但他们也最多只是认为我们是个合格的慈善团体而非政府。如果想提高我们政府的合法性，最好的选择是和先前已在国会中的政党组成执政联盟，如此一来我们便可以利用他们在民间积累下来的声望为我们的新政权背书。\n\n中国青年党是一群少壮派和城市知识分子组成的联盟，他们对工业化事务非常上心，但他们相当讨厌外国势力。如果我们和他们合作的话就要小心我们的对外政策惹他们不高兴。\n\n宗社党虽然是一群满清遗老，但他们之中最激进的已经在之前的政变中被清除了，现在留下的是一群掌握着北京乃至全国民族工业的“企业家”。我们当然可以和这些人共同创造财富，前提是我们后续推行的政策不会损伤他们的利益，他们要和外国人做生意，基本上是中国青年党的反面。\n\n第三个选择是帝国宪政会，作为温和的中庸政党，和他们合作可以为我们争取相当广泛的支持者，而且不会导致我们的外交政策被他们左右。但代价是这群人很看重投资回报不高的农村地区，为了取悦他们，我们的许多投资可能都要进入农村这个无底洞……\n\n显然我们没有精力向各方都派出说客，或许我们需要专精于一家。"
  QIE_ws_normal_events.1.a: "宗社党人符合我们的计划。"
  QIE_ws_normal_events.1.b: "青年党并不是一个很坏的选择。"
  QIE_ws_normal_events.1.c: "帝国宪政会最软弱，可以利用。"
  QIE_ws_normal_events.2.t: "战事不利！"
  QIE_ws_normal_events.2.desc: "我们的战争计划未能按照预计进行，我们的敌人仍然具有强烈的反抗意志。由于战事不利，我军的士气遭到了重创，民众也开始怀疑我们是否能够实现我们的战争目标，以及这场战争是否真的不会对他们的日常生活造成巨大的影响。"
  QIE_ws_normal_events.2.a: "该死！"
  QIE_ws_normal_events.3.t: "来自北京的救济"
  QIE_ws_normal_events.3.desc: "今天早上，一支身穿直系军服的小股部队出现在了陕西和四川的交界线上。我们的士兵一开始认为这是北京政府的突然袭击，但事情很快水落石出。原来是中央政府的援助到了。就像[SZC.GetLeader]之前听说的那样，如今的中央政府已被名为救世新教的慈善团体控制，早在1925年，川黔湘鄂赣五省大饥荒爆发时，救世新教就曾向四川提供过援助。而如今他们掌握了政治实体，其援助数量比起上一次有过之而无不及！感谢他们的帮助，我们的饥荒问题得到了极大的缓解。"
  QIE_ws_normal_events.3.a: "但代价是什么？"
  QIE_ws_normal_events.4.t: "援助的代价"
  QIE_ws_normal_events.4.desc: "今天我们收到了[QIE.GetName]发来的电报，[QIE.GetLeader]在今天正式通知我们，要求我们立即承认他们的权威。在电报中[QIE.GetName]指出，作为中华大地上真正合法的政权，他们希望我们能够自行解散政府和军队，并加入中央政府的怀抱。此外他们还在电报中特别指出，希望[SZC.GetLeader]以及他的政治幕僚们考虑此前面对饥荒时[QIE.GetName]的帮助。他们许诺我们的政府人员将享受退休待遇，但他们将无法再次涉入政坛。面对着这样一份令人感到意外和出格的要求，我们既可以选择拒绝——代价就是战争，对方肯定不会善罢甘休；也可以选择屈服，但与作为合作政府不同，我们的政府将直接烟消云散，毫无保留的机会。"
  QIE_ws_normal_events.4.a: "饥荒？什么饥荒？我没听说过。"
  QIE_ws_normal_events.4.b: "我们不会成为忘恩负义之人。"
  QIE_ws_normal_events.5.t: "慈善的胜利"
  QIE_ws_normal_events.5.desc: "我们收到来自成都方面的消息，[SZC.GetLeader]控制的四川政府已决定全盘接受我们的要求，和平地与我们的政府直接合并。现在四川境内的士兵正在依次复员，我们的政府官员也正在赶往四川进行政权的交接。看来我们先前的慈善行动奏效了。"
  QIE_ws_normal_events.5.a: "小代价解决了大麻烦。"
  QIE_ws_normal_events.6.t: "忘恩负义"
  QIE_ws_normal_events.6.desc: "我们收到来自成都方面的消息，四川政府断然拒绝了我们提出的合并要求，在回复中，他们指出我们并未对四川饥荒提供任何有益的帮助，并且还“假借赈灾之名，施行测绘之实”。这些谣言足以证明他们的政府不过是一群忘恩负义，扭曲事实的不肖盗匪组成的土匪窝点。[SZC.GetLeader]还狂妄地指出，他们才是中国唯一合法的政府，就算是合并，也不能将中国的权力交给我们。看来谈判已经破裂，和平解决的机会变得十分渺茫。我们的军事指挥部已经草拟了一份进攻四川的计划，如果开战，我们或许能在三个月内将这群鼠辈彻底解决。"
  QIE_ws_normal_events.6.a: "不要对军阀们的良心抱有幻想，准备集结。"
  QIE_ws_normal_events.7.t: "为祖国而战"
  QIE_ws_normal_events.7.desc: "[RUS.GetName]在[RUS.GetLeader]的领导下，终于向德意志帝国举起了复仇的铁锤。这由许许多多平凡又坚韧的俄罗斯士兵组成的铁锤一遍又一遍地敲打在东墙之上，在世界发出震耳欲聋的回音——不只是在宣告俄罗斯将一雪《布列斯特条约》之耻，更是在宣告一场超越一切战争的战争。\n\n长期以来一直在我们的军队中服役的救世新教成员伊戈尔·谢苗诺维奇·梅钦斯基，或者称为“涵慧居士”希望返回他的国家，他都感谢我们这段时间和他的合作，但他已决定加入这场对他来说无上光荣的伟大战争之中，他或许会随着一场又一场的胜利步步高升，或许会在某个无人知晓的敌方默默地死去。但无论如何，他都将裹上属于自己国家，自己民族的旗帜，并永远留在那里。"
  QIE_ws_normal_events.7.a: "迷途的孩子总归要回家。"
  QIE_ws_normal_events.8.t: "捷克语"
  QIE_ws_normal_events.8.desc: "[CZE.GetName]在[CZE.GetLeader]的领导下，对奥地利发动了致命的一击。这由许许多多平凡又坚韧的俄罗斯士兵组成的铁锤一遍又一遍地敲打在东墙之上，在世界发出震耳欲聋的回音——不只是在宣告俄罗斯将一雪《布列斯特条约》之耻，更是在宣告一场超越一切战争的战争。\n\n长期以来一直在我们的军队中服役的救世新教成员梅恩杰尔，或者称为“涵法居士”希望返回他的国家，他都感谢我们这段时间和他的合作，但他已决定加入这场对他来说无上光荣的伟大战争之中，他或许会随着一场又一场的胜利步步高升，或许会在某个无人知晓的敌方默默地死去。但无论如何，他都将裹上属于自己国家，自己民族的旗帜，并永远留在那里。"
  QIE_ws_normal_events.8.a: "我们会祝福你的返乡之路，异邦的流浪者。"


