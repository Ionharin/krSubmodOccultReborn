l_simp_chinese:
  QIE_ws_god_circle_events.1.desc: "救世新教的乩坛再开了。"
  QIE_ws_god_circle_events.1.a: "尊道贵德"
  QIE_ws_god_circle_events.2.t: "儒祖线第一条事件"
  QIE_ws_god_circle_events.2.desc: "大家听说要尊孔子都感到奇怪，大家已经都很尊重儒家道德了，为什么还需要继续尊儒。"
  QIE_ws_god_circle_events.2.a: "孔子已经是个死人了"
  QIE_ws_god_circle_events.3.t: "儒祖线第二条事件"
  QIE_ws_god_circle_events.3.desc: "乡间组织人们去曲阜孔林参拜儒祖，儒祖在乩坛上降下旨意。要求大家遵守规则。"
  QIE_ws_god_circle_events.3.a: "孔子一直没死，何谈复活？"
  QIE_ws_god_circle_events.4.t: "道祖线第一阶段"
  QIE_ws_god_circle_events.4.desc: "听说救世新教开始重新遵奉道祖，努力会的胡适写了一篇贼赃说的文章批评这一现象。"
  QIE_ws_god_circle_events.4.a: "为何维护旧宗教，舍弃新文明？"
  QIE_ws_god_circle_events.5.t: "道祖线第二阶段"
  QIE_ws_god_circle_events.5.desc: "杨荫杭写了一篇讨胡适大博士檄文，刊登在报纸上批评胡适是资产阶级走狗。"
  QIE_ws_god_circle_events.5.a: "胡博士如此毁我珠玉，夸人瓦砾，其心可诛。"
  QIE_ws_god_circle_events.6.t: "佛祖线第一阶段"
  QIE_ws_god_circle_events.6.desc: "河南乡间的一户人家正在破败的佛教庙宇中烧香，为他们新出生的孩子祈求平安幸福。"
  QIE_ws_god_circle_events.6.a: "愿佛祖保佑。"
  QIE_ws_god_circle_events.7.t: "佛祖线第二阶段"
  QIE_ws_god_circle_events.7.desc: "由于重新开始遵奉佛祖，现在寺庙重新获得了土地的权力。之前那家贫苦人家如今成为了寺庙的雇佣农，为寺庙种地工作。在一个暴雨的深夜，他们的孩子因为传染病夭折了。"
  QIE_ws_god_circle_events.7.a: "我来这里是为你们道喜，因你们的孩子已脱离苦海。"
  QIE_ws_god_circle_events.8.t: "耶祖线第一阶段"
  QIE_ws_god_circle_events.8.desc: "人们之前就浅浅听闻过耶稣基督的名字，但是人们对洋神仙不感兴趣。只是听说来救世新教拜耶稣基督就给发米面，他们才来了。"
  QIE_ws_god_circle_events.8.a: "这里只有稻米基督徒。"
  QIE_ws_god_circle_events.9.t: "耶祖线第二阶段"
  QIE_ws_god_circle_events.9.desc: "救世新教宣称只要对外传播耶稣的乩语，就能领到更多米面，甚至还有鸡蛋和其它新奇的洋吃食。如果能够将其他人介绍加入崇拜耶稣基督的行列，还能得到两份奖励。"
  QIE_ws_god_circle_events.9.a: "为了香蕉搬运炸弹的猴子们。"
  QIE_ws_god_circle_events.10.t: "回祖线第一阶段"
  QIE_ws_god_circle_events.10.desc: "一支从宁夏沙沟门宦东逃到华北平原的哲合忍耶家庭目睹了在北京城内摇头晃脑的救世新教乩手请“教祖”过程。"
  QIE_ws_god_circle_events.10.a: "这不是我们认识的他。"
  QIE_ws_god_circle_events.11.t: "QIE_ws_god_circle_events.11"
  QIE_ws_god_circle_events.11.desc: "这支家族消失在了北京城的暮色之中，在第二天，人们依然聆听着救世新教对这一切经文的解释。以及呼吁人们为了国家和民族，向所有敌人发动战争。"
  QIE_ws_god_circle_events.11.a: "他们所称之为天园的，实则是火狱。"

