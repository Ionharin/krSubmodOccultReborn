 QIE_god_circle_description_tt: "救世新教以乩语安抚人心，稳定社会。不同的教祖将为救世新教的统治带来§C不同的效果§!。只有当某些教祖的教化足够深入人心之时，人们或许才会配合那些疯狂的行径……"
