 QIE_wushan_seize_shandong_financial_reserves_desc: "既然山东已完全落入我们的控制，我们终于可以将他们政府中的一切都尽情搬走。仓皇逃窜的统治者或许能带走银票，但他们可搬不走存在银行里的大量黄金和其它贵金属。这些战利品一部分将用于犒劳军队，一部分将用于国内建设，还有一部分将作为“另款”储存起来，为我们未来建立军事工业组织服务。"
