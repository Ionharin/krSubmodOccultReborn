 #决议
 QIE_wushan_black_diamond_category: "控制黑色钻石"
 QIE_wushan_black_diamond_category_desc: "煤炭是一种极为重要的战略资源，如果我们的工厂想正常产出民生产品和枪支弹药，就必须确保煤炭能源的充裕。我国之前已设置过开平煤矿，滦州煤矿等煤炭开采公司，确定了数条潜在有价值的煤炭矿脉。其中一些位于浅表，我们可以独立开发，而有一些矿脉凭我们目前的技术水平尚无法开采——我们只能与海外势力合作，或是空守着这些我们无法开发的财宝，等到我们技术足够的那一天。"
 QIE_wushan_survey_shanxi_vein: "勘探山西矿脉"
 QIE_wushan_survey_shanxi_vein_desc: "我们将派出勘探队和地质专家对山西地区的未开发煤田进行评估，以确保我们的工厂能够维持正常的生产效率。"
 QIE_wushan_survey_tangshan_vein: "勘探唐山矿脉"
 QIE_wushan_survey_tangshan_vein_desc: "我们将派出勘探队和地质专家对唐山地区的未开发煤田进行评估，以确保我们的工厂能够维持正常的生产效率。"
 QIE_wushan_survey_guisui_vein: "勘探归绥矿脉"
 QIE_wushan_survey_guisui_vein_desc: "我们将派出勘探队和地质专家对归绥地区的未开发煤田进行评估，以确保我们的工厂能够维持正常的生产效率。"
 QIE_wushan_survey_guanzhong_coal: "勘探关中煤矿"
 QIE_wushan_survey_guanzhong_coal_desc: "我们将派出勘探队和地质专家，与外国资本一起合作对关中地区的未开发煤田进行评估，以确保我们的工厂能够维持正常的生产效率。"
 QIE_wushan_foreign_investment_category: "对外招商贸易"
 QIE_wushan_foreign_investment_category_desc: "既然我们已经决定负担起之前政府留下的债务，那么不妨最大限度利用我们现有的招商引资法案来从全球贸易市场中谋取最大的利益。救世新教在各国强权之中皆有外籍会员，虽然人数有限，却足以作为我们接触外国资本的桥梁。借助这些关系，我们或许能够获得来自海外的援助。\n\n当然，所谓招商引资并不必然局限于民用事业。在许多国家对国际贸易货物睁一只眼闭一只眼的今日，我们同样可以借此补充我们的现代化武器，以在未来的中国战场上应用它们。"
 QIE_wushan_buy_german_rifles: "购买德制步枪"
 QIE_wushan_buy_german_rifles_desc: "我们在布拉格地区的会员传回来一个好消息，一家德国军火商手中有一批原定供给于德国军队的步枪，但因型号较老遭到淘汰。但这样的武器对于我们来说依然十分先进。我们可以将其伪装成回收金属运入国内。"
 QIE_wushan_buy_LEC_rifles: "购买租界步枪"
 QIE_wushan_buy_LEC_rifles_desc: "我们派往使馆城市进行军火贸易的人传回来一个好消息，他在使馆城市的一场宴会中结识了一位军火商，他手中有一批亟待处理的枪支。我们或许可以购买这批武器，以为未来的作战作准备。"
 QIE_wushan_buy_russian_rifles: "购买俄制步枪"
 QIE_wushan_buy_russian_rifles_desc: "我们在莫斯科地区的会员传回来一个好消息，一家俄罗斯军火商手中有一批原定供给于俄罗斯军队的步枪，但因型号较老遭到淘汰。但这样的武器对于我们来说依然十分先进。我们可以将其伪装成回收金属运入国内。"
 QIE_wushan_buy_japanese_rifles: "购买日制步枪"
 QIE_wushan_buy_japanese_rifles_desc: "尽管长期以来我们都和日本人关系紧张。但我们在奈良地区的会员还是传回来一个好消息，日本军队正在有计划淘汰一批可靠耐用的有坂步枪。日本政府和军队只想处理掉这些废弃物，以免继续占据其仓库。他们不会过问这些武器流向了哪里……"
 QIE_wushan_let_us_ask_the_jiangnan_factory: "寻求江南制造总局支持"
 QIE_wushan_let_us_ask_the_jiangnan_factory_desc: "江南制造总局目前在华东混战的胜利者手中，如果我们想进行尽可能广泛的重整军备，就不得不借助他们的力量。幸运的是，它目前还掌握在军阀势力手中。只要我们稍稍以金钱利益诱惑，他们就可以无视我们的行为。"
 QIE_wushan_japanese_zaibatsu_funds: "引入日本财阀注资"
 QIE_wushan_japanese_zaibatsu_funds_desc: "公开接受日本财阀与商社的投资势必会令民众质疑政府的政治方针，甚至招致民族主义者的激烈攻击。但这些资金将有助于我们迅速恢复民用工业，并为后续军事工业建设奠定基础。\n\n日本资本所追求的不过是经济利润。只要他们不公开宣扬所谓“大东亚共荣”，我们便能够控制那些不满的声音从而继续进行商业合作。民众眼下能拿出的只有饥饿的肚腹与无处安放的双手；而日本人手中有我们急需的金钱与技术。"
 QIE_wushan_support_from_beyond_the_pass: "来自关外的资助？"
 QIE_wushan_support_from_beyond_the_pass_desc: "一笔从奉天政府控制地区的福间铁工厂汇出的“企业投资”来到了我们在使馆城市建立的皮包公司的账户上。我们将好好利用这笔汇款恢复我们的民用工业。"
 QIE_wushan_seek_zhili_merchant_support: "争取直系旧商支持"
 QIE_wushan_seek_zhili_merchant_support_desc: "得益于[ROOT.GetLeader]早年在各类社会组织中担任职务的经历，他与诸多盐商及商会人士之间建立起了相当深厚的联系。或许我们可以游说旧直系盐商界人士与地方商会，以争取他们支持我们的民政建设计划。"
 QIE_wushan_accept_daben_donation: "接受大本教慈善汇款"
 QIE_wushan_accept_daben_donation_desc: "日本大本教以“国际赈灾”名义向我们的政府提供了一笔可观的资助金，用于救助在近期一系列动荡中变为难民和流浪者的中国人。我们或许可以挪用这笔赈灾款，将其转化为国家建设所需的资金。"
 QIE_wushan_refugee_crisis_category: "动荡的中国"
 QIE_wushan_refugee_crisis_category_desc: "§8北京政府§!对八省联合崩溃的袖手旁观造成了无可估量的结果，每天都有数千人越过边境线进入到我们的势力范围寻求躲避战争的侵害。他们本是为了寻求安宁和稳定来到我们这里，结果他们自己却成了破坏安宁和稳定的原因。\n\n这些逃难的流民形成了向北移动的队伍，有些人因疲惫和饥饿死在了官道上，有些人则与当地的恶势力勾结加入了土匪。如果我们不能妥善应对这些涌入的难民的话，八省联合覆灭的余波将同时把整个北京政府也炸得粉碎。\n\n§G四川农民§!长期以来被利益驱使，将鸦片作为经济作物大量种植，这导致四川的粮食自给水平低得令人发指。而忽视谷物大米产量的做法迎来了它的报应，伴随着一场大旱，以及随之而来的蝗灾，这场席卷四川全境的大饥荒彻底瘫痪了四川省政府的行政能力。\n\n他们现在急需帮助，假使我们向他们伸出援手，尽管作为割据一方的军阀，他们不一定会记住并报答我们的好意。但我们可以尝试在民间塑造我们的赈灾形象，从而尝试利用民意压迫其政府实现我们想要达成的目的——甚至是和平的统一。\n\n但我们手中的资源有限，是解决我们迫在眉睫的危机，还是为了不一定到来的巨大回报支援外人，§R我们必须作出权衡§!。\n\n§O鸾务院§!目前可调动的§C赈灾资源§!：£GFX_production_cost [?QIE_ws_crisis_response_funding|H0]\n"
 QIE_wushan_refugees_fleeing_war: "迫在眉睫的八省联合流民危机"
 QIE_wushan_refugees_fleeing_war_desc: "单纯的慈善赈济只会拖垮我们，我们必须尽快制定出能够持续性处理如此多流民的赈济方法。或许与华北地区的企业主与新兴工厂合作，将这些流民以较低价格补贴给§Y贫民工厂§!充当低价劳动力或许能够缓解我们面对的问题。但总之，我们必须尽快制定相关策略，以免这些流民对我们的社会结构造成更大的创伤。"
 QIE_wushan_open_temporary_gruel_kitchens: "开办临时粥厂"
 QIE_wushan_open_temporary_gruel_kitchens_desc: "我们将采纳中国政府千年以来应对流民的基本办法——开办粥厂——来避免这些人饿死。只要他们能够得到一口吃的，尽管依然饥饿，但他们心中会燃起希望，这将确保他们不会因为饥饿到极点去铤而走险做出某些危害社会的事情……"
 QIE_wushan_launch_public_fundraising: "发动社会募捐"
 QIE_wushan_launch_public_fundraising_desc: "我们需要借助政府的力量去鼓励民众为这些流民进行慈善捐款。城市里那些不懂如何种地，只是极富怜悯心的知识分子们暂且不论；我们最需要的是那些地主和士绅分子能够开仓卖粮或其它急需的东西。这会很费事，但也不会太费事，只要我们有意驱赶一小群胆大的流民去侵占一个守财奴的仓库，就能让他们明白孰轻孰重。"
 QIE_wushan_request_international_relief: "向国际援助组织求援"
 QIE_wushan_request_international_relief_desc: "这个世界上还有许多地区并未生活在饥荒和战乱的阴影之下，我们可以向他们求助一些粮食。声音要足够大，请求要足够诚恳，并且要尽可能地让我们的请求为更多人所知，国际上没有哪个政府会不要脸到看着一群人在他们面前饿死，尤其是他还拒绝提供帮助。"
 QIE_wushan_a_secret_remittance: "一笔秘密“捐赠”"
 QIE_wushan_a_secret_remittance_desc: "我们得到了一笔来自海外的秘密捐赠，汇款被中转了好几次，已经无法确定发出者的身份。虽然我们没法立刻把这些钱转化乘赈灾用的物资，但不管他是谁，我们都应该感谢他——说起来，你们有没有感觉最近这些物资消耗得很快？"
 QIE_wushan_a_secret_remittance_tooltip: "£GFX_production_cost [?QIE_ws_crisis_response_funding|H0]"
 QIE_wushan_a_secret_remittance_tooltip_blocked: "£GFX_production_cost [?QIE_ws_crisis_response_funding|R0]"
 QIE_wushan_a_secret_remittance.tt: "§O我们会将所有剩余的赈灾物资全部卖掉，将其换成政治点数。每卖出100点物资，我们就能获得150点政治点。§!"
 QIE_wushan_sichuan_famine_relief_countdown: "四川大饥荒"
 QIE_wushan_sichuan_famine_relief_countdown_desc: "四川的大饥荒仍在持续，我们之前象征性的干预取得了意外的反响，如果我们加大对这场危机的干预力度的话，或许我们可以借此绑架掌控四川的军阀政府，要求其与我们和平地合并。"
 QIE_wushan_send_telegram_to_sichuan: "向四川发送电报"
 QIE_wushan_send_telegram_to_sichuan_desc: "大饥荒已经结束，现在是时候向四川索要我们的报酬了，尽管名义上这些赈灾物资都是免费赠予它们的，但他们应该也不会天真到真的认为这些都是“免费的午餐”。"
 QIE_wushan_special_budget_for_sichuan: "特别预算"
 QIE_wushan_special_budget_for_sichuan_desc: "我们将制定一笔特别预算用于应对四川地区的饥荒问题。不幸的是我们手中确实没有更多资源，这势必会削弱我们本就不多的赈灾资源。"
 QIE_wushan_sichuan_relief_grain: "调拨救灾粮"
 QIE_wushan_sichuan_relief_grain_desc: "我们向河南、直隶的地主与粮商大量采购了粮食，这些粮食会运往四川用于缓解当地面临的饥荒风险。"
 QIE_wushan_grain_for_office: "纳粟补官"
 QIE_wushan_grain_for_office_desc: "只是单纯地采购粮食并不能让粮商和地主完全和我们合作，显然由于四川地区的饥荒使得他们也开始担心起华北会不会也遭受饥荒袭击——除了钱之外我们要拿出更能吸引他们的东西，比如社会地位。"
 QIE_ws_help_szc_famine_0: "我们已制定对四川饥荒的特别预算"
 QIE_ws_help_szc_famine_1: "我们已拨给四川地区无需偿还的救灾粮"
 QIE_ws_crisis_response_funding_tooltip: "£GFX_production_cost [?40|H0]"
 QIE_ws_crisis_response_funding_tooltip_blocked: "£GFX_production_cost [?40|R0]"
 QIE_ws_crisis_response_funding_cost_tooltip: "执行该决议将花费$QIE_ws_crisis_response_funding_tooltip$"
 QIE_wushan_kunpeng_fund_category: "鲲鹏振浪扶摇，径上昆仑九霄"
 QIE_wushan_kunpeng_fund_category_desc: "我们未雨绸缪制定的§C“鲲鹏行动”§!旨在确保当政府重新控制整个中华大地之后，能够于重建事业中迅速追赶列强，并再次以东方最伟大国家的身份指引他人。而那些各自为政、割据一方的§g短视军阀§!和§R非法政府§!为这一计划提供了意外的资金来源。\n\n一方面我们可以没收其资金储备，用以支持光复华夏的战争；另一方面我们可将其中一部分暂行封存，留待日后支付工业复苏与国家重建所需。根据目前已合法收回并封存的伪政府资金，我们预计将在国家重建阶段能额外拨款约§Y[?ROOT.post_CHI_war_mio_reconstruction]§!的经费。"
 QIE_wushan_seize_shanxi_financial_reserves: "夺取山西伪政府资金储备"
 QIE_wushan_seize_shanxi_financial_reserves_desc: "既然山西已完全落入我们的控制，我们终于可以将他们政府中的一切都尽情搬走。仓皇逃窜的统治者或许能带走银票，但他们可搬不走存在银行里的大量黄金和其它贵金属。这些战利品一部分将用于犒劳军队，一部分将用于国内建设，还有一部分将作为“另款”储存起来，为我们未来建立军事工业组织服务。"
