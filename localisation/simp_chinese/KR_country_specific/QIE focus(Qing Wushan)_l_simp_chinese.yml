 QIE_wushan_dual_ocean_commission_naval_light_gun_hit_chance_factor_tt: "海军轻炮命中几率：§G+5.00%§!"
 QIE_wushan_dual_ocean_commission_naval_torpedo_enemy_critical_chance_factor_tt: "海军鱼雷触发敌方致命一击几率：§G-15.00%§!"
