 QIE_the_shadow_of_order_desc: "值此鼠年佳节，不止有一股势力在庆祝新年，回顾旧日。曾经参与了张勋复辟的前九门提督江朝宗代替缺席的吴佩孚，向北京某个慈善组织的成员致以新年祝词。但在场的大多数人都知道今年的政治形势并不乐观，§R一场风暴即将到来……§!"
 QIE_secret_meeting: "慈善募捐"
 QIE_secret_meeting_desc: "救世新教已耗尽了他们预算中最后一份用于赈灾的资金，如果北京政府和财政部依然对外面的混乱漠不关心，并且表示无法给予任何帮助的话，他们就必须想办法自己从某些渠道搞到赈灾资金了。"
 QIE_hang_on_the_oppo_discontent: "抓住混乱情绪"
 QIE_hang_on_the_oppo_discontent_desc: "如今北京城乱作一团，但对我们来说确实是最好的情况。直系的不作为必然导致他们失去支持，我们只消慢慢等待，小皇帝和§C智玄§!之间必将爆发一场难以弥合的冲突。\n§R万事俱备，只欠东风……§!"
 QIE_the_seances_of_master_lv: "新国新教"
 QIE_the_seances_of_master_lv_desc: "两伙不敬先祖，策划政变的反贼在乾清宫中相互射击，救世新教已将他们一网打尽，逆贼曹锟及其乱党皆已伏法。我们已请溥仪陛下安心养伤，在此期间救世新教和前国会中的其它政党将担负起维持京城秩序，平定乱局的职责。"
 QIE_wushan_power: "天命未失，代帝监国"
 QIE_wushan_power_desc: "事情发展完全在意料之外，谁能想到一场由保皇派策划的政变最后却引发了一场出人意料的反政变？如今救世新教正努力将自己重组为一个政府内阁，在这政权交接的时期，最幸运的莫过于许多成员都曾在旧北洋政府担任过职务。"
 QIE_seize_the_great_game: "西出函谷"
 QIE_into_samadhi: "娑罗双树入涅槃"
 QIE_into_samadhi_desc: "§8最后说法，度须跋陀罗。 所应度者，皆已度讫。 于娑罗双树间，将入涅槃。§!"
