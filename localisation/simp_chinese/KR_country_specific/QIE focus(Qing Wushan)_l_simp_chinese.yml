 QIE_adopt_start_steel_producing_search: "建设北京钢铁机械厂"
 QIE_adopt_start_steel_producing_search_desc: "我国的钢铁产业目前处于起步状态，在和谐社团把控政府的时期，我国主要从德国人那里进口优质钢铁，我们必须改变这种现状，建立属于我们自己的钢铁工业。如果海外商人愿意帮助我们将十分有助益，不然我们就只能全靠自己了。"
 QIE_adopt_start_tungsten_producing_search: "开采战略金属"
 QIE_seize_the_gold_mine: "重新利用叛军资金"
 QIE_wushan_china_united_again_lower_phase_desc: "我们敬爱的共和国大主席，汤尔和博士被人在大庭广众之下射杀了！人们自发走上街头，为汤主席哭诉，要让密谋杀害他，破坏这来之不易的欢乐的人付出代价。[ROOT.GetLeader]已重新接过共和国领袖的担子，他将不断地进行搜捕，直到将潜伏在我们中间破坏和平的颠覆分子全部铲除，如果敌人来自外部，[ROOT.GetLeader]也宣布他们必然会付出代价！"
 QIE_wushan_china_united_again_lower_phase: "五德终始"
 QIE_the_government_which_wave_foreigners: "笑面盈盈的体面政府"
 QIE_wushan_jiang_establish_the_editing_and_translation_department: "重设译学馆"
 QIE_wushan_jiang_fanatics_militia_for_master: "护香义勇尽归册"
 QIE_wushan_jiang_confirmed_as_the_leader: "四勿轩主人"
 QIE_wushan_jiang_confirmed_as_the_leader_desc: "在江朝宗的英明治理之下，我国的社会状况不仅安定了下来，还赢得了周围国家的尊重和友谊，这一切都足以证明只有江朝宗能挽大厦于降倾，只有江朝宗能带领华北政府实现中华统一的梦想。"
 QIE_wushan_wu_our_precious_traditional_culture: "我们珍贵的生活传统"
 QIE_wushan_wu_enforcing_ethics_through_military_orders: "以军令扬礼法"
 QIE_wushan_two_leader_the_order_of_non_speaker: "无言者之诏"
 QIE_wushan_reassess_the_financial_situation: "重核财政账册"
 QIE_wushan_the_new_government_reviving_tradition: "复兴传统的新政府"
 QIE_wushan_the_new_government_reviving_tradition_desc: "中华大地上有很多野心家，但最终能够支配全国的人却少之又少。我们的政府必须向民众证明自己的实力和抱负，而避免民众将我们和那些昙花一现的僭越政权相提并论。"
 QIE_wushan_establish_fair_social_standards: "谨权量"
 QIE_wushan_revise_cautions_laws: "审法度"
 QIE_wushan_restore_abolished_positions: "修废官"
 QIE_wushan_forcing_prisoners_to_work: "习艺所与教养局"
 QIE_wushan_contact_with_the_social_elites: "接触社会精英"
 QIE_wushan_restore_squire_council: "重组缙绅议会"
 QIE_wushan_negotations_with_YCP: "为崭新中华的大步向前"
 QIE_wushan_negotations_with_YCP_desc: "[ROOT.GetLeader]和中国青年党的代表都承认，如今的华北政府需要对国营企业和军事工业开展一场轰轰烈烈的大改革。[ROOT.GetLeader]盛赞了中国青年党对当前中国社会弊病的精准洞悉，并欢迎青年党人为社会建设和治理提供更多方案。"
 QIE_wushan_negotitations_with_CERA: "重要的是多数人的幸福"
 QIE_wushan_negotitations_with_CERA_desc: "[ROOT.GetLeader]和帝国宪政会的代表都承认，长期以来的军阀混战使得我们的农村地区十分脆弱，大片土地遭到闲置废弃。农民是我们的根本，改善农民的处境就是改善华北政府的处境。[ROOT.GetLeader]盛赞了帝国宪政会对当前中国社会弊病的精准洞悉，并欢迎帝国宪政会相关人士为社会建设和治理提供更多方案。"
 QIE_wushan_negotitations_with_MP: "确保本国企业家的利益"
 QIE_wushan_negotitations_with_MP_desc: "[ROOT.GetLeader]和宗社党的代表都承认，我国大部分民生工业实际上在德国人的控制之下，但这并非是坏事。通过和德国企业合作，我们或许可以提高我们本国企业的各项水平，从而加快我国的工业化进程。[ROOT.GetLeader]盛赞了宗社党对当前中国社会弊病的精准洞悉，并欢迎宗社党人和富有智慧的勋贵们为社会建设和治理提供更多方案。"
 QIE_wushan_wu_confirmed_as_the_leader: "正义阁先生"
 QIE_wushan_prepare_blow_up_the_dam: "仿效王贲旧事"
 QIE_wushan_prepare_blow_up_the_dam_desc: "秦王政二十二年，王贲率领六十万大军攻打魏国，包围魏都大梁，随后他引黄河鸿沟水灌入魏国首都，大水浸泡全城三月有余，将魏国从中原彻底抹除。假使有一天，对中华文明虎视眈眈的侵略者们侵入到沧县-保定之后时，我们可以仿效先祖的战略，掘开黄河大坝，从而迟滞敌人前进，并为我们争取更多反击机会。"
 QIE_seize_the_gold_mine_desc: "财政部提出了一个在我们统一中华之后十分有用的构想：“鲲鹏计划”，我们将收回伪政府的财富和黄金，其中一部分将用于继续我们的统一事业，另一部分将作为战后重建军工体系的经费存在。"
 QIE_integrate_existing_MIO_resources: "建立洛阳七一四兵工署"
 QIE_wushan_now_has_fallen_into_ancient_ice: "如今已落入古老冰狱"
 QIE_wushan_the_dream_jiang: "江四先生之幻梦"
 QIE_wushan_the_dream_wu: "吴小鬼儿之泡影"
 QIE_wushan_now_has_fallen_into_ancient_ice_desc: "时钟已指向早子，救世新教的癫狂梦境已经终结。各人有他应得的报酬，战败者两手空空，按理也是应当。各人有他各自的果报，且瞧瞧谁能坚持到底！"
 QIE_wushan_china_airforce_coming: "从洛阳出发"
 QIE_the_project_of_white_horse: "“白马“计划"
 QIE_wushan_the_great_beast_industry: "工业巨兽的苏醒"
 QIE_wushan_the_great_beast_industry.tt: "§C这将结束七一四兵工署的轮询，我们当前取得的所有突破将在未来引发连锁反应。\n\n当我们结束轮询之后，将会加强江南修造舰船总局。\n\n当我们结束轮询之后，将会加强洛阳航空处并强化§Y重明神鸟，翱翔天际§C的国策效果。\n§!§W"
 QIE_wushan_long_honed_tactics: "久经考验的传统战法"
 QIE_wushan_remembering_lessons_of_the_new_army: "铭记辛亥教训"
 QIE_wushan_restart_small_station_drill_ground: "宣扬小站精神"
 QIE_wushan_the_new_right_army_imperial_guard: "继承武卫右军衣钵"
 QIE_embrace_new_tactics: "拥抱新战法"
 QIE_wushan_the_war_of_sciences: "科学的战争"
 QIE_wushan_new_type_squad_tactics: "新式班组战术"
 QIE_wushan_sturmtruppen: "彗星袭月"
 QIE_wushan_union_between_loong_eagle: "龙骧鹰扬"
 QIE_wushan_union_between_loong_eagle_desc: "在[QIE.GetLeader]英明神武的领导下，坚强勇敢的军队和人民清除了所有来犯之敌，但仍有人在暗中对这个新生国家怀有不满。这些人大概率是工团主义的残兵败将和那些仍然忠诚于他们已死主子的军阀奴才。仅凭我们来对付所有人实在太过困难，我们应该与自己的老伙计——德国结盟，建立一个基于北京-柏林的横跨整个欧亚大陆的同盟。"
 QIE_wushan_great_loong_stand_on_east: "孤龙东立"
 QIE_wushan_great_loong_stand_on_east_desc: "最终，在[QIE.GetLeader]的带领之下我们战胜了一切胆敢在正面向我们发起进攻的敌人，他们滴落的鲜血警示着那些欲要继续挑战我们的“王道”的敌人。这些卑鄙小人如今在黑暗之中玩起了花样，欲要我们这个统一的国家不利。但无妨，青龙已经苏醒，它将立于东方睥睨整个世界。"
 QIE_wushan_penetrate_and_infiltrate_the_enemy: "灵动如水"
 QIE_decisive_battle_with_the_enemy: "侵略如火"
 QIE_wushan_the_project_of_yi: "后羿行动"
 QIE_wushan_the_project_of_yi_desc: "邪恶的日本侵略者终于不再掩饰他们对广袤大陆的贪欲。自古以来，海岛之民便难以与大陆之民长久和平共处。中国曾以礼教与道德教育日本人，使这些蛮夷得以脱离蒙昧。然而如今这些受教化而不知感恩的白眼狼，竟反过来将枪炮指向他们昔日的师长。拿起武器，杀死这些不知廉耻的家伙！日本必须毁灭！"
 QIE_invasion_from_sea: "从海上进攻"
 QIE_invasion_from_sky: "从天空降落"
 QIE_wushan_prepare_the_pink_plan: "准备日暮计划"
 QIE_wushan_prepare_the_pink_plan_tt: "§C如果我们完成了该国策，其影响会延续到我们后续重建中国。§!"
 QIE_wushan_the_project_code_jianzhen: "准备东渡计划"
 QIE_wushan_salt_and_land: "盐与土"
 QIE_wushan_air_force_academy: "建立[ROOT.GetName]航空学院"
 QIE_wushan_wu_our_precious_traditional_culture_desc: "孔孟文化是我们中华民族伟大的传统文化，然而许多接受了国外腐臭思想的知识分子和青年却认为自家的珍珠美玉应该摔碎，转而供奉别人的废石瓦砾。我们将通过在社会上宣扬鼓励我们的优秀传统文化来对抗这些错误的观念。"
 QIE_wushan_restore_squire_council_desc: "政府基层的执行不能离开股长，就像社会基层的治理不能离开乡绅那样。中国拥有广袤的土地，其中大多数地区依然是乡村，通过在县一级重开缙绅会议并授予他们权力，我们将能把行政压力分摊给这些满心欢喜接受乌纱帽的人。"
 QIE_seances_restart_in_beijing.tt: "§L救世新教的一切都始于1919年吕洞宾仙人的降乩。如今我们已经控制了整个华北政府，我们应当将吕洞宾作为“虚君”供奉，为他在我们的政府之中设立一个象征着国师的宝座，放在当前空置着的皇帝宝座左侧。当然，这个宝座上永远不会出现一位§R活人§!，永远不会……§!\n\n"
 QIE_seize_the_great_game.tt: "通过此，我们将在人民心目中确立道家先祖的尊贵地位。\n这将使人们更不易因我们的§R对外政策而影响政治稳定§!。并且当乩坛降笔§C道祖§!之时，将根据其教化等级获得额外强化。"
 QIE_into_samadhi.tt: "通过此，我们将在人民心目中确立释家先祖的尊贵地位。\n这将使人们更能够自发维持§R社会的基本稳定§!。并且当乩坛降笔§C佛祖§!之时，将根据其教化等级获得额外强化。"
 QIE_spring_and_autumn_ritual.tt: "通过此，我们将在人民心目中确立儒家先祖的尊贵地位。\n这将使我们推动政策的阻力降低，并获得更多§R政治资源§!。并且当乩坛降笔§C儒祖§!之时，将根据其教化等级获得额外强化。"
 QIE_jesus_shed_his_blood.tt: "通过此，我们将在人民心目中确立耶家先祖的尊贵地位。\n这将使被我们占领地区的人们更加§R乐于和我们合作并接受我们的统治§!。并且当乩坛降笔§C耶祖§!之时，将根据其教化等级获得额外强化。"
 QIE_raise_the_long_blade.tt: "通过此，我们将在人民心目中确立回家先祖的尊贵地位。\n这将使我们的士兵更加§R英勇地组织攻击和冲锋§!。并且当乩坛降笔§C回祖§!之时，将根据其教化等级获得额外强化。"
 QIE_ws0_tt: "§R所有人都在等待着京城内的消息……§!"
 QIE_ws1_tt: "救世新教必须着眼于处理目前的混乱情况，但教团内部首先就由谁出任政治领袖引发了争吵。\n\n§R如今江朝宗与吴佩孚就领袖之位开始竞争……这是一个迅速且无法干涉的过程。\n\n但如果他们二人最终僵持不下，或许会引发意料之外的结果。\n§!"
 QIE_ws2_tt: "§C江朝宗与吴佩孚两败俱伤，不得不承认钱能训为他们的唯一教统，救世新教将由二人协理打理。它的未来犹未可知。§!"
 QIE_become_MP_shadow_tt: "§C自民国肇始，礼崩乐坏，皆因弃纲常而效西洋。今以救世新教为体，行监国辅弼之实，必扬王道于天下，立朝纲于四海。他日再造乾坤，仍奉大清正朔，圣主垂拱，王道重光。§!\n§Y救世新教将以新名义整合政局。§!"
 QIE_become_CERA_shadow_tt: "§t民权不可轻，君主不可无。§!\n§Y救世新教将以新名义整合政局。§!"
 QIE_become_YCP_shadow_tt: "§G凡议会之腐、党争之祸，皆因无神圣信仰为干城。今日中国，外患如潮，内贼如蠹，唯青年党人执干戈以卫社稷，吾等旧人，愿作甲胄。§!\n§Y救世新教将以新名义整合政局。§!"
 QIE_focus_can_only_be_completed_by_advisor_tt: "该国策只能由§Y$CHARACTER$§!在完成§Y$FOCUS$§!之后自动推进。"
 QIE_auto_focus_in_progress_tt: "§R$CHARACTER$§!正在谋划下一次行动\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_jiang_power_focus_can_only_be_completed_by_advisor_tt: "该国策只能由江朝宗在§Y救世新教§!控制北京之后自动推进。"
 QIE_jiang_power_auto_focus_in_progress_tt: "江朝宗正在展示他的力量\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_wu_power_focus_can_only_be_completed_by_advisor_tt: "该国策只能由吴佩孚在§Y救世新教§!控制北京之后自动推进。"
 QIE_wu_power_auto_focus_in_progress_tt: "吴佩孚正在捍卫他的地位\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_old_chinese_beliefs_reborn_warning_tt: "§R我们将以伦理纲常复兴中华！§!\n\n§C在我们统一中华之后，与之互斥的国策将跳过。\n§!"
 QIE_and_new_beliefs_live_in_here_warning_tt: "§R我们将以道德共荣开化诸国！§!\n\n§C在我们统一中华之后，与之互斥的国策将跳过。\n§!"
 QIE_pauper_factory_tt: "\n§C中华大地上有许多流离失所，四处逃荒的贫民。他们将自己寻找活计，当完工之后，他们又会因为失去了经济来源再流浪去别的地点，我们正可以利用这一点来引导他们的迁徙。"
 QIE_respond_the_sichuan_famine_tt: "§C我们将利用一部分资源去救助四川的难民，这将导致我们自身的动荡，但可能会也可能不会在未来得到四川的回报！§!\n\n§C额外获得§!£GFX_production_cost [?40|H0]§C的赈灾资源用于应对我们当前所面对的问题。§!\n\n"
 QIE_henan_focus_can_only_be_completed_by_poor_tt: "该国策只能由被安置到河南的流民自动推进"
 QIE_henan_auto_focus_in_progress_tt: "河南地区的流民正在建设\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_xian_focus_can_only_be_completed_by_poor_tt: "该国策只能由被安置到陕西的流民自动推进"
 QIE_xian_auto_focus_in_progress_tt: "陕西地区的流民正在建设\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_zhili_focus_can_only_be_completed_by_poor_tt: "该国策只能由被安置到直隶的流民自动推进"
