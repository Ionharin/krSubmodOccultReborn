 QIE_advance_to_the_shanhaiguan: "今朝斩关而去"
 QIE_wushan_universe_is_destroyed_by_fire: "火爁炎而不灭"
 QIE_wushan_universe_is_destroyed_by_fire_desc: "世界已被战争之火吞噬，我们必须拿起武器保护我们的家人，保护我们的生活。不仅仅是消极的防御，为了避免类似[JAP.GetName]的侵略事件再次发生在我们身上，我们要对世界上所有潜在的，可能威胁到我们的人进行战争准备。"
 QIE_wushan_universe_is_destroyed_by_water: "水浩洋而不息"
 QIE_wushan_universe_is_destroyed_by_water_desc: "就像过去在使馆城市和我们的国家之中的那些外国人的探子那样，在各地都有为了个人的财富利益愿意出卖自身国家机密的利己主义者。我们或许也可以利用其他国家的这些人来为我们谋取利益。"
 QIE_wushan_wangongchang_explosion: "天启大爆炸"
 QIE_wushan_wangongchang_explosion_desc: "明朝天启六年，在北京王恭厂火药库曾发生一场大爆炸。史实记载爆炸引发了灵芝状的云团和随即而来的尘云，甚至有传闻称灾民衣物无故脱落、器物凭空消失。我们应当充分利用这一历史记忆，向民众宣传中华文明曾领先于世界。通过默许天启大爆炸与“核科技”的阴谋论联系，我们既可激发百姓的民族自豪，也能号召他们踊跃捐资，以复兴这属于中国的失落科技。"
 QIE_wushan_arrest_of_opposition_figures: "清洗反对派"
 QIE_wushan_arrest_of_opposition_figures_desc: "在中国统一之前，那些和我们貌合神离的反对派出于相似的目的与我们一同作战。为维持这份脆弱的合作，我们甚至在一定程度上同他们分享了权力。但这些人仍不知满足，中国统一之后，他们非但没有接受新秩序，反而开始公开批评政府。说到底我们只是终点不同的同路人，既然同路人已成绊脚石，政府便有责任采取手段阻止他们继续传播那些有害的思想。"
 QIE_wushan_eradicate_poisonous_weeds: "阴风起，毒草生"
 QIE_wushan_eradicate_poisonous_weeds_desc: "长期以来我们的文艺和知识界都被来自西方社会的靡靡之音影响着，“言必称希腊”成为了这些人士的不治之症。[ROOT.GetLeader]计划出版一系列丛书，系统叙述[ROOT.GetName]如何凭借中国传统思想，在邪恶外国势力的威胁与分裂势力的包围之下完成国家统一。此外政府也将补贴印刷传统伦理书籍的印刷厂，并对来自西方世界的知识书籍进行严格管制。"
 QIE_wushan_our_rockets_our_victory: "迎回万户"
 QIE_wushan_our_rockets_our_victory_desc: "早在明朝时期，灿烂的中华文明便已触及火箭技术的雏形。万户被人们尊称为“飞天士大夫”，他乘坐着自制的火箭飞上了天空，并因此成为了火器神真人。我们将重新发掘万户传说，将其塑造成国家火箭事业的精神象征。民众将会明白：我们并非是在向西方学习，而是在复原本就属于中华文明的古老神兵。"
 QIE_wushan_punish_those_syndicalistic_thugs: "对赤色瘟疫的终战"
 QIE_wushan_punish_those_syndicalistic_thugs_desc: "工团主义者的红色是他们口中咀嚼的牺牲者的鲜血的颜色，他们究竟要制造多少次革命，多少次暴动，创造多么大的血海才能罢休？如果他们希望鲜血，那我们就给他们鲜血，让我们杀尽最后一个工团主义者，让我们用他们的血海止息一切血海的再次诞生。"
 QIE_wushan_punish_those_syndicalistic_thugs.tt: "§R我们将终结世界上所有社会主义国家。§!"
 QIE_the_rise_of_jiang_desc: "在合纵连横，成功挫败了宗社党激进分子之后，江朝宗作为救世新教的掌院之一再次获得了亲吻世俗宝座的机会。他计划建立一个充满外交魅力，对外开放的政府，也唯有如此这般才能实现他的最终目的。"
 QIE_the_defense_of_wu_desc: "吴佩孚已从丙子政变的冲击中恢复过来，作为救世新教名义上的掌院之一，他对这个崭新的政教合一政府的想法是一个复兴了中华优秀传统文化的，独立自主的民族政府。他相信中国人的根基全在孔孟，只要中国人重新开始尊孔重礼，那么属于中国的灿烂世纪也将二度到来。"
 QIE_seek_japanese_sympathy_desc: "仅仅是证明自己的威望还不足以扳倒吴佩孚，我还必须寻找到能诋毁他的证据。或许我在日本的朋友们此前曾收集过什么关于他的信息。"
 QIE_beijing_mingjing_society_desc: "江朝宗长期以来寓居北京，私下里和各路社会名流，知识分子与政商新星串联。在这些交流过程中，他一定干过一些见不得人的勾当，如果北京明经学会的人能为我提供一些相关证据，我就可以证明江朝宗表面上为社会为人民，背地里是为了那些精英和他自己的钱袋子。"
 QIE_lobby_members_desc: "这场发生在北京城内的政治斗争绝非是寻常战场上的充满硝烟和血腥味的交战，而是带着权术和社交色彩的无声的对抗。通过利用旧有的关系，我就能够向吴佩孚施压，迫使他退出权力斗争。"
 QIE_mobilize_connections_desc: "这场战争是不流血的战争，但正因为不流血所以才更凶险，因为你没法知道对方是否攻击到了你的要害。我必须尽快寻找能够在救世新教内支持我的人，至少在教团的例行会议上向人们证明我虽然缺席了教内事务很长时间，但依然具有相当高的社会威望与教内信任度。"
 QIE_the_reluctant_two_leaders_desc: "尽管一个死人坐上了救世新教至高教统的宝座，但为了推行政策，他依然需要一个活人政府为他代劳。江朝宗和吴佩孚已被任命为特命副教统，负责协力钱能训教统治理国家。江吴二人再次开始了他们在桌下的斗争，用他们的方式各自对这脆弱又坚固的领袖之位施加着影响。"
 QIE_jiang_controls_the_wushan_desc: "江朝宗终于坐上了他梦寐以求的权力宝座，不是虚妄的圣人之位，而是真正的君王之位。在他脚下这个满目疮痍的国家中，教团成员与北京市民们对他三呼万岁。而他也决定用他自己的方式来回报友人和民众对他的信任与祝福。"
 QIE_wu_control_the_wushan_desc: "经过又一番波折，吴佩孚再次君临了北京城的顶点。只是这一次物是人非，在他身边簇拥着的不再是津保派和洛阳派的军头们，而是一群念叨着圣贤经文的传统文人。吴佩孚将重塑这个逐渐腐烂的国家，重塑整个中华民族。不久之后，它将再次屹立在广袤的东方大陆之上，成为四方夷狄羡慕的难生中土。"
 QIE_the_oracle_of_master_lv_desc: "乩坛之上出现了一位新神仙的降笔，原来是救世新教的初代教统，北洋政府国务总理钱能训显现了。此前他已飞升紫府，位列仙班。他不忍看到教团因内斗而分裂，因此而降鸾在此。钱真人已下达谕旨，此后教团大小事务，皆全权听从他的旨意。"
 QIE_honor_tao_as_the_superior_desc: "1920年7月13日，儒释道三教祖师降临于燕京吕祖阁，救世新教的乩坛之上。向我们阐明了三教相合的真谛。既然我们已经掌握了国家宣传机器，现在是时候进一步将道祖当初告诉我们的真正智慧推广给我们的民众，以向他们传播我们希望他们遵守的中华传统文化了。"
 QIE_honor_buddhism_as_the_superior_desc: "1920年7月13日，儒释道三教祖师降临于燕京吕祖阁，救世新教的乩坛之上。向我们阐明了三教相合的真谛。既然我们已经掌握了国家宣传机器，现在是时候进一步将佛祖当初告诉我们的真正智慧推广给我们的民众，以向他们传播我们希望他们遵守的中华传统文化了。"
 QIE_honor_con_as_the_superior_desc: "1920年7月13日，儒释道三教祖师降临于燕京吕祖阁，救世新教的乩坛之上。向我们阐明了三教相合的真谛。既然我们已经掌握了国家宣传机器，现在是时候进一步将儒祖当初告诉我们的真正智慧推广给我们的民众，以向他们传播我们希望他们遵守的中华传统文化了。"
 QIE_honor_jesus_as_the_superior_desc: "1920年4月，西哲亚里士多德与耶祖耶稣基督降临于燕京吕祖阁，救世新教的乩坛之上。长期以来由于耶祖的降乩时只说英语，导致我们与其进行交流多有障碍。如果我们向市民们也推广耶祖作为中华先贤的身份的话，恐怕会遇到同样的问题。"
 QIE_honor_mohammad_as_the_superior_desc: "1922年9月，回祖降临于燕京吕祖阁，救世新教的乩坛之上。向我们开示了回教与中华传统美德之间的关系。我们或许可以向市民们推广尊奉回祖作为中华先贤的想法。这有助于我们凝聚一种崭新的民族认同，拉拢西北地区的回族人支持我们的政府。"
 QIE_respond_the_sichuan_famine_desc: "大旱叠加军阀混战，四川饥荒的问题已经使四川政府焦头烂额。如果我们能向四川督理提供一些人道主义救援，或许在未来这份人情能派得上用场。"
 QIE_economic_stability_desc: "[ROOT.GetLeader]已成为了教团与政府的至高权力拥有者。虽然我们对难民危机的出色应对赢得了一些社会精英和市民的称赞。但大多数人仍将我们视为反动落后的封建迷信分子，我们必须改变这种看法：当下最紧要的找到一个合适的政党进行联合，面对能够分享改变中国的权力的机会，很少有在野党能够继续恪守自己的原则。"
 QIE_debt_negotiation_desc: "这个时间还是来到了，尽管我们自诩为新政府，但国际债权人们不会因为我们的一面之词就放过我们。除非我们直接拒绝履行义务，否则压倒性的国际债务将持续阻碍我们的经济增长。一个合理的选择是，由于华东混战导致德国在华利益受损，如果我们此时与德国人谈判或许能争取到更好的条件。但那些反租界，反国外人士会对我们的选择表示遗憾。"
 QIE_cancel_completely_desc: "这个时间还是来到了，尽管我们自诩为新政府，但国际债权人们不会因为我们的一面之词就放过我们。除非我们直接拒绝履行义务，否则压倒性的国际债务将持续阻碍我们的经济增长。完全债务违约是个诱人的选择，我们可以让所有数字在一夜之间一笔勾销，虽然在短期内会造成损失，但长远来看却使我们能进一步发展。但那些与海外有交流的企业主会对我们的选择表示遗憾。"
 QIE_charitable_share_bank_desc: "北京慈善银行股份有限公司是由段祺瑞政府的财政总长李思浩为我们设计的一项用于募集慈善基金，投资社会发展的金融项目。然而随着皖系的落败，李思浩被前政府通缉，这项计划最后不得不中止。既然现在我们控制了政府，也许我们可以重启该计划，并撤销李思浩的通缉令，让他回来为我们效力。"
 QIE_pauper_factory_desc: "我国的工业基本只在几个大城市中有所发展，而乡间地区完全是一片尚未开垦的处女地。如今我们手头有如此多的闲置人口，或许我们可以打发他们去各个欠发达地区从事拓荒工作，以工代赈，一方面解决了流民危机，另一方面则开发了我们的土地。"
 QIE_temporary_housing_desc: "由于八省联合崩溃带来的持续冲突与北京城的骚动，大量战争流民进入到了我们的势力范围。我们或许可以妥善安置他们。救济棚屋和棉衣已经在有序发放，并且这些建设行动还意外地刺激了流民的再就业。只要这样维持下去，社会秩序的恢复即将到来。"
 QIE_project_henan_desc: "河南地区长期以来严重依赖土地产出，即便是手工业也不甚发达，其工业化程度几乎为零。如果这些四处漂泊的流民能够帮助我们修缮对应的基础设施，或许将河南省开发成一个强大的工业地区将变得可能。"
 QIE_project_zhili_desc: "直隶省是我国都市化最显著的城区之一，但这要感谢作为首都的北京。京城周围诸如唐山一类的地区仍然有大量土地尚未利用。如果这些四处漂泊的流民能够帮助我们修缮对应的基础设施，或许将直隶省开发成一个强大的工业地区将变得可能。"
 QIE_project_xian_desc: "陕西关中地区是我国推广新棉种的棉产区，但该地区纺织业依然以手工业者和家庭小作坊为主，这主要是因为关中地区交通闭塞，物流成本较高导致的。如果这些四处漂泊的流民能够帮助我们修缮对应的基础设施，或许将陕西省开发成一个强大的工业地区将变得可能。"
 QIE_the_legacy_of_wang_jinghui_desc: "辛酉年八月二十日，宏教柳真人于南京救世新教分会汪镜慧宅中下降，留下“体仁嘉会，利物固真”的谕旨之后便返回天庭。自那之后汪居士就以此为信条，发扬慈善，提倡教育。如今他虽已驾鹤西去，但我们将以他的名字命名这所公学，如此一来千千万万受他恩惠的人都将记住他。"
 QIE_seize_german_assets_desc: "随着我们撕碎那些只是数字的文件，大量在我国政府势力范围内的德国企业已经撤离。他们留下了没办法搬走的厂房和机构。我们可以利用这些工业企业并将之国有化，毕竟这是德国人们遗弃在这里的。他们最多只能过过嘴瘾，不会有任何额外的反应。"
 QIE_old_army_new_life_desc: "我们现有的军队简直是一支杂牌军，这并不是在责怪我们的装备不统一，换句话说装备不统一都是最小的问题。在我们之间存在着农民兵，保定军校出身的军校生，满清勋贵们为了彰显地位维持的八旗骑兵，想要在战场上指挥这样一支各自为战的混乱部队是不可能的，我们必须将他们统一在一个思想之下，一条战线之上。"
 QIE_restart_beijing_charity_society_desc: "华东八省联合的动乱与四川大饥荒相互叠加，已使大量逃荒难民北迁涌入我们控制的地区。各地官员纷纷报告这些无所依附、无事可做的人群正逐渐成为社会稳定的隐患。鸾务院现已批准一项计划，我们将重启直皖战争时期曾用于赈济灾民的贫民赈济会。"
 QIE_jesus_shed_his_blood_desc: "仁慈的耶祖领受了先天太一至圣老祖的命令，降临到夷狄中间向他们传达道德和美善。他平等地对待所有人，用礼义和道德教化那些人，正因如此，他们将耶祖奉为来到外邦人之中，传播礼教的明灯之光。但仍有一些人，他们的心刚硬，不接受礼教，或许唯有疼痛才会让他们记住自己的错误。"
 QIE_raise_the_long_blade_desc: "仁慈的回祖领受了先天太一至圣老祖的命令，降临到夷狄中间向他们传达道德和美善。他平等地对待所有人，用礼义和道德教化那些人，他站立在他们之中，用老祖传给他的大道和他们盟誓。但有些回族人似乎并不领情，他们看到我们将回祖奉为中华先师反而变得愤怒起来，与我们的宗教政策对着干。我们应该以破坏团结为名对他们进行矫正。"
 QIE_spring_and_autumn_ritual_desc: "§8泰山其颓乎，梁木其坏乎，哲人其萎乎。\n既歌而入，当户而坐。§!"
 QIE_seize_the_great_game_desc: "§8子将隐矣，强为我著书。\n于是乃著书上下篇，言道德之意五千余言，而去，莫知其所终。§!"
 QIE_union_the_world_as_the_country_desc: "我们的五教合一政策虽然有一些小波折，但它证明了建立一种万神殿式的新宗教体系，并且让这种宗教受到政府的节制并非不可行——至少我们现在还能控制住它。在这一基础上，不论是通过交流还是通过刀剑，如果我们能向世界上的其它地区推广我们的教义，或许我们就能潜移默化地让整个世界都接受中华礼教，实现真正意义上的大一统。"
 QIE_introducing_funds_desc: "既然我们已经决定担负起前政府的债务，那我们何必仍然局限于德国本身呢？债多不压身，我们已决定最大化利用现有的国际投资法来谋取利益，如此一来我们应该能够吸引到其他的外国投资，从而进一步实现经济增长。此外我们或许还能借此机会进行秘密的军备力量扩张。"
 QIE_put_on_the_cloak_of_confucius_desc: "1923年发生的二七暴动起因是有邪恶的工团分子混入工人团体之中，公然煽动他们破坏生产。我们必须汲取上次的教训，为此我们将允许工人们组织总工会，当然工会领袖要由我们的政府指派。此外，我们还会要求总工会每周都开展必须强制参加的传统经典读书会，以提高工人们的思想觉悟。"
 QIE_develop_henan_desc: "我们对河南的基础投资取得了回报，随着交通路线的畅通，反而有更多无家可归，寻求一份过活口粮的流民来到河南参加建设计划。我们预计将在河南地区建成几座工厂，这将创造更多就业人口，并提高地区整体的工业化水平。"
 QIE_develop_zhili_desc: " 我们对直隶的基础投资取得了回报，随着交通路线的畅通，反而有更多无家可归，寻求一份过活口粮的流民赶到直隶参加建设计划。我们预计将在直隶地区建成几座工厂，这将创造更多就业人口，并提高地区整体的工业化水平。"
 QIE_final_industry_henan_desc: "在[ROOT.GetRulingParty]领导和指挥下，经过艰苦卓绝的奋斗，河南地区终于一改基础薄弱，技术落后的过去面貌，成为了我国重要的现代工业基地之一。这一切不仅要感谢那些为建设日夜劳动的雇工们，也要感谢[ROOT.GetLeader]具有前瞻性的以工代赈政策——这样高效又廉价的劳动力，如果能一直为我们所用，那该有多好……"
 QIE_final_industry_xian_desc: "在[ROOT.GetRulingParty]领导和指挥下，经过艰苦卓绝的奋斗，陕西地区终于一改交通不变，产业结构单一脆弱的过去面貌，成为了我国重要的现代工业基地之一。这一切不仅要感谢那些为建设日夜劳动的雇工们，也要感谢[ROOT.GetLeader]具有前瞻性的以工代赈政策——这样高效又廉价的劳动力，如果能一直为我们所用，那该有多好……"
 QIE_final_industry_zhili_desc: "在[ROOT.GetRulingParty]领导和指挥下，经过艰苦卓绝的奋斗，直隶地区终于一改北京发达，周边落后的过去面貌，成为了我国重要的现代工业基地之一。这一切不仅要感谢那些为建设日夜劳动的雇工们，也要感谢[ROOT.GetLeader]具有前瞻性的以工代赈政策——这样高效又廉价的劳动力，如果能一直为我们所用，那该有多好……"
 QIE_german_technology_desc: "外国投资者和工程师因为我们的债务违约仓促离开了我国，但他们没办法把所有文件都带回去，况且在我们短暂的合作时光里，这些外国人已向我们的工人和工程师传授了许多现代工业要领，借助这些文件，我们便能自己开动起这些机器。"
 QIE_collaborate_with_german_companies_desc: "德国人依然是我们的最大投资人，比起亚洲地区其他不甚稳定的国家，德国资产和我国之间存在着天然的亲和力，只要稍加游说，让这些德国资产加大对我们的投资并不是一件难事。我国政府将向这些企业授予政府合同，以确保我们之间的合作平等而稳定，并且具有可预见的充沛利润。"
 QIE_free_schools_for_poor_desc: "觉是轩学堂最早由八省联合地区的救世新教分会于南京朝天宫创办，是救世新教专门资助孤贫无力子弟的小学夜校。我们应该复制觉是轩学斋的模式，对那些逃难的儿童进行义务教育，一方面能够起到对他们的教化作用，另一方面也能做到以学代赈。"
 QIE_develop_xian_desc: " 我们对陕西的基础投资取得了回报，随着交通路线的畅通，反而有更多无家可归，寻求一份过活口粮的流民抵达陕西参加建设计划。我们预计将在陕西地区建成几座工厂，这将创造更多就业人口，并提高地区整体的工业化水平。"
 QIE_construction_after_chinese_unification_desc: "我国的历史自古以来就是由各民族共同书写的，五方之民的结构直截了当地指出位于中国核心的民族应该像哥哥帮助弟弟那样去帮助四夷——位于周边的民族。如今中华大地上的四夷都已认同我们的政府是天下共主，为了纪念我们和各民族之间深厚的兄弟友谊，我们将按照古制划分九州，并在对应的地区修建纪念碑，让人们能够永远记住是我们将他们从分裂和战乱中拯救了出来。"
 QIE_research_and_development_department_desc: "我们的军事工业研究显著落后于世界水平，新锐的武器将在战场上进一步为我们奠定胜局。为此我们要建立一个军工研究所来努力改变现状，地址已选在洛阳，这是吴佩孚大帅的练兵之地。"
 QIE_restart_desc: "1915年民国政府曾在山西孝义建设了巩县兵工厂，自那之后巩县兵工厂就再也没有升级过了。为了开动我们的国家机器，为未来的战争做准备，是时候对孝义地区的军事工业进行扩建了。"
 QIE_rebuild_the_officer_corps_desc: "我们必须承认这个事实，不管是我们的还是中国其他军阀的军队都面临着相同的问题：缺少好兵，缺少好将。兵可以很快训练出来，但军官却很难速成。我们将从和我们友好的国家与使馆城市邀请有经验的军官来指导我们。"
 QIE_the_legacy_of_zhili_desc: "回望我们20世纪以来的作战经验，我们就会发现主宰中国战场的始终是意志坚定的步兵和引人瞩目的大炮，过去我们靠这两样东西支配了国家，今天我们依然会依靠这两样东西重新参与到逐鹿天下的斗争之中。"
 QIE_iron_tank_law_desc: "在俄罗斯，一种被称为“新骑兵”的构想被提出了。它的目的是利用俄罗斯悠久的哥萨克骑兵，将马匹替换成现代机械化装备，就能继续发挥他们的机动优势。这对于我国长期那些以来在马背上生活的八旗骑兵来说有着共通的道理。"
 QIE_the_ocean_of_guns_desc: "一支军队想要维持作战力量可以没有火炮和坦克，但如果子弹和枪支也不够用的话，他们就只能进行白刃战。这无疑意味着巨大的伤亡，我们必须确保能够为我们的士兵列装足够多的步枪，免得他们只能赤手空拳对抗敌人。"
 QIE_let_the_cannons_roar_desc: "在我们于中华大地上作战的时候，强大的火力支援是不可或缺的。火炮这种造价便宜，威力巨大的武器正是我们急需的装备。它们将在我们的部队突进时提供值得信赖的帮助。"
 QIE_establish_the_war_headquarters_desc: "我国几乎没有任何近代形式的参谋部，长期以来的作战方针都是向高级将领提供一个大方向，由将领自己去规划执行。自行其是的各个集团军使得我们的大量资源都浪费了，军队的作战规划负担也相当沉重。我们已设立军咨参赞司，它仿照德国人的总参谋部设计，旨在专门研究战争的各方面特征并为动员和作战进行规划。"
 QIE_the_heavy_footsteps_of_the_iron_behemoth_desc: "《山海经》中的神话生物赣巨人居住在枭阳国，这些巨大的食人怪物金刚不坏，令人畏惧。我们将制造大量战场上的“赣巨人”，大量列装的坦克将彻底碾碎任何敢于站在我们面前，螳臂当车的敌人。"
 QIE_improve_the_material_system_desc: "与欧洲的情况不同，我国的领土地形复杂且多变，并且交通情况不佳。这使得我们的装甲部队在很多时间无法发挥出全力。但我们已找到了一种解决办法，通过在民用工厂中规划更多“特殊”设计，我们就能在战争开始时快速地将其转化为可被利用的战时补给中心。"
 QIE_speed_is_the_only_useful_thing_desc: "我国伟大的军事学者孙子曾经说过，军队作战就要力争速胜，旷日持久则军队必然疲惫。为此我们必须以各种方法提高行军速度和作战速度，避免作战陷入胶着。如有确实的必要，就要让他们努力克服。"
 QIE_solid_as_a_rock_desc: "我国伟大的军事学者孙子曾经说过，军队作战就要力争速胜，旷日持久则军队必然疲惫。只要我们努力加强军队的防御水平，敌人久攻不下必然白白地损失士气和武器，最终走向失败。面对着无法推进的战线和永无止境的士兵，他们最终将会因为内部社会压力而彻底瓦解。"
 QIE_the_human_tide_desc: "合纵与连横是中国古代的政治策略，然而它们亦可以用于兵法。所谓合纵就是联合许多弱小的人起来通过车轮战不让强敌得到喘息机会，从而击败对方。我们将应用这种战法，让敌人在疲惫之中死去！"
 QIE_fearless_soilers_desc: "是谁让人们有和平的生活？是国家；是谁让人们有的吃有的穿？是国家；是谁让人们有一份工作？是国家。[ROOT.GetName]的人们看看在中亚地区，看看希瓦的人们，就会意识到自己生活在一个幸福的国度里。然而那些邪恶的伪政府和军阀试图破坏这份安宁，为了报效祖国赐给人们的和平生活，士兵们应该拿起武器，悍不畏死，只有这样他们的家人才能更长久地享受这份恩惠。"
 QIE_increase_military_production_desc: "说到中国最引以为豪的军事院校，那必然是保定军校。拜过去十几年的发展所赐，保定军校现已发展成一个军事综合体，我们的下一步计划是进一步扩建保定地区的军工业，使其能源源不断地为我们的战争计划提供必要的武器。"
 QIE_elite_soldiers_desc: "合纵与连横是中国古代的政治策略，然而它们亦可以用于兵法。所谓连横就是通过精锐部队快速破坏敌人的薄弱区域，从而使敌人整体变得更弱，更易被我们的精英部队攻击。我们将应用这种战法，让敌人在恐惧之中死去！"
 QIE_against_airborne_enemies_desc: "近期的战争使人们意识到了飞机的重要性，不幸的是，我们的敌人——[JAP.GetName]就拥有大量的飞机，而我们自身的航空力量除了在洛阳和北京的堪堪几支联队之外再无其他。从零建造起一支能和日本人正面对抗的天空力量对目前的我们来说是天方夜谭。幸运的是，我们有一种廉价的替代方案：防空炮。"
 QIE_against_tanks_desc: "我们的敌人可能拥有强大的装甲战车，但那又如何？一辆坦克需要昂贵的成本投入，但我们只需要列装世界大战时期的老式火炮就能轻松对它们造成威胁。"
 QIE_eye_of_the_immortal_desc: "毫无疑问，德国陆军在世界大战中取胜的关键在于他们能够出色地协调大规模行动，以实现单独而互相统一的战略目标，这需要一种被称为无线电的技术。此外，我们还将使用中国人自己的智慧去进一步获取信息。"
 QIE_establish_modern_intelligence_department_desc: "对于合格的战争计划来讲情报是不可或缺的。德意志国有第三b部，反动的伪法国政权有情报总署。反观我们虽然也培养了很多间谍，但从来没有建立过一个机构去系统地分析我们得到的情报。是时候改变这一现状了，如此一来我们就能在战争之中占尽先机。"
 QIE_become_MP_shadow_desc: "大部分强硬的宗社党员已在紫禁城政变中被我们清洗。如今宗社党中残留的大部分人都是有着大量工业财富的满洲勋贵。说到底他们并不在意统治者是谁，只要当前政权能够保护他们的财产，并且带他们发财就行。如果我们和他们进行合作就不得不顾及他们的利益，如果引发了什么危机导致他们的产品或者财富出了问题，我们一定会付出代价的。"
 QIE_become_CERA_shadow_desc: "保救大清皇帝会是一个受众广泛的政党，深受农民和一些城市知识分子的支持。说到底它只是一个大帐篷政党，里面装满了一群愤世嫉俗，道貌岸然的伪君子。和这群中庸之辈合作可能是最符合我们的利益的，只要我们能给广大民众一点表面上的利益，这些人会很乐意支持我们的政权。"
 QIE_become_YCP_shadow_desc: "中国青年党主要由保定军校的青年学员和一部分城市知识分子组成并提供资金维持其运作。他们长期以来捍卫着民族主义事业，并致力于致力于加强中央集权与工业化。在这一点上，我们似乎非常适合与他们合作。但要小心这些热血青年们会对任何国外势力报以敌意，如果我们做出了错误的选择，他们可能反过来会伤害我们自身。"
 QIE_wushan_common_polit_16_desc: "这个国策将大幅（+2）提高我们的激进度。对全世界工团主义国家宣战。如果我们完成了“结世界为一国”并且没有完成“龙骧鹰扬”，将解锁额外的宣战对象。（帝国公约，协约国和大东亚共荣圈）流共工于幽州，放驩兜于崇山，窜三苗于三危，殛鲧于羽山，四罪而天下咸服。"
 QIE_old_chinese_beliefs_reborn_desc: "圣人先贤之言终于突破了我们的民众之中长期以来受到西方思想和战乱影响而形成的那层厚厚的痂，现在中华传统美德再次充满于我们的人民心中，他们已做好准备捍卫传统文化，捍卫祖国，捍卫我们的政府了。"
 QIE_and_new_beliefs_live_in_here_desc: "我们对两位“异邦教祖”展开的宣传攻势起到了效果，通过向他们解释这些教祖实际上是继承了美好的中华文化，人们至少不再像庚子暴乱时那样对这些外来的洋神仙有所敌视了。不过在民众之间出现了另一种声音，他们认为西方政权是文化窃贼，剽窃了中国人民的美德和知识并伪造了“宗教”来掩盖他们的行为。我们或许可以利用这种新兴的民族主义精神。"
 QIE_seances_restart_in_beijing_desc: "时值八会吉日，诸天大圣尊神上会灵宝玄都玉京山上宫，朝庆天真，奉戒持斋，旋行诵经，并遣天真威神周行天下，纠察功过。燕京吕祖阁中，救世新教列位成员亦开乩降笔，恭请五教先师救脱凡人于苦海，宣讲道德于凡间。然而今时不同往日，京城大权已落入我等同侪之手，凡我等所行必于社会之上，山河之间有所反应。"
 QIE_restore_the_order_behind_shanhaiguan_desc: "长期以来，中国一直被野心勃勃的强人们和心怀不轨的地方派系所分裂。作为中国唯一的合法政府，我们将向这些割据一方的军阀，左翼分子甚至革命党匪徒发去电报，要求他们放下武器立刻归顺。但如果他们连这最后的仁慈都不接受的话，我们就将起兵讨伐他们，消灭这些僭主。"
 QIE_eliminate_traitors_in_the_south_desc: "“联省运动”本质上不过是合理化地方军阀割据的产物，那些被西方思想荼毒的天真知识分子竟然支持这种伪装成统一的分裂。中国自古以来都主张大一统，一个国家中绝不能出现两位最高统治者。联省派实际上就是破坏中华统一的害虫，我们将消灭这些匪徒。"
 QIE_destory_the_red_flag_desc: "丙寅年间，我们曾经击败了孙文和他图谋不轨的社会主义恶贼。这群残兵败将丢盔弃甲，跑到了法国寻求一隅安歇，如今却卷土重来，重新在中华大地上以革命之名，行暴力之实。我们将消灭这些手下败将，并且这一次将斩草除根，确保这些可恨的罪犯再也无法掀起什么风浪。"
 QIE_advance_to_the_shanhaiguan_desc: "直奉战争尚且可以称得上是两位强者一决雌雄的战争，但邪恶的张作霖却无法堂堂正正地接受他的失败，他流窜回了奉天，在那里向日本人卑躬屈膝，并计划将整个中华献给他的外国主子。我们必须斩杀这个卖国贼！"
 QIE_universal_education_for_poor: "体仁大学堂"
 QIE_revenge_for_1928: "昔日戊辰困龙"
 QIE_revenge_for_1928_desc: "“门户开放，机会均等”，1928年以美国人为首的帝国主义者打着做生意的旗号强行分裂了我们的国家，这些租界明明是我国的土地，但我国人民却无法自由进出。只要使馆城市一日存在，就是我们一日的耻辱。"
 QIE_the_dawn_of_loong_the_dusk_of_thieves: "青龙飞天，小人掩目"
 QIE_ws_jiang_chao_zong: "江朝宗"
 QIE_ws_jiang_chao_zong_bio: "江朝宗出身于一个贫穷的乡下家庭，早年间因为家贫不得不放弃学习，转而在未来的台湾巡抚刘铭传开办的“继勋典铺”当一名当铺学徒，并在不久后加入了刘铭传的淮军。1884年他参与了中法战争，在刘铭传指挥下击败法军，收复台湾基隆。\n\n由于在战争中英勇作战的表现，江朝宗被提拔为海军管带。在甲午战争期间，江朝宗追随袁世凯，亲临前线为清军侦察日本军队的动向，随后他又参与了袁世凯的北洋新军创立。他所立下的一系列战功使得他升任为陕西省汉中镇正二品总兵。辛亥革命期间，他从陕西返回北京，在袁世凯手下担任陆军参谋，1913年升任为提督九门步军巡捕五营统领——俗称“九门提督”，成为了北京至高无上的守卫者。\n\n在张勋进入北京，发动第一次宣统复辟时，身为九门提督的江朝宗支持张勋并出席了复辟会议，也是在那里他与郑孝胥和吴景濂等人产生了联系。然而在段祺瑞马场誓师之后，江朝宗又密电段祺瑞，支持他起兵讨伐张勋。当张勋的残兵败将试图进入北京城时，江朝宗将九道大门悉数封锁，使得他们被段祺瑞全部歼灭。\n\n此事之后，段祺瑞罢免了江朝宗的九门提督职务，转而封他为“迪威上将军”将其架空。正是这件事之后，江朝宗遇到了正在寻找金主的河南民间宗教——救世新教……\n\n§Y备注：江朝宗表面和蔼可亲，实则残忍无情，是纯粹的机会主义者。袁世凯之子袁克文曾揭露他广布爪牙，冤杀枉戮，不可数计。\n他甚至曾经试图构陷袁克文是国民党的间谍，从而将其杀死。§!"
 QIE_ws_jiang_chaozong_leader_desc: "§Y生于：§!§L1861年；大清、安徽省宁国府§!\n§Y背景：§!§L$QIE_ws_jiang_chao_zong_bio$§!"
 QIE_ws_jiang_chaozong_advisor_desc: "§Y生于：§!§L1861年；大清、安徽省宁国府§!\n§Y派系：§!§L无派系§!\n§Y背景：§!§L江朝宗出身于一个贫穷的乡下家庭，早年间因为家贫不得不放弃学习，转而在未来的台湾巡抚刘铭传开办的“继勋典铺”当一名当铺学徒，并在不久后加入了刘铭传的淮军。1884年他参与了中法战争，在刘铭传指挥下击败法军，收复台湾基隆。\n\n由于在战争中英勇作战的表现，江朝宗被提拔为海军管带。在甲午战争期间，江朝宗追随袁世凯，亲临前线为清军侦察日本军队的动向，随后他又参与了袁世凯的北洋新军创立。他所立下的一系列战功使得他升任为陕西省汉中镇正二品总兵。辛亥革命期间，他从陕西返回北京，在袁世凯手下担任陆军参谋，1913年升任为提督九门步军巡捕五营统领——俗称“九门提督”，成为了北京至高无上的守卫者。\n\n在张勋进入北京，发动第一次宣统复辟时，身为九门提督的江朝宗支持张勋并出席了复辟会议，也是在那里他与郑孝胥和吴景濂等人产生了联系。然而在段祺瑞马场誓师之后，江朝宗又密电段祺瑞，支持他起兵讨伐张勋。当张勋的残兵败将试图进入北京城时，江朝宗将九道大门悉数封锁，使得他们被段祺瑞全部歼灭。\n\n此事之后，段祺瑞罢免了江朝宗的九门提督职务，转而封他为“迪威上将军”将其架空。正是这件事之后，江朝宗遇到了正在寻找金主的河南民间宗教——救世新教……\n\n§Y备注：江朝宗在救世新教中道号“慧济”，是救世新教的早期金主与成员。他是救世新教在北京得以发展如此多上流社会人士的主要推手。§!"
 QIE_ws_wu_pei_fu: "吴佩孚"
 QIE_ws_wu_pei_fu_bio: "吴佩孚出身商人家庭，他在保定陆军速成学堂学习测绘科，并于日俄战争期间成为上尉。之后他加入新军，在曹锟麾下服役，并在辛亥革命期间表现卓越。\n\n护国战争中，吴佩孚与蔡锷交战，并勉强击败了蔡锷的部队。1918年，北洋政府挥师南征，吴佩孚指挥的第三师攻陷了长沙，但湖南省之后被交给了旧皖系的张敬尧。吴佩孚和曹锟遂密谋决定推翻段祺瑞的旧皖系军阀，在直皖战争中，吴佩孚率军取得了决定性的胜利。\n\n吴佩孚成为了首位登上《时代》杂志封面的中国人，并被称为“中国最强者”。1922年，他试图建立一个改革派的“好人内阁”，但由于内部分歧和曹锟的反对而失败。1924年被冯玉祥背叛后，吴佩孚投靠赵恒惕，并于1926年重返华北，击败了国民军。\n\n在北伐战争期间，吴佩孚和张作霖组成“安国军”以抵抗国民革命军，大获全胜。随后他又与奉系军阀争夺北京的控制权，并在第三次和第四次直奉战争中击败了奉系。\n\n尽管1928年吴佩孚反对清廷复辟，但他也能在这一新的政府结构中风生水起，在边缘化保皇派的同时维持住了北洋的主导地位。\n\n在救世新教成功夺取权力之后，吴佩孚作为事院掌院回到了救世新教，并最终赢得了权力斗争，确立了自己的领导地位。正如他自己在北京明经学会为他出版的作品《大学正释》中论述的那样，他将让孔孟之道在中国复兴，并最终计划建成一个具有中国特色的民主共和体制。\n\n§Y备注：吴佩孚野心勃勃、信念坚定、热爱祖国，渴望在未来的中国实现民主与共和。\n吴佩孚对乔治·华盛顿的丰功伟绩推崇备至，并把自己塑造为再造共和的元勋。§!"
 QIE_ws_wu_peifu_leader_desc: "§Y生于：§!§L1874年4月22日；大清、山东省蓬莱§!\n§Y背景：§!§L$QIE_ws_wu_pei_fu_bio$§!"
 QIE_ws_qian_neng_xun: "普明正化真人"
 QIE_ws_qian_neng_xun_bio: "钱能训生于诗书之家，家中长辈便是清政府的要员。这使得他早早地就依靠恩荫制度被提拔为了官员候补。1898年，钱能训中进士，被授予翰林，随后担任陕西布政使。\n\n1910年，经军机大臣徐世昌推荐，爱新觉罗·载沣册封钱能训为封疆大臣，同时兼任陕西巡抚。随着辛亥革命的爆发，钱能训在西安城内大肆搜捕革命党人，以维持统治。在革命军攻下西安之后，他与西安将军合作尝试夺回城市，未果。见大势已去的他本计划自杀谢罪，但却被革命军发现。\n\n在第一次宣统复辟期间，钱能训出席了复辟会议，成为了农工部左侍郎。1918年12月14日，钱能训任中华民国国务总理，与陆徵祥、曹汝霖、陆宗舆组成新内阁。但随着翌年与大日本帝国之间的《二十一条谈判》未能取得令人满意的结果，使得整个内阁陷入崩溃。\n\n在被迫辞职之后，钱能训在江朝宗的介绍下加入了救世新教，受到徐世昌的影响，他对吕洞宾十分感兴趣，曾主导了多次吕洞宾的神仙摄影和扶乩问事。而吕洞宾也以神谕告知众人钱能训才是救世新教的教主。1924年，钱能训去世。在五教教祖和吕洞宾的一齐见证下，钱能训升入天界，“被授以金阙廉玄主掌，封号普明正化真人”。如今江朝宗与吴佩孚之间因为权力斗争而互爆丑闻，致使双方都陷入了极为不利的境地。钱能训不忍看到二人如此象征，破坏教内的兄弟情谊，于是特意从天界下降，再一次作为教主指引教团。\n\n§Y备注：钱能训的遗像绝无任何力量，归根结底，它只是龚心湛和李思浩等北洋技术官僚的橡皮图章。\n他们所能做的就是尽力维持平衡，但为了取得显著的进展，他们或许不得不受到江朝宗或吴佩孚的摆布……§!"
 QIE_ws_qian_nengxun_leader_desc: "§Y生于：§!§L1870年；大清、浙江省嘉善县§!\n§Y背景：§!§L$QIE_ws_qian_neng_xun_bio$§!"
 QIE_ws_tang_er_he: "汤尔和"
 QIE_ws_tang_er_he_bio: "著名知识分子、“六松老人”汤尔和是孙传芳核心圈子中一名十分特殊的官员。他自幼学习经典，接受私塾教育，是一名颇有天赋的学生。1903年，汤尔和赴日本成城学校学习军事，留日期间积极参加抗清反帝活动，并加入同盟会。1904年，他在浙江高等学堂做音乐教员，三年后再度前往日本学医，就读于金泽医学专门学校，而后转赴德国柏林大学留学，获得医学博士学位。\n\n回国后，汤尔和先后在多所机构担任内科医生和医学总监，期间创办了浙江病院，参加了辛亥革命，后又创办了国立北京医学专门学校并担任校长，1915年发起成立中华民国医药学会，1920年奉派赴欧洲考察医学，1922年回国后任教育部次长。\n\n1923年，日本关东大地震后，汤尔和出任中国红十字会慰问使者赴日，此后在吴佩孚支持下成立的王宠惠“好人政府”中担任教育总长。1925年，汤尔和与汪精卫就孙中山病情是用中医还是西医治疗发生了短暂的辩论，他站在西医一边。1926年，汤尔和任内务部总长，1927年改任财政部总长。\n\n1929年，汤尔和获日本东京帝国大学医学博士学位，回国后在南直系政府中担任各种职务。在收到了江朝宗的邀请信之后，汤尔和北上加入了北京政府。\n\n如今中国已经统一，而救世新教意外地放弃了他们对中国的控制权，尝试将权力奉还给一个民主共和的新政府。而这个临时过渡政府推举汤尔和担任主席，这使得这位老人承受了不小的压力。\n\n§Y备注：汤尔和并非救世新教成员，也对鬼神之事不感兴趣。尽管他相信鬼神之说是一种能够安慰别人的方法，但他本人坚信现代科学的力量.\n\n汤尔和与江朝宗因1923年日本关东大地震的慰问而有一面之缘，彼时江朝宗等救世新教代表也前往日本进行国际赈灾活动。§!"
 QIE_ws_tang_erhe_leader_desc: "§Y生于：§!§L1878年；大清、浙江省杭州府§!\n§Y背景：§!§L$QIE_ws_tang_er_he_bio$§!"
