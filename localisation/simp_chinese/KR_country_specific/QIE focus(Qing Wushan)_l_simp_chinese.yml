 QIE_guide_1: "§M救世新教§!/§M中华天德圣教国§!：§M江朝宗§!/§M吴佩孚§!（$national_populist_coloured$）\n£white_dot 在八省联合难民大量涌入华北平原，救世新教提请紧急救灾草案时选择拒绝救世新教的求援，这将使救世新教立刻跳过其自动国策“慈善募捐”，从而能在宣统政变前率先完成国策分支。\n£white_dot 在华东混战爆发时，不要接受陈调元和齐燮元的请求。\n£white_dot 正常进入宣统维新路线，任意选择一位政变者。如果选择阎锡山，选择利用他的野心。\n£white_dot 在“不祥的军队调动”事件中，选择不调查事件。\n£white_dot 在“在大殿之外”事件中，选择“两支叛匪正在乾清宫内交战，护驾！”\n£white_dot 卫兵冲进大殿时，即可解锁第三个隐藏选项，让救世新教政变成功。\n£white_dot 在切换为救世新教国策树后，完成国策“天命未失，代帝监国”，在随后自动触发的“焚香”事件中，即可选择让江朝宗或吴佩孚任意一人的密谋成功。\n£white_dot 如果选择“双香同烬，乩语不成真谶”，即可在解决“八省流民危机”事件后让两人的丑闻都被暴露，由龚心湛和李思浩等技术官僚夺取权力，进入§M钱能训§!的死者治国隐藏线。\n£white_dot §R注意！§!在统一中国后，设立的§M新北洋政府临时委员会§!（$social_liberal_coloured$），以及临时大主席§M汤尔和§!是剧情的一部分，该线路目前无法变身为正常化的§M中华民国§!。"
