 QIE_wushan_prepare_for_the_second_round_robin: "铸造新道路"
 QIE_wushan_preparing_for_the_next_war: "为下一次战争的准备"
 QIE_wushan_preparing_for_the_next_war_desc: "战争只是暂时离开了我们，它仍然潜伏在我们周围，伺机再次将我们拖入它的领域。放眼望去，在我们周围存在着的似乎都是我们的敌人。我们必须小心应对这个已经堕入黑暗的邪恶世界，为此提高警惕，时刻准备与那些歹徒和恶魔作战是极为必要的。"
 QIE_wushan_wu_as_vice_master: "智玄副教统"
 QIE_wushan_wu_as_vice_master_desc: "经过救世新教内部的权力斗争之后，吴佩孚与江朝宗都未能胜出。他们二人相争同时导致两人不仅在社会上，而且在教团中的地位与名誉都有所受损。吴佩孚不得不屈服于救世新教鸾务院的五人委员会，承认已经死去的钱能训为教统，而自己作为副教统协理相关事务。"
 QIE_wushan_jiang_as_vice_master: "慧济副教统"
 QIE_wushan_jiang_as_vice_master_desc: "经过救世新教内部的权力斗争之后，吴佩孚与江朝宗都未能胜出。他们二人相争同时导致两人不仅在社会上，而且在教团中的地位与名誉都有所受损。江朝宗不得不屈服于救世新教鸾务院的五人委员会，承认已经死去的钱能训为教统，而自己作为副教统协理相关事务。"
 QIE_wushan_wu_as_vice_master_1: "智玄副教统"
 QIE_wushan_wu_as_vice_master_1_desc: "经过救世新教内部的权力斗争之后，吴佩孚与江朝宗都未能胜出。他们二人相争同时导致两人不仅在社会上，而且在教团中的地位与名誉都有所受损。吴佩孚不得不屈服于救世新教鸾务院的五人委员会，承认已经死去的钱能训为教统，而自己作为副教统协理相关事务。"
 QIE_wushan_jiang_as_vice_master_1: "慧济副教统"
 QIE_wushan_jiang_as_vice_master_1_desc: "经过救世新教内部的权力斗争之后，吴佩孚与江朝宗都未能胜出。他们二人相争同时导致两人不仅在社会上，而且在教团中的地位与名誉都有所受损。江朝宗不得不屈服于救世新教鸾务院的五人委员会，承认已经死去的钱能训为教统，而自己作为副教统协理相关事务。"
 QIE_wushan_five_turbid_evils_world: "五浊恶世"
 QIE_wushan_five_turbid_evils_world_desc: "佛祖曾在《法华经》中开示，当世界末日到来之时，众生将沉溺在五种污浊的邪恶中：劫浊、见浊、烦恼浊、众生浊、命浊。而就在这五浊恶世出现的时候，诸佛和仙人将会降临世间，替人们驱散黑暗。而如今一方面世界各地陷入万劫不复的战争之中，一方面佛和仙人又确实统治着中国这片宁静的土地。§R难道这一切还不能证明如今正是该与邪恶一战的终极时刻吗？我们将战胜所有黑暗，将清净带回世间，不仅成为中国，更成为列国的拯救者。§!"
 QIE_wushan_east_hua_west_xia: "东华西夏"
 QIE_wushan_east_hua_west_xia_desc: "终极之战打响了，正所谓东者为华，西者为夏。华，荣也，是仙人的象征；夏，中国之民也，是人民的象征。§R仙人自古以来就是要解救凡人的，这既是预言，也是命运本身。我们的圣战军队将彻底粉碎世界上存在的所有邪恶，将所有的中国之民都从邪灵和魔鬼的控制下解放出来，还世界一片朗朗乾坤。§!"
 QIE_wushan_celebration_for_the_end_of_war: "终战"
 QIE_wushan_celebration_for_the_end_of_war_desc: "难熬的冬天已经过去，春天已经来临。人们走上街头，欢庆着这在数十年的混乱之后，再次获得的，来之不易的幸福与和平————愿战争不再到来，愿痛苦不再到来，愿悲伤不再到来。"
 QIE_wushan_the_fear_of_peace_broken: "对和平破碎的恐惧"
 QIE_wushan_the_fear_of_peace_broken_desc: "汤尔和之死让人们开始担忧新政府是否能确保他们的安稳生活——他们连距离自己不到数百米的大主席都保护不好，又怎能履行保护民众生命，保护民众财产的诺言？对新北洋政府的质疑声开始出现，人们因失去和平的可能性而战栗不止。"
 QIE_wushan_mass_arrests: "大规模搜捕"
 QIE_wushan_mass_arrests_desc: "政府正在大规模搜捕潜在的可疑分子与破坏分子，并鼓励相互监视与举报。救世新教不仅将对那些犯罪者施以最严厉的惩罚，也将对任何异见声音丝毫不留情面，将他们悉数清除。这并不只是救世新教的想法，而是所有人向救世新教呼求的政策，因为唯有这样，人们才能确保自己现有的生活不会被那些群众里的坏人所破坏。"
 QIE_wushan_only_one_light_in_this_dark_world: "五色石，补苍天"
 QIE_wushan_only_one_light_in_this_dark_world_desc: "往古之时，四极废，九州裂；\n天不兼覆，地不周载；\n火爁炎而不灭，水浩洋而不息；猛兽食颛民，鸷鸟攫老弱。\n于是女娲炼§L五色§!石以补苍天，§R断鳌足§!以立四极，§R杀黑龙§!以济冀州，§R积芦灰§!以止淫水。\n§O苍天补，四极正；淫水涸，冀州平；狡虫死，颛民生。§!"
 QIE_ws_focus_it_will_increase_maddness.tt: "§G这将增加民众的狂热度，如果我们持续这样做，可能会反过来被§R自己创造的怪物§!吞噬。\n§!"
