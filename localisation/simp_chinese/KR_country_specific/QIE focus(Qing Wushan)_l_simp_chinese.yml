 QIE_god_circle_shi_tier_1: "佛祖降鸾：疑虑丛生"
 QIE_god_circle_shi_tier_1_desc: "对中国的统治者来说，最有利的宗教便是佛教。佛教是最能安定社会秩序，维持当下稳定的选择。尽管我们所宣扬的这位“释迦牟尼”与一些佛教中人认识的有所出入，但毕竟广大民众是察觉不出来区别的。"
