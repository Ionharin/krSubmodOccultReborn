 QIE_wushan_long_tt: "救世新教"
 QIE_wushan_long: "救世新教\n§L救世新教起源于1919年河南地区的神秘主义降灵会，原名为悟善社。最早是失意文人煮酒论政的组织，他们供奉传说中的中国神灵吕洞宾，认为世界败坏，末日将至。降灵会很快就陷入了经济危机，致使其不得不派出成员前往北京寻找资金援助。悟善社成员王锦蕖与当时因张勋复辟事件而被政府排挤的九门提督江朝宗之间产生了联系，他向江朝宗赠送了使用相机拍摄的“吕洞宾显灵照片”，博取了江朝宗的好感与信任，并吸纳其加入了悟善社。\n\n自江朝宗加入之后，他大量邀请了当时下野或依旧在任的北洋政府成员加入该社团，并从多方渠道积极募集资金，开展公益事业，从而将悟善社包装为一个慈善组织而非单纯的神秘主义团体。1925年，钱能训、江朝宗、段祺瑞与吴佩孚等人宣布得到了“太一至圣先天老祖”的启示文本，该文本是由儒教、佛教、道教、基督教、伊斯兰教的五教先知一同在降灵会上向他们传达的，目的是避免即将到来的末日，拯救衰颓的世界。随后，悟善社向北洋政府提交了一份文件，请求改组为宗教组织，该请求由时任北洋内务总长，同时也是悟善社成员的龚心湛批准。至此，原本的悟善社彻底被北洋政要改造为其活动的另一个俱乐部与宗教团体。\n\n1926年救世新教曾召请南海观音，亚里士多德与乔治·华盛顿对北伐的国民革命军进行预言并影响。随着德国人的介入与北伐团体的溃散，以及1927年宣统皇帝的复辟，救世新教一跃成为了颇受政府当局注重的慈善与新兴宗教团体。但这个未戴王冠的影子政府也不得不面对新的问题，随着当任教主吴佩孚在名义上重新获得了北京政府的权力，他疏远了救世新教的许多事务，这使得江朝宗不得不承担起本不应由他承担起的行政职责，并意外地积累了不可小觑的人脉。§!\n"
