 #修饰符/加成
 QIE_wushan_zhili_arsenal_state_modifier: "直隶军事综合体"
 QIE_wushan_zhili_arsenal_state_modifier_desc: "救世新教进一步强化了直隶地区，特别是保定的军事力量。通过将其打造成我国军工业的心脏，我们就能最大限度发挥其军事工业实力，将我们的军队武装到牙齿。"
 QIE_wushan_chixian_shenzhou_modifier: "赤县神州"
 QIE_wushan_chixian_shenzhou_modifier_desc: "上古时代，大禹分天下为九州，并铸造九鼎证明其拥有统治天下的权威。然而随着数千年的战乱，九鼎已不知所终。但任何统一了中国的强人都希冀通过重铸九鼎来证明自己是合法的天子。我们也如此效法，在此地树立起了象征我们不可置疑的权威的鼎。"
 QIE_wushan_kunpeng_plan_modifier: "鲲鹏计划"
 QIE_wushan_kunpeng_plan_modifier_desc: "财政部的李思浩为我们提供了一个极具诱惑力的建议——“鲲鹏计划”——这是一笔特别另款，就像一个存钱罐，用于在我们统一中国之后的建设。但这笔钱并不出自我们自己的口袋，而是从那些被我们击败的军阀手里夺取。"
 QIE_wushan_lvzu_chunyang_throne_modifier: "吕祖纯阳之位"
 QIE_wushan_lvzu_chunyang_throne_modifier_desc: "至圣先天太一老祖乃开天辟地、创生宇宙之独一真神，至高至贵，万灵所本；而吕洞宾纯阳真人则是其唯一使者。正是在纯阳真人的点化之下，世间始有五教分立，以各自经义教化万邦诸族。如今我们已在教中为真人设立宝座，使其名义居于教统与掌院之上。随着五教教诲不断推行于社会，教团对民众精神与秩序的掌控也将日益稳固。尽管在海外观察家看来这是对社会自由的侵犯，但对我们的人民来说，这正是吕祖对众民庇护日深的明证。"
 QIE_wushan_luoyang_arsenal_modifier: "洛阳七一四研究所"
 QIE_wushan_luoyang_arsenal_modifier_desc: "我们建立的洛阳七一四研究所是一个较小的军工研究所，所能为我们的军事研究提供的帮助有限，而且也不一定能涉及到所有领域，但有总比没有好。"
 QIE_wushan_aviation_affairs_commission_modifer: "巡抚空路空军统领行台"
 QIE_wushan_aviation_affairs_commission_modifer_desc: "在过去，袁世凯于南苑机场建立了中国历史上第一支训练有素的航空兵。那时候的中国空军十分弱小，其存在价值仅仅是存在，而如今我们将继承袁少保的遗产，建立一支真正强大的空军，他们将翱翔于天空，猎杀任何来犯之敌。"
 QIE_wushan_coal_mining_principle_modifier: "确保能源"
 QIE_wushan_coal_mining_principle_modifier_desc: "煤矿是十分重要的工业能源，任何工业行为都无法离开这些“黑色钻石”。"

