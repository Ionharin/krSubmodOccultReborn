 QIE_god_circle_lao_tier_1: "回祖降鸾：疑虑丛生"
 QIE_god_circle_lao_tier_1_desc: "一位并不属于汉族的外来教祖势必会引起大家的抵触，但这种抵触是因为不了解而非惧怕所产生的。我们只需要不断地宣扬他的存在，并且向人们展示他的教诲与中国本土文化之中的共通点，便能削弱这种抵触情绪。"
