 QIE_wushan_military_end_desc: "教化不足，则刑戮继之。经过一系列改革，[ROOT.GetName]的军队已经脱胎换骨，它将成为一把锋利的宝剑，这些勇士时刻准备着为[ROOT.GetName]的人民夺回那些本该属于他们的土地和资源——只要他们无情的攻势还没有将它们化为乌有。"
