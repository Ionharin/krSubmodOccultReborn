 QIE_god_circle_no_focus_tier_1: "儒祖降鸾：疑虑丛生"
 QIE_god_circle_no_focus_tier_1_desc: "尽管儒教的所谓孔孟之道已经成为了中国人的一部分，但我们要推广的“孔子”与大众所熟知的并不太相同，人们仍然需要一段时间去接受。"
 QIE_god_circle_no_focus_tier_2: "儒祖降鸾：广为人知"
 QIE_god_circle_no_focus_tier_2_desc: "经过一段时间的传播，中国人已经对我们的所推广的这位教祖放下了戒备心，现在我们要做的就是继续进行宣传，从而让他渗入到人们的生活之中。"
 QIE_god_circle_no_focus_tier_3: "儒祖降鸾：深入人心"
 QIE_god_circle_no_focus_tier_3_desc: "每当人们讨论起燕京吕祖阁中的扶乩时，就算是那些最死硬的知识分子也不得不承认我们的神秘主义活动对社会产生的正面影响。儒祖降乩已经成为了维持社会安定，提供精神慰藉的一种民俗活动，人们已经全然接受了其作用。"
 QIE_god_circle_con_tier_1: "道祖降鸾：疑虑丛生"
 QIE_god_circle_con_tier_1_desc: "自始至终，名义上的中国本土宗教只有道教。虽然自康有为主张“废庙办学”和“恢复孔教”以来，道教信仰接连受到打击，但这并不会影响我们的“老子”在乩坛上的威严。只是人们人们仍然需要一段时间去接受他的存在。"
 QIE_god_circle_con_tier_2: "道祖降鸾：广为人知"
 QIE_god_circle_con_tier_2_desc: "经过一段时间的传播，中国人已经对我们的所推广的这位教祖放下了戒备心，现在我们要做的就是继续进行宣传，从而让他渗入到人们的生活之中。"
