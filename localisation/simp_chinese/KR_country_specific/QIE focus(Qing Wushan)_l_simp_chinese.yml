 QIE_wushan_dead_leader_live_country: "和谐平衡"
 QIE_wushan_dead_leader_live_country_desc: "在教统的统治之下，我们已经恢复了华北地区的秩序。现在华北地区一扫之前礼教废弛，道德沦丧的乱象，成为了中国无数人艳羡的道德之地，和谐与平衡真正降临到了我们的人民之间。"
 QIE_wushan_dead_leader_live_country.tt: "§C通过完成[ROOT.GetLeader]的互斥国策即可跳过该国策。§!§W"
 QIE_wushan_return_to_democracy: "五色旗飘扬的新一年"
 QIE_wushan_return_to_democracy_desc: "中国人民的梦想终于实现了！如今中国已再次统一，人们走上街头欢庆着战争的结束与和平的到来。救世新教是我国统一的大功臣！现在正如他们之前所承诺的那样，这个新生的民主共和国已从其手中接过权力，将带领中国人民走向新的时代。中国万岁！共和万岁！"
 QIE_wushan_return_to_democracy_fake: "§9我们将着手成立一个崭新的共和政府，它将从救世新教手中继承权力，从而真正实现辛亥革命的理想！§!"
 QIE_wushan_return_to_democracy_true: "§0在混乱之中，人们奔向了救世新教，民主共和的幻梦也一并消散了。他们的脚步踩灭了辛亥最后的余火，但与之相对的，一个愤怒且令人恐惧的政权也由此而诞生。§!"
 QIE_adopt_start_tungsten_producing_search_desc: "我国的钨产业目前处于起步状态，在和谐社团把控政府的时期，我国主要和外国资本合作开采这些不可再生的稀有资源，我们必须改变这种现状，将战略金属牢牢掌握在自己手中。如果海外商人愿意向我们提供一些开采技术的话会十分有利，不然我们就只能全靠自己了。"
 QIE_the_dawn_of_loong_the_dusk_of_thieves_desc: "如今戊辰之耻既雪，关外土地也重回我们掌控，昔日被困在黄泥之中的青龙如今突破天关，再次傲视苍穹。然而边境地区还有许多困苦的人民不知道我们的回归。我们的信使不日就将出发，为他们带去这一喜讯。"
 QIE_universal_education_for_poor_desc: "在“宏教柳真人”的降乩指导下，桂广德，周学仕，汪镜慧三人在南京堂子街张公祠建立了一所公益夜校，教授国文、数学、英语以及一系列基本技术。我们应该推广这种公益教育，这有利于帮助我们培养一批水平足够的技术工种。"
 QIE_universal_education_for_poor_industry_1: "体仁大学堂"
 QIE_decide_adopt_forced_producing_plan_desc: "每天来到我们的救济所和粥厂里领取救济粮的人越来越多了，并且这个人数还在增长，使得救济所的财政压力越来越大，我们必须要想些别的办法。这些难民会被我们安置在各个缺人手的工厂里从事劳动，如果他们达不到生产指标，那么他们就只能“自愿”不吃饭了。"
 QIE_decide_adopt_247_producing_plan_desc: "每天来到我们的救济所和粥厂里领取救济粮的人越来越多了，并且这个人数还在增长，使得救济所的财政压力越来越大，我们必须要想些别的办法。这些难民会被我们分为两组安置在各个缺人手的工厂里从事劳动，每人工作12小时，这样就能确保我们的工厂24小时不停歇地产出成品。"
 QIE_wushan_salt_and_land_desc: "我们会封锁他们的贸易，我们会掌控他们的经济，我们会抹去他们的语言，我们会涂改他们的文字，我们会为他们构造一个崭新的过去。他们会称呼我们是带来和平的使者，这一切只因我们决定彻底毁灭他们。"
 QIE_wushan_restore_abolished_positions_desc: "我们的政府缺乏人才，但更缺乏职务。如果想要拉拢那些有影响力的社会人士，最好的办法就是由政府和他们结成利益共同体，新设置一些看似地位较高，实则权力极小的官职就能满足这些人的虚荣心。现在我们只需要暗示他们掏钱就能获得这些……"
 QIE_wushan_establish_fair_social_standards_desc: "旧政府对社会的掌控力度相当虚弱，这就是社会上充斥着谎言，欺骗和不道德的原因。既然我们已经控制了政府，我们就必须将中华传统社会道德视为一种不成文法进行推行……模糊的定义有助于我们对其随意进行解释。"
 QIE_wushan_contact_with_the_social_elites_desc: "如果我们能够招揽那些知识分子和在社会上有名望的人为我们的政府说话，那就会有更多的民众相信我们真的是一个值得信赖的政府。面对一起切蛋糕的诱惑，这些社会精英不会无动于衷的。"
 QIE_KR_wushan_gathering_storm_desc: "大清即将迈入1936年。在1927年的第四次直奉战争中，为了换取德国支持，宣统皇帝复辟归位，但他仍不得民心，并且大多数人都不将其视为正统。\n\n直系军阀击败了奉系军阀和国民党军队，但他们作为中国近二十年之乱世的赢家，对这个国家的控制却远谈不上稳固。在东方，大日本帝国正对大陆虎视眈眈，而在中华大地上，一场即将到来的危机正在华东地区悄然酝酿。慈善组织悟善社中的社会精英和前北洋政府官员们正在私下中相互拜访，他们所计划的事情政府也不知晓。内外敌人无不威胁着清廷的霸权，其权力掌握还能持续多久，将逐渐揭晓……"
 QIE_wushan_long_honed_tactics_desc: "没有必要去学习外国人的作战策略，中国的军事战术是植根于数千年军事实践经验的，舍弃它们相当于舍弃了中国兵家群体的智慧，相当于背叛了中华优秀传统文化。我们将以弱胜强、以柔克刚。爱国主义和民族主义将帮助我们挺过最艰难的时刻，从而战胜我们面对的强敌。"
 QIE_embrace_new_tactics_desc: "坦克、飞机和卡车的出现，将中国数千年积累下来的兵法碾得粉碎。面对新时代的战争我们不该固步自封，而要向那些现代化军事强国学习，把战争策略从一种凭直觉的行为转化成一种可以量化的科学。"
 QIE_wushan_the_war_of_sciences_desc: "大英帝国的流亡将领J.F.C.富勒总结了他们在第一次世界大战中失败的原因，他的著作《论未来战争》和《战争科学的基础》提出了一种规范化的战争原则，各国军事参谋部都将他的作品奉为圭臬，我们最好也仔细研读他的理论，以免我们在军事作战思想上继续落后于他人。"
 QIE_wushan_new_type_squad_tactics_desc: "我们部队中的步枪组和机枪组长期以来各自为战，但在德意志帝国如今这种区分已经逐渐被淡化，转而以“班组”之名称呼这些步兵火力单位，它们将以机枪手为中心进行展开。我们将向德意志人学习这项先进战术。"
 QIE_wushan_remembering_lessons_of_the_new_army_desc: "辛亥革命为什么会发生？这全是因为各地新军大量任用留学海外，浸染邪说，没有接受过我国优秀思想教育的军官。嗟乎！最后除了北洋六镇的精兵强将之外，其余军队都被革命党人完全渗透。前车之覆，后车之鉴。我们必须要严抓军队思想建设，避免类似的事情再次发生。"
 QIE_wushan_restart_small_station_drill_ground_desc: "1894年，袁世凯大总统在天津小站模仿德国陆军制度训练了定武军，凭严格管理缔造了我国第一支陆军，又凭个人崇拜将这支军队牢牢地掌握在强人手中。如今天津虽被使馆城市控制，但并不妨碍我们依照袁少保的思路重整一支强大，有毅力，并且忠诚非凡的军队。"
 QIE_wushan_the_new_right_army_imperial_guard_desc: "武卫右军是1898年设立的五军之中最强大也最精锐的一支师，也是在拳匪暴乱之后唯一留存下来的一支武力。经过一番整肃和训练，我们的军队终于配得上承继这种神勇强大的军队名号，作为令敌人闻风丧胆的精锐部队守护国家了。"
 QIE_decisive_battle_with_the_enemy_desc: "有什么东西比火更加猛烈凶狠？它将肆意舔舐，将触碰到的房屋和障碍焚烧殆尽，没有什么能够阻挡它。我们的数支军队将轮番发动攻击，从而不给敌人留下任何休整恢复的时间。失去了喘息机会的敌人面对我们猛烈的攻击只能节节败退，最终跪倒在我们面前。"
 QIE_wushan_revise_cautions_laws_desc: "1912年推行的《中华民国暂行新刑律》是直接继承自《大清刑律》的，而《大清民律》则从未被继承，前政府也从未正式推出过完整独立的民法。我们将监督新生的司法部门对现有刑律进行修订，并基于《大清民律》尽快指制定新的民法，以推出一套有利于我们治理国家的新法律。"
 QIE_wushan_forcing_prisoners_to_work_desc: "在过去，救世新教就和政府合作开办过一些习艺所和教养局，以收容约束社会上的乞丐与轻罪人士。一方面通过对这些人进行再教育可以帮助他们自食其力，另一方面维护了社会稳定。借此立法的机会，我们或许可以稍稍扩大这些社会收容部门的权力，帮助我们进一步稳定社会治安。"
 QIE_invasion_from_sea_desc: "[JAP.GetName]是一个岛国，如果我们想要对它复仇的话，其中一个选择就是从海上运输兵力发动登陆作战，但我们最先遭遇的麻烦就会是他们强大的海军。"
 QIE_invasion_from_sky_desc: "[JAP.GetName]与我国之间相隔着整片东海，如果我们想要对它复仇的话，其中一个选择就是从天空空投兵力快速占领港口地区，再将我们的军队运送至其本土，但我们最先遭遇的麻烦就会是他们不可忽视的空军力量。"
 QIE_wushan_the_project_code_jianzhen_desc: "这个世界上没有钱解决不了的问题，而且如今世界大战已经爆发，我们从非敌国那里得到武器也不会受到太多盘问。他们或许还需要我们的资金去支援他们的战争计划。我们准备购买一批运输船，从而将我们的部队运送到日本本土。"
 QIE_wushan_prepare_the_pink_plan_desc: "这个世界上没有钱解决不了的问题，而且如今世界大战已经爆发，我们从非敌国那里得到武器也不会受到太多盘问。他们或许还需要我们的资金去支援他们的战争计划。我们准备购买一批运输机，从而将我们的部队运送到日本本土。"
 QIE_jesus_stage_2_desc: "耶祖在《先天混元玄玄太上秘箓救世界真经》中晓谕我们，至圣先天太一老祖是世间的唯一主宰，而耶教的一切教化都是来自老祖分教别传的。这意味着耶祖所传授的东西本就源自我们灿烂的中华文化，将回祖奉为我国文化的至圣先师毫无问题。"
 QIE_mohammad_stage_2_desc: "回祖在《先天混元玄玄太上秘箓救世界真经》中晓谕我们，至圣先天太一老祖是世间的唯一主宰，而回教的一切教化都是来自老祖分教别传的。这意味着回祖所传授的东西本就源自我们灿烂的中华文化，将回祖奉为我国文化的至圣先师毫无问题。"
 QIE_confucism_stage_2_desc: "儒祖在《先天混元玄玄太上秘箓救世界真经》中晓谕我们，至圣先天太一老祖是世间的唯一主宰，而儒教的一切教化都是来自老祖分教别传的。不幸的是，后人误解了儒祖的许多意思，而且儒祖生前还有许多想说的话也没有说出来，幸运的是，《真经》补全了这一切。"
 QIE_buddhism_stage_2_desc: "佛祖在《先天混元玄玄太上秘箓救世界真经》中晓谕我们，至圣先天太一老祖是世间的唯一主宰，而佛教的一切教化都是来自老祖分教别传的。不幸的是，佛法本意未被后世完全理解，但老祖所揭示的“玄玄”将弥补这一点，将人们引向通往无上正觉与涅槃境界的道路。"
 QIE_educate_the_people_with_tao_desc: "道祖在《先天混元玄玄太上秘箓救世界真经》中晓谕我们，至圣先天太一老祖是世间的唯一主宰，而道教的一切教化都是来自老祖分教别传的。不论是“谷神不死”还是“清净解化”，实际上都来自于《真经》之中。"
 QIE_wushan_puppet_trade_factory: "向海外输出华工"
 QIE_wushan_puppet_trade_factory_desc: "我们的国家重建需要资金，而这些流民正好能为我们所用。我们可以模仿第一次世界大战时的选择，向海外输出华人劳工来换取经费，这一方面能缓解我们的社会压力，另一方面还能为我们搞到真金白银的外汇，而非由我们印刷的纸。"
 QIE_wushan_reorganise_the_kailuan_mining_bureau: "重开开滦矿务局"
 QIE_wushan_reorganise_the_kailuan_mining_bureau_desc: "成立于1878年的开滦矿务局是政府与海外资本共同建立的合资企业。然而在长期的军阀混战之中，矿务局遭到了废止，值此发展时机我们或许可以重开矿务局，邀请相关资本再度与我们合作共同开发。"
 QIE_wushan_redundant_civilian_factory_design: "民用工厂冗余设计"
 QIE_wushan_redundant_civilian_factory_design_desc: "这些民用工厂增加了许多不必要的冗余设计，等到某个特定的时刻，这些额外建成的设施就将发挥作用。"
 QIE_wushan_rapid_supply_hub_construction: "快速建造补给中心"
 QIE_wushan_rapid_supply_hub_construction_desc: "我们对民用工厂的冗余设计如今取得了回报，现在我们得以利用这些额外设计将它们改造成补给中心，从而为我们的前线部队提供更多资源以缓解补给问题。"
 QIE_wushan_wu_confirmed_as_the_leader_desc: "玉帅吴佩孚向世界宣告，中国人民自今天起站起来了，任何外国鬼子和军阀都别再想从中国人民手中夺走一分利益。吴佩孚将带领中国人民修正这世间颠倒的道义，玉帅万岁！孔孟礼教万岁！"
 QIE_wushan_the_ghost_of_dual_ocean_navy_desc: "在近一百年前，中国牢牢控制了亚洲的海洋。他拥有四支强大的舰队彰显其力量。然而时过境迁，资金匮乏，海岸控制权的不确定性以及外国邪恶势力的阴谋使我们的海上力量落后于世界水平。我们的目标是彻底摆脱这些困境。"
 QIE_wushan_focus_on_northern_navy_strategy_desc: "1867年创立的北洋水师曾是傲视世界的强大海军之一，但在邪恶且懦弱的卖国大臣李鸿章的指示下，北洋舰队竟被日本这个蕞尔小邦悉数歼灭——我们将重建北洋舰队的巨舰大炮，再次控制整个东方的海洋。"
 QIE_wushan_fleet_in_being_desc: "一支强大海军力量有时并不需要真正出击，只需要令我们的敌人相信停驻在母港里的舰队对他们是个巨大的威胁，即可起到其战略作用。"
 QIE_wushan_decisive_battle_doctrine_desc: "一场决定性的海战将彻底瘫痪敌人的海上力量，如果我们能够捕捉到决战机会并将敌方舰队一网打尽，那么自那之后我们就再也无需担心任何大洋上的威胁了。"
 QIE_wushan_combine_sky_with_ocean_desc: "我们的海上和空中力量的发展导向了另一条道路——海军用飞机，无论是从航母起飞袭扰对手，还是从陆地起飞对敌方舰队进行轰炸打击，都将进一步削弱我们敌人的抵抗意志和军事力量。"
 QIE_wushan_prepare_for_the_second_round_robin_desc: "经过艰苦的发展，我们终于建成了无比强大的海军与空军，中国再一次拥有了符合其地位的三军力量。听那天空中飞机掠过的声音，海洋里舰队破开海浪的声音，陆地上坦克碾压灌木的声音，这些即是我们的仇敌所听到的最后声音。"
 QIE_wushan_more_is_better_faster_is_great_desc: "经过一系列谨慎的讨论，兵工署决定将我们的装甲力量的发展方向定为产量优先。如果我们的工厂中能源源不断地产出无边无际的钢铁军团，任何敌人都将为之胆寒。"
 QIE_wushan_efficient_utilization_of_resources_desc: "经过一系列谨慎的讨论，兵工署决定开发一种新的生产方法，以最大效率利用我们制造装甲的资源。如果我们能够通过这种优化获得无边无际的钢铁军团，任何敌人都将为之胆寒。"
 QIE_wushan_conduct_armor_steel_experiments_desc: "经过一系列谨慎的讨论，兵工署决定对坦克装甲进行研究，通过增加我们的装甲硬度与厚度，敌人面对的将是一座又一座他们无法战胜的移动堡垒。"
 QIE_wushan_high_speed_racing_engine_desc: "经过一系列谨慎的讨论，兵工署决定对坦克发动机进行研究，通过增加我们的发动机强度，敌人面对的将是一座又一座飞驰在地面上的骇人炮台。"
 QIE_wushan_stability_first_and_most_important_desc: "设计需要冗余，我们的装甲必须能够胜任各种意外情况。通过提高其可靠性，它将能应对更灵活的作战地形，并维持更长的寿命。"
 QIE_wushan_squander_money_focus_on_fire_desc: "设计中最重要的就是火力，我们的装甲必须能做到一击制敌，通过优化其炮弹及炮管设计，我们将能确保高效率杀伤敌人，从而减少战场损耗。"
 QIE_the_project_of_white_horse_desc: "兵工署得到了一笔新经费拨款，这意味着我们能够继续加强原先计划的发展方向。"
 QIE_wushan_715_armor_design_arsenal_desc: "兵工署得到了一笔新经费拨款，这意味着我们能够继续加强原先计划的发展方向。"
 QIE_wushan_further_optimize_design_direction_desc: "兵工署得到了一笔新经费拨款，这意味着我们能够继续加强原先计划的发展方向。"
 QIE_wushan_the_great_beast_industry_desc: "经过一系列的发展，如今我们已经拥有了一个强大的装甲研究军工组织。而在军事技术的发展上，任何已取得的突破都能反哺其它军事技术的发展。就算是我们的敌人也不得不承认，一头他们所最畏惧的工业巨兽正在东方苏醒。"
 QIE_after_wushan_control_whole_china_yangzhou_building_desc: "禹画九州，周分六服，断长补短，止方七千，国赋之所均，王教之所备，此谓华夏者也。所谓扬州者，北据淮，南距海。厥土下湿而多生杨柳，以为名。"
 QIE_after_wushan_control_whole_china_jinzhou_building_desc: "禹画九州，周分六服，断长补短，止方七千，国赋之所均，王教之所备，此谓华夏者也。南方为荆州，楚也，其山蜿蜒高耸，故为荆。"
 QIE_after_wushan_control_whole_china_jiangzhou_building_desc: "禹画九州，周分六服，断长补短，止方七千，国赋之所均，王教之所备，此谓华夏者也。华阳之壤，梁岷之域，是其一囿；囿中之国，则梁州矣。"
 QIE_after_wushan_control_whole_china_yizhou_building_desc: "禹画九州，周分六服，断长补短，止方七千，国赋之所均，王教之所备，此谓华夏者也。仰禀参伐，俯壤华阳，黑水、江、汉为梁州。"
 QIE_after_wushan_control_whole_china_jizhou_building_desc: "禹画九州，周分六服，断长补短，止方七千，国赋之所均，王教之所备，此谓华夏者也。两河之间为冀州，晋也。"
 QIE_after_wushan_control_whole_china_yuzhou_building_desc: "禹画九州，周分六服，断长补短，止方七千，国赋之所均，王教之所备，此谓华夏者也。河、汉之间为豫州，天下之中者，周也。"
 QIE_after_wushan_control_whole_china_yanzhou_building_desc: "禹画九州，周分六服，断长补短，止方七千，国赋之所均，王教之所备，此谓华夏者也。河、济之间为兖州，卫也。"
 QIE_after_wushan_control_whole_china_qingzhou_building_desc: "禹画九州，周分六服，断长补短，止方七千，国赋之所均，王教之所备，此谓华夏者也。东方为青州，齐也。"
 QIE_after_wushan_control_whole_china_xuzhou_building_desc: "禹画九州，周分六服，断长补短，止方七千，国赋之所均，王教之所备，此谓华夏者也。徐，舒也，海岱及淮惟徐州。"
 QIE_the_first_choice_movement_base: "移动要塞"
 QIE_wushan_the_first_choice_battleship: "注重战列舰"
 QIE_wushan_the_first_choice_cruiser: "注重巡洋舰"
 QIE_wushan_the_first_choice_submarines: "注重潜艇"
 QIE_wushan_the_first_choice_destroyer: "注重驱逐舰"
 QIE_the_first_choice_movement_base_desc: "在如今的世界海军局势之下，如果真的要建设一支强大的海军，唯一的选择就是航空母舰。那些真正能左右海战胜负的海军航空兵将从空母上起飞，为他们的敌人带去硝烟和死亡，这将使我们的造船工业更加青睐于专精制造航空母舰。"
 QIE_wushan_the_first_choice_battleship_desc: "虽然航空母舰已经证明了它在现代战争中的力量，但我们依然不能忽视战列舰这一海上霸主的存在。作为大洋之上最坚固，最凶猛的舰船，对其进行投资研究是绝对不会出错的，这将使我们的造船工业更加青睐于专精制造战列舰。"
 QIE_wushan_the_first_choice_cruiser_desc: "不论何时何种情况，投资轻中型巡洋舰都不会是一个错误的选择。如果缺少这些屏卫船只，我们就无法维持自己在海战中的优势地位，这将使我们的造船工业更加青睐于专精制造潜艇。"
 QIE_wushan_the_first_choice_submarines_desc: "这些造价便宜但拥有致命力量的潜艇是保护我们的最佳选择，对于攻击交战方的商船和货轮，甚至是向我们的陆军运送补给上潜艇都能发挥作用，这将使我们的造船工业更加青睐于专精制造潜艇。"
 QIE_wushan_the_first_choice_destroyer_desc: "开发驱逐舰能确保我们的海域安全，并让我们拥有骚扰敌人的能力，这将使我们的造船工业更加青睐于专精制造驱逐舰。"
 QIE_ws_tang_erhe_fake_3: "共和国的好人政府"
 QIE_ws_tang_erhe_fake_3_desc: "在[QIE.GetLeader]的妥善治理之下，中国焕发出崭新的面貌，我们能够感谢的不是那些神仙，也不是过去在我们头上作威作福的皇帝。我们要感谢的唯有现任政府的得力统治，以及我们辛勤劳动的双手。"
 QIE_ws_tang_erhe_fake_1: "恢复全国考试制度"
 QIE_ws_tang_erhe_fake_1_desc: "在战乱时期，尽管我们的一些大学院校仍然在坚持授课。但我们不得不承认，我国通过考试选拔人才的机制在过去十几年彻底瘫痪了，如今我们已经统一全国，是时候召开第一次全国范围的选拔性考试了。"
 QIE_ws_tang_erhe_fake_1.tt: "获得§Y重新开始选拔人才§!，其效果为：\n研究速度: §G+10%§!\n每月研究速度: §G+0.2%§!"
 QIE_ws_tang_erhe_fake_7: "解放思想"
 QIE_ws_tang_erhe_fake_7_desc: "中国的历史与皇帝密不可分，这数千年来的封建思想植根于中国人民的精神之中。尽管近代以来，许多知识分子为唤醒国人振臂高呼，但封建落后的堤坝又怎是我们的涓涓细流能够瞬间拆毁的？我们将继续宣扬自由平等的思想，水滴石穿，假以时日，我们一定能够移走人们心中封建的大山。"
 QIE_ws_tang_erhe_fake_7.tt: "获得为期§Y1800日§!的§Y水滴石穿§!，其效果为：\n每日社会民主主义支持率 §G+0.06§!\n每日社会自由主义支持率 §G+0.06§!\n每周稳定度: §G+0.15%§!"
 QIE_ws_tang_erhe_fake_2: "开展战后重建"
 QIE_ws_tang_erhe_fake_2_desc: "长期以来的中华混战将我们国家的工业体系几乎摧毁了，尽管在之前我们发展了一些工业，但那是为了备战而准备的极为畸形的工业体系。现在我们不再需要枪支和炮弹，需要的是面包和鲜花。我们将重建我们的轻工业体系，为人民带来和平美好的生活。"
 QIE_ws_tang_erhe_fake_8: "鼓励民族实业发展"
 QIE_ws_tang_erhe_fake_8_desc: "我们薄弱的轻工业体系长期以来都相当依赖外国。如果我们想真正强大起来，就必须发展出独立的轻工业体系。为此我们将补贴民族实业家，帮助他们发展。"
 QIE_ws_tang_erhe_fake_8.tt: "移除我们所有与军备扩张相关的民族精神\n\n获得§Y开始重建§!，效果为：\n建造速度: §G+15%§!\n生活消费品系数: §Y+10%§!"
 QIE_ws_tang_erhe_fake_4: "兑付战争债券"
 QIE_ws_tang_erhe_fake_4_desc: "我们的金融机构在统一战争前为了募集资金曾以债券的形式向人们募集金钱，现在是时候兑付这些承诺了。除此之外，我们还要仔细考虑一下对于那些战前由其它政府提供的金融产品，对我们来说要如何处理。这可能会关系到人们对我们的支持……"
 QIE_ws_tang_erhe_fake_5: "决定外交原则"
 QIE_ws_tang_erhe_fake_5_desc: "既然中国已经统一，而我们已把国内事务处理得井井有条，现在我们该把视线转向国外了——我们必须决定我们在世界舞台上的姿态，以及我们如何对待那些曾与我们有旧怨的国家。"
 QIE_ws_tang_erhe_fake_5.tt: "触发事件“§Y我们在国际上的位置§!”。"
 QIE_ws_tang_erhe_fake_6: "举起东方自由的火炬"
 QIE_ws_tang_erhe_fake_6_desc: "我们做到了，在我们来之前，这里是一片战乱频发，军阀割据的土地。当我们完成这一切之后，这里是一个统一，强大，充满民主自由的共和国。我们将在东亚地区举起象征自由的火炬，并从反动势力和军国主义的威胁中保护更多亚洲国家。"
 QIE_ws_tang_erhe_fake_6.tt: "§Y新北洋政府§!将被称为§Y中华民国§!\n将国策树变更为§Y中华民国国策树§!\n\n§C我们将寻求组建一个联盟，以维护东亚地区的长久和平与稳定。§!"
