 QIE_wushan_seize_liangguang_financial_reserves_desc: "既然两广已完全落入我们的控制，我们终于可以将他们政府中的一切都尽情搬走。仓皇逃窜的统治者或许能带走银票，但他们可搬不走存在银行里的大量黄金和其它贵金属。这些战利品一部分将用于犒劳军队，一部分将用于国内建设，还有一部分将作为“另款”储存起来，为我们未来建立军事工业组织服务。"
 QIE_wushan_seize_huadong_financial_reserves: "夺取华东伪政府资金储备"
 QIE_wushan_seize_huadong_financial_reserves_desc: "既然华东已完全落入我们的控制，我们终于可以将他们政府中的一切都尽情搬走。仓皇逃窜的统治者或许能带走银票，但他们可搬不走存在银行里的大量黄金和其它贵金属。这些战利品一部分将用于犒劳军队，一部分将用于国内建设，还有一部分将作为“另款”储存起来，为我们未来建立军事工业组织服务。"
 QIE_wushan_seize_xibei_financial_reserves: "夺取西北伪政府资金储备"
 QIE_wushan_seize_xibei_financial_reserves_desc: "既然西北三马已完全落入我们的控制，我们终于可以将他们政府中的一切都尽情搬走。仓皇逃窜的统治者或许能带走银票，但他们可搬不走存在银行里的大量黄金和其它贵金属。这些战利品一部分将用于犒劳军队，一部分将用于国内建设，还有一部分将作为“另款”储存起来，为我们未来建立军事工业组织服务。"
 QIE_wushan_seize_xinjiang_financial_reserves: "夺取新疆伪政府资金储备"
 QIE_wushan_seize_xinjiang_financial_reserves_desc: "既然新疆已完全落入我们的控制，我们终于可以将他们政府中的一切都尽情搬走。仓皇逃窜的统治者或许能带走银票，但他们可搬不走存在银行里的大量黄金和其它贵金属。这些战利品一部分将用于犒劳军队，一部分将用于国内建设，还有一部分将作为“另款”储存起来，为我们未来建立军事工业组织服务。"
 QIE_wushan_submitting_to_the_king_category: "率宾归王"
 QIE_wushan_submitting_to_the_king_category_desc: "“坐朝问道，垂拱平章。爱育黎首，臣伏戎羌。遐迩一体，率宾归王。”\n\n这由知名学者周兴嗣所作的千字文，在过去数千年中在中华大地上被无数人传唱，道出了中华人民对天下一体，万民同心的美好向往。但试看今日神州之河山，四方分裂，礼崩乐坏，群雄割据。各地伪政权实行着他们的“霸道”。\n\n四海的百姓都陷入到痛苦和绝望之中，无不希羡着华北平原礼法有序，歌舞升平的现状；无不仰慕着北京政府鸣凤在竹，白驹食场的仁政。是时候了，作为中华大地唯一的“王道”，我们将讨伐这些僭主，将人民从他们手中解放出来。"
 QIE_wushan_punish_jinyang: "伐晋阳之罪"
 QIE_wushan_punish_jinyang_desc: "长期以来山西政府都号称自己是中华大地上唯一合法的政府，但如今以[SHX.GetLeader]为首的土匪山贼虐待百姓，横征暴敛，酒池肉林的商纣旧事已被一个从山西逃荒而来的难民所揭露。我们无法容忍这样的行为，我们将彻底消灭盘踞在山西的非法政权！"
 QIE_wushan_punish_sichuan: "伐巴蜀之罪"
 QIE_wushan_punish_sichuan_desc: "长期以来四川政府都号称自己是中华大地上唯一合法的政府，但如今以[SZC.GetLeader]为首的土匪山贼虐待百姓，横征暴敛，酒池肉林的商纣旧事已被一个从四川逃荒而来的难民所揭露。我们无法容忍这样的行为，我们将彻底消灭盘踞在四川的非法政权！"
 QIE_wushan_punish_wanxi: "伐淮南之罪"
 QIE_wushan_punish_wanxi_desc: "长期以来皖系政府都号称自己是中华大地上唯一合法的政府，但如今以[ANQ.GetLeader]为首的土匪山贼虐待百姓，横征暴敛，酒池肉林的商纣旧事已被一个从安徽逃荒而来的难民所揭露。我们无法容忍这样的行为，我们将彻底消灭盘踞在安徽的非法政权！"
 QIE_wushan_punish_bashenglianhe: "伐八省联合之罪"
 QIE_wushan_punish_bashenglianhe_desc: "长期以来八省联合政府都号称自己是中华大地上唯一合法的政府，但如今以[LEP.GetLeader]为首的土匪山贼虐待百姓，横征暴敛，酒池肉林的商纣旧事已被一个从南京逃荒而来的难民所揭露。我们无法容忍这样的行为，我们将彻底消灭盘踞在南京的非法政权！"
 QIE_wushan_punish_liangguang: "伐岭南之罪"
 QIE_wushan_punish_liangguang_desc: "长期以来广州政府都号称自己是中华大地上唯一合法的政府，但如今以[GXC.GetLeader]为首的土匪山贼虐待百姓，横征暴敛，酒池肉林的商纣旧事已被一个从两广逃荒而来的难民所揭露。我们无法容忍这样的行为，我们将彻底消灭盘踞在两广的非法政权！"
 QIE_wushan_punish_hunan: "伐荆楚之罪"
 QIE_wushan_punish_hunan_desc: "长期以来湖南政府都号称自己是中华大地上唯一合法的政府，但如今以[HNN.GetLeader]为首的土匪山贼虐待百姓，横征暴敛，酒池肉林的商纣旧事已被一个从湖南逃荒而来的难民所揭露。我们无法容忍这样的行为，我们将彻底消灭盘踞在湖南的非法政权！"
 QIE_wushan_punish_yunnan: "伐南中之罪"
 QIE_wushan_punish_yunnan_desc: "长期以来云南政府都号称自己是中华大地上唯一合法的政府，但如今以[YUN.GetLeader]为首的土匪山贼虐待百姓，横征暴敛，酒池肉林的商纣旧事已被一个从云南逃荒而来的难民所揭露。我们无法容忍这样的行为，我们将彻底消灭盘踞在云南的非法政权！"
 QIE_wushan_punish_fengtian: "伐黑水之罪"
 QIE_wushan_punish_fengtian_desc: "长期以来奉天政府都号称自己是北洋政府最后的堡垒，但如今以[FNG.GetLeader]为首的卖国政府与日本人之间的肮脏交易已被披露，他试图将东北地区拱手赠予日本人。我们无法容忍这样的行为，我们将彻底消灭盘踞在关外的伪政府，汉奸，外国人的走狗！"
 QIE_wushan_punish_lkmt: "伐吴越之罪"
 QIE_wushan_punish_lkmt_desc: "随着一声刺耳的号角声，昔日席卷南方向北侵略的红色瘟疫又一次扑向了中华大地，以[CHI.GetLeader]为首的孙文党徒想要把中国再一次置于鲜血与痛苦的境地之中。他们如同蝗虫，所到之处美好的中华文化皆被他们啃食。农民们啊，拿起武器，点燃火堆，挖深壕沟，让我们彻底终结这随着末世将至而作威作福的红色蝗灾！"
 QIE_wushan_dual_leadership_bop: "§Y真人居中升座，生者分侍两厢§!"
 QIE_wushan_bop_jiang_side: "江朝宗主导"
 QIE_wushan_bop_wu_side: "吴佩孚主导"
 QIE_wushan_bop_support_jiang: "善款包装"
 QIE_wushan_bop_support_jiang_desc: "我们可以尝试将我们的政治献金包装为慈善捐款，将其委托给对方的运作的地方赈灾组织“代为处理”。"
 QIE_wushan_bop_support_wu: "以兵代赈"
 QIE_wushan_bop_support_wu_desc: "通过将无所事事的流民编入民兵队，一方面能够缓解流民的就业问题，另一方面又能够借助他们处理治安问题。"
 QIE_wushan_bop_jiang_power_hijacked: "慧济居士劫持鸾务院"
 QIE_wushan_bop_jiang_total_control: "慧济居士掌控鸾务院"
 QIE_wushan_bop_jiang_pressure: "江朝宗施压鸾务院"
 QIE_wushan_bop_balanced_court: "鸾务院维持平衡"
 QIE_wushan_bop_wu_pressure: "吴佩孚施压鸾务院"
 QIE_wushan_bop_wu_total_control: "智玄居士掌控鸾务院"
 QIE_wushan_bop_wu_supreme_power: "智玄居士劫持鸾务院"
 QIE_wushan_bop_celebrity_liaison_fee: "批准名流联谊劳务费"
 QIE_wushan_bop_celebrity_liaison_fee_desc: "以筹款为名义邀请社会名流参加慈善晚宴是个非常正当的理由，鸾务院没有恰当的理由拒绝我们的拨款要求。我们可以从这里着手，输送一些利益。"
 QIE_wushan_bop_extra_funding_army_bureau: "军事发展临时开支"
 QIE_wushan_bop_extra_funding_army_bureau_desc: "我们必须快速行动，建成一只能够应对即将到来的困难的现代军队。为此向鸾务院要求更多拨款是合理的。"
 QIE_wushan_bop_subsidize_industrialists: "补贴实业家"
 QIE_wushan_bop_subsidize_industrialists_desc: "企业主和实业家是我们政府不可或缺的一部分，如果没办法喂饱他们，就会有千千万万的工人和平民挨饿。我们应该对他们的生产进行补贴。"
 QIE_wushan_bop_strengthen_military_training: "加强军事训练"
 QIE_wushan_bop_strengthen_military_training_desc: "我们的看家领域正是兵法，即便拥有了能够主宰中华大地的长枪短炮，如果没有合理的军事方法和严格的纪律，我们的部队依然会被一支鞭炮冲散。"
 QIE_wushan_bop_introduce_elites_to_salvationism: "介绍名流加入救世新教"
 QIE_wushan_bop_introduce_elites_to_salvationism_desc: "一位来自使馆城市的社会名流对我们的组织非常感兴趣，如果我们能为他举办入会仪式接受他入会，他或许能为我们带来意想不到的利益。"
 QIE_wushan_bop_expand_salvationism_in_officer_corps: "在军官团中发展新教"
 QIE_wushan_bop_expand_salvationism_in_officer_corps_desc: "想想辛亥革命是如何发生的，正是因为各地新军任用有着革命思想的军官和归国青年，才导致他们被渗透成了筛子。而由袁世凯率领的北洋六镇因为在精神上都接受了同一套教育，才能免于这些邪恶的革命思想的毒害。如果我们能在军官团中进一步宣讲救世新教的道德和爱国教义，我们就能最大限度确保士兵们的枪握在军官手中，而军官的思想握在我们的手中。"

 # 民族精神
 QIE_conspiracy_of_wushan: "救世新教的帮助？"
 QIE_conspiracy_of_wushan_desc: "这是掌教吴佩孚缺席救世新教新年会议的第九年。作为由政商界精英组成的慈善组织兼兄弟会团体，救世新教在协助挫败国民党造反之后成为了北京首屈一指的慈善机构。目前，掌教事务由当年主持丁巳复辟的江朝宗代为处理。§R但愿他们只是慈善组织。§!"
 QIE_help_of_wushan: "救世新教的帮助"
 QIE_help_of_wushan_desc: "于1919年在河南广善坛成立的救世新教颇受北洋政府人士赏识，如今它已发展成北京最大的慈善组织。值此动荡时刻，救世新教得到了政府的资金支援，正在全力救助从动荡的八省联合地区逃难而来的流民。这需要一些时间。它证明了自己依然是北京最受政商界人士青睐的慈善组织。"
 QIE_hate_of_wushan: "逐渐扩大的八省流民危机"
 QIE_hate_of_wushan_desc: "随着一批又一批北上逃离兵难的流民进入信阳和武汉地区，北京政府对八省流民危机置若罔闻的选择正在逐渐付出代价。§R京畿的夜也静得可怕……§!"
 QIE_wushan_rapid_infiltration: "快速渗透"
 QIE_wushan_rapid_infiltration_desc: "我们将利用单兵的灵活性与隐蔽性对敌人的阵线进行快速渗透，从而在不知不觉中瓦解敌人的战线。"
 QIE_wushan_let_the_artillery_speak: "让大炮发言"
 QIE_wushan_let_the_artillery_speak_desc: "火力，火力，还是火力。在密集的弹幕射击和成建制的集中攻击之下，我们面对的任何敌人都无法幸免于难。"
 QIE_work_for_rice: "劳动决定存在价值"
 QIE_work_for_rice_desc: "我们已通知这些在我们这里白吃白喝的懒蛋，大善人的时代结束了。如果他们以后要还想喝上稀粥，就要证明他们能够有喝稀粥的价值。"
 QIE_work_for_247_rice: "连续生产"
 QIE_work_for_247_rice_desc: "通过将这些难民分成两部分，我们就可以确保工厂中24小时都有人工作。对于那些工厂主来说，这意味着产量的提高和资本的增殖。"
 QIE_wushan_charity_relief: "慈善金融学"
 QIE_wushan_charity_relief_desc: "重新开始运作的北京慈善救济银行协助我们从社会募集的第一笔救助款已经到账，这舒缓了我们的救济压力。不过我们也没必要将所有善款都拿出来进行赈济，或许拿去投资，钱生钱也是个不错的选择……"
 QIE_wushan_theocratic_authority_1: "新教权力：非法疑云"
 QIE_wushan_theocratic_authority_1_desc: "尽管江朝宗被部分认为混乱应该及时制止的满清勋贵和保守知识分子盛赞为“三定京师，躬身为民”。但救世新教当前的号召力显然全然仰赖玉帅和他的直系旧部而非这位北洋老人。此外，我们的神秘学活动也不可避免地招致了非议。如果我们想成功控制住华北平原地区，就必须想办法展示我们将为中国政局带来稳定的决心——至少在外表上和上届直系政府不一样。"
 QIE_wushan_theocratic_authority_2: "新教权力：渐入民心"
 QIE_wushan_theocratic_authority_2_desc: "得益于我们颁布的政策，与前国会中的广泛政党之间的和睦合作，以及在八省联合崩溃之后开展的一系列改善民生的工作。我们的政权已经在大部分人心中被承认。然而，我们的扶鸾活动还是引发了部分顽固知识分子和更传统人士的抨击。"
 QIE_wushan_theocratic_authority_3: "新教权力：尽在掌握"
 QIE_wushan_theocratic_authority_3_desc: "如今农村缙绅将我们视为中国传统文化的恢复者；满清勋贵们相信我们将在平定天下之后将政权奉还给它真正的主人；那些躁动的青年更是将我们视为赶走洋鬼子的爱国政府。梁惠王曾问于博学的孟子如何才能令社会安定，孟子告诉他天下一旦统一，民心必然所向，社会必然安定。在今天举国上下都将朝着中国统一的这个目标，支持我们的行动。"
 QIE_wang_jinghui_academy: "镜慧公学"
 QIE_wang_jinghui_academy_desc: "汪镜慧于南京救世新教分会所计划成立的公学如今成为了现实，我们做到了，我们建立了一所面向贫民，对其进行专业教育的学校。这所公学将为我们提供许多我们所急需的人才，而他们也会因我们所提供的教育而对我们报以深深的感谢之情。"
 QIE_inner_sage: "内圣"
 QIE_inner_sage_desc: "§C天降彝伦，立我烝民。纲常所在，即社稷所系。凡冠带之伦、诗书之泽，皆当执礼以守，抱义以死。圣人之道，非徒修身，实为甲胄。内则正心以齐众，外则据德以退敌。一民一土，皆受命于天。毫厘之失，礼崩乐坏；内圣不摇，外侮奚入。§!"
 QIE_outer_king: "外王"
 QIE_outer_king_desc: "§C天下非一人之天下，然道德者天下之共器也。五教未行之处，即禽兽游走之地；圣化未沾之民，皆倒悬待救之魂。今以仁义为旌旗，以乩谕为斧钺，驱长车而出玉门，扬德音而渡重洋。非嗜杀也，实不忍彼苍生久沦苦海。王者之师，有征无战；大同之世，孰敢不来。§!"
 QIE_wushan_madan_spirit: "报君黄金台上意"
 QIE_wushan_madan_spirit_desc: "我们向人们承诺将会保护他们，我们给他们武器，给他们训练，给他们吃和穿，而他们则在敌人想要夺走这些的时候勇敢地站出来，阻止敌人这样做。再没有比他们更加爱国的人了。"
 QIE_wushan_human_tide_spirit: "合纵"
 QIE_wushan_human_tide_spirit_desc: "千里之堤，溃于蚁穴。只要我们的士兵联合起来，即便是再强大的敌人也会疲累，而这就使得他的弱点暴露了出来。"
 QIE_wushan_elite_soldiers_spirit: "连横"
 QIE_wushan_elite_soldiers_spirit_desc: "兵不在多，而在于精。一支卓越的精英部队才是我们最需要的军事力量，我们不会白白浪费我们的军事产能去进行武装，每一颗子弹都能最高效率地杀伤更多的敌人。"
 QIE_wushan_continuation_of_xiaozhan_spirit: "小站精神的延续"
 QIE_wushan_continuation_of_xiaozhan_spirit_desc: "尽管现在天津小站暂时落入他人之手，但他们能夺去土地，却无法夺去小站精神！我们将在我们的军队中实践它，从而建成一支真正忠诚的强大军队。"
 QIE_wushan_unexpected_budget: "意料之外的预算"
 QIE_wushan_unexpected_budget_desc: "我们预算有限，101号特别实验部门一方面正在优化飞行器的生产流程，另一方面在蒙古地区开展新飞行器的相关试飞工作。要是在一段时间内他们没法取得成果，我们就不得不中止对他们的资助。"
 QIE_wushan_sunrise: "日出"
 QIE_wushan_sunrise_desc: "黑夜将尽，朝阳已升。我们的祖国终于从这长眠不醒的噩梦中苏醒了，面对着崭新的未来，人们将争先恐后地去建设它。"
 QIE_wushan_luoyang_arsenal_zhili_research: "洛阳研究所：传统武器开发"
 QIE_wushan_luoyang_arsenal_tank_research: "洛阳研究所：机械化开发"
 QIE_wushan_luoyang_arsenal_infantry_cost: "洛阳研究所：注重步兵武器"
 QIE_wushan_luoyang_arsenal_artillery_cost: "洛阳研究所：注重火炮"
 QIE_wushan_luoyang_arsenal_armor_cost: "洛阳研究所：注重装甲兵器"
 QIE_wushan_luoyang_arsenal_motorized_cost: "洛阳研究所：注重机动载具"
 QIE_jingchun_army_bureau: "起步的军机处"
 QIE_jingchun_army_bureau_desc: "总而言之，我们用尽各种手段总算是把这些士兵放在一起统一管理了，接下来要做的就是利用参谋部和现代战法将他们从各行其是的军队改造成能统一服从调配的军队。是谁想到让克劳塞维茨在乩坛上降神谕的……"
 QIE_jingchun_army_bureau_upgraded: "景纯真人军机处"
 QIE_jingchun_army_bureau_upgraded_desc: "与世界领先国家的军事系统相比，我们只是暂时落入下风，还尚未到无药可救的地步。况且在西方世界可用的经验，在这片中华大地上则不一定可用。假以时日，我们必定能够向所有人证明，我们所拥有的才是中国真正的王者之师，是天命所归的真正统治者。"
 QIE_jingchun_army_bureau_tank_upgraded: "景纯真人军机处"
 QIE_jingchun_army_bureau_tank_upgraded_desc: "与世界领先国家的军事系统相比，我们只是暂时落入下风，还尚未到无药可救的地步。况且在西方世界可用的经验，在这片中华大地上则不一定可用。假以时日，我们必定能够向所有人证明，我们所拥有的才是中国真正的王者之师，是天命所归的真正统治者。"
 QIE_jingchun_army_bureau_tank_upgraded_2: "救世景纯真人军机处"
 QIE_jingchun_army_bureau_tank_upgraded_2_desc: "长期以来，中国大多数军队都毫无纪律，行事散漫，他们比起军人更像是官方土匪。随着军机处系统的彻底推行，我们终于得以一扫过去之不良风气，真正了建成一支现代化的军队和与之对应的指挥系统。如今，这支强大的军事力量正枕戈待旦，静待着命令去将敌人彻底碾碎。"
 QIE_jingchun_army_bureau_upgraded_2: "救世景纯真人军机处"
 QIE_jingchun_army_bureau_upgraded_2_desc: "长期以来，中国大多数军队都毫无纪律，行事散漫，他们比起军人更像是官方土匪。随着军机处系统的彻底推行，我们终于得以一扫过去之不良风气，真正了建成一支现代化的军队和与之对应的指挥系统。如今，这支强大的军事力量正枕戈待旦，静待着命令去将敌人彻底碾碎。"
 QIE_wushan_debt_repayment: "债务偿还"
 QIE_wushan_debt_repayment_desc: "我们已经开始着手解决我们的负债问题，和德国人之间达成的新协议免除了我们的一部分利息，代价是我们现在开始将以年为周期开始偿还债务。尽管李思浩故技重施，为我们设计了一套类似于当年为袁世凯设计的“盐务另款”，减少了我们的财政负担。但如今需要偿还的债务对当前政府来说依然十分沉重，但好在我们已经能够看到彻底摆脱债务的那一天了。"
 QIE_wushan_poor_relief_society: "贫民赈济会"
 QIE_wushan_poor_relief_society_desc: "1920年8月，直皖战争爆发，救世新教于京畿一带设立了贫民赈济会，负责联络社会士商，官绅名望开展慈善救济活动，战后该组织便自行解散。如今我们已重启贫民赈济会，但我们资源有限，而灾民数量庞大，如果单纯只是进行慈善救济，恐怕总有一天会引发崩溃。"
 QIE_wushan_rebuild_labor_cooperative_institute: "重建劳工合作院"
 QIE_wushan_rebuild_labor_cooperative_institute_desc: "想要解决工团主义的问题，最好的方法就是模仿工团的方式建立受到政府控制的工人合作院，并且相关成员任命权力，合作院会议内容都掌握在我们手中。"
 QIE_wushan_unite_against_external_enemies: "天下之本在国"
 QIE_wushan_unite_against_external_enemies_desc: "战争已经到来！任何人都必须服从命令，以国家指派给他的最合适的方式来捍卫国家的利益。正所谓保天下者，匹夫之贱，与有责焉耳矣。"
 QIE_wushan_fiscal_reorganization: "财政系重组中"
 QIE_wushan_fiscal_reorganization_desc: "在王克敏的领导下，政府最终决定撕毁所欠下的国际债务，这无疑导致我国的国际金融信誉一落千丈，也彻底断绝了我们和海外进行正常贸易的可能性。王克敏正在主持对财政系的重组工作，其目的是减轻这段时间我们因失去外部援助所导致的经济发展问题。"
 QIE_wushan_relief_finance_bureau: "自给自足的金融状态"
 QIE_wushan_relief_finance_bureau_desc: "经过半年时间，财政系彻底优化了先前的金融关系和对外发展策略。得益于我们庞大的人口，如今我们已经建立起了一种对外部环境依赖极少的，自给自足式的经济发展模式。"
 QIE_tangdi_zhihua: "常棣之华"
 QIE_tangdi_zhihua_desc: "常棣之华，鄂不韡韡。凡今之人，莫如兄弟。\n死丧之威，兄弟孔怀。原隰裒矣，兄弟求矣。\n脊令在原，兄弟急难。每有良朋，况也永叹。\n兄弟阋墙，外御其务。每有良朋，烝也无戎。"
 QIE_wushan_artillery_units_focus: "弹幕规划"
 QIE_wushan_artillery_units_focus_desc: "通过将炮兵分配给特定的单位，我们可以为突破行动预先规划弹幕，这将加强我们的炮兵火力，使其攻击更加猛烈。"
 QIE_wushan_special_units_focus: "渗透阵地"
 QIE_wushan_special_units_focus_desc: "我们将采用零距离接敌的策略，在夜间渗透入敌人的阵地并发起攻击。"
 QIE_wushan_belligerent_government: "好战的政府"
 QIE_wushan_belligerent_government_desc: "时机已至，如今我们终于不再需要伪装成一个推行全球化睦邻政策，一个卖国求荣的买办政府了。我们先前通过国际贸易和外交关系获得的所有资源，如今都将成倍地用于开动我们的战争机械……"
 QIE_wushan_precious_tradition: "珍贵的传统"
 QIE_wushan_precious_tradition_desc: "圣人之言，价值千金。如今国家分裂，天下混乱，正是因为人们忘记了礼仪道德，转而崇拜起所谓共和解放。为此我们要将孔孟传统重新植入到人心之中，《春秋左传》的大经大法将能拯救当下的一切弊端。"
 QIE_wushan_scriptural_police: "经教督察"
 QIE_wushan_scriptural_police_desc: "经教督察们不仅将在军队之中，也将在社会上巡逻。他们将在公共场合监督我们所倡导的道德规范是否被恰当执行。他们与司法机关无关，所能做的事情只是对不符合社会道德的地方进行指导和上报，因此不受到对司法机关人员的约束，自然也无需承担相关义务。"
 QIE_wushan_huayi_distinction: "华夷之辨"
 QIE_wushan_huayi_distinction_desc: "四夷之民长有重译而至，慕中华之仁义忠信，虽身出异域，能驰心于华，吾不谓之夷矣。四夷内向，乐我仁义忠信，愿为人伦齿者，岂不为四夷之华乎？记吾言者，夷其名尚不为夷矣。"
 QIE_wushan_restore_ethical_order: "恢复伦理纲常"
 QIE_wushan_restore_ethical_order_desc: "儒家伦理是中华文明与国家建设的基石，在过去十几年中我们接受了西方思想，忽视了自己祖先传下来的珍贵宝物。现在是时候重新在社会中宣扬我们的优秀文化了。"
 QIE_wushan_enforce_salvationist_legal_code: "推行《春秋律令》"
 QIE_wushan_enforce_salvationist_legal_code_desc: "早在共和革命之前，我国就有诸如《大清刑律》和《大清民律》之类的司法与宪法原则。只是由于之前共和国人士卑鄙无耻的窃国行为，这些基于我国国情制定的法律并未能实际投入实践。我们将在社会上推行继承了它们的新法律《春秋律令》。该法律不仅象征着我国社会回归传统，更象征着中华法系在如今这个时代的延续。"
 QIE_wushan_salvationist_legal_code: "《春秋律令》"
 QIE_wushan_salvationist_legal_code_desc: "早在共和革命之前，我国就有诸如《大清刑律》和《大清民律》之类的司法与宪法原则。只是由于之前共和国人士卑鄙无耻的窃国行为，这些基于我国国情制定的法律并未能实际投入实践。我们将在社会上推行继承了它们的新法律《春秋律令》。在经过了一段时间的过渡期之后，在我们统治的地区都已开始正式实行《春秋律令》。该法律不仅象征着我国社会回归传统，更象征着中华法系在如今这个时代的延续。"
 QIE_wushan_rebuild_enyin_temporary: "重建特奏恩荫制度"
 QIE_wushan_rebuild_enyin_temporary_desc: "我国自古以来就存在着荫袭制度，这一制度能够确保上层社会被牢牢把握在一部分人手中，从而组成更紧密的利益共同体，我们应该重建此制度来强化统治。但我们同时也没忘记开放一些上升通道给各式各样的人，如此一来我们便能确保整个政治共同体内所有人的利益。"
 QIE_wushan_revived_enyin_system: "恩荫制度"
 QIE_wushan_revived_enyin_system_desc: "我国自古以来的荫袭制度已被重建，如此一来我们得以将上层社会牢牢把握在自己手中。但我们同时也没忘记开放一些上升通道给各式各样的人，如此一来我们便能确保整个政治共同体内所有人的利益。"
 QIE_wushan_temporary_friendly_ties: "我们与世界暂时的友善关系"
 QIE_wushan_temporary_friendly_ties_desc: "我们的新生政权现在如此弱小，过去的政府给我们留下的是一个如同废墟一般的国家。为了改善现状，我们最好的选择就是在外交层面上对强权们示以友好。列强们看上了我们土地之下的矿产和我们充沛的人力资源，而我们或许可以利用这些换取到对我们有利的东西……\n\n§R一旦开战，救世新教将撕去这幅伪装。§!"
 QIE_wushan_siyi_translation_institute: "译学馆"
 QIE_wushan_siyi_translation_institute_desc: "译学馆始于1903年，这个短命的组织曾经是中国获取外界知识的少数门户之一。我们已重启译学馆翻译海外重要著作以供我们使用。§R除了常见的经济学和军事书籍之外，或许我们还可以让他们“翻译”一些根本不存在的国外书籍……§!"
 QIE_wushan_rooster_devours_vermin: "雄鸡噬虫"
 QIE_wushan_rooster_devours_vermin_desc: "战争还没有结束，尽管日本人已经离开了大陆，但他们的威胁还没有消失。中华如同雄鸡，日本就是那条虫子。我们只消低头一啄，它便稳稳地落入我们腹中，成为一顿美餐。"
 QIE_wushan_blades_sigils_and_thunderfire: "大刀，神符与五雷火枪"
 QIE_wushan_blades_sigils_and_thunderfire_desc: "借助传统武术、符箓、几只淘汰下来的火枪还有一些伪装成传统医学药物的现代药物，我们在各地村庄中都建立了乡勇民团。假使有一天我们的土地不幸暂时落入敌手，他们要面对的便是高昂的统治成本和无休止的治安战。"
 QIE_wushan_ycp_one_year_special_plan: "青年党的一年特别计划"
 QIE_wushan_ycp_one_year_special_plan_desc: "我们与青年党人合作开展一年特别计划，旨在改善我国薄弱的工业力量，使得我们不再受制于人，青年党人相信，通过发展工业，我国便能够跻身世界强国之列。"
 QIE_wushan_rural_revival_movement: "乡土复兴运动"
 QIE_wushan_rural_revival_movement_desc: "我们与帝国宪政会成员合作开展一年特别计划，旨在改善我国乡村地区与城市地区之间发展不平衡的问题，使得那些尚未得到妥善开发的乡村土地能够被充分利用起来，帝国宪政会成员相信，通过发展乡村地区，我国国民便能更加幸福，而我国实力自然也因此强壮起来。"
 QIE_wushan_subsidize_domestic_enterprises_first: "以贴补本国企业优先"
 QIE_wushan_subsidize_domestic_enterprises_first_desc: "我们与宗社党人合作开展一年特别计划，旨在提高我国民族工业的发展水平，与国际接轨。这些宗社党企业主相信，实业才能兴国，而全球化的互惠互利是实业兴国必不可少的一环。"
 QIE_wushan_chawei_commissioner: "察微都统"
 QIE_wushan_chawei_commissioner_desc: "我们培养了大量间谍收集情报，但我们却缺乏能够分析这些情报的机构。我们所设立的新情报机关将帮助我们处理收集到的这些讯息，并协助我们制定相关计划。"
 QIE_wushan_full_power_chawei_commissioner: "全权察微都统"
 QIE_wushan_full_power_chawei_commissioner_desc: "我们培养了大量间谍收集情报，但我们却缺乏能够分析这些情报的机构。我们所设立的新情报机关将帮助我们处理收集到的这些讯息，并协助我们制定相关计划。"
 QIE_wushan_special_mandate_chawei_commissioner: "特命察微都统"
 QIE_wushan_special_mandate_chawei_commissioner_desc: "我们培养了大量间谍收集情报，但我们却缺乏能够分析这些情报的机构。我们所设立的新情报机关将帮助我们处理收集到的这些讯息，并协助我们制定相关计划。"
 QIE_wushan_extraordinary_plenipotentiary_chawei_commissioner: "特命全权察微院"
 QIE_wushan_extraordinary_plenipotentiary_chawei_commissioner_desc: "随着第二次世界大战的全面爆发，如果我们想在世界大战中占得先机，我们就必须给予我们的情报部门更多权力。如此一来我们便能在大战的阴影之下先一步洞悉敌人，而我们的任何战争计划也将因此而受益。"
 QIE_dual_control_wushan_focus_tt: "§Y江朝宗§!与§Y吴佩孚§!的长期僵持导致了社内其它中立成员的不满，他们迫使二人承认§Y钱能训§!为§R救世新教§!的独一教统，这位已死之人的亡灵将通过扶乩传讯来带领华北政府走向一条未知的道路——这将取决于后续的博弈。§R但至少目前，一切都很平静。§!"
 
 # 部分早期事件
 QIE_wushan_events.1.t: "救世新教提请集资捐助"
 QIE_wushan_events.1.desc: "慈善团体救世新教向我们请求一笔不菲的补助，以赈济安置最近因八省联合动荡局势涌入河南与湖北的八省的难民，这笔资金将用于开办保育院，建立临时住所等赈灾事业。与政治官员不同，它们虽然名义上是慈善团体，但平日里与各北洋要员来往密切。其主脑江朝宗曾在第三次直奉战争时大力支持直隶派。治理灾害，保护民众是政府应尽的职责，但此前我们征收税款不顺，想要再掏出这样一笔多余资金实在困难。"
 QIE_wushan_events.1.a: "我们没钱——让他们另请高明吧。"
 QIE_wushan_events.1.b: "再苦一苦财政部"
 QIE_wushan_events.2.t: "另谋出路"
 QIE_wushan_events.2.desc: "令人深感意外的是，和谐社团以及背后操控它的直系政府拒绝向救世新教提供赈济八省联合流民的资金。自救世新教成立以来，其活动资金离不开官绅名流与社会士商的支持。特别是考虑到当前政府在人民心目中的地位，无论是那位“贿选总统”还是智玄居士都应该会借助这一机会展示自己安抚民众的决心，惠生还以为至少能得到一点来自官方的资助，以带动社会各界人士踊跃参与到救济筹款之中，稳定现在的混乱局面。\n\n总而言之，当务之急是去别的渠道看看能不能找到钱，只依靠教内成员的捐款眼下虽然能够起到安置难民的作用，但很明显无法解决不久之后到来的问题。"
 QIE_wushan_events.2.a: "或许他们不是不想拿钱，是他们拿不出钱。"
 QIE_wushan_events.3.t: "在茶馆中偶遇"
 QIE_wushan_events.3.desc: "“今日的天气倒是符合现状，虽只是细雨阵阵，但其中也藏着……”\n\n江朝宗释然一笑，在来今雨轩中端起盖碗轻啜一口。甘香与淡淡苦味一并滑入喉中。这盏茶花了他三角洋钱，倒是衬得上价格的好味道。\n\n1920年庚申年春，他因随张勋参与德国人支持的溥仪复辟，遭段祺瑞政府处置。偏在那时，他又患了眼疾——几乎以为自己下半辈子便要做个瞎眼将军。也正是在中央公园，老友汪仲高与邓宇安将一张以灵界照相术拍得的吕洞宾纯阳真人圣像赠予了他。凭着那张照片，以及随后爆发的直皖战争，作为慈善组织的救世新教才得以正式创立。细想起来，教团每一次起势似乎都总伴随着战争与动荡。\n\n但这次还会和往常一样吗？\n\n“您是雨丞公吧。”正当江朝宗沉入旧事时，一个小眼睛的男人在他面前停下脚步。\n\n“想不到竟会在这里遇到您，我还以为这里早被那班知识分子当成大本营了。现在灭虫工也来了，是要做大扫除吗？”\n\n江朝宗面带困惑地盯着对方——至少是努力表现得面带困惑。来人正是他此行的目标佟济煦，宗社党幕后理论家郑孝胥的友人，也是溥仪的侍卫长。\n\n“您是？”江朝宗缓缓放下茶盏，“老朽年迈力衰，或许从前在哪里见过，只是一时实在记不得了。”"
 QIE_wushan_events.3.a: "“我是佟济煦，我们在南苑航空学校见过一面。”"
 QIE_wushan_events.3.b: "“是我啊，张勋举事时我们在复辟会议上见过。”"
 QIE_wushan_events.4.t: "北京传来奇怪的讯息"
 QIE_wushan_events.4.desc: "从围绕在中国政坛的重重迷雾中，传来了一个令人困惑的消息。尽管细节还不甚明了，但据信在今早的紫禁城中发生的一场政变之后，一个对中国政坛陌生而又熟悉的人物——江朝宗出现了。1917年，在德国人的支持下溥仪曾进行了失败的复辟，当时担任九门提督，负责拱卫北京的正是江朝宗。陪同他出席的是吴佩孚的副手刘玉春以及宗社党成员爱新觉罗·溥侊。\n江朝宗曾参与丁巳复辟，但在最后关头却倒向了段祺瑞。他向世界媒体透露了政变的过程。“逆匪曹锟意图行刺陛下！陛下受到惊吓，现在无法出席。”如今他的慈善机构兼宗教组织，救世新教已经暂时控制住了北京的情况，计划在接下来的时间中处理八省联合崩溃以及四川饥荒带来的中国失序问题。江朝宗并没有向媒体透露为何与曹锟荣辱与共的吴佩孚势力出现在他身边。现在没人能确定未来会发生什么……"
 QIE_wushan_events.4.a: "另一个张天然？"
 QIE_wushan_events.5.t: "测试占位事件"
 QIE_wushan_events.5.desc: "你怎么会看到这个事件？这绝对出BUG了。"
 QIE_wushan_events.5.a: "尊道贵德"
 QIE_wushan_events.6.t: "焚香"
 QIE_wushan_events.6.desc: "借着直系军阀对八省联合的崩溃袖手旁观，和谐社团的秩序如沙塔般瓦解的现状，救世新教趁势接管了北京的行政系统。然而，随着教统从虚职变为实权，这“慈善组织”内部的权力天平，终于彻底失衡。\n江朝宗与吴佩孚自政变以来便分坐吕祖阁东西两侧的厢房，表面仍同赴扶乩，暗中已各施神通。为维持教众面前的和睦假面，每月的例行降鸾仍是必须到场的表演。今夜由慈智居士担任乩手，请纯阳真人吕祖下降。参与扶乩的各人都手持仙香，在此地，仙香的品质就是权力与地位的无声宣言。江朝宗手中那支，是从日本旧友处凭重金得来的伽罗金刚香，紫烟沉厚，如苍龙蟠柱；吴佩孚所持的，则是从山东曲阜孔林采制的古柏香，清瘦挺拔，似君子临风。\n\n正值此时，乩盘上的沙迹开始游走。一笔一划，殿中众人屏息，寂静如坟。吕祖降笔，赐诗四句：\n\n“东海水深不可航，西山月暗路偏长。欲知天命归何处，且看谁人焚此香。”\n\n最后一笔落下，乩盘戛然而止。满殿无人敢出声。只有香火明灭，两柱烟柱笔直上升，在梁上交缠，如同二龙相斗，难分胜负。此刻，不知是何人心思疏漏，竟忘记掩好门窗，一股夜风从阁外钻入，不疾不徐，却精准地扑向该去的地方。"
 QIE_wushan_events.6.a: "伽罗香灭，金刚不护其主"
 QIE_wushan_events.6.b: "柏香中折，圣人不度其途"
 QIE_wushan_events.6.c: "双香同烬，乩语不成真谶"
 QIE_wushan_events_6_a_tt: "§Y江朝宗§!与他的§g日本友人§!之间的密约最终未能成功。§Y吴佩孚§!将成为救世新教唯一的领袖。"
 QIE_wushan_events_6_b_tt: "§Y吴佩孚§!与§G明经学会§!的儒冠最终未能胜过渡海而来的东瀛金刚之烟。§Y江朝宗§!将成为救世新教唯一的领袖。"
 QIE_wushan_events_6_c_tt: "§R风停了。什么都没发生。§!"
 QIE_wushan_events.11.t: "丙子会议"
 QIE_wushan_events.11.desc: "就像每年庆祝春节的惯例一样，社中成员今夜也齐聚在六国饭店。慧济居士发表了他一贯务实而简短的新春致辞。与白日里国会总裁那番令人昏昏欲睡的陈词滥调相比，这番话显然更得诸人欢心。慧济先是概述了乙亥年社内慈善事业的进益与成员名录的变动，随后又提及去年扶乩所得经文的刊印与分发——之后便进入了交谊时间，那些新入社的面孔谨慎地穿行在人群之间，试图在旧人们的闲谈中为自己寻得一席之地。\n\n慧济端着酒杯缓步穿过大厅，四下张望在搜寻着某个人，他听到大多数人都在谈论八省联合近来通车的浙赣铁路，这条铁路显然对于很多人来说意味着南方市场的进一步扩张。有一位在理事会身居要职的社员透露说德国高层即将在随后几天内宣布收购这条铁路，中国民族主义者想必不会对此坐视不管；而在抗议、罢市与反租界运动真正兴起之前，预先向那些合适的人物略作“资助”或许有利可图……\n\n慧济终究还是没有看到他——尽管有零零散散的北京明经学会成员映入眼帘，然而，智玄居士本人依旧没有出席今年的会议。"
 QIE_wushan_events.11.a: "这是吴佩孚缺席的第九年……"
 QIE_wushan_events.11.b: "君子失位犹为君子，君王失位沦为匹夫。"
 QIE_wushan_events.12.t: "一顿简餐"
 QIE_wushan_events.12.desc: "江朝宗和吴景濂在前门大街的东来顺中坐下，这是属于他们这一代北洋老人的社交传统。江朝宗早知道保定王与玉帅不过是在维持一层体面的利益相通，却未曾料到在是否支援八省危机一事上，他们内部竟能争执至此。在来自南方的电报一封又一封地送入二人手中的过程中，不掷下骰子相当于最坏的选择。\n\n吴景濂夹起一片羊肉，放在铜锅的滚汤中沉浮片刻，盯着这逐渐失去血色的肉片，江朝宗意识到，北京的局势或许并不会像直系政府所期待的那样，在作壁上观中自行归于平静。相反，它正滑向最坏的方向。"
 QIE_wushan_events.12.a: "江四先生，这羊肉要老了。"
 QIE_wushan_events.13.t: "占卜"
 QIE_wushan_events.13.desc: "在明光胡同吕祖阁中，桂舫先是燃香三根，向着吕洞宾的塑像虔诚地拜了三拜。随后从自己随身的口袋中取出了那只漆木盘子，按照当前的时辰开始转动占卜。待盘上诸象归位，殿内重新安静下来，桂舫又跪地叩首，双手毕恭毕敬地从供桌下请出解卦之书。\n\n“卦上怎么说？”慧济见占卜已经结束，便低声问道。\n\n“遍地是财啊，”桂舫点了点头，“三传纯土，皆为官鬼。再看中传，官鬼乘白虎。若是寻常人家，欲取此财，必招凶祸。”\n\n话已至此，他却忽然一转。“但于你我二人而言，乃是催官符至。伏吟之象，主滞淤难解；又有乱首之嫌，正宜以下犯上。”桂舫合上卦书，缓缓念道：\n\n“见财动心，凶祸来袭，中传虎鬼，仕宦宜临。”"
 QIE_wushan_events.13.a: "白虎噬黄龙，国祚行将尽"
 QIE_wushan_events.14.t: "什刹海的不速之客"
 QIE_wushan_events.14.desc: "这位邀请他们的主人出手可真是阔绰，不仅选了会贤堂饭庄这么个高级地方，而且还请来了余叔岩这位大拿唱《捉放宿店》。席面已尽，余音未散，众人举目四顾，才发现今夜到场者几乎可称得上另一套国会班子——只不过，他们大多是在那些遭和谐社团排挤的小团体里仍旧遭受排挤的小团体。在场的人都知道，今天这顿可是绝不便宜。\n\n现在，那位自称“慧济居士”的好客主人终于现身了。江朝宗身着军服，佩着象征旧日地位的勋章，缓步走上戏台。他先向在场众人请求为八省联合流民募捐，随后话锋一转，便开始谈论今日北京城中日益混乱的局势：他表示自己已经知晓在在座人群之中形成了一个松散而谨慎的联盟，若时局继续败坏，他本人，以及救世新教，也愿意为恢复北京秩序略尽绵薄之力。\n\n最先发出不满的是努力会成员。他们本是听了汤尔和的劝说才肯赴宴，却无论如何也难以接受自己竟要同一群鼓吹“五教合一”、又声称能与“耶稣”通灵的怪人谈论政治联合。曾琦则更为直接：他询问江朝宗救世新教是否真如坊间传闻那样暗中接受德国人、日本人与使馆城市的资助。青年党人显然怀疑江朝宗动机不纯，但也不得不承认，若他真能控制政府，他们并非不能考虑合作。\n\n帝国宪政会诸人同样心存疑虑。毕竟，大家都知道玉帅吴佩孚也是救世新教中人，谁又能断定，江朝宗这场名为串联各方的宴会，不是直系布下的一场引蛇出洞？然而转念一想，若直系当真要收拾他们似乎也不必如此大费周章。几番低声商议之后，他们最终决定暂且支持江朝宗的行动。至于那些明光会成员则显然另有盘算。他们神情平静，言辞含蓄，仿佛早已知道今夜会发生什么。江朝宗对此并不意外。来此之前，郑孝胥大约已经将该说的都同他们说过了。"
 QIE_wushan_events.14.a: "至少比起现任政府，这里更有国会的样子。"
 QIE_wushan_events.15.t: "令人讪笑的流言"
 QIE_wushan_events.15.desc: "近日，吴佩孚与曹锟不过是在街上露个面，便能察觉到一股反常的气氛。每当二人出现，老百姓就会交头接耳说些小话。他们一开始只当是针对最近局势的寻常流言，直到几封解释相关情形的电报送到案前，二人才终于明白其中缘故。\n\n原来自八省联合崩溃以来，不少从南方逃入华北的“半仙异人”也跟着难民一道涌入北京。他们沿街摆摊、批命看相，口中却总离不开同一句话：今年乃丙子之年，玉帅与保定王皆逢流年不利，恐有丧门之灾。\n\n若只是一个算命先生如此胡言倒也不足为虑。偏偏许多自称从南方逃来的术士都说得有鼻子有眼，彼此之间又能互相印证。几日之间，流言便越传越广，仿佛吴、曹二人今年必遭大厄已成定局。\n\n更麻烦的是，一些流氓混混与走投无路的八省难民，竟借流言壮胆，铤而走险试图闯入东堂子胡同抢夺财物。王承斌虽已下令加强警备，但眼下京城局势处处吃紧，兵力实在捉襟见肘。吴景濂于是提议可以让各家的私兵来临时充当安保力量，如今那些私兵已经在路上了。"
 QIE_wushan_events.15.a: "算命的随口一说，你们就信了？"
 QIE_wushan_events.15.tt: "§O有传闻说在街上看到了穿直系军服的俄罗斯人，真是奇怪。§!"
 QIE_wushan_events.16.t: "漂泊来到远方"
 QIE_wushan_events.16.desc: "梅钦斯基早就对这个捷克人很感兴趣了。与自己不同，对方长得实在太像一个中国人。只要换上这身衣服，他几乎立刻就能去某个中国军阀麾下报到——这话说出来也不知究竟算是恭维还是冒犯。就在他脑子里还在思忖着要怎么开始这场对话时候，对方先开口了。这混账说的是德语。幸好，梅钦斯基也多少听得懂几句。\n\n“梅恩杰尔，”捷克人下意识想去摸Khedive，但转念一想中国兵见都没见过这个，要是露出破绽就全完了，“你叫什么？”\n“伊戈尔·谢苗诺维奇·梅钦——”\n“不是，不是这个。”梅恩杰尔摆摆手，“我是说那些中国人，他们给你叫了个什么名字？”\n\n“涵慧，说是具有智慧。”梅钦斯基皱了皱眉，“这名字真他妈怪。”“他们管我叫涵法，具有法律。这倒有意思，听起来像是我能合法干自己想干的事情——我要——”他手开始颤抖，又开始摸索身上的香烟，“——总有一天我要回布拉格，然后让他妈的——所有捷克人都说捷克语。”\n\n这阵情绪来去突然，话音刚落，梅恩杰尔又重新恢复了开口前那副漠然的神情，仿佛方才那几句话并不是从他口中说出。梅钦斯基现在手足无措，只好和他吹嘘自己当初是怎么跟着起事的捷克斯洛伐克军团一起解放西伯利亚，痛击俄罗斯红军的。"
 QIE_wushan_events.16.a: "“别不信，老子在叶卡捷琳诺达尔单枪匹马干死了五个赤匪。你看这左手就是他们射的。”"
 QIE_wushan_events.17.t: "在大殿之外"
 QIE_wushan_events.17.desc: "乾清宫丹陛之下，几名仪仗卫兵沉默地望着吴佩孚、曹锟以及他们二人的卫兵从远处走来。再转头望向丹陛之上，十几名皇帝亲兵也已各就其位。吴佩孚和曹锟走近了，在踏入大殿之前，二人似乎又低声交换了几句话。随后他们并肩迈入殿中。\n\n在更远些的宫墙阴影下，几队临时调来的护卫正等待着真正的号令。他们名义上是为了防备近来宫外骚乱波及御前而临时征用的安保力量。但事实上这些人所听命的绝非皇帝本人。他们紧张地倚在木箱上，等待着那个关键信号，毡毯与箱盖便会被掀开，藏在其中的短枪也将重见天日。\n\n宗社党以为自己能借小皇帝的名义除去曹吴，曹吴则以为自己能凭卫队与手枪全身而退。可无论哪一边先开枪，都会把自己最后一点体面葬送在乾清宫里。\n\n丹陛之下的卫兵听到了急促的脚步声与沉重的跺踏声，殿内忽然嘈杂起来，紧接着宫墙阴影下的护卫们听到了第一声枪响，枪声随后连成一片。曹吴二人的卫兵一边招呼着仪仗卫兵，一边拔枪冲入乾清宫，廊下顿时乱作一团。人人都被这场突如其来的政变攫住目光，却没人注意一个戴眼镜，穿西装，约莫一米七的男人趁乱从宫内拔腿奔出。"
 QIE_wushan_events.17.a: "不急，且待他们两败俱伤。"
 QIE_wushan_events.17.b: "两支叛匪正在乾清宫内交战，护驾！"
 QIE_wushan_events.17.at: "§R机会只在一瞬间，如果我们就这样等待下去，救世新教恐怕会错失夺权的时机！§!"
 QIE_wushan_events.17.tt: "\n§Y爱新觉罗·溥仪§! 逝去?\n人力: §R-1§!?"
 QIE_wushan_events.18.t: "正大光明"
 QIE_wushan_events.18.desc: "在祖先留下来的基业——乾清宫内互相射击原本便已足够骇人，在与宗社党人的交火中，吴佩孚脸色惨白地斜倚在柱子上，因为失血过多令他的视线渐渐模糊，耳边的枪声也像是一阵阵闷响，分不清是从哪里，由谁射出的；曹锟则踉跄地想躲到殿中柱子的另一边，却在转身的一瞬间被一颗子弹精准地击中了脑袋。那是一颗7.62毫米，专供M1891/30使用的步枪弹。\n\n直到直系卫兵与皇帝亲卫互射一轮过后，真正决定胜负的声音才终于响起。几名皇帝亲兵尚未来得及重新装填，便被从廊下涌入的另一波火力压倒在金砖墁地之上。直系卫兵还未来得及分辨来者究竟是援军还是敌人，便也在混乱中被迫弃械。冲锋枪的短促扫射穿过三交六碗菱花窗，在古老殿宇内来回震荡，木屑、碎瓷与血雾一同落下。那些方才还想以皇命捕杀曹吴的人，如今横七竖八地倒在沾满血迹的“正大光明”的牌匾之下。\n\n伴随着后三殿再度归于沉寂，梅钦斯基掏出了自己从友人那里拿到的Khedive香烟，满足地抽了一口。伴随着他惬意地吐出烟圈，紫禁城内那些“临时安保人员”和满族乱党之间的第二波交火也开始了。"
 QIE_wushan_events.18.tt: "§O我们将清洗大部分依旧顽固地忠诚于曹锟的内阁，以及那些仍然激进地坚持复辟大业的宗社党人。§!"
 QIE_wushan_events.18.a: "送智玄去医院。"
 QIE_wushan_events.18.b: "安息吧，保定王。"
 QIE_wushan_events.19.t: "反贴邮票的信件"
 QIE_wushan_events.19.desc: "又是个美好的清晨，汤尔和照例站在自家门前，继续做他的“清晨操”。这是他十几年前访问德意志帝国时学来的健康科学习惯，此后竟一直坚持了下来——说到十几年前，汪精卫那张年轻而激烈的脸又忽然浮现在他眼前。那场报纸上的论战早已过去许久，可每当想起对方当年那些为中医治死孙中山辩护的那些言辞，汤尔和仍忍不住停下动作，发出一声冷笑。不过，一个声音很快打断了他回忆的思绪。\n\n“汤先生，有您的信件！”原来是邮递员来了。\n\n在短暂寒暄并送走邮递员后，汤尔和才低头仔细端详起手中的信封。此时便足以断定写信人实在丢三落四：首先是信封上并未注明寄信人是谁，其次是贴邮票的时候，竟然荒唐地将帆船邮票倒过来贴了左上角，似乎是这大船莫名其妙地就沉在了一片白洋之中。不过对于汤尔和来说，这似乎有着特殊意味。他的脸色一下子变得严肃起来，转身回到了寓所中。在确定门窗都已关好，屋内再无旁人声息，他才将那封信拆开。"
 QIE_wushan_events.19.a: "“六松老人大鉴”"
 QIE_wushan_events.19.b: "“邀您于北京前海会贤堂饭庄共赏《捉放宿店》”"
 QIE_wushan_events.19.c: "“慧济居士敬启”"
 QIE_wushan_events.20.t: "给玉帅"
 QIE_wushan_events.20.desc: "智玄居士尊鉴：\n\n今修尺素，以问足下之决心。君启此函，必能洞明事理，择善而从。\n\n方今政府，背弃信誓。一酗酒狂徒，日媚夷狄，以攫私利。更有慕其人者，虽非圣人，然称君子，顾念旧谊，纵容此狂悖不肖之辈，屡屡姑息。君岂不闻四方饥馑、兵燹连天，百姓呻吟泣血。而当局者畏避天下重责，不为善，亦不为恶，谬托老子无为之道，袖手坐视危局，乃至祸成滔天。\n\n当世人才辈出，皆虎视九鼎。见民灾不行赈济，是为不仁；纵洋虏攘夺国财，是为不义；立国会而架空诸党，是为不信。此三罪者，承平之时犹可苟安，及今乱世，足使四海之人起而问罪于君矣。\n\n惟愿足下奋然力行，担荷重任，勿于纲纪崩坏、法度陵夷之际，犹自逡巡。若再迟疑，必致天下倾覆，足下之位亦不可保。临书仓促，言不尽意。\n\n丙子年六月 于四勿轩 慧济 敬上"
 QIE_wushan_events.20.a: "“如果是江朝宗的信就不用拆开念给我，直接和那一大堆信放一起就行。”"
 QIE_wushan_events.21.t: "紫禁城警备加强"
 QIE_wushan_events.21.desc: "鉴于国家局势日益恶化，且近来屡屡发生宵小趁夜半时分避开巡更守卫、潜入宫中行窃的安全漏洞事件。作为溥仪侍卫长的佟济煦已经下令要求进一步加强紫禁城警备。临时征召而来的安保人员陆续进驻宫门内外。尽管他们之中不少人不过是些站没站相、干一天算一天的街面混混，总让人感觉手脚不干净，会刮走乾清宫的墙皮。然而幸运的是，看起来其中还是有一些受过专业训练，步伐沉稳的专业人士，他们巡夜时也不像那些临时雇来的闲汉一般东张西望。时局如此，实在无法再苛求更多。至少在名义上，这些人都是来保护紫禁城的。"
 QIE_wushan_events.21.a: "只希望乱局尽快平定。"
 QIE_wushan_events.22.t: "救世新教宣布复仇"
 QIE_wushan_events.22.desc: "[FROM.Capital.GetCapitalVictoryPointName]方面发来消息，自从新北洋共和政府大主席汤尔和遭遇刺杀后，中国的社会秩序又一次陷入了崩溃状态。人们自发地走上街头，为这位逝去的“好人主席”哭诉。另有许多北京城中的民众将救世新教所在的明光胡同一带的吕祖阁团团包围，他们跪在这一宗教圣殿之外，为汤尔和申冤。\n\n救世新教已宣布国家进入紧急状态并对暗杀的凶手及其背后主使进行调查，[ROOT.GetLeader]已重新就任国家首脑，在庄重的仪式之后，他在圣殿中祭拜了他们所崇拜的诸神，并宣布将让一切在内部和外部，意图威胁中国的敌人都付出代价。这股迅速高涨的复仇热潮令许多中国知识分子和外国人都感到不安和恐惧，他们已经陆续离开了中国。而[ROOT.GetName]将采取的下一步行动目前仍不明了。"
 QIE_wushan_events.22.a: "让他们偿付血债！"
 QIE_wushan_events.22.b: "疯狂的邪教徒们再次掌权。"
 QIE_wushan_events.23.t: "中国邪教徒光复北洋！"
 QIE_wushan_events.23.desc: "对历史学家们来说，今天发生的一切都值得细细研究。中国发生了令人困惑的变化。救世新教的教统[ROOT.GetLeader]在[FROM.Capital.GetCapitalVictoryPointName]发表了演讲，宣布自己已在战场上击败了所有“玷污中华传统文化”的对手，让分裂的中国再次统一。而更令人震惊的消息在后面：[ROOT.GetLeader]认为“末日”危机已经结束，救世新教已经完成了它拯救灾难的使命。在接下来的一段时间中，他们将把权力交到一个由知识分子和老牌政治家共同主持的新生共和国手中，它本身则将回归宗教慈善事务。这个崭新的中国将被称为“新北洋”。\n\n救世新教与寻常民间邪教不同，其教团成员大多是在袁世凯时期便已展露锋芒的军人或高级知识分子。但他们自愿放弃权力的举动也确实令国际观察家吃了一惊，社会学家们正在密切关注救世新教的下一步动向。"
 QIE_wushan_events.23.a: "赤县神州重归于我等手中。"
 QIE_wushan_events.23.b: "邪教徒就这样放弃了权力？"
 QIE_wushan_events.7.t: "债务清偿完毕"
 QIE_wushan_events.7.desc: "终于，我们偿还了所有债务！如今再也没有任何债务的枷锁施加在[QIE.GetName]身上，而我们也终于从每日胆战心惊的状态中解放出来，现在可以专心于国内的经济建设和工业发展了。"
 QIE_wushan_events.7.a: "无债一身轻"
 QIE_wushan_events.8.t: "社会人士慷慨解囊"
 QIE_wushan_events.8.desc: "使馆城市天津市中的华人实业家们在听闻北京政府正在解决八省难民问题后，便在使馆城市内发动了募捐。如今募捐款和捐赠的物资已交到我们手中，他们希望我们妥善利用资源，并祝我们尽早解决相关问题，拯救黎民百姓于痛苦之中。"
 QIE_wushan_events.8.a: "解燃眉之急！"
 QIE_wushan_events.8.tt: "§C我们额外获得了§!£GFX_production_cost [?70|H0]§C的赈灾资源用于解决我们面临的问题！§!"
 QIE_wushan_events.9.t: "德国人要求更好的条件"
 QIE_wushan_events.9.desc: "与我们进行合作建设的德国企业向我们发来通知，称和我们之间的合作非常舒适。他们提出如果可以的话，我们可以再签订另约，他们将以优惠价格帮助我们再建立几座工厂。我国目前急需开发不假，但如果就这样被外国企业牵着鼻子走，恐怕会对我们的政府形象造成影响。"
 QIE_wushan_events.9.a: "比起意识形态，我们更欢迎实业。"
 QIE_wushan_events.9.b: "我们必须保卫自己的生活。"
 QIE_wushan_events.10.t: "财政系重组完毕"
 QIE_wushan_events.10.desc: "王克敏领导的财政系于今日上午告知我们，他们对财政系的重组已经结束。现在新生的财政系将采用与之前完全不同的金融策略和对外政策，以尽量减轻由于我们债务违约所导致的相关问题。"
 QIE_wushan_events.10.a: "适合于中国自己的财政方式！"
 china_events.70.d.wushan: "我国已有数千载之历史。两千年来，中国一直是亚洲的中心，无数小国仰慕其文明之光。然而，这个曾欲传承万世的帝国在上个世纪却陷入了剧烈动荡。大清朝虽然将中国的疆域扩张到了新的高度，但欧洲帝国主义的侵略却使帝国坠入前所未有的低谷。更糟糕的是，冥顽不灵的日本人在甲午战争中给予清朝沉重打击。神器倾覆之际，中国人民对帝制丧失了信心。\n\n1911年10月10日，这一天永远地改变了我国的命运。驻武昌新军中的革命党人发动叛乱反抗满清统治，辛亥革命由此爆发。革命浪潮席卷南方，而北方则在钦差大臣袁世凯的掌控下继续忠于清朝。然而，洞悉时势的袁世凯同意废黜幼帝溥仪，以换取大总统之位。起初，袁世凯被迫与革命者妥协，但他巧妙地将其边缘化，并不断扩张北洋系的势力。然而，他的复辟野心最终适得其反，引发了新的军阀混战时代。\n\n北伐失败后，分裂的时代宣告结束。吴佩孚、曹锟、孙传芳三位大帅为神州大地带来了和平，以宽仁之举迎回皇帝，开启了和平的新纪元。然而，1936年直系秩序崩溃，地方战乱再次爆发。历史已经证明，如今的政权如此短命完全是因为统治者放弃了传承千年的道德文明，转而开始谈论政法等等旁门左道。\n\n随着救世新教掌握了华北平原的广袤土地，重生的国家开始着手治理这个饱受科学，民主和那些外来思想毒害的国家。10月10日让我们记住了不脚踏实地，盲目追随外国鬼子的可悲下场，唯有中华传统美德方能指引我们治愈这片破碎的山河，中兴华夏！"
 china_events.70.option.d: "幸运的是，我们终究摆脱了它。"
 qing_coup_events.21.c: "伴随着骚动声，子弹雨从殿外倾泻进来……"
 QIE_wushan_reborn_chinese_arsenal: "重生的中华兵工厂"
 QIE_wushan_reborn_chinese_arsenal_desc: "随着我们成功统一中国之后鲲鹏计划的成功实施。我们要进行的第一步就是将地方旧有兵工厂整合进入洛阳七一四兵工署。一个属于中国的，前所未有的崭新现代军工体系即将在我们手中成型。"
 QIE_wushan_our_independent_tank_factory: "成立机械研究特别小组"
 QIE_wushan_conduct_armor_steel_experiments: "开展装甲钢实验"
 QIE_wushan_high_speed_racing_engine: "特殊发动机项目"
 QIE_wushan_715_armor_design_arsenal: "二次拨款支持相关研究"
 QIE_wushan_the_eagle_soars_in_the_sky: "扩建洛阳西工航空研究所"
 QIE_wushan_squander_money_focus_on_fire: "火力优先"
 QIE_wushan_stability_first_and_most_important: "可靠优先"
 QIE_integrate_existing_MIO_resources_desc: "尽管我们国家拥有各个地方都拥有能够生产步枪和火炮的兵工厂，但我们始终没有掌握生产坦克的能力。[ROOT.GetLeader]已经下令开展一项名为“鲲鹏计划”的军工发展计划，该计划的第一个目标就是扩张我们在战前设立的洛阳七一四研究所，该部门将开展机械化军事工业的相关研究，并为未来的国防建设积累经验。假以时日，我们定能迎头赶上世界潮流，成为一支不可小觑的军事力量。"
 QIE_wushan_aviation_714_bonus_tt: "§C由于714局积累的技术，我们取得了额外加强！§!"
 extra_paratrooper_supply_grace_tt: " 伞兵携行补给：§G+240.0§! 小时"
 paradrop_organization_factor_tt: " $MODIFIER_PARADROP_ORGANIZATION_FACTOR$：$RIGHT|+=%1$"
 QIE_wushan_more_is_better_faster_is_great: "多就是好，快就是棒"
 QIE_wushan_efficient_utilization_of_resources: "高效利用紧缺资源"
 QIE_wushan_further_optimize_design_direction: "进一步优化设计方向"
 QIE_wushan_china_airforce_coming_desc: "[ROOT.GetName]的航空兵部队由玉帅吴佩孚在洛阳练兵时建立，但长期以来军队中都未能好好利用这支航空力量。随着中国的统一，我们终于可以仔细筹划，建立起一支不落后于世界的空军了。"
 QIE_wushan_air_force_academy_desc: "不得不承认，中国人口众多，但人才稀少。在我们统一中国之前，我们就曾因缺乏将官人才而一度陷入劣势。如今我们已决定开办[ROOT.GetName]航空学院，用于培养合适的飞行员，第一批学员将从陆军之中进行选拔。"
 QIE_wushan_expand_more_air_ports: "扩建更多机场"
 QIE_wushan_expand_more_air_ports_desc: "建造足量的飞机跑道将极大地保证我们能在现代战争中保有一大支空军部队，考虑到我国幅员辽阔的地形。军机处已决定在武汉、黑龙江、上海和北京新建或扩建机场，以确保我们的在任何一场潜在战争中都能进行空中支援。"
 QIE_wushan_establish_aviation_industry: "起步的航空工业"
 QIE_wushan_establish_aviation_industry_desc: "世界大战已让我们充分了解了飞机和陆军协同攻击的重要性：不论是侦察敌人的动向，打击地面目标，还是在空中与敌方空中力量激烈交锋。在国有工厂的专项投资下，统一之后第一架由中国人自己生产的飞机即将飞上蓝天。"
 QIE_wushan_focus_on_air_bomb: "战场支援优先"
 QIE_wushan_focus_on_air_fight: "空中优势优先"
 QIE_wushan_focus_on_air_fight_desc: "由于我们薄弱的航空工业经验，我们暂时只能注重在单一方面发展。军机处中的一部分军官认为，我们可以利用空军损害敌方战争潜力。通过使用战斗机群打垮敌人的空军来建立空中优势，从而阻止敌人补给和增援。"
 QIE_wushan_focus_on_air_bomb_desc: "由于我们薄弱的航空工业经验，我们暂时只能注重在单一方面发展。军机处中的一部分军官认为，我们可以空军直接支援地面部队行动。轰炸机将帮助陆军清理敌军机枪阵地、火炮炮台和碉堡，从而减轻伤亡。"
 QIE_wushan_daytime_airtime: "白日出动"
 QIE_wushan_night_knight: "夜晚突袭"
 QIE_wushan_daytime_airtime_desc: "通过在白天有组织地进行持续攻击，我们能够在具有良好视野的情况下相对稳定且有条理地执行任务，与此同时采用这种空战方式也有助于我们的部队提高协调性和一致性，这将使我们的出击更加有效率。"
 QIE_wushan_night_knight_desc: "夜间行动充满着不确定性和视野风险，但经过加强训练后我们的飞行员就能在夜幕掩护下将损失降至最低，这些小股行动的幽灵将在黑夜中渗透入敌方的领域，而我们的敌人仍在呼呼大睡，就算死亡也不会意识到我们的拜访。"
 QIE_wushan_air_defence_force: "升级的防空力量"
 QIE_wushan_air_defence_force_desc: "尽管经过一系列训练，我们已经拥有了一支能力出众的飞行员，但是他们毕竟不可能无处不在。军机处已授权七一四兵工署进行防空力量的研究与作业，我们将在城市中心和关键地带修筑和维护防空设施，以应对任何居心叵测的来犯之敌。"
 QIE_wushan_paratrooper: "伞兵部队"
 QIE_wushan_paratrooper_desc: "在对抗[JAP.GetName]时，我们就曾短暂地计划训练一支精锐伞降部队来攻击其本土。现在是时候扩建这支精锐部队了。我们将招募更多精英，他们的目标是在敌后进行破坏并夺取战略要地。"
 QIE_wushan_chinese_wisdom_and_design: "中国智慧，中国设计"
 QIE_wushan_chinese_wisdom_and_design_desc: "洛阳七一四兵工署的101号特别实验部门已计划发起一项针对航天工业的特别实验，正在寻求我们的注资。如果计划顺利，我们或许能通过改善飞机设计结构来减少生产成本。此外，101号特别实验部门还请求在蒙古地区进行一种新锐飞行器的试飞，相关文件已提交给军机处。"
 QIE_wushan_we_will_rule_sky_and_land: "重明神鸟，翱翔天际"
 QIE_wushan_we_will_rule_sky_and_land_desc: "[ROOT.GetName]的空军已时刻准备着在亚洲地区捍卫我们仁慈的王道了，经过一系列现代化措施，我们已将我们的空军彻底武装起来，从而拥有了保护整个亚洲乃至世界力量。我们已授权714兵工署开展一项新锐研究——喷气式推进。我们在发展空军期间积累的经验也结出了硕果——洛阳的金谷园航空制造局将接收七一四的部分研究材料，专门进行飞机领域的研究。"
 QIE_wushan_the_ghost_of_dual_ocean_navy: "两洋水师的遗产"
 QIE_wushan_sturmtruppen_desc: "不客气地说，我们被敌人包围了。如果我们的敌人一齐起来进攻我们的话，我国会陷入劣势。考虑到我们既有的军事力量，最好的选择是对其中一方势力发动快速战争来消灭对方，从而缓解其它战线的危险。"
 QIE_wushan_penetrate_and_infiltrate_the_enemy_desc: "有什么东西比水更加灵动多变？将它放在容器里，它就呈现出容器的形状，可一旦容器上有微小的缝隙它就能够渗透进去。我们的军队也将抓住敌人的微小失误，迅速地渗透进入敌人的防御线，并将他们彻底击溃。"
 QIE_wushan_focus_on_northern_navy_strategy: "延续北洋水师战法"
 QIE_wushan_focus_on_southern_navy_strategy: "延续南洋水师战法"
 QIE_wushan_wu_enforcing_ethics_through_military_orders_desc: "尽管政府已在社会上广泛地推行宣传了孔孟之道和儒家传统道德对中国人民的重要性，但看起来我们的军队对这些内容仍不感冒。吴佩孚教统已强制要求对士兵们进行思想教育。许多救世新教成员作为新设立的经教警察已被派驻进入军队监督思想工作的落实情况。"
 QIE_the_government_which_wave_foreigners_desc: "新政府应当是一个开放的政府，本着美国人在十年前提出的“机会均等”原则，我们再一次邀请世界各国与中国共同开发我们的市场，并且一同获得利益。当然，这份利益只会维持到和平结束的那一天……"
 QIE_wushan_jiang_establish_the_editing_and_translation_department_desc: "1903年，为了和国际社会接轨，也为了满足培养新型人才的必要，当时的清政府设立了京师大学堂译学馆以翻译海外著作。然而在1911年它就关闭了。我们应该重设译学馆，对国外出色的军事与科学作品进行翻译，此外，译学馆还可以协助我们出版更多有必要被“翻译”的内容。"
 QIE_wushan_punishment_those_enemies_desc: "我们已报了戊辰年的仇恨，那时洋鬼子打着“门户开放，机会均等”的原则，在我国沿海地区扶植了伪政权“使馆城市”，懦弱的前政府居然答应了这个荒唐的要求，替四万万中国人民做了决定，自那之后，这些洋人的靴子就踩在中国人的背上作威作福。如今使馆城市已经消失，但当时参与这项行动的国家仍然存在，我们将作为复仇者，向这些始作俑者致以第二次问候……"
 QIE_industry_focus_rely_on_foreigner_country_desc: "在做生意这件事上我国非常支持美国人的说法，“门户开放，机会均等”。我国拥有的是资源，而缺少的正是与之相匹配的技术。通过与海外资本合作，我们将能利用国外工程师来提高我们的建设水平。"
 QIE_wushan_jiang_fanatics_militia_for_master_desc: "长久以来中国的农民都生活在被游民和土匪侵扰的恐惧之中。在最落后的贫困农村中发展起了一种使用符咒和药水来保护身体免遭伤害的迷信。我们可以利用这些穷苦的贫民，以保护当地寺庙中的神灵为由，借助“神功”和几支老式步枪在农村中建立起民兵队。他们或许不能帮助我们对抗正规军，但假使有一天我们的土地不幸沦陷，这些人将能把敌人拖入到治安战的泥潭之中。"
 QIE_wushan_two_leader_the_order_of_non_speaker_desc: "钱能训教统已经下达了他的第一份命令，这是由鸾务院组成的一个五人委员会进行扶乩之后获得的。教统在神谕中强调了许多对恢复社会稳定和民众对政府信心的政策。"
 QIE_wushan_reassess_the_financial_situation_desc: "为了进行和谐正确的治理，我国政府就必须确认目前有多少资金可以进行利用。如今救世新教不再是一个慈善团体，而是一个政府组织，任何预算和资金都必须通过极为严格的审核之后方才能够准许使用——我们之间不会有人想看到我们的政府陷入到万劫不复的财务危机之中，对吧？"
 QIE_industry_focus_independent_planned_economy_desc: "我们已决定对财政系统进行重组以应对我们面对的债务违约问题，一项财政紧缩政策已被提上日程，特别债务不日也将发行，我们将尝试通过国内储蓄将贷款交给那些富有活力的私人企业来激活国内经济动力。"
 QIE_adopt_start_coal_mining_search_desc: "煤炭是十分重要的燃料资源，此前我们已从阎锡山手中夺取了晋东地区，但我们却一直搁置了开发。一方面是担忧破坏山西和我们政府之间脆弱的友谊，另一方面则是我们的技术不足以开发更深层煤矿。但现在是时候将这些黑色钻石从地下掘出了。我们可以自己进行开采，也可以借助开滦矿务局和外资合伙开采——前提是有外国企业愿意和我们合作。"
 QIE_wushan_decisive_battle_doctrine: "寻找决战机会"
 QIE_wushan_fleet_in_being: "存在即是威慑"
 QIE_wushan_hit_and_run: "水面袭扰战术"
 QIE_wushan_submarines_focus: "主要关注潜艇"
 QIE_wushan_focus_on_southern_navy_strategy_desc: "建立于1875年的南洋水师是清政府时期拱卫江浙的重要力量。与追求决战的北洋水师不同，南洋水师由于各方面原因维持着一支数量有限的舰队，通过机动性与策略而非火力来打击敌人。"
 QIE_wushan_hit_and_run_desc: "我们将基于水面袭扰，一击脱离的战术思想来指导我们的海军发展，如此一来我们并不需要维持一支规模庞大的舰队，我们要做的就是先敌人一步锁定对方，攻击，然后离开交战区域。"
 QIE_wushan_submarines_focus_desc: "为了实现我们神出鬼没的战术目的，潜艇是一种非常适合的舰船，一方面它造价便宜，另一方面却又足够致命。对于现在预算极为有限的我们来说可以说是最合适的发展选择。"
 QIE_wushan_torpedo_are_best_choice: "青睐鱼雷"
 QIE_wushan_torpedo_are_best_choice_desc: "对于我们的海军来说，再没有什么比鱼雷更重要了。一条铁甲舰或许需要一年时间才能从造船厂内交付给舰队服役，但我们的海军只需要上个月生产出来的几百发鱼雷就能让铁甲舰沉睡于海底。"
 QIE_wushan_destroyer_and_cruiser: "驱逐舰与巡洋舰"
 QIE_wushan_destroyer_and_cruiser_desc: "我们将稳步建成一支能够与世界上任何海军力量正面交战的大舰队。为此我们首先将发展驱逐舰，这将帮助我们扫清任何潜伏在深海之中的敌人；随后是巡洋舰，它们将在海面之上形成一道铁壁，屏卫我们的主力舰。"
 QIE_wushan_our_dream_our_ocean: "我们的梦，我们的海"
 QIE_wushan_our_dream_our_ocean_desc: "我们梦想着新生的中国在软实力和技术实力上引领世界的那个未来，如今已变成了现实。我们付出了时间和大量金钱以追赶大国和对手的强大海军。如今，我们的伟大舰队遨游在大海之上，我们将自己规划未来的航向。为了更好地服务于我们的海军，七一四兵工署将与大连造船公司合作，从而专注于发展舰船制造。"
 QIE_wushan_strengthen_coastal_defense: "加强海岸防御"
 QIE_wushan_strengthen_coastal_defense_desc: "我们将在舰队周围的关键节点大量修缮海岸要塞和炮台，只要确保我们的舰队处于岸防大炮的保护伞下，敌方海军就不敢直接攻击港口。"
 QIE_wushan_combine_sky_with_ocean: "从蓝色到蓝色"
 QIE_wushan_the_air_ship: "倾泻爆炸"
 QIE_wushan_the_air_ship_desc: "我们近期在海军和空军上取得的成果使得大家能够彼此取长补短。一项特别会议已在七一四兵工署中召开，在会议上我们确定了将委托714开发一种强大的海军轰炸机，它能以极高的效率毁灭敌人的舰队。"
 QIE_wushan_the_second_choice_destroyer: "注重驱逐舰"
 QIE_wushan_the_second_choice_destroyer_desc: "开发驱逐舰能确保我们的海域安全，并让我们拥有骚扰敌人的能力，这将使我们的造船工业更加青睐于专精制造驱逐舰。"
 QIE_wushan_the_second_choice_submarines: "注重潜艇"
 QIE_wushan_the_second_choice_submarines_desc: "这些造价便宜但拥有致命力量的潜艇是保护我们的最佳选择，对于攻击交战方的商船和货轮，甚至是向我们的陆军运送补给上潜艇都能发挥作用，这将使我们的造船工业更加青睐于专精制造潜艇。"
 QIE_the_second_choice_movement_base: "移动要塞"
 QIE_the_second_choice_movement_base_desc: "在如今的世界海军局势之下，如果真的要建设一支强大的海军，唯一的选择就是航空母舰。那些真正能左右海战胜负的海军航空兵将从空母上起飞，为他们的敌人带去硝烟和死亡，这将使我们的造船工业更加青睐于专精制造航空母舰。"
 QIE_wushan_the_second_choice_battleship: "注重战列舰"
 QIE_wushan_the_second_choice_battleship_desc: "虽然航空母舰已经证明了它在现代战争中的力量，但我们依然不能忽视战列舰这一海上霸主的存在。作为大洋之上最坚固，最凶猛的舰船，对其进行投资研究是绝对不会出错的，这将使我们的造船工业更加青睐于专精制造战列舰。"
 QIE_wushan_the_second_choice_cruiser: "注重巡洋舰"
 QIE_wushan_the_second_choice_cruiser_desc: "不论何时何种情况，投资轻中型巡洋舰都不会是一个错误的选择。如果缺少这些屏卫船只，我们就无法维持自己在海战中的优势地位，这将使我们的造船工业更加青睐于专精制造潜艇。"
 QIE_wushan_we_need_reserves: "培训合格海员"
 QIE_wushan_we_need_reserves_desc: "对如今的我国来说，合格的海军人员实在少之又少，我们不得不从零开始招募并培训。不然即便我们有足够强大的舰队，也没有能够运作它的人才。"
 QIE_wushan_dual_ocean_commission_naval_heavy_gun_hit_chance_factor_tt: "海军重炮命中几率：§G+5.00%§!"
