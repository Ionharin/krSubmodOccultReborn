 QIE_ws_adv_cao_rulin: "曹汝霖"
 QIE_ws_adv_cao_rulin_desc: "§Y生于：§!§L1877年1月2日；大清、江苏省上海县§!\n§Y派系：§!§c新交通系§!\n§Y背景：§!§L曹汝霖1900年入东京法学院读书，1904年回国，在商部商务司工作，后调任外务部。1910年，载沣任命他为外务部副大臣，辛亥革命后改当律师，后来作为第一届北洋参议院议员重返政坛。\n\n曹汝霖后于1913年出任外交次长，1915年在袁世凯政府授意下，与陆征祥一道与日方就《二十一条》举行谈判，因此遭张勋等人痛斥为卖国贼。1916年，曹汝霖出任交通总长，同时兼署外交总长。同年秋，曹汝霖接替梁士诒担任交通银行总理，由此成为“新交通系”首领，与梁士诒的“旧交通系”分庭抗礼。\n\n曹汝霖此后又出任段祺瑞内阁的交通总长、财政总长和其他内阁职务，并为旧皖系政府和军队争取到了大批日本财政援助。他的住所在11月抗议中被烧毁，他本人也于1920年被内阁罢免，后又担任过一段时间的交通银行总经理。\n\n尽管他之前曾受张作霖之邀担任财政委员会委员长，但在得知救世新教掌握权力之后他还是决定回到北京，或许是因为比起奉天，在这一边，他更不会亏待自己的钱包。§!\n\n§Y备注：曹汝霖于救世新教会中道号“慧牟”，他将救世新教会视为一个串联各方，并从中谋取利益的俱乐部，其人并不上心相关宗教事业。§!"
 QIE_ws_adv_gong_xinzhan: "龚心湛"
 QIE_ws_adv_gong_xinzhan_desc: "§Y生于：§!§L1871年；大清、安徽省合肥县§!\n§Y派系：§!§L无派系§!\n§Y背景：§!§L龚心湛是清朝监生，金陵同文馆毕业。后来留学日本。曾在中国驻日本、美国、法国、意大利、菲律宾等国使领馆任随员多年。归国后，任广东知府兼署理按察使，兼廉钦兵备道。1912年后历任武昌造币厂厂长、汉口中国银行行长、赈抚局督办、安徽省国税筹备处处长、财政司司长。1914年任安徽省财政厅厅长。1915年6月，升任北京政府财政部次长，兼任盐务署督办。同年12月，任督办经界局事务。1916年4月，任参政院参政。\n\n1919年1月，任北京政府财政部总长兼币制局督办兼造币厂总裁。6月13日，龚心湛兼任代理国务总理。随后因吴佩孚、张作霖与曹锟三人的压力而请辞。\n\n1924年，龚心湛出任内务部总长兼扬子江水道讨论委员会会长兼赈务督办。次年12月被正式任命为交通部总长。然而不久后他便辞任寓居天津，开始承办实业。先后担任银行董事、玻璃公司总董、矿务局董事、启新洋灰公司总理、董事长等。在救世新教掌握权力之后，他成为了新政权的财政总长。§!§!\n\n§Y备注：龚心湛于救世新教会中道号“慧澈”，是救世新教的经济委员。正是因为有他在其中运作，救世新教长期以来才能吸纳足够的资金来从事慈善事业。§!"
 QIE_ws_adv_li_sihao: "李思浩"
 QIE_ws_adv_li_sihao_desc: "§Y生于：§!§L1882年；大清、浙江省慈溪县§!\n§Y派系：§!§L无派系§!\n§Y背景：§!§L李思浩参加了1903年浙江恩科，成为举人，随后就读于京师大学堂。1912年任财政次长兼盐务署长、代总长，并一度兼任中国银行总裁、币制局总裁。1919年任财政总长兼盐务署督办。\n\n1913年，袁世凯与五国银行团签订2500万英镑的借款合同。李思浩为此设计了天才般的“盐务另款”，巧妙地从还款中每月抽出了数十万元用于政府发展。这笔“另款”直到直皖战争时期仍在发挥作用。段祺瑞执政后，李思浩、徐树铮、王唐等人又建立了“安福俱乐部”，李思浩在多方巧妙斡旋，通过出卖关税、盐税、烟酒公卖权为皖系政府筹得大量军费，引得社会反感谴责。\n\n在吴佩孚联合南方八省组成反段联盟之后，李思浩巧妙地通过收购北京报社、向报社记者输送利益来在社会舆论上阻止吴佩孚北归，并一方面计划在国会发动倒阁运动，迫使靳云鹏下台；一方面利用报刊将自己与曾疏隽、朱深包装为“爱国者”。但随着直皖战争后皖系失势，入主北京的吴佩孚将李思浩列为“安福系十大祸首”之一，李思浩遭到全国通缉。他随后短暂地在张作霖内阁中担任过顾问，但随着奉系在第三次直奉战争中的失败，他因畏惧被吴佩孚清算而选择提前逃往天津，并未随张作霖北上。§!§!\n\n§Y备注：李思浩于救世新教会中道号“慧义”，在救世新教中担任经济委员，他本人将救世新教视为一件好用的金融工具。在天津躲避通缉期间，作为金融天才的他被各方势力拉拢，据说甚至国民党左派也向他抛去了橄榄枝。§!"
 QIE_ws_adv_lu_zongyu: "陆宗舆"
 QIE_ws_adv_lu_zongyu_desc: "§Y生于：§!§L1876年；大清、浙江省杭州府§!\n§Y派系：§!§c新交通系§!\n§Y背景：§!§L陆宗舆出身商人家庭，后入南京文正书院，1899年自费入早稻田大学法制经济科学习，1902年回国，担任税务管理工作，后来担任进士馆及警官学堂教习。1905年，他出任徐世昌麾下的巡警部主事，后任考察政治大臣载泽的参赞。\n\n陆宗舆曾跟随徐世昌出任奉天洋务局总办兼管东三省盐务，并于1908年随徐世昌返回北京，1910年出任资政院议员，此后先是担任交通银行协理，不久后升任度支部副大臣。1913年，他当选参议院议员，同年出任中国驻日本全权公使。\n\n日本山东出兵时，陆宗舆向日本方面转达了中国的中立立场，并积极推动与日本签订“二十一条”。袁世凯逝世后，他被召回国内，出任交通银行股东会长，受曹汝霖派遣与章宗祥共同赴日交涉西原借款，并于1917年出任中日合办的中华汇业银行总经理。1919年，他与曹汝霖组成新交通系，同年与章宗祥一起遭到抗议者的殴打，最终被解职。1925年，他出任临时参政院参政，最终寓居天津，后被曹汝霖召至奉天为其效力。随着救世新教控制了北京政府，他接受了向他抛出的橄榄枝，与曹汝霖一起回到了北京。§!§!\n\n§Y备注：陆宗舆于救世新教会中道号“慧依”，好谈论鬼神报应。他宣称自己拥有一种奇异的功能，能够用鼻子识别是否下雨，约有90%的正确率。§!"
 QIE_ws_adv_tang_erhe: "汤尔和"
 QIE_ws_adv_tang_erhe_desc: "§Y生于：§!§L1878年；大清、浙江省杭州府§!\n§Y派系：§!§M南直系§!\n§Y背景：§!§L著名知识分子、“六松老人”汤尔和是孙传芳核心圈子中一名十分特殊的官员。他自幼学习经典，接受私塾教育，是一名颇有天赋的学生。1903年，汤尔和赴日本成城学校学习军事，留日期间积极参加抗清反帝活动，并加入同盟会。1904年，他在浙江高等学堂做音乐教员，三年后再度前往日本学医，就读于金泽医学专门学校，而后转赴德国柏林大学留学，获得医学博士学位。\n\n回国后，汤尔和先后在多所机构担任内科医生和医学总监，期间创办了浙江病院，参加了辛亥革命，后又创办了国立北京医学专门学校并担任校长，1915年发起成立中华民国医药学会，1920年奉派赴欧洲考察医学，1922年回国后任教育部次长。\n\n1923年，日本关东大地震后，汤尔和出任中国红十字会慰问使者赴日，此后在吴佩孚支持下成立的王宠惠“好人政府”中担任教育总长。1925年，汤尔和与汪精卫就孙中山病情是用中医还是西医治疗发生了短暂的辩论，他站在西医一边。1926年，汤尔和任内务部总长，1927年改任财政部总长。\n\n1929年，汤尔和获日本东京帝国大学医学博士学位，回国后在南直系政府中担任各种职务。在收到了江朝宗的邀请信之后，汤尔和北上加入了北京政府。§!\n\n§Y备注：汤尔和并非救世新教成员，他与江朝宗因1923年日本关东大地震的慰问而有一面之缘，彼时江朝宗等救世新教代表也前往日本进行国际赈灾活动。§!"
 QIE_ws_adv_yuan_yonglian: "袁永廉"
 QIE_ws_adv_yuan_yonglian_desc: "§Y生于：§!§L1881年；大清、贵州省贵阳府§!\n§Y派系：§!§L无派系§!\n§Y背景：§!§L袁永廉为1904年的恩科进士，取得三甲第二十三名。在清政府时期，他担任户部主事与山西财政副监理。不久赴日本留学，入法政大学。1912年归国后出任北京政府财政部检事，山西国税厅筹备处处长，印花税会办。1920年任财政部赋税司司长。\n\n1926年颜惠庆摄政内阁，即吴佩孚支持的“好人内阁”上台后，袁永廉于财政部担任次长一职。§!§!\n\n§Y备注：袁永廉于救世新教会中道号“固真”，在救世新教中担任经济委员。他本人好谈鬼神神怪之物，曾与他人一起在北京组织另一个神秘学团体“普善社”。"
 QIE_ws_adv_zhong_shiming: "钟世铭"
 QIE_ws_adv_zhong_shiming_desc: "§Y生于：§!§L1879年；大清、直隶省天津府§!\n§Y派系：§!§L无派系§!\n§Y背景：§!§L钟世铭在1903年4月进入北洋大学堂学习三年。1906年赴美国接受高等教育，1909年11月获哈佛大学文学硕士学位。毕业后途经俄罗斯归国时，奉命赴欧洲各先进国家考察政治。1910年2月，任直隶学务公所专门科科员兼直隶高等工业学堂英文教授。1921年，任财政部次长兼盐务总署署长。\n\n1923年间他曾在张作霖内阁中担任高等财政顾问，但在第三次直奉战争后并未随其一同返回奉天。随后他寓居天津，专心于在天津办理社会公益事业。钟世铭在天津主持了明德慈济会与国学研究社，分别担任会长与副社长。§!§!\n\n§Y备注：钟世铭于救世新教会中道号“弼谛”，为救世新教副教主之一，主掌慈善与扶乩事务。但他本人并不对这些怪力乱神之事上心，他更倾向于将救世新教作为一个慈善组织而非宗教组织去使用。"
 QIE_ws_adv_zhou_zhenlin: "周震鳞"
 QIE_ws_adv_zhou_zhenlin_desc: "§Y生于：§!§L1875年；大清、湖南省长沙府§!\n§Y派系：§!§m旧政学系§!（§l再造派§!）\n§Y背景：§!§L周震鳞于1903年参加黄兴等人创立的革命团体华兴会会议，并决定在长沙发动武装起义。1905年，他加入同盟会，随后前往日本法政大学学习，1907年回国之后，便在北京为《帝国日报》、《顺天时报》撰文宣传革命。1911年武昌起义前夕，奉命回长沙，约集同志，布置军事。湖南光复后被委为筹饷局局长。1912年春参加组织政府事宜。翌年三月，积极进行反袁活动，旋在九江被捕，获释后再次东渡日本，参加中华革命党。\n\n1916年他奉孙中山命令前往北京，以参议员身份在国会联络国民党两院议员进行议会斗争，并在北京开办《真共和日报》宣传三民主义。次年，奉命随孙中山赴广州护法，后又前往上海担任国民党事务所秘书长。1920年周震鳞前往福建会晤陈炯明，为其制定回粤计划。\n\n1923年与冯玉祥会面，组织国民军对抗阎锡山，并在曹锟贿选之后出面抨击指责。§!§!\n\n§Y备注：周震鳞于救世新教会中道号“道腴”，他是救世新教中唯一一位与国民党关系密切的人物，尽管表面上他常与黄郛主导的旧政学系纠缠不清，但他实际上与孙科等人有着私下秘密的联系——当然，这件事已被救世新教所知晓。"
 QIE_ws_adv_zhuang_rensong: "庄仁松"
 QIE_ws_adv_zhuang_rensong_desc: "§Y生于：§!§L1873年；大清、江苏省丹阳县§!\n§Y派系：§!§L无派系§!\n§Y背景：§!§L庄仁松，又名庄乐峰。毕业于北洋水师学堂，为严复的弟子。虽然因在学堂训练时从桅杆上摔下，导致腿部受伤而无法从军，但也因此作为优等生毕业后留校任教。1900年，他将开平矿务局出卖给英国政府，引发了清政府与英国之间的产权纠纷，使得其不得不逃往天津。\n\n辛亥革命后，庄仁松与其同学，时任大总统黎元洪一起创办中兴煤矿股份有限公司，并担任董事，成为了黎元洪的白手套。随着公司业务风生水起，1926年，庄仁松被英国人指派为天津英租界华人纳税会董事长，为了改善教育问题，他在担任董事期间积极筹措资金，游说使馆城市工部局，试图建立一所中国人自己的学校。庄仁松最后成功募集到了三万四千两白银用于建设学校，这所被称为天津公学的中国人学校只招收在天津纳税的华人家庭的孩子。\n\n不久之后，天津公学因申请就读者与日俱增，旧校舍已无法容纳。英租界华人董事联名要求工部局资助兴建新校舍，但遭董事以经费困难为由拒绝，最终由庄乐峰决定自行募款建设，并将学校改名为“耀华中学”，取其“光耀中华”之含义。§!§!\n\n§Y备注：庄仁松于救世新教会中道号“乐峰”，为救世新教慈院与鸾务院掌事之一，负责慈善与扶乩事务。他本人虽对这些怪力乱神之事不甚相信，但也认为这也是教化民众的一种方式。"
 QIE_beiyang_warfare: "林建章"
 QIE_ws_big_gun_warfare_desc: "§Y生于：§!§L1874年；大清、福建省福州§!\n§Y派系：§!§L无派系§!\n§Y背景：§!§L林建章以对新技术的欣赏和自身的大胆开始了自己的海军生涯。作为一个土生土长的福建人，他参加了中国海军，并从江南海军学院当中毕业。在辛亥革命期间，林建章通过在长江上游救援革命军的行动展示了自己的职业水准和勇气。南京临时政府因此授予其海军中校之衔，并令其指挥海军的旗舰“南琛”号。这一次晋升足见其政治影响。随后林建章来到了直系海军之中。在清王朝复辟之后，林建章宣布带领舰队独立，并开到上海，然而他的下属却合力将其罢免，把他扔到了烟台。在蒙受羞辱之后，张作霖找上门来，并允许他在烟台重建一支舰队。§!\n\n§Y备注：林建章于救世新教会中道号“悟荣”，是救世新教的经济委员之一，负责管理教内善款。他本人极为支持龚心湛的事业。§!"
 QIE_ws_jfc_fuller: "J.F.C.富勒"
 QIE_ws_jfc_fuller_desc: "§Y生于：§!§L1878年；英国，西萨塞克斯郡奇切斯特§!\n§Y派系：§!§L无派系§!\n§Y背景：§!§L约翰·弗雷德里克·查尔斯·富勒，1898年被委任至牛津郡轻步兵团第一营，1899年至1902年间在南非参与了第二次布尔战争，并于抵达当地数月后晋升为中尉。1913年，他被录取进入参谋学院，并于1914年1月开始在那里学习。\n\n在世界大战期间，富勒先后担任本土部队和驻法第七军的参谋军官，1916年起调任机枪兵团重型分队司令部（该部队后改组为坦克兵团）任职。\n\n1917年9月，他在贝尔米库尔的坦克兵团总部与军需大臣温斯顿·丘吉尔进行了会谈。他参与策划了1917年11月康布雷战役的坦克突袭行动，并为1918年秋季攻势制定了坦克作战方案，晋升为中校。\n\n他还设计了一项被称为“1919计划”的对德意志全面机械化进攻方案，但因德国迅速取得胜利而未能实施。在流亡加拿大后，他选择了从军队退役，专心于军事理论的写作。§!\n\n§Y备注：富勒与神秘的西方神秘学组织“A∴A∴”有所关联，他被尊称为“大新手”。他的军事理论作品中也可见到诸如卡巴拉生命树等西方神秘学内容的论述。§!"
