 QIE_wushan_after_china_reborn_YCP: "诛杀国贼"
 QIE_wushan_after_china_reborn_MP: "入股勋贵企业"
 QIE_wushan_after_china_reborn_YCP_desc: "是时候了，既然中华已归于一统，我们在民间的威望已抵达了极点，我们就再没有必要借助青年党来提高我们的合法性了。长期以来这些喋喋不休的青年人就对我们的政策指手画脚，还对我们的扶乩活动嗤之以鼻。现在我们将彻底瓦解他们，寻回属于我们自己的安宁和平静。"
 QIE_wushan_after_china_reborn_CERA_desc: "是时候了，既然中华已归于一统，我们在民间的威望已抵达了极点，我们就再没有必要借助帝国宪政会来提高我们的合法性了。长期以来这些喋喋不休的青年人就对我们的政策指手画脚，还对我们的扶乩活动嗤之以鼻。现在我们将彻底瓦解他们，寻回属于我们自己的安宁和平静。"
 QIE_wushan_after_china_reborn_MP_desc: "是时候了，既然中华已归于一统，我们在民间的威望已抵达了极点，我们就再没有必要借助宗社党来提高我们的合法性了。为了合理地从这些遗老手中夺取利益，救世新教已策划了一场慈善晚宴，我们将在晚宴上宣布新的经商政策，通过“自愿”发放更多的股权并由国家购买，我们就可以控制他们的产业。"
 QIE_after_wushan_control_whole_china_luoyang_building_desc: "自开天辟地始，人类的统治者便安坐于天下中心的位置，分制约八方辅佐他的地区。对大多数人来说这只是一个神话，但其中却暗含着天命的预兆。我们既然已经平定天下，并顺应民意成为了万世之明君，那么就应当顺应这上古时代的制度，将我们的统治机关迁移到世界的中心——洛阳。如此一来我们便能向我们的民众证明，三皇五帝与贤德的周天子的国家确实降临到了他们身边。"
 QIE_wushan_punishment_those_enemies: "复仇者的信"
 QIE_industry_focus_rely_on_foreigner_country: "合作建设计划"
