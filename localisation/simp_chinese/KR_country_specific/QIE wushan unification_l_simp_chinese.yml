  QIE_wushan_luoyang_airport_organisation: "洛阳金谷园航空制造局"
  QIE_wushan_luoyang_airport_organisation_subtitle: "实验性空中堡垒设计商"
  QIE_wushan_luoyang_airport_organisation_desc: "1920年5月，吴佩孚于洛阳金谷园修建了大型飞机场，那里正是直系空军的发源地。我们亦将七一四兵工署设置在洛阳，作为新近起步的军工产业基地，其发展目标是与保定地区的军事综合体分庭抗礼，相互制衡，以免造成一方做大的结果。"
  ws_luoyang_airport_mio_initial_trait: "$QIE_wushan_luoyang_airport_organisation_subtitle$\n§L$QIE_wushan_luoyang_airport_organisation_desc$§!\n"
  ws_luoyang_airport_upgrade_12_tt: "在完成§Y战场支援优先§!或§Y空中优势优先§!国策后，激活该特质将为巡抚空路空军统领行台提供§C额外加强§!！\n\n§Y战场支援优先§!将提供对地攻击：§G+15%§!\n§Y空中优势优先§!将提供对空攻击：§G+15%§!"
  ws_luoyang_airport_upgrade_12_1_tt: "§Y巡抚空路空军统领行台§!追加效果\n对地攻击：§G+15%§!"
  ws_luoyang_airport_upgrade_12_2_tt: "§Y巡抚空路空军统领行台§!追加效果\n对空攻击：§G+15%§!"
  ws_luoyang_airport_bonus_desc_20: "§C该特质还可重复激活§Y5§!次。§!"
  ws_luoyang_airport_bonus_desc_19: "§C该特质还可重复激活§Y4§!次。§!"
  ws_luoyang_airport_bonus_desc_18: "§C该特质还可重复激活§Y3§!次。§!"
  ws_luoyang_airport_bonus_desc_17: "§C该特质还可重复激活§Y2§!次。§!"
  ws_luoyang_airport_bonus_desc_16: "§C该特质已§Y无法§!再重复激活。\n\n激活该特质将解锁§Y最终迭代§!。"
  qie_mio_luoyang_airport_bonus_completed: "已将研发规程打磨至完美。"
