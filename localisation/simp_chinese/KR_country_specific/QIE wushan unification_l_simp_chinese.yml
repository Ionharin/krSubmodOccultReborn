  QIE_wushan_jiangnan_shipyard_organisation_subtitle: "先端舰队设计商"
  QIE_wushan_jiangnan_shipyard_organisation_desc: "江南舰船修造总所始于1865年成立的江南机器局，在这个分裂又统一的中国，它再次承担起了自己作为尖端舰船研究组织的身份。为中国海军威震亚太献上自己的一份力量。"
