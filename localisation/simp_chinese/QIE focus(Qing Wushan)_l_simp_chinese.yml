 QIE_wushan_common_polit_16_desc: "这个国策将大幅（+2）提高我们的激进度。对全世界工团主义国家宣战。如果我们完成了“结世界为一国”并且没有完成“龙骧鹰扬”，将解锁额外的宣战对象。（帝国公约，协约国和大东亚共荣圈）流共工于幽州，放驩兜于崇山，窜三苗于三危，殛鲧于羽山，四罪而天下咸服。"
