 QIE_the_reluctant_two_leaders: "不情愿的两位教主"
 QIE_ws_event1_tt: "§Y看来这些爱心人士不得不去另找地方化缘了。§!"
 QIE_ws0_tt: "§R所有人都在等待着京城内的消息……§!"
 QIE_ws1_tt: "救世新教必须着眼于处理目前的混乱情况，但教团内部首先就由谁出任政治领袖引发了争吵，§R如今江朝宗与吴佩孚就领袖之位开始竞争……这是一个迅速且无法干涉的过程。\n但如果他们二人最终僵持不下，或许会引发意料之外的结果。§!"
 QIE_ws2_tt: "§C江朝宗与吴佩孚未能分出胜负，救世新教将由这两位教主共治。它的未来犹未可知。§!"
 QIE_conspiracy_of_wushan: "救世新教的帮助？"
 QIE_conspiracy_of_wushan_desc: "于1919年在河南广善坛成立的救世新教颇受北洋政府人士赏识，如今它已发展成北京最大的慈善组织，协助政府赈济直隶及河南地区的贫苦灾民。§R但愿他们只是慈善组织。§!"
 QIE_help_of_wushan: "救世新教的帮助"
 QIE_help_of_wushan_desc: "于1919年在河南广善坛成立的救世新教颇受北洋政府人士赏识，如今它已发展成北京最大的慈善组织，协助政府赈济直隶及河南地区的贫苦灾民。如今他们正在全力安置涌入的八省联合灾民。"
 QIE_hate_of_wushan: "救世新教不知所踪"
 QIE_hate_of_wushan_desc: "§R京畿的夜静得可怕。§!"
