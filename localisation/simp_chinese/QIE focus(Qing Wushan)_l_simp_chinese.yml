 QIE_wushan_the_new_government_reviving_tradition_desc: "中华大地上有很多野心家，但最终能够支配全国的人却少之又少。我们的政府必须向民众证明自己的实力和抱负，而避免民众将我们和那些昙花一现的僭越政权相提并论。"
