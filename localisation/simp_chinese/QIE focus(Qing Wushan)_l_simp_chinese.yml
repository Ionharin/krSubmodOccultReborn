 QIE_wushan_wu_our_precious_traditional_culture: "我们珍贵的生活传统"
 QIE_wushan_precious_tradition: "珍贵的传统"
 QIE_wushan_precious_tradition_desc: "在旧有乡里与礼序的再组织下，社会获得了短期稳定与人口恢复，但也带来了更多民生供养负担。"
 QIE_wushan_scriptural_police: "经教警察"
 QIE_wushan_scriptural_police_desc: "以经典名义整肃基层治安与社会秩序，短期内巩固了统治稳定。"
