 QIE_wushan_prepare_blow_up_the_dam: "仿效王贲旧事"
 QIE_wushan_prepare_blow_up_the_dam_desc: "秦王政二十二年，王贲率领六十万大军攻打魏国，包围魏都大梁，随后他引黄河鸿沟水灌入魏国首都，大水浸泡全城三月有余，将魏国从中原彻底抹除。假使有一天，对中华文明虎视眈眈的侵略者们侵入到沧县-保定之后时，我们可以仿效先祖的战略，掘开黄河大坝，从而迟滞敌人前进，并为我们争取更多反击机会。"
 QIE_seize_the_gold_mine_desc: "我们将解锁一个决议，能够通过夺取非法政府的“非法国库”来转换为对我们短期有益的加成。完成国策后解锁“夺取非法政府资金”决议，每个决议持续30天，移除后给予玩家90天的“士气高涨”，效果为突破+10%，对次要国家伤害+15%。同时黄金储备计数器+1。在我们统一全国之后，我们可以通过QIE_integrate_existing_MIO_resources国策消耗全部黄金储备，来帮助MIO快速升级。"
