 QIE_god_circle_shi_tier_3_desc: "军队在苦战环境中的韧性达到新的水平。"
 QIE_god_circle_lao_tier_1: "道祖降鸾·初阶"
 QIE_god_circle_lao_tier_1_desc: "清静无为之道让学术与技术体系得以稳步运转。"
 QIE_god_circle_lao_tier_2: "道祖降鸾·进阶"
 QIE_god_circle_lao_tier_2_desc: "士人与工匠在共同信念下展开更紧密协作。"
