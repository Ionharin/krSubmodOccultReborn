 QIE_god_circle_title_text: "§R五教乩坛§!"
 QIE_no_god_tt: "回祖尚未扶笔降鸾"
 QIE_con_focus_tt: "儒祖尚未扶笔降鸾"
 QIE_lao_focus_tt: "道祖尚未扶笔降鸾"
 QIE_shi_focus_tt: "佛祖尚未扶笔降鸾"
 QIE_jesus_focus_tt: "耶祖尚未扶笔降鸾"
 QIE_god_circle_description_tt: "救世新教以乩语安抚人心，不同的教祖将为救世新教的统治带来§C不同的效果§!。只有当某些教祖的教化足够深入人心之时，人们或许才会配合那些疯狂的行径……"
 QIE_wushan_long: "救世新教\n§L救世新教起源于1919年河南地区的一家乩坛，最早是失意文人煮酒论政的组织。然而，随着江朝宗加入救世新教。§!\n"
 QIE_wushan_short: "救世新教"
 QIE_wushan_focus_name: "§R救世新教§!"
 QIE_wushan_events.1.t: "救世新教提请集资捐助"
 QIE_wushan_events.1.desc: "慈善团体救世新教向我们请求一笔不菲的补助，以赈济安置最近因八省联合动荡局势涌入河南与湖北的八省的难民，这笔资金将用于开办保育院，建立临时住所等赈灾事业。与政治官员不同，它们虽然名义上是慈善团体，但平日里与各北洋要员来往密切。其主脑江朝宗曾在第三次直奉战争时大力支持直隶派。治理灾害，保护民众是政府应尽的职责，但此前我们征收税款不顺，想要再掏出这样一笔多余资金实在困难。"
 QIE_wushan_events.1.a: "地主家也没有余粮了"
 QIE_wushan_events.1.b: "再苦一苦财政部"
 QIE_wushan_events.2.t: "秘密会面"
 QIE_wushan_events.2.desc: "我不想一个人写mod了"
 QIE_wushan_events.2.a: "救世新教叙事线"
 QIE_wushan_events.3.t: "在会面之前"
 QIE_wushan_events.3.desc: "现在救世新教的人混进去了"
 QIE_wushan_events.3.a: "可是那会怎样？（移除救世新教的帮助）"
 QIE_wushan_events.4.t: "北京传来奇怪的讯息"
 QIE_wushan_events.4.desc: "从围绕在中国政坛的重重迷雾中，传来了一个令人困惑的消息。尽管细节还不甚明了，但据信在今早的紫禁城中发生的一场政变之后，一个对中国政坛陌生而又熟悉的人物，江朝宗出现了，陪同他出席的是吴佩孚的副手刘玉春。\n江朝宗曾参与丁巳复辟，是坚定的保皇党。他向世界媒体透露了政变的过程，现在，他的机构，救世新教已经暂时控制住了北京的情况。但没人能确定未来会发生什么……"
 QIE_wushan_events.4.a: "另一个张天然？"
