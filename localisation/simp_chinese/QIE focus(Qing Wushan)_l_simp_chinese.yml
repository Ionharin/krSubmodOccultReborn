 QIE_god_circle_no_focus_tier_1: "儒祖降鸾·初阶"
 QIE_god_circle_no_focus_tier_1_desc: "教众暂以安抚民心为先，维持表面的秩序。"
 QIE_god_circle_no_focus_tier_2: "儒祖降鸾·进阶"
 QIE_god_circle_no_focus_tier_2_desc: "在各派之间保持平衡，治理逐渐稳定。"
 QIE_god_circle_no_focus_tier_3: "儒祖降鸾·圆熟"
 QIE_god_circle_no_focus_tier_3_desc: "乩坛已形成成熟的协调机制，政令阻力明显下降。"
 QIE_god_circle_con_tier_1: "道祖降鸾·初阶"
 QIE_god_circle_con_tier_1_desc: "重礼重序，令政务运行更为顺畅。"
 QIE_god_circle_con_tier_2: "道祖降鸾·进阶"
 QIE_god_circle_con_tier_2_desc: "教化深入士绅与官僚网络，统治合法性持续回升。"
 QIE_god_circle_con_tier_3: "道祖降鸾·圆熟"
 QIE_god_circle_con_tier_3_desc: "礼教秩序完成重构，政务与民情形成共振。"
 QIE_god_circle_shi_tier_1: "佛祖降鸾·初阶"
 QIE_god_circle_shi_tier_1_desc: "军中开始接受新的精神训诫。"
 QIE_god_circle_shi_tier_2: "佛祖降鸾·进阶"
 QIE_god_circle_shi_tier_2_desc: "戒律与牺牲精神强化了部队的作战意志。"
 QIE_god_circle_shi_tier_3: "佛祖降鸾·圆熟"
 QIE_god_circle_shi_tier_3_desc: "军队在苦战环境中的韧性达到新的水平。"
 QIE_god_circle_lao_tier_1: "回祖降鸾·初阶"
 QIE_god_circle_lao_tier_1_desc: "清静无为之道让学术与技术体系得以稳步运转。"
 QIE_god_circle_lao_tier_2: "回祖降鸾·进阶"
 QIE_god_circle_lao_tier_2_desc: "士人与工匠在共同信念下展开更紧密协作。"
