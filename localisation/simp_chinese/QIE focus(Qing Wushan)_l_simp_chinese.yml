 QIE_god_circle_shi_tier_3: "佛祖降鸾·圆熟"
 QIE_god_circle_shi_tier_3_desc: "军队在苦战环境中的韧性达到新的水平。"
 QIE_god_circle_lao_tier_1: "回祖降鸾·初阶"
 QIE_god_circle_lao_tier_1_desc: "清静无为之道让学术与技术体系得以稳步运转。"
 QIE_god_circle_lao_tier_2: "回祖降鸾·进阶"
 QIE_god_circle_lao_tier_2_desc: "士人与工匠在共同信念下展开更紧密协作。"
 QIE_god_circle_lao_tier_3: "回祖降鸾·圆熟"
 QIE_god_circle_lao_tier_3_desc: "道法体系渗透至研发与生产流程，效率显著提升。"
 QIE_god_circle_jesus_tier_1: "耶祖降鸾·初阶"
 QIE_god_circle_jesus_tier_1_desc: "布道网络正在塑造新的集体牺牲观。"
 QIE_god_circle_jesus_tier_2: "耶祖降鸾·进阶"
 QIE_god_circle_jesus_tier_2_desc: "教团组织的动员能力不断增强。"
