 QIE_wushan_negotations_with_YCP: "为崭新中华的大步向前"
 QIE_wushan_negotations_with_YCP_desc: "[ROOT.GetLeader]和中国青年党的代表都承认，如今的华北政府需要对国营企业和军事工业开展一场轰轰烈烈的大改革。[ROOT.GetLeader]盛赞了中国青年党对当前中国社会弊病的精准洞悉，并欢迎青年党人为社会建设和治理提供更多方案。"
 QIE_wushan_negotitations_with_CERA: "重要的是多数人的幸福"
 QIE_wushan_negotitations_with_CERA_desc: "[ROOT.GetLeader]和帝国宪政会的代表都承认，长期以来的军阀混战使得我们的农村地区十分脆弱，大片土地遭到闲置废弃。农民是我们的根本，改善农民的处境就是改善华北政府的处境。[ROOT.GetLeader]盛赞了帝国宪政会对当前中国社会弊病的精准洞悉，并欢迎帝国宪政会相关人士为社会建设和治理提供更多方案。"
 QIE_wushan_negotitations_with_MP: "确保本国企业家的利益"
 QIE_wushan_negotitations_with_MP_desc: "[ROOT.GetLeader]和宗社党的代表都承认，我国大部分民生工业实际上在德国人的控制之下，但这并非是坏事。通过和德国企业合作，我们或许可以提高我们本国企业的各项水平，从而加快我国的工业化进程。[ROOT.GetLeader]盛赞了宗社党对当前中国社会弊病的精准洞悉，并欢迎宗社党人和富有智慧的勋贵们为社会建设和治理提供更多方案。"
 QIE_wushan_wu_confirmed_as_the_leader: "正义阁先生"
 QIE_wushan_prepare_blow_up_the_dam: "仿效王贲旧事"
 QIE_wushan_prepare_blow_up_the_dam_desc: "秦王政二十二年，王贲率领六十万大军攻打魏国，包围魏都大梁，随后他引黄河鸿沟水灌入魏国首都，大水浸泡全城三月有余，将魏国从中原彻底抹除。假使有一天，对中华文明虎视眈眈的侵略者们侵入到沧县-保定之后时，我们可以仿效先祖的战略，掘开黄河大坝，从而迟滞敌人前进，并为我们争取更多反击机会。"
 QIE_seize_the_gold_mine_desc: "财政部提出了一个在我们统一中华之后十分有用的构想：“鲲鹏计划”，我们将收回伪政府的财富和黄金，其中一部分将用于继续我们的统一事业，另一部分将作为战后重建军工体系的经费存在。"
 QIE_integrate_existing_MIO_resources: "建立洛阳七一四兵工署"
 QIE_wushan_now_has_fallen_into_ancient_ice: "如今已落入古老冰狱"
 QIE_wushan_the_dream_jiang: "江四先生之幻梦"
 QIE_wushan_the_dream_wu: "吴小鬼儿之泡影"
 QIE_wushan_now_has_fallen_into_ancient_ice_desc: "时钟已指向早子，救世新教的癫狂梦境已经终结。各人有他应得的报酬，战败者两手空空，按理也是应当。各人有他各自的果报，且瞧瞧谁能坚持到底！"
