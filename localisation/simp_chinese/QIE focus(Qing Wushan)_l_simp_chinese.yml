 QIE_wushan_lvzu_chunyang_throne_modifier_desc: "吕祖纯阳之位已立，相关安排仍在推进。"
 QIE_wushan_luoyang_arsenal_modifier: "洛阳军械所"
 QIE_wushan_luoyang_arsenal_modifier_desc: "直隶旧式军工体系正在被重新整理，并逐步向更现代的军械生产体系过渡。不同方向的投资将决定这座军械所最终偏向何种器械传统。"
