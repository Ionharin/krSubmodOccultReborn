 QIE_the_legacy_of_wang_jinghui_desc: "辛酉年八月二十日，宏教柳真人于南京救世新教分会汪镜慧宅中下降。如今汪居士虽已归于黄土，但他的名字必被千万万饱受涂炭的孤寡贫残之人铭记。"
