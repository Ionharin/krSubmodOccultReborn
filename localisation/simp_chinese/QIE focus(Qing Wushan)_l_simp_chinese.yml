 QIE_revenge_for_1928: "昔日戊辰困龙"
 QIE_revenge_for_1928_desc: "戊辰年美国鬼子以所谓“门户开放”之理由割去我各租界，如今是让它们回归的时刻了。"
 QIE_the_dawn_of_loong_the_dusk_of_thieves: "青龙飞天，小人掩目"
 QIE_work_for_rice: "以工作换取大米"
 QIE_work_for_rice_desc: "通过组织化的贫民工厂体系，政府将赈济与劳动绑定，以维持城市秩序与基础生产。"
 QIE_work_for_247_rice: "以不舍昼夜换取大米"
 QIE_work_for_247_rice_desc: "在昼夜轮转的高压工时制度下，赈济工厂将流民劳动力彻底纳入连续生产体系，以产能换取秩序。"
 QIE_wushan_charity_relief: "慈善救济"
 QIE_wushan_charity_relief_desc: "慈善网络在短期内缓解了社会燃眉之急，但其维持成本与政治代价同样沉重。"
 QIE_wushan_theocratic_authority_1: "新教权力：人微言轻"
 QIE_wushan_theocratic_authority_1_desc: "救世新教初掌大权，名义可传于市井，政令却仍受旧官僚与旧军系掣肘。新秩序已开始发声，但尚不足以压过旧时代回响。"
 QIE_wushan_theocratic_authority_2: "新教权力：渐入中枢"
 QIE_wushan_theocratic_authority_2_desc: "随着教团网络渗入行政中枢与地方治理，新权力开始形成制度惯性。反对声仍在，但其阻滞效力已明显削弱。"
 QIE_wushan_theocratic_authority_3: "新教权力：一言九鼎"
 QIE_wushan_theocratic_authority_3_desc: "当乩谕成为秩序来源，教团意志便与国家机器完成耦合。旧有合法性让位于新的政治神学，政令执行与动员能力同步增强。"
 QIE_wushan_chaotic_big_tent: "混乱的大帐篷"
 QIE_wushan_chaotic_big_tent_desc: "救世新教暂时容纳了军阀、士绅、门生与地方团体等多股势力。它带来了一定调度弹性，却也使军事协同与战役规划陷入持续摩擦。"
 QIE_pauper_factory_tt: "贫民将自动流向需求的贫民工厂"
 QIE_respond_the_sichuan_famine_tt: "§C我们将利用一部分资源去救助四川的难民，这将导致我们自身的动荡，但可能会也可能不会在未来得到四川的回报！§!"
 QIE_henan_focus_can_only_be_completed_by_poor_tt: "该国策只能由被安置到河南的贫民自动推进"
 QIE_henan_auto_focus_in_progress_tt: "河南计划正在进行\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_xian_focus_can_only_be_completed_by_poor_tt: "该国策只能由被安置到陕西的贫民自动推进"
 QIE_xian_auto_focus_in_progress_tt: "陕西计划正在进行\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_zhili_focus_can_only_be_completed_by_poor_tt: "该国策只能由被安置到直隶的贫民自动推进"
 QIE_zhili_auto_focus_in_progress_tt: "直隶计划正在进行\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_jiang_control_wushan_focus_tt: "§Y江朝宗§!在这场权力斗争中取得了胜利，他将成为§O救世新教§!的独一教统，并带领华北政府走向一条以对外开放，外交政治为基本准则的道路。§R至少看起来如此。§!"
 QIE_wu_control_wushan_focus_tt: "§Y吴佩孚§!在这场权力斗争中取得了胜利，他将成为§O救世新教§!的独一教统，并带领华北政府走向一条以独立自主，民族自立为基本准则的道路。§R至少看起来如此。§!"
 QIE_dual_control_wushan_focus_tt: "§Y江朝宗§!与§Y吴佩孚§!的长期僵持导致了社内其它中立成员的不满，他们迫使二人承认§Y钱能训§!为§R救世新教§!的独一教统，这位已死之人的亡灵将通过扶乩传讯来带领华北政府走向一条未知的道路——这将取决于后续的博弈。§R但至少目前，一切都很平静。§!"
 QIE_ws_jiang_chao_zong: "江朝宗"
 QIE_ws_wu_pei_fu: "吴佩孚"
 QIE_ws_qian_neng_xun: "普化正明真人"
 QIE_a_helping_hand_in_disaster: "面对灾害的援手"
 QIE_eight_mighty_dragon_scripture: "残经"
 QIE_eight_mighty_dragon_scripture_desc: "赤明开图，运度自然；元始安镇，敷落五篇；赤书玉字，八威龙文；保制劫运，使天长存。\n\n乩坛已重开于燕京，但龙文仍停留在诵读与誓愿之中。教众记其名而未尽知其义，官府借其威而未得其实。此刻的八威龙文，只是风暴前的一卷空白天书。"
 QIE_eight_mighty_dragon_scripture_taixi: "玄玄秘录"
 QIE_eight_mighty_dragon_scripture_taixi_desc: "龙文西传，先入市井与工场。救世新教以“济世”之名吸纳外邦技艺，将慈善、工务与军需缝合为一体：机器昼夜不息，仓廪得以充盈，民众在动员中学会服从。\n\n“泰西”并非弃夏从夷，而是借其器、取其法、役其力，使新政权在喧嚣与钢铁之间站稳脚跟。"
 QIE_eight_mighty_dragon_scripture_zhongtu: "先天浑元玄玄秘录"
 QIE_eight_mighty_dragon_scripture_zhongtu_desc: "龙文还本中土，复以礼乐纲常为骨。乩坛话语不再止于劝善，而是化为秩序：乡绅与士人重归朝列，民心在“正名”与“安分”中渐次归拢，政令由此得以贯通上下。\n\n“中土”之义，在于以华夏旧典驯服乱世新权，使国家不只能够运转，更能被相信。"
 QIE_eight_mighty_dragon_scripture_longzhang: "八威龙文"
 QIE_eight_mighty_dragon_scripture_longzhang_desc: "及至龙章既成，泰西之器与中土之道终于并轨。工场、官署与乩坛同声相应，战时可聚众力，平时可养民生；外来之术不再漂浮，旧日之礼不再迟钝，二者俱为国家所用。\n\n此时的八威龙文，已非一纸符箓，而是一整套统御天下的章程：能召集，能生产，能安民，亦能定乱。"
 QIE_wang_jinghui_academy: "镜慧公学"
 QIE_wang_jinghui_academy_desc: "以赈济与教化为名而设的新式学术机构，汇聚工务、电子与基础科学人才，为救世新教的国家建设提供持续智力支撑。"
 QIE_inner_sage: "内圣"
 QIE_inner_sage_desc: "§C天降彝伦，立我烝民。纲常所在，即社稷所系。凡冠带之伦、诗书之泽，皆当执礼以守，抱义以死。圣人之道，非徒修身，实为甲胄。内则正心以齐众，外则据德以退敌。一民一土，皆受命于天；毫厘之失，便是礼崩乐坏。故曰：内圣不摇，外侮奚入。§!"
 QIE_outer_king: "外王"
 QIE_outer_king_desc: "§C天下非一人之天下，然道德者天下之共器也。五教未行之处，即禽兽游走之地；圣化未沾之民，皆倒悬待救之魂。今以仁义为旌旗，以乩谕为斧钺，驱长车而出玉门，扬德音而渡重洋。非嗜杀也，实不忍彼苍生久沦苦海。王者之师，有征无战；大同之世，孰敢不来。§!"
 QIE_wushan_madan_spirit: "马丹"
 QIE_wushan_madan_spirit_desc: "军中以强行攻势为先，强调敢战与速决。此法能在短期内提升前线冲击能力与部署效率，却也使部队防御韧性与战斗损耗承受更高代价。"
 QIE_wushan_human_tide_spirit: "聚兵成塔"
 QIE_wushan_human_tide_spirit_desc: "救世新教强调以密集兵员与持续训练维持前线韧性。部队成军速度与组织耐受得到再塑，但高强度动员同样带来更大的经验磨损。"
 QIE_wushan_elite_soldiers_spirit: "精兵干戚"
 QIE_wushan_elite_soldiers_spirit_desc: "救世新教以精练军制重塑骨干部队，强调精兵先行与核心战力保存。此举可有效降低实战损耗，但长期强化训练也将延长部队成军周期。"
 QIE_wushan_continuation_of_xiaozhan_spirit: "小站精神的延续"
 QIE_wushan_continuation_of_xiaozhan_spirit_desc: "小站练兵传统被重新整理并制度化，军中训练效率与基础素养得到提升，但严格训练周期也拉长了部队成军时间。"
 QIE_wushan_zhili_arsenal_state_modifier: "直隶救世武备局"
 QIE_wushan_zhili_arsenal_state_modifier_desc: "救世新教在直隶设立了统筹军需、产线与工务调配的武备机构，区域工业动员效率因此得到显著提升。"
