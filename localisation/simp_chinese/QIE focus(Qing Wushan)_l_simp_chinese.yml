 QIE_improve_the_material_system_desc: " "
 QIE_speed_is_the_only_useful_thing_desc: "我国伟大的军事学者孙子曾经说过，军队作战就要力争速胜，旷日持久则军队必然疲惫。为此我们必须以各种方法提高行军速度和作战速度，避免作战陷入胶着。如有确实的必要，就要让他们努力克服。"
 QIE_solid_as_a_rock_desc: "我国伟大的军事学者孙子曾经说过，军队作战就要力争速胜，旷日持久则军队必然疲惫。只要我们努力加强军队的防御水平，敌人久攻不下必然白白地损失士气和武器，最终走向失败。面对着无法推进的战线和永无止境的士兵，他们最终将会因为内部社会压力而彻底瓦解。"
 QIE_the_human_tide_desc: "合纵与连横是中国古代的政治策略，然而它们亦可以用于兵法。所谓合纵就是联合许多弱小的人起来通过车轮战不让强敌得到喘息机会，从而击败对方。我们将应用这种战法，让敌人在疲惫之中死去！"
 QIE_fearless_soilers_desc: "是谁让人们有和平的生活？是国家；是谁让人们有的吃有的穿？是国家；是谁让人们有一份工作？是国家。[ROOT.GetName]的人们看看在中亚地区，看看希瓦的人们，就会意识到自己生活在一个幸福的国度里。然而那些邪恶的伪政府和军阀试图破坏这份安宁，为了报效祖国赐给人们的和平生活，士兵们应该拿起武器，悍不畏死，只有这样他们的家人才能更长久地享受这份恩惠。"
 QIE_increase_military_production_desc: "说到中国最引以为豪的军事院校，那必然是保定军校。拜过去十几年的发展所赐，保定军校现已发展成一个军事综合体，我们的下一步计划是进一步扩建保定地区的军工业，使其能源源不断地为我们的战争计划提供必要的武器。"
 QIE_elite_soldiers_desc: "合纵与连横是中国古代的政治策略，然而它们亦可以用于兵法。所谓连横就是通过精锐部队快速破坏敌人的薄弱区域，从而使敌人整体变得更弱，更易被我们的精英部队攻击。我们将应用这种战法，让敌人在恐惧之中死去！"
 QIE_against_airborne_enemies_desc: "近期的战争使人们意识到了飞机的重要性，不幸的是，我们的敌人——[JAP.GetName]就拥有大量的飞机，而我们自身的航空力量除了在洛阳和北京的堪堪几支联队之外再无其他。从零建造起一支能和日本人正面对抗的天空力量对目前的我们来说是天方夜谭。幸运的是，我们有一种廉价的替代方案：防空炮。"
 QIE_against_tanks_desc: "我们的敌人可能拥有强大的装甲战车，但那又如何？一辆坦克需要昂贵的成本投入，但我们只需要列装世界大战时期的老式火炮就能轻松对它们造成威胁。"
 QIE_eye_of_the_immortal_desc: "毫无疑问，德国陆军在世界大战中取胜的关键在于他们能够出色地协调大规模行动，以实现单独而互相统一的战略目标，这需要一种被称为无线电的技术。此外，我们还将使用中国人自己的智慧去进一步获取信息。"
 QIE_establish_modern_intelligence_department_desc: " "
 QIE_become_MP_shadow_desc: "大部分强硬的宗社党员已在紫禁城政变中被我们清洗。如今宗社党中残留的大部分人都是有着大量工业财富的满洲勋贵。说到底他们并不在意统治者是谁，只要当前政权能够保护他们的财产，并且带他们发财就行。如果我们和他们进行合作就不得不顾及他们的利益，如果引发了什么危机导致他们的产品或者财富出了问题，我们一定会付出代价的。"
 QIE_become_CERA_shadow_desc: "保救大清皇帝会是一个受众广泛的政党，深受农民和一些城市知识分子的支持。说到底它只是一个大帐篷政党，里面装满了一群愤世嫉俗，道貌岸然的伪君子。和这群中庸之辈合作可能是最符合我们的利益的，只要我们能给广大民众一点表面上的利益，这些人会很乐意支持我们的政权。"
 QIE_become_YCP_shadow_desc: "中国青年党主要由保定军校的青年学员和一部分城市知识分子组成并提供资金维持其运作。他们长期以来捍卫着民族主义事业，并致力于致力于加强中央集权与工业化。在这一点上，我们似乎非常适合与他们合作。但要小心这些热血青年们会对任何国外势力报以敌意，如果我们做出了错误的选择，他们可能反过来会伤害我们自身。"
 QIE_wushan_common_polit_11_desc: " "
 QIE_wushan_common_polit_12_desc: " "
 QIE_wushan_common_polit_13_desc: " "
 QIE_wushan_common_polit_14_desc: " "
 QIE_wushan_common_polit_15_desc: " "
 QIE_wushan_common_polit_16_desc: "这个国策将大幅（+2）提高我们的激进度。对全世界工团主义国家宣战。如果我们完成了“结世界为一国”并且没有完成“龙骧鹰扬”，将解锁额外的宣战对象。（帝国公约，协约国和大东亚共荣圈）流共工于幽州，放驩兜于崇山，窜三苗于三危，殛鲧于羽山，四罪而天下咸服。"
 QIE_wushan_common_polit_17_desc: " "
 QIE_wushan_common_polit_18_desc: " "
 QIE_wushan_common_polit_19_desc: " 王恭厂，给200%核科技进度加成；核科学家加入国家"
 QIE_wushan_common_polit_20_desc: "我们将实现我们的目标。基于已完成的国策激进度给予不同等级的效果。（<=1,2-5,6）"
 QIE_old_chinese_beliefs_reborn_desc: " "
 QIE_and_new_beliefs_live_in_here_desc: " "
 QIE_seances_restart_in_beijing_desc: "时值八会吉日，诸天大圣尊神上会灵宝玄都玉京山上宫，朝庆天真，奉戒持斋，旋行诵经，并遣天真威神周行天下，纠察功过。白云观吕祖阁中，救世新教列位成员亦开乩降笔，恭请五教先师救脱凡人于苦海，宣讲道德于凡间。然而今时不同往日，我等同侪现已执掌京城大权，凭降乩劝善，教化民众之重任，不可不慎而行之。"
 QIE_restore_the_order_behind_shanhaiguan_desc: "长期以来，中国一直被野心勃勃的强人们和心怀不轨的地方派系所分裂。作为中国唯一的合法政府，我们将向这些割据一方的军阀，左翼分子甚至革命党匪徒发去电报，要求他们放下武器立刻归顺。但如果他们连这最后的仁慈都不接受的话，我们就将起兵讨伐他们，消灭这些僭主。"
 QIE_eliminate_traitors_in_the_south_desc: "“联省运动”本质上不过是合理化地方军阀割据的产物，那些被西方思想荼毒的天真知识分子竟然支持这种伪装成统一的分裂。中国自古以来都主张大一统，一个国家中绝不能出现两位最高统治者。联省派实际上就是破坏中华统一的害虫，我们将消灭这些匪徒。"
 QIE_destory_the_red_flag_desc: "丙寅年间，我们曾经击败了孙文和他图谋不轨的社会主义恶贼。这群残兵败将丢盔弃甲，跑到了法国寻求一隅安歇，如今却卷土重来，重新在中华大地上以革命之名，行暴力之实。我们将消灭这些手下败将，并且这一次将斩草除根，确保这些可恨的罪犯再也无法掀起什么风浪。"
 QIE_advance_to_the_shanhaiguan_desc: "如果尚未和奉天开战，给予进攻奉天的战争目标"
 QIE_universal_education_for_poor: "体仁大学堂"
 QIE_revenge_for_1928: "昔日戊辰困龙"
