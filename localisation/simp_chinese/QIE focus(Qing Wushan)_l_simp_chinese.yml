 QIE_the_shadow_of_order: "丙子的幽灵"
 QIE_the_shadow_of_order_desc: "值此鼠年佳节，不止有一股势力蠢蠢欲动。\n§R这支潜伏在阴影中的幽灵势力将自行行动，等待着既有秩序最虚弱的时刻……§!"
 QIE_secret_meeting: "一场秘密的结集"
 QIE_secret_meeting_desc: "如果现今政府没办法提供更多帮助的话，那就只能这样做了。\n§R由于无法从政府那里得到任何帮助，那些主张保持现状的人只好乖乖闭嘴。§!"
 QIE_hang_on_the_oppo_discontent: "抓住混乱情绪"
 QIE_hang_on_the_oppo_discontent_desc: "如今北京城乱作一团，但对我们来说确实是最好的情况。我们只消慢慢等待，小皇帝和§C智玄§!之间必将爆发一场难以弥合的冲突。\n§R万事俱备，只欠东风……§!"
 QIE_the_seances_of_master_lv: "吕洞宾降笔"
 QIE_wushan_power: "不稳定的政权"
 QIE_wushan_power_desc: "事情发展完全在意料之外，在这场中国秩序崩溃的事件中，最后获胜的竟然是救世新教这样一个北洋系大帐篷。一个宗教团体组织是否能稳定中国的混乱现状？但总之，该上了。"
 QIE_seize_the_great_game: "西出函谷"
 QIE_into_samadhi: "娑罗双树入涅槃"
 QIE_into_samadhi_desc: "§8最后说法，度须跋陀罗。 所应度者，皆已度讫。 于娑罗双树间，将入涅槃。§!"
 QIE_spring_and_autumn_ritual: "道之以德，齐之以礼"
