 QIE_god_circle_description_tt: "救世新教以乩语安抚人心，不同的教祖将为救世新教的统治带来§C不同的效果§!。只有当某些教祖的教化足够深入人心之时，人们或许才会配合那些疯狂的行径……"
 QIE_wushan_long_tt: "救世新教（临时总社）"
 QIE_wushan_long: "救世新教\n§L救世新教起源于1919年河南地区的一家乩坛，最早是失意文人煮酒论政的组织。然而，随着江朝宗加入救世新教。§!\n"
