 QIE_ws_zeng_qi: "曾琦"
 QIE_ws_hu_shih: "胡适"
 QIE_ws_aisin_gioro_pugong: "爱新觉罗·溥侊"
 QIE_ws_luanwu_yuan: "救世新教鸾务院"
 QIE_wushan_focus_name: "§R救世新教§!"
 QIE_jiushi_xinjiao_party: "救世新教（分坛）"
 QIE_jiushi_xinjiao_party_long: "救世新教（分坛）"
 QIE_wushan_events.1.t: "救世新教提请集资捐助"
 QIE_wushan_events.1.desc: "慈善团体救世新教向我们请求一笔不菲的补助，以赈济安置最近因八省联合动荡局势涌入河南与湖北的八省的难民，这笔资金将用于开办保育院，建立临时住所等赈灾事业。与政治官员不同，它们虽然名义上是慈善团体，但平日里与各北洋要员来往密切。其主脑江朝宗曾在第三次直奉战争时大力支持直隶派。治理灾害，保护民众是政府应尽的职责，但此前我们征收税款不顺，想要再掏出这样一笔多余资金实在困难。"
 QIE_wushan_events.1.a: "地主家也没有余粮了"
 QIE_wushan_events.1.b: "再苦一苦财政部"
 QIE_wushan_events.2.t: "秘密会面"
 QIE_wushan_events.2.desc: "我不想一个人写mod了"
 QIE_wushan_events.2.a: "救世新教叙事线"
 QIE_wushan_events.3.t: "在会面之前"
 QIE_wushan_events.3.desc: "现在救世新教的人混进去了"
 QIE_wushan_events.3.a: "可是那会怎样？（移除救世新教的帮助）"
 QIE_wushan_events.4.t: "北京传来奇怪的讯息"
 QIE_wushan_events.4.desc: "从围绕在中国政坛的重重迷雾中，传来了一个令人困惑的消息。尽管细节还不甚明了，但据信在今早的紫禁城中发生的一场政变之后，一个对中国政坛陌生而又熟悉的人物，江朝宗出现了，陪同他出席的是吴佩孚的副手刘玉春。\n江朝宗曾参与丁巳复辟，是坚定的保皇党。他向世界媒体透露了政变的过程，现在，他的机构，救世新教已经暂时控制住了北京的情况。但没人能确定未来会发生什么……"
 QIE_wushan_events.4.a: "另一个张天然？"
 QIE_wushan_events.5.t: "燕京纯阳宫内"
 QIE_wushan_events.5.desc: "总之就是救世新教又开始扶乩了"
 QIE_wushan_events.5.a: "尊道贵德"
 QIE_wushan_events.11.desc: "就像每年庆祝春节的惯例一样，社中成员今夜也齐聚在六国饭店。慧济居士发表了他一贯务实而简短的新春致辞。与白日里国会总裁那番令人昏昏欲睡的陈词滥调相比，这番话显然更得诸人欢心。慧济先是概述了乙亥年社内慈善事业的进益与成员名录的变动，随后又提及去年扶乩所得经文的刊印与分发。几句寒暄，数项数字，恰到好处地结束了正式议程。随后便是交谊时间，那些新入社的面孔谨慎地穿行在人群之间，试图在旧人们的闲谈中为自己寻得一席之地。\n慧济端着酒杯缓步穿过大厅，四下张望在搜寻着某个人，他听到大多数人都在谈论八省联合近来通车的浙赣铁路，这条铁路显然对于很多人来说意味着南方市场的进一步扩张。有一位在东亚理事会身居要职的社员谈到据说德国高层即将收购这条铁路，中国民族主义者想必不会对此坐视不管；而在抗议、罢市与反租界运动真正兴起之前，预先向那些合适的人物略作“资助”或许有利可图……\n慧济终究还是没有看到他——尽管有零零散散的北平明经学会成员映入眼帘，然而，智玄居士本人依旧没有出席今年的会议。"
 QIE_wushan_events.11.a: "这是吴佩孚缺席的第九年……"
 QIE_wushan_events.11.b: "君子失位犹为君子，君王失位沦为匹夫。"
 QIE_wushan_events.12.t: "在瓦解之前"
 QIE_wushan_events.12.desc: "江朝宗和吴景濂在前门大街的东来顺中坐下，这是属于他们这一代北洋老人的社交传统。江朝宗早知道保定王与玉帅不过是在维持一层体面的利益相通，却未曾料到在是否支援八省危机一事上，他们内部竟能争执至此。在来自南方的电报一封又一封地送入二人手中的过程中，不掷下骰子相当于最坏的选择。吴景濂夹起一片羊肉，放在铜锅的滚汤中沉浮片刻，盯着这逐渐失去血色的肉片，江朝宗意识到，北京的局势或许并不会像直系政府所期待的那样，在作壁上观中自行归于平静。相反，它正滑向最坏的方向。"
 QIE_wushan_events.12.a: "江四先生，这羊肉敬您。"
 QIE_wushan_events.13.t: "一次占卜"
 QIE_wushan_events.13.desc: "“卦上说什么？”在明光胡同吕祖阁中，慧济手持灯烛，询问桂舫占卜的结果。\n“遍地是财啊，”桂舫点了点头，“三传纯土，皆为官鬼。而且你看，中传为官鬼乘白虎，若是平常人家，欲要取此财富恐怕凶祸不小。”\n\n然而，他又话锋一转，“但是你对我二人来说，那就是催官符至。这伏吟的卦象，正是当下滞淤难解，而更是又乱首之嫌，宜以下犯上。正所谓”\n“见财动心，凶祸来袭，中传虎鬼，仕宦宜临。”"
 QIE_wushan_events.13.a: "白虎噬龙，国祚将尽"
 QIE_wushan_events.14.t: "什刹海的不速之客"
 QIE_wushan_events.14.desc: "江朝宗在什刹海邀请了国会里的边缘团体，除了工团主义者。努力会对救世新教嗤之以鼻，青年党抱有同样的想法，但他们重申如果江朝宗真的能够控制政府，他们才会考虑联合；帝国宪政会对江朝宗有所怀疑，但决定支持他的行动；明光会成员似乎另有想法。"
 QIE_wushan_events.14.a: "比起现任政府，这里更像国会"
 QIE_wushan_events.15.t: "集结"
 QIE_wushan_events.15.desc: "直系私兵们开始行动起来。青年党现在认为他们也可以加入。"
 QIE_wushan_events.15.a: "要让他们以为你能做到，你就能做到"
 QIE_wushan_events.16.t: "从北方来"
 QIE_wushan_events.16.desc: "救世新教海外成员之间的一次对话，俄罗斯人和犹太人。"
 QIE_wushan_events.16.a: "传统主义者们，联合起来！"
 QIE_wushan_events.17.t: "在大殿之外"
 QIE_wushan_events.17.desc: "听到枪响就冲进去！"
 QIE_wushan_events.17.b: "现在，让芝加哥打字机发言"
 QIE_wushan_events.18.t: "救世新教之胜"
 QIE_wushan_events.18.desc: "在我们的饱和火力覆盖下，不论是吴佩孚和曹锟的部下，还是计划政变的宗社党人都被打成了筛子。马卡洛夫的一颗子弹精准地送曹锟这个酒鬼去见了阎王。"
 QIE_wushan_events.18.a: "九年了，终于又见到你了，智玄。"
 QIE_wushan_events.18.b: "安息吧，保定王。"
