 QIE_wushan_dead_leader_live_country: "和谐平衡"
 QIE_wushan_dead_leader_live_country_desc: "在教统的统治之下，我们已经恢复了华北地区的秩序。现在华北地区一扫之前礼教废弛，道德沦丧的乱象，成为了中国无数人艳羡的道德之地。"
