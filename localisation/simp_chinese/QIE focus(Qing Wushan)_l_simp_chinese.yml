 QIE_wushan_great_loong_stand_on_east: "孤龙东立"
 QIE_wushan_great_loong_stand_on_east_desc: "青龙已经苏醒，如今正立于东方睥睨着整个世界。"
 QIE_wushan_penetrate_and_infiltrate_the_enemy: "灵动如水"
 QIE_decisive_battle_with_the_enemy: "侵略如火"
 QIE_wushan_the_project_of_yi: "后羿行动"
 QIE_wushan_the_project_of_yi_desc: "邪恶的日本侵略者终于不再掩饰他们对广袤大陆的贪欲。自古以来，海岛之民便难以与大陆之民长久相安。中国曾以礼教与道德教化东瀛国土，使那些荒僻海岛上的蛮夷得以脱离蒙昧，稍具文明之形。若无中华之恩泽，日本何以有今日之成就？然而如今这些受教化而不知感恩的白眼狼，竟反过来将枪炮指向他们昔日的师长。拿起武器！保卫华夏！§R日本必须毁灭！§!"
 QIE_invasion_from_sea: "从海上进攻"
 QIE_invasion_from_sky: "从天空降落"
 QIE_wushan_prepare_the_pink_plan: "准备日暮计划"
 QIE_wushan_the_project_code_jianzhen: "准备东渡计划"
 QIE_wushan_salt_and_land: "盐与土"
 QIE_wushan_air_force_academy: "建立[ROOT.GetName]航空学院"
 QIE_wushan_wu_our_precious_traditional_culture_desc: "孔孟文化是我们中华民族伟大的传统文化，然而许多接受了国外腐臭思想的知识分子和青年却认为自家的珍珠美玉应该摔碎，转而供奉别人的废石瓦砾。我们将通过在社会上宣扬鼓励我们的优秀传统文化来对抗这些错误的观念。"
 QIE_wushan_restore_squire_council_desc: "政府基层的执行不能离开股长，就像社会基层的治理不能离开乡绅那样。中国拥有广袤的土地，其中大多数地区依然是乡村，通过在县一级重开缙绅会议并授予他们权力，我们将能把行政压力分摊给这些满心欢喜的人。"
 QIE_seances_restart_in_beijing.tt: "§C救世新教的一切都始于1919年吕洞宾仙人的降乩。如今我们已经控制了整个华北政府，我们应当将吕洞宾作为“虚君”供奉，为他在我们的政府之中设立一个象征着国师的宝座，放在当前空置着的溥仪宝座左侧。当然，这个宝座上永远不会出现一位§R活人§!，永远不会……§!"
 QIE_seize_the_great_game.tt: "通过此，我们将在人民心目中确立道家先祖的尊贵地位。\n这将使人们更不易因我们的§R对外政策而影响政治稳定§!。并且当乩坛降笔§C道祖§!之时，将根据其教化等级获得额外强化。"
 QIE_into_samadhi.tt: "通过此，我们将在人民心目中确立释家先祖的尊贵地位。\n这将使人们更能够自发维持§R社会的基本稳定§!。并且当乩坛降笔§C佛祖§!之时，将根据其教化等级获得额外强化。"
 QIE_spring_and_autumn_ritual.tt: "通过此，我们将在人民心目中确立儒家先祖的尊贵地位。\n这将使我们推动政策的阻力降低，并获得更多§R政治资源§!。并且当乩坛降笔§C儒祖§!之时，将根据其教化等级获得额外强化。"
 QIE_jesus_shed_his_blood.tt: "通过此，我们将在人民心目中确立耶家先祖的尊贵地位。\n这将使被我们占领地区的人们更加§R乐于和我们合作并接受我们的统治§!。并且当乩坛降笔§C耶祖§!之时，将根据其教化等级获得额外强化。"
 QIE_raise_the_long_blade.tt: "通过此，我们将在人民心目中确立回家先祖的尊贵地位。\n这将使我们的士兵更加§R英勇地组织攻击和冲锋§!。并且当乩坛降笔§C回祖§!之时，将根据其教化等级获得额外强化。"
 QIE_ws0_tt: "§R所有人都在等待着京城内的消息……§!"
 QIE_ws1_tt: "救世新教必须着眼于处理目前的混乱情况，但教团内部首先就由谁出任政治领袖引发了争吵，§R如今江朝宗与吴佩孚就领袖之位开始竞争……这是一个迅速且无法干涉的过程。\n但如果他们二人最终僵持不下，或许会引发意料之外的结果。§!"
 QIE_ws2_tt: "§C江朝宗与吴佩孚未能分出胜负，救世新教将由这两位教主共治。它的未来犹未可知。§!"
 QIE_become_MP_shadow_tt: "§C自民国肇始，礼崩乐坏，皆因弃纲常而效西洋。今以救世新教为体，行监国辅弼之实，必扬王道于天下，立朝纲于四海。他日再造乾坤，仍奉大清正朔，圣主垂拱，王道重光。§!\n§Y救世新教将以新名义整合政局。§!"
 QIE_become_CERA_shadow_tt: "§t民权不可轻，君主不可无。§!\n§Y救世新教将以新名义整合政局。§!"
 QIE_become_YCP_shadow_tt: "§G凡议会之腐、党争之祸，皆因无神圣信仰为干城。今日中国，外患如潮，内贼如蠹，唯青年党人执干戈以卫社稷，吾等旧人，愿作甲胄。§!\n§Y救世新教将以新名义整合政局。§!"
 QIE_focus_can_only_be_completed_by_advisor_tt: "该国策只能由§Y$CHARACTER$§!在完成§Y$FOCUS$§!之后自动推进。"
 QIE_auto_focus_in_progress_tt: "§R$CHARACTER$§!正在谋划下一次行动\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_jiang_power_focus_can_only_be_completed_by_advisor_tt: "该国策只能由江朝宗在§Y救世新教§!控制北京之后自动推进。"
 QIE_jiang_power_auto_focus_in_progress_tt: "江朝宗正在展示他的力量\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_wu_power_focus_can_only_be_completed_by_advisor_tt: "该国策只能由吴佩孚在§Y救世新教§!控制北京之后自动推进。"
 QIE_wu_power_auto_focus_in_progress_tt: "吴佩孚正在捍卫他的地位\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_old_chinese_beliefs_reborn_warning_tt: "§R我们将以伦理纲常复兴中华！§!"
 QIE_and_new_beliefs_live_in_here_warning_tt: "§R我们将以道德共荣开化诸国！§!"
 QIE_pauper_factory_tt: "贫民将自动流向需求的贫民工厂"
 QIE_respond_the_sichuan_famine_tt: "§C我们将利用一部分资源去救助四川的难民，这将导致我们自身的动荡，但可能会也可能不会在未来得到四川的回报！§!"
 QIE_henan_focus_can_only_be_completed_by_poor_tt: "该国策只能由被安置到河南的贫民自动推进"
 QIE_henan_auto_focus_in_progress_tt: "河南计划正在进行\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_xian_focus_can_only_be_completed_by_poor_tt: "该国策只能由被安置到陕西的贫民自动推进"
 QIE_xian_auto_focus_in_progress_tt: "陕西计划正在进行\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_zhili_focus_can_only_be_completed_by_poor_tt: "该国策只能由被安置到直隶的贫民自动推进"
 QIE_zhili_auto_focus_in_progress_tt: "直隶计划正在进行\n进度：§Y$FLAG_DAYS$§!/[?temp_focus_days]天"
 QIE_jiang_control_wushan_focus_tt: "§Y江朝宗§!在这场权力斗争中取得了胜利，他将成为§O救世新教§!的独一教统，并带领华北政府走向一条以对外开放，外交政治为基本准则的道路。§R至少看起来如此。§!"
 QIE_wu_control_wushan_focus_tt: "§Y吴佩孚§!在这场权力斗争中取得了胜利，他将成为§O救世新教§!的独一教统，并带领华北政府走向一条以独立自主，民族自立为基本准则的道路。§R至少看起来如此。§!"
 QIE_black_diamond_unlock_tt: "§O我们将获得一个针对煤炭资源的修正，这基于我们先前做出的决定。§!\n\n§C如果我们选择和洋人合作，我们将能勘测更多矿脉，但他们会得到属于他们的一份。\n\n如果我们独自进行这项工作，虽然可利用的资源会变少，但将全部为我们所用。§!"
 QIE_forced_producing_plan_tt: "§C我们将把流民安排在赈济工厂中，通过提高工厂的生产效率来最大化支配人力资源。§!"
 QIE_247_producing_plan_tt: "§C我们将把流民安排在赈济工厂中，通过采用不舍昼夜的新型工作方式来提高产量，最大化解决流民问题。§!"
 QIE_restore_order_tt: "§P我们将恢复关内秩序§!"
 QIE_wushan_jiang_establish_the_editing_and_translation_department_tt: "§C我们将得以翻译海外博物典籍，§R在可预见的将来，编译院也能派上用场。§!"
 QIE_debt_negotiation_ycp_betrayed_tt: "§R这将使青年党人认为受到了背叛！§!"
 QIE_debt_negotiation_mp_betrayed_tt: "§R这将使宗社党企业主认为受到了背叛！§!"
 QIE_cancel_completely_ycp_resolve_tt: "§C我们向青年党人展示了我们的决心！§!"
 QIE_debt_negotiation_mp_env_tt: "§C我们令宗社党企业主相信健全的经商环境即将到来！§!"
 QIE_god_circle_title_text: "§R五教乩坛§!"
