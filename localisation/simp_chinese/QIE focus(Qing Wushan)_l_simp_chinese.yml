 QIE_wushan_the_great_beast_industry.tt: "§C这将结束714军工署的第一次轮询，我们当前取得的所有突破将在未来引发连锁反应。\n\n当我们结束第一次轮询之后，将会加强722航空航天飞机制造厂并强化§Y重明神鸟，翱翔天际§C的国策效果。\n§!§W"
