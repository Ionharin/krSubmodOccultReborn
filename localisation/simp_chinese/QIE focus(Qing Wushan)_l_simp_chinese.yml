 chinese_traditionalist: "§O礼教派§!"
 china_faction_alignment_name_traditionalist_china: "§O礼教派§!§Y阵营§!"
 china_faction_tenets_title_traditionalist_china: "§O礼教派§!§Y理念§!"
 china_faction_tenets_traditionalist_china_desc: "§L礼教派是中国最奇特的一群民族主义者与传统主义者，他们总体上是反动，反现代，反科学的。这一派的组织构成相当松散，思想来源也极为繁杂：其中既有守旧士绅、儒学名流，也有厌恶共和政治的旧官僚，以及在西化浪潮中感到惶恐不安的青年学人。大体而言，他们相信西方世界在遥远的过去也曾拥有过某种类似儒家文明的道德根基，只是在现代性的推进中将其逐渐遗失。而更加可憎的是，这套已经堕落的思想又随着列强的炮舰传入中国，反过来污染了本应高尚而自足的中华传统。\n\n因此，礼教派号召重新恢复传统文明，尤其是以儒家礼教为核心的道德秩序。在他们看来，中国面对一切危机的根本都是因为整个社会已经背离了维系天下的伦理根基。只要礼崩乐坏仍在继续，那么无论任何政治体制都无法给中华文明带来复兴。\n\n以辜鸿铭为代表的相关学者坚信，西方人之所以认定东方人野蛮落后，恰恰是因为东方人没有像西方人那样野蛮。西方拥有机枪和大炮，他们凭借这些摧毁了中国旧有的政治秩序，并将有毒的知识散播给中国青年。\n\n然而，礼教派的反西方并不意味着他们拒绝一切西方器物。恰恰相反，他们相信终有一日，当中国人也能制造同样精良的枪炮，并将炮口转向“洋鬼子”之时，西方世界便将在自己发明的暴力之下接受审判。§R到那时，人们就会意识到，真正胜利的是孔孟之道本身。§!"
