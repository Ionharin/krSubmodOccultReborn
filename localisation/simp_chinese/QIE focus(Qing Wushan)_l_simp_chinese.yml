 QIE_restart_beijing_charity_society_desc: "华东八省联合的动乱与四川大饥荒相互叠加，已使大量逃荒难民北迁涌入我们控制的地区。各地官员纷纷报告这些无所依附、无事可做的人群正逐渐成为社会稳定的隐患。鸾务院现已批准一项计划，我们将重启直皖战争时期曾用于赈济灾民的贫民赈济会。"
