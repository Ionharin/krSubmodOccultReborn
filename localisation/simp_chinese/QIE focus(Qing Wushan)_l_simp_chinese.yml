 QIE_seances_restart_in_beijing_desc: "时值八会吉日，诸天大圣尊神上会灵宝玄都玉京山上宫，朝庆天真，奉戒持斋，旋行诵经，并遣天真威神周行天下，纠察功过。白云观吕祖阁中，救世新教列位成员亦开乩降笔，恭请五教先师救脱凡人于苦海，宣讲道德于凡间。然而今时不同往日，我等同侪现已执掌京城大权，凭降乩劝善，教化民众之重任，不可不慎而行之。"
