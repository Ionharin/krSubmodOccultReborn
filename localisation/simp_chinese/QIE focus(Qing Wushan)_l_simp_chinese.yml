 QIE_respond_the_sichuan_famine_desc: "大旱叠加军阀混战，四川饥荒的问题已经使四川政府焦头烂额。如果我么能向四川督理提供一些人道主义救援，或许在未来这份人情能派得上用场。"
 QIE_economic_stability_desc: "[ROOT.GetLeader]已被确认掌握了救世新教的全部权力，成为了教团与政府的至高权力拥有者。然而，凭我们现在的威望却难以推行有效的政令。虽然我们对难民危机的出色应对赢得了一些社会精英和市民的称赞。但大多数人仍将我们视为反动落后的封建迷信分子，我们将在未来改变这种误解：当下最紧要的找到一个合适的政党进行联合，面对能够分享改变中国的权力的机会，很少有在野党能够继续恪守自己的原则。"
