 QIE_ws0_tt: "§R所有人都在等待着京城内的消息……§!"
 QIE_ws1_tt: "救世新教必须着眼于处理目前的混乱情况，但教团内部首先就由谁出任政治领袖引发了争吵，§R如今江朝宗与吴佩孚就领袖之位开始竞争……这是一个迅速且无法干涉的过程。\n但如果他们二人最终僵持不下，或许会引发意料之外的结果。§!"
 QIE_ws2_tt: "§C江朝宗与吴佩孚未能分出胜负，救世新教将由这两位教主共治。它的未来犹未可知。§!"
 QIE_become_MP_shadow_tt: "§C自民国肇始，礼崩乐坏，皆因弃纲常而效西洋。今以救世新教为体，行监国辅弼之实，必扬王道于天下，立朝纲于四海。他日再造乾坤，仍奉大清正朔，圣主垂拱，王道重光。§!\n§Y救世新教将以新名义整合政局。§!"
 QIE_become_CERA_shadow_tt: "§t民权不可轻，君主不可无。§!\n§Y救世新教将以新名义整合政局。§!"
 QIE_become_YCP_shadow_tt: "§G凡议会之腐、党争之祸，皆因无神圣信仰为干城。今日中国，外患如潮，内贼如蠹，唯青年党人执干戈以卫社稷，吾等旧人，愿作甲胄。§!\n§Y救世新教将以新名义整合政局。§!"
 QIE_conspiracy_of_wushan: "救世新教的帮助？"
 QIE_conspiracy_of_wushan_desc: "这是掌教吴佩孚缺席救世新教新年会议的第九年。作为由政商界精英组成的慈善组织兼兄弟会团体，救世新教在协助挫败国民党造反之后成为了北京首屈一指的慈善机构。目前，掌教事务由当年主持丁巳复辟的江朝宗代为处理。§R但愿他们只是慈善组织。§!"
 QIE_help_of_wushan: "救世新教的帮助"
 QIE_help_of_wushan_desc: "§Y于1919年在河南广善坛成立的救世新教颇受北洋政府人士赏识，如今它已发展成北京最大的慈善组织。值此动荡时刻，救世新教得到了政府的资金支援，正在全力救助从动荡的八省联合地区逃难而来的流民。这需要一些时间。它证明了自己依然是北京最受政商界人士青睐的慈善组织。§!"
 QIE_hate_of_wushan: "逐渐扩大的八省流民危机"
 QIE_hate_of_wushan_desc: "随着一批又一批北上逃离兵难的流民进入信阳和武汉地区，北京政府对八省流民危机置若罔闻的选择正在逐渐付出代价。§R京畿的夜也静得可怕……§!"
