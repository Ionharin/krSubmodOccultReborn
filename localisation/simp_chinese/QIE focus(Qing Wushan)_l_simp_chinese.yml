 QIE_wushan_after_china_reborn_YCP_desc: "是时候了，既然中华已归于一统，我们在民间的威望已抵达了极点，我们就再没有必要借助青年党来提高我们的合法性了。长期以来这些喋喋不休的青年人就对我们的政策指手画脚，还对我们的扶乩活动嗤之以鼻。现在我们将彻底瓦解他们，寻回属于我们自己的安宁和平静。中华归于一统之后可见，触发事件“虚假联盟的终结”，70天后触发事件“我们在找你”，提高激进度"
 QIE_wushan_after_china_reborn_CERA_desc: "是时候了，既然中华已归于一统，我们在民间的威望已抵达了极点，我们就再没有必要借助帝国宪政会来提高我们的合法性了。长期以来这些喋喋不休的青年人就对我们的政策指手画脚，还对我们的扶乩活动嗤之以鼻。现在我们将彻底瓦解他们，寻回属于我们自己的安宁和平静。触发事件“帝国宪政会的终结”，70天后触发事件“北平车站的枪声”，提高激进度"
 QIE_wushan_after_china_reborn_MP_desc: "是时候了，既然中华已归于一统，我们在民间的威望已抵达了极点，我们就再没有必要借助宗社党来提高我们的合法性了。为了合理地从这些遗老手中夺取利益，救世新教已策划了一场慈善晚宴，我们将在晚宴上宣布新的经商政策，通过“自愿”发放更多的股权并由国家购买，我们就可以控制他们的产业。如果他们真要为了这点钱拒绝合作，那我们也有办法……触发事件“宗社党的终结”，70天后触发事件“在海拉尔”，提高激进度"
 QIE_after_wushan_control_whole_china_luoyang_building_desc: "这个国策将触发一个事件，根据选项决定是否提高激进度"
