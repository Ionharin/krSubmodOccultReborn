 QIE_ws_jiang_chao_zong: "江朝宗"
 QIE_eight_mighty_dragon_scripture: "残经"
 QIE_eight_mighty_dragon_scripture_desc: "赤明开图，运度自然；元始安镇，敷落五篇；赤书玉字，八威龙文；保制劫运，使天长存。\n\n乩坛已重开于燕京，但龙文仍停留在诵读与誓愿之中。教众记其名而未尽知其义，官府借其威而未得其实。此刻的八威龙文，只是风暴前的一卷空白天书。"
 QIE_eight_mighty_dragon_scripture_taixi: "玄玄秘录"
 QIE_eight_mighty_dragon_scripture_taixi_desc: "龙文西传，先入市井与工场。救世新教以“济世”之名吸纳外邦技艺，将慈善、工务与军需缝合为一体：机器昼夜不息，仓廪得以充盈，民众在动员中学会服从。\n\n“泰西”并非弃夏从夷，而是借其器、取其法、役其力，使新政权在喧嚣与钢铁之间站稳脚跟。"
 QIE_eight_mighty_dragon_scripture_zhongtu: "先天浑元玄玄秘录"
 QIE_eight_mighty_dragon_scripture_zhongtu_desc: "龙文还本中土，复以礼乐纲常为骨。乩坛话语不再止于劝善，而是化为秩序：乡绅与士人重归朝列，民心在“正名”与“安分”中渐次归拢，政令由此得以贯通上下。\n\n“中土”之义，在于以华夏旧典驯服乱世新权，使国家不只能够运转，更能被相信。"
 QIE_eight_mighty_dragon_scripture_longzhang: "八威龙文"
 QIE_eight_mighty_dragon_scripture_longzhang_desc: "及至龙章既成，泰西之器与中土之道终于并轨。工场、官署与乩坛同声相应，战时可聚众力，平时可养民生；外来之术不再漂浮，旧日之礼不再迟钝，二者俱为国家所用。\n\n此时的八威龙文，已非一纸符箓，而是一整套统御天下的章程：能召集，能生产，能安民，亦能定乱。"
 QIE_wang_jinghui_academy: "镜慧公学"
 QIE_wang_jinghui_academy_desc: "以赈济与教化为名而设的新式学术机构，汇聚工务、电子与基础科学人才，为救世新教的国家建设提供持续智力支撑。"
 QIE_inner_sage: "内圣"
 QIE_inner_sage_desc: "§C天降彝伦，立我烝民。纲常所在，即社稷所系。凡冠带之伦、诗书之泽，皆当执礼以守，抱义以死。圣人之道，非徒修身，实为甲胄。内则正心以齐众，外则据德以退敌。一民一土，皆受命于天；毫厘之失，便是礼崩乐坏。故曰：内圣不摇，外侮奚入。§!"
 QIE_outer_king: "外王"
 QIE_outer_king_desc: "§C天下非一人之天下，然道德者天下之共器也。五教未行之处，即禽兽游走之地；圣化未沾之民，皆倒悬待救之魂。今以仁义为旌旗，以乩谕为斧钺，驱长车而出玉门，扬德音而渡重洋。非嗜杀也，实不忍彼苍生久沦苦海。王者之师，有征无战；大同之世，孰敢不来。§!"
 QIE_wushan_madan_spirit: "马丹"
 QIE_wushan_madan_spirit_desc: "军中以强行攻势为先，强调敢战与速决。此法能在短期内提升前线冲击能力与部署效率，却也使部队防御韧性与战斗损耗承受更高代价。"
 QIE_wushan_human_tide_spirit: "聚兵成塔"
 QIE_wushan_human_tide_spirit_desc: "救世新教强调以密集兵员与持续训练维持前线韧性。部队成军速度与组织耐受得到再塑，但高强度动员同样带来更大的经验磨损。"
 QIE_wushan_elite_soldiers_spirit: "精兵干戚"
 QIE_wushan_elite_soldiers_spirit_desc: "救世新教以精练军制重塑骨干部队，强调精兵先行与核心战力保存。此举可有效降低实战损耗，但长期强化训练也将延长部队成军周期。"
 QIE_wushan_zhili_arsenal_state_modifier: "直隶救世武备局"
 QIE_wushan_zhili_arsenal_state_modifier_desc: "救世新教在直隶设立了统筹军需、产线与工务调配的武备机构，区域工业动员效率因此得到显著提升。"
 QIE_jingchun_army_bureau: "救世景纯真人军机局"
 QIE_jingchun_army_bureau_desc: "以乩坛训诫整编旧式军伍，景纯真人军机局主张以严密组织与持续练兵弥补装备与制度短板。军中纪律与协同有所提升，但为维持这套体系，社会稳定将付出一定代价。"
 QIE_jingchun_army_bureau_upgraded: "救世景纯真人军机局"
 QIE_jingchun_army_bureau_upgraded_desc: "军机局完成制度整训后，旧伍不再只是维持秩序的武装，而成为可持续动员的主力。其步兵战斗效能与练兵效率显著提高，但社会仍需承担这套体系的治理成本。"
 QIE_jingchun_army_bureau_tank_upgraded: "救世景纯真人军机局"
 QIE_jingchun_army_bureau_tank_upgraded_desc: "军机局在装甲化建设下完成转型，重心转向机动作战与突破协同。其装甲兵战力与整训效率明显提升，同时仍保留高压整军所带来的组织代价。"
 QIE_jingchun_army_bureau_tank_upgraded_2: "救世景纯真人军机局"
 QIE_jingchun_army_bureau_tank_upgraded_2_desc: "军事重组完成后，军机局将机动突击学说进一步制度化。装甲部队在推进、补给与战场持续作战方面获得全面强化，形成更具压迫性的突破能力。"
 QIE_jingchun_army_bureau_upgraded_2: "救世景纯真人军机局"
 QIE_jingchun_army_bureau_upgraded_2_desc: "军事重组完成后，军机局将稳固防御与地域适应训练体系全面下沉至一线部队。步兵火力与防护进一步提升，且在极端气候与筑垒作战中具备更强持久力。"
 QIE_buddhism_stage_2: "千叶莲华"
 QIE_confucism_stage_2: "乐只君子"
 QIE_jesus_stage_2: "外邦人的光"
 QIE_mohammad_stage_2: "以没落时的星宿盟誓"
 QIE_wushan_events.6.t: "焚香"
 QIE_wushan_events.6.desc: "借着直系军阀对八省联合的崩溃袖手旁观，和谐社团的秩序如沙塔般瓦解的现状，救世新教趁势接管了北京的行政系统。然而，随着教统从虚职变为实权，这“慈善组织”内部的权力天平，终于彻底失衡。\n江朝宗与吴佩孚自政变以来便分坐吕祖阁东西两侧的厢房，表面仍同赴扶乩，暗中已各施神通。为维持教众面前的和睦假面，每月的例行降鸾仍是必须到场的表演。今夜由慈智居士担任乩手，请纯阳真人吕祖下降。参与扶乩的各人都手持仙香，在此地，仙香的品质就是权力与地位的无声宣言。江朝宗手中那支，是从日本旧友处凭重金得来的伽罗金刚香，紫烟沉厚，如苍龙蟠柱；吴佩孚所持的，则是从山东曲阜孔林采制的古柏香，清瘦挺拔，似君子临风。\n\n正值此时，乩盘上的沙迹开始游走。一笔一划，殿中众人屏息，寂静如坟。吕祖降笔，赐诗四句：\n\n“东海水深不可航，西山月暗路偏长。欲知天命归何处，且看谁人焚此香。”\n\n最后一笔落下，乩盘戛然而止。满殿无人敢出声。只有香火明灭，两柱烟柱笔直上升，在梁上交缠，如同二龙相斗，难分胜负。此刻，不知是何人心思疏漏，竟忘记掩好门窗，一股夜风从阁外钻入，不疾不徐，却精准地扑向该去的地方。"
 QIE_wushan_events.6.a: "伽罗香灭，金刚不护其主"
 QIE_wushan_events.6.b: "柏香中折，圣人不度其途"
 QIE_wushan_events.6.c: "双香同烬，乩语不成真谶"
 QIE_wushan_events_6_a_tt: "江朝宗与他的日本友人之间的密约最终未能成功。吴佩孚将成为救世新教唯一的领袖。"
 QIE_wushan_events_6_b_tt: "明经学会的儒冠，抵不过东瀛的金刚之烟。江朝宗将成为救世新教唯一的领袖。"
 QIE_wushan_events_6_c_tt: "风停了。什么都没发生。"
 QIE_two_leaders_bonus_1: "智玄副教统"
 QIE_two_leaders_bonus_2: "无言者之诏"
 QIE_wushan_debt_repayment: "债务偿还"
 QIE_wushan_debt_repayment_desc: "账簿尚未清空，喘息已然可贵。政府以牺牲部分民生与社会情绪为代价，换取了短暂的财政秩序与信用续命。"
 QIE_wushan_events.7.t: "债务清偿完毕"
 QIE_wushan_events.7.desc: "最后一笔到期款项已如约划拨，旧债条目自总账上逐一勾销。压在案头多时的本息清单终于合上，财政部得以暂时卸下这副沉重枷锁。"
 QIE_wushan_events.7.a: "无债一身轻"
 QIE_wushan_events.8.t: "社会人士慷慨解囊"
 QIE_wushan_events.8.desc: "随着赈济网络重新运作，各地绅商、会馆与地方团体纷纷送来款项与物资。虽然这份援助并不能从根本上解决所有问题，但至少足以让眼前危局暂时缓和。"
 QIE_wushan_events.8.a: "解燃眉之急！"
 QIE_wushan_military_reorg_tactic_tt: "在我们完成军事重组后，我们侧重的战术将展现其作用"
 QIE_wushan_military_end: "奉教明刑"
 QIE_wushan_military_end_desc: "教化不足，则刑戮继之。"
 QIE_wushan_foreign_investment_category: "引进外资"
 QIE_wushan_foreign_investment_category_desc: "在放宽部分投资限制后，我们可以通过一系列政策进一步引导外来资本流向国家建设。"
 QIE_wushan_refugee_crisis_category: "八省流民危机"
 QIE_wushan_refugee_crisis_category_desc: "战乱持续发酵，流民正在以超出地方承载能力的速度涌入。若不能及时建立有效安置体系，社会秩序将迅速恶化。"
 QIE_wushan_black_diamond_category: "控制黑色钻石"
 QIE_wushan_black_diamond_category_desc: "围绕煤炭与战略矿产的争夺将决定我们的工业命脉。是借外力扩张矿脉，还是独自掌控收益，将塑造完全不同的资源格局。"
 QIE_wushan_coal_mining_principle_modifier: "煤矿开采原则"
 QIE_wushan_coal_mining_principle_modifier_desc: "围绕煤矿勘探与开采所采取的组织原则，将直接影响我们对煤炭资源的获取效率。"
 QIE_wushan_survey_shanxi_vein: "勘探山西矿脉"
 QIE_wushan_survey_shanxi_vein_desc: "组织地质队与工务组进入山西一带开展煤矿勘探。需要至少2座民用工厂支撑勘探调度。"
 QIE_wushan_survey_tangshan_vein: "勘探唐山矿脉"
 QIE_wushan_survey_tangshan_vein_desc: "对唐山周边矿脉进行系统勘探并建立初步开采评估。需要至少2座民用工厂支撑勘探调度。"
 QIE_wushan_survey_guisui_vein: "勘探归绥矿脉"
 QIE_wushan_survey_guisui_vein_desc: "派遣地质勘测力量前往归绥地区，以确认可持续开采的煤矿储量。需要至少2座民用工厂支撑勘探调度。"
 QIE_wushan_survey_guanzhong_coal: "勘探关中煤矿"
 QIE_wushan_survey_guanzhong_coal_desc: "在外资协作框架下开展关中煤矿深度勘探。需要至少2座民用工厂支撑勘探调度。"
 QIE_black_diamond_unlock_tt: "§C如果我们选择和洋人合作，我们将能勘测更多矿脉，但他们会得到属于他们的一份。\n如果我们独自进行这项工作，虽然可利用的资源会变少，但将全部为我们所用§!"
 QIE_wushan_refugees_fleeing_war: "战乱流民正在逃难"
 QIE_wushan_refugees_fleeing_war_desc: "我们必须在90天内完成§Y贫民工厂§!相关安置方案，否则社会将为失序付出沉重代价。"
 QIE_wushan_open_temporary_gruel_kitchens: "开办临时粥厂"
 QIE_wushan_open_temporary_gruel_kitchens_desc: "通过紧急设立临时粥厂与施济点，短期缓和流民冲击，争取更多时间推进制度化安置。"
 QIE_wushan_launch_public_fundraising: "发动社会募捐"
 QIE_wushan_launch_public_fundraising_desc: "动员地方士绅、商会与宗教网络发起公开募捐，以财政与社会资源缓解流民冲击。"
 QIE_wushan_request_international_relief: "向国际援助组织求援"
 QIE_wushan_request_international_relief_desc: "通过对外渠道争取紧急援助物资和资金，换取危机处置时间，并改善国际观感。"
 QIE_wushan_a_secret_remittance: "一笔秘密汇款"
 QIE_wushan_a_secret_remittance_desc: "一笔来路不明却数额可观的汇款正在办理转入，来源与条件仍被层层保密。"
 QIE_wushan_unlock_foreign_investment_decisions_tt: "解锁决议：§Y引进外资§!"
 QIE_wushan_buy_german_rifles: "购买德国步枪"
 QIE_wushan_buy_german_rifles_desc: "通过外资渠道直接采购一批德制步枪，以缓解前线装备短缺。"
 QIE_wushan_buy_japanese_rifles: "购买日本步枪"
 QIE_wushan_buy_japanese_rifles_desc: "通过对日渠道采购一批制式步枪，快速补充现有库存缺口。"
 QIE_wushan_japanese_zaibatsu_funds: "引入日本商社周转金"
 QIE_wushan_japanese_zaibatsu_funds_desc: "引入来自日本商社的短期周转资金，暂时压低财政负担并推动民用建设，但其代价将在项目结束后显现。"
 QIE_wushan_support_from_beyond_the_pass: "来自关外的资助？"
 QIE_wushan_support_from_beyond_the_pass_desc: "尝试争取关外资本与渠道支援，以缓解当前工业建设压力。"
 QIE_wushan_seek_zhili_merchant_support: "争取直系旧商支持"
 QIE_wushan_seek_zhili_merchant_support_desc: "动员旧直系商路与地方商会协同投入，换取更快的民政与基建推进速度。"
 QIE_wushan_accept_daben_donation: "接受大本教慈善汇款"
 QIE_wushan_accept_daben_donation_desc: "来自大本教网络的慈善汇款将用于支持当前政府的基础运转与投资项目。"
 QIE_wushan_daben_donation: "大本教慈善汇款"
 QIE_wushan_daben_donation_desc: "在大本教渠道的慈善资金支持下，政府获得了额外的地图外民用产能。"
 QIE_wushan_poor_relief_society: "贫民赈济会"
 QIE_wushan_poor_relief_society_desc: "赈济会以粥厂、施药与临时安置维持城市底层秩序，在短期内稳定了社会情绪，但财政与行政负担也随之增长。"
 QIE_wushan_rebuild_labor_cooperative_institute: "重建劳工合作院"
 QIE_wushan_rebuild_labor_cooperative_institute_desc: "在新的社会治理框架下，劳工合作院被重组为兼具安置与调配职能的机构。它能减轻财政压力并加快建设，但也压缩了可动员兵源。"
 QIE_wushan_relief_unsustainable_tt: "赈济出于善业，成本难以为继，我们将能在后续改善现状。"
 QIE_forced_producing_plan_tt: "§C我们将把流民安排在赈济工厂中，通过提高工厂的生产效率来最大化支配人力资源。§!"
 QIE_247_producing_plan_tt: "§C我们将把流民安排在赈济工厂中，通过采用不舍昼夜的新型工作方式来提高产量，最大化解决流民问题。§!"
 QIE_chaotic_fruit: "混乱的果实"
 QIE_chaotic_fruit_desc: "各方权柄缠结于一体，政令纷杂、上下一心难成。它带来的是短期的可战性与长期的统治代价。"
 QIE_fond_of_merit_but_kills_recklessly: "喜功妄杀"
 QIE_fond_of_merit_but_kills_recklessly_desc: "好大喜功，赏罚失度。对外强硬带来短时动员热情，却也不断侵蚀国内秩序与可持续兵源。"
 QIE_confucian_general: "儒将"
 QIE_four_nots_scholar: "四勿先生"
 QIE_four_nots_scholar_desc: "非礼勿视，非礼勿听，非礼勿言，非礼勿动。江朝宗以礼法自矜，以神道行权，在收束舆情与党争稳态上手段老辣。"
 QIE_after_wushan_control_whole_china_southern_building: "青州发展计划"
 QIE_after_wushan_control_whole_china_qingzhou_building: "铸少阳青州鼎"
 QIE_after_wushan_control_whole_china_xuzhou_building: "铸东原徐州鼎"
 QIE_after_wushan_control_whole_china_yangzhou_building: "铸江都扬州鼎"
 QIE_after_wushan_control_whole_china_jinzhou_building: "铸江陵荆州鼎"
 QIE_after_wushan_control_whole_china_jiangzhou_building: "铸成都梁州鼎"
 QIE_after_wushan_control_whole_china_yizhou_building: "铸长安雍州鼎"
 QIE_after_wushan_control_whole_china_yuzhou_building: "铸神功豫州鼎"
 QIE_after_wushan_control_whole_china_yanzhou_building: "铸日观兖州鼎"
 QIE_after_wushan_control_whole_china_jizhou_building: "铸武兴冀州鼎"
 QIE_after_wushan_control_whole_china_luoyang_building: "重铸雒阳之鼎"
 QIE_wushan_alliance_with_germany: "重燃丁巳之情"
 QIE_wushan_never_alliance: "赤县上邦"
 QIE_wushan_alliance_with_canada: "与旧协约国的友谊"
 QIE_wushan_after_china_reborn_CERA: "离间保救会"
 QIE_wushan_after_china_reborn_YCP: "诛杀国贼"
 QIE_wushan_after_china_reborn_MP: "喂饱勋贵"
 QIE_wushan_after_china_reborn_YCP_desc: "中华归于一统之后可见，触发事件“虚假联盟的终结”，70天后触发事件“我们在找你”，提高激进度"
 QIE_wushan_after_china_reborn_CERA_desc: "中华归于一统之后可见，触发事件“帝国宪政会的终结”，70天后触发事件“北平车站的枪声”，提高激进度"
 QIE_wushan_after_china_reborn_MP_desc: "中华归于一统之后可见，触发事件“宗社党的终结”，70天后触发事件“在海拉尔”，提高激进度"
 QIE_after_wushan_control_whole_china_luoyang_building_desc: "这个国策将触发一个事件，根据选项决定是否提高激进度"
 QIE_wushan_punishment_those_enemies: "复仇者的信"
 QIE_industry_focus_rely_on_foreigner_country: "合作建设计划"
 QIE_industry_focus_independent_planned_economy: "资金倍增计划"
 QIE_decide_adopt_forced_producing_plan: "不肯做工，不可吃饭"
 QIE_decide_adopt_247_producing_plan: "不劳动者不得食"
 QIE_adopt_start_coal_mining_search: "开始勘测煤炭"
 QIE_adopt_start_steel_producing_search: "建设北平钢铁机械厂"
 QIE_adopt_start_tungsten_producing_search: "开采战略金属"
 QIE_seize_the_gold_mine: "重新利用叛军资金"
 QIE_wushan_china_united_again_lower_phase_desc: "中华已归于一统，如果领袖是江朝宗升级+换黑黄色国旗。吴佩孚升级+换黄黑色国旗。钱能训，则升级为缁银色旗帜"
 QIE_wushan_china_united_again_lower_phase: "五德终始"
 QIE_wushan_events.9.t: "德国人要求更好的条件"
 QIE_wushan_events.9.desc: "与德方工程与贷款代表的后续磋商进入关键阶段。对方表示，若要继续扩大合作规模，需要我们在政策与利益分配上给出更多让步。"
 QIE_wushan_events.9.a: "比起意识形态，我们更欢迎实业"
 QIE_wushan_events.9.b: "我们必须保卫自己的生活"
 QIE_wushan_fiscal_reorg_tt: "§C我们将重组当前的财政系统，这将短期内带来冲击，但会在六个月后迎来巨大的改善§!"
 QIE_wushan_fiscal_reorganization: "重组财政系"
 QIE_wushan_fiscal_reorganization_desc: "财政体系被强制重组，旧有分配网络与预算流程正在拆解重编。短期阵痛难以避免，但这被视作恢复国家调度能力的必要代价。"
 QIE_wushan_relief_finance_bureau: "救务赈财院"
 QIE_wushan_relief_finance_bureau_desc: "经过半年重组，新的救务赈财院将赈济、税务与建设拨款纳入统一管线。财政调度效率显著提高，国家建设开始进入更有组织的加速阶段。"
 QIE_wushan_events.10.t: "财政系重组完毕"
 QIE_wushan_events.10.desc: "六个月的制度清理与预算重排终于告一段落。新财政框架虽仍有摩擦，却已初步形成一套可持续运作的调度体系。"
 QIE_wushan_events.10.a: "适合于中国自己的财政方式！"
 QIE_wushan_black_diamond_action_ongoing: "勘探队正在行动中"
 QIE_wushan_kunpeng_fund_category: "鲲鹏振浪扶摇，径上昆仑九霄"
 QIE_wushan_kunpeng_fund_category_desc: "当秩序恢复之后，旧有金库、账册与流散资金将重新进入权力视野。如何调度这笔储备，将决定下一阶段国家机器的速度。"
 QIE_wushan_seize_financial_reserves: "夺取资金储备"
 QIE_wushan_seize_financial_reserves_desc: "在完成金矿与财政节点整合后，我们将尝试接管并集中关键资金储备。"
 QIE_restore_order_tt: "§P我们将恢复关内秩序§!"
 QIE_tangdi_zhihua: "棠棣之华"
 QIE_tangdi_zhihua_desc: "常棣之华，鄂不韡韡。凡今之人，莫如兄弟。\n死丧之威，兄弟孔怀。原隰裒矣，兄弟求矣。\n脊令在原，兄弟急难。每有良朋，况也永叹。\n兄弟阋墙，外御其务。每有良朋，烝也无戎。"
