 QIE_restore_order_tt: "§P我们将恢复关内秩序§!"
 QIE_tangdi_zhihua: "棠棣之华"
 QIE_tangdi_zhihua_desc: "常棣之华，鄂不韡韡。凡今之人，莫如兄弟。\n死丧之威，兄弟孔怀。原隰裒矣，兄弟求矣。\n脊令在原，兄弟急难。每有良朋，况也永叹。\n兄弟阋墙，外御其务。每有良朋，烝也无戎。"
 QIE_the_government_which_wave_foreigners: "笑面盈盈的体面政府"
 QIE_wushan_belligerent_government: "好战的政府"
 QIE_wushan_belligerent_government_desc: "机会已至，如今我们终于不再需要伪装成一个追求全球化睦邻政策，一个卖国求荣的政府了。现在我们在先前得到的利益，都将成倍地用于开动我们的战争机械……"
 QIE_wushan_jiang_establish_the_editing_and_translation_department: "重设四夷编译司"
 QIE_jiang_fanatics_militia_for_master: "护坛乡勇尽归册"
 QIE_wushan_jiang_fanatics_militia_for_master: "护香义勇尽归册"
 QIE_wushan_jiang_confirmed_as_the_leader: "四勿轩主人"
 QIE_wushan_jiang_confirmed_as_the_leader_desc: "中华已准备好归于一统"
 QIE_wushan_wu_our_precious_traditional_culture: "我们珍贵的生活传统"
 QIE_wushan_precious_tradition: "珍贵的传统"
 QIE_wushan_precious_tradition_desc: "在旧有乡里与礼序的再组织下，社会获得了短期稳定与人口恢复，但也带来了更多民生供养负担。"
 QIE_wushan_scriptural_police: "经教警察"
 QIE_wushan_scriptural_police_desc: "以经典名义整肃基层治安与社会秩序，短期内巩固了统治稳定。"
 QIE_wushan_wu_enforcing_ethics_through_military_orders: "以军令扬礼法"
 QIE_wushan_left_wing_army_right_wing_altar: "东厢掌军，西厢掌坛"
 QIE_wushan_two_leader_the_order_of_non_speaker: "无言者之诏"
 QIE_wushan_reassess_the_financial_situation: "重核财政账册"
 QIE_wushan_the_new_government_reviving_tradition: "复兴传统的新政府"
 QIE_wushan_establish_fair_social_standards: "谨权量"
 QIE_wushan_revise_cautions_laws: "审法度"
 QIE_wushan_restore_abolished_positions: "修废官"
 QIE_wushan_forcing_prisoners_to_work: "习艺所与教养局"
 QIE_wushan_contact_with_the_social_elites: "接触社会精英"
 QIE_wushan_restore_squire_council: "重组缙绅议会"
 QIE_wushan_dual_leadership_bop: "§Y真人居中升座，生者分侍两厢§!"
 QIE_wushan_bop_jiang_side: "江朝宗主导"
 QIE_wushan_bop_wu_side: "吴佩孚主导"
 QIE_wushan_bop_support_jiang: "善款包装"
 QIE_wushan_bop_support_jiang_desc: "我们可以尝试将我们的政治献金包装为慈善捐款，将其委托给对方的运作的地方赈灾组织“代为处理”。"
 QIE_wushan_bop_support_wu: "以兵代赈"
 QIE_wushan_bop_support_wu_desc: "通过将无所事事的流民编入民兵队，一方面能够缓解流民的就业问题，另一方面又能够借助他们处理治安问题。"
 QIE_wushan_bop_jiang_power_hijacked: "慧济居士劫持鸾务院"
 QIE_wushan_bop_jiang_total_control: "慧济居士掌控鸾务院"
 QIE_wushan_bop_jiang_pressure: "江朝宗施压鸾务院"
 QIE_wushan_bop_balanced_court: "鸾务院维持平衡"
 QIE_wushan_bop_wu_pressure: "吴佩孚施压鸾务院"
 QIE_wushan_bop_wu_total_control: "智玄居士掌控鸾务院"
 QIE_wushan_bop_wu_supreme_power: "智玄居士劫持鸾务院"
 QIE_wushan_bop_celebrity_liaison_fee: "批准名流联谊劳务费"
 QIE_wushan_bop_celebrity_liaison_fee_desc: "以筹款为名义邀请社会名流参加慈善晚宴是个非常正当的理由，鸾务院没有恰当的理由拒绝我们的拨款要求。我们可以从这里着手，输送一些利益。"
 QIE_wushan_bop_extra_funding_army_bureau: "为军机局额外拨款"
 QIE_wushan_bop_extra_funding_army_bureau_desc: "我们必须快速行动，建成一只能够应对即将到来的困难的现代军队。为此向鸾务院要求更多拨款是合理的。"
 QIE_wushan_bop_subsidize_industrialists: "补贴实业家"
 QIE_wushan_bop_subsidize_industrialists_desc: "企业主和实业家是我们政府不可或缺的一部分，如果没办法喂饱他们，就会有千千万万的工人和平民挨饿。我们应该对他们的生产进行补贴。"
 QIE_wushan_bop_strengthen_military_training: "加强军事训练"
 QIE_wushan_bop_strengthen_military_training_desc: "我们的看家领域正是兵法，即便拥有了能够主宰中华大地的长枪短炮，如果没有合理的军事方法和严格的纪律，我们的部队依然会被一支鞭炮冲散。"
 QIE_wushan_bop_introduce_elites_to_salvationism: "介绍名流加入救世新教"
 QIE_wushan_bop_introduce_elites_to_salvationism_desc: "一位来自使馆城市的社会名流对我们的组织非常感兴趣，如果我们能为他举办入会仪式接受他入会，他或许能为我们带来意想不到的利益。"
 QIE_wushan_bop_expand_salvationism_in_officer_corps: "在军官团中发展新教"
 QIE_wushan_bop_expand_salvationism_in_officer_corps_desc: "想想辛亥革命是如何发生的，正是因为各地新军任用有着革命思想的军官和归国青年，才导致他们被渗透成了筛子。而由袁世凯率领的北洋六镇因为在精神上都接受了同一套教育，才能免于这些邪恶的革命思想的毒害。如果我们能在军官团中进一步宣讲救世新教的道德和爱国教义，我们就能最大限度确保士兵们的枪握在军官手中，而军官的思想握在我们的手中。"
 QIE_wushan_submitting_to_the_king_category: "率宾归王"
 QIE_wushan_submitting_to_the_king_category_desc: "“坐朝问道，垂拱平章。爱育黎首，臣伏戎羌。遐迩一体，率宾归王。”\n\n这由知名学者周兴嗣所作的千字文，在过去数千年中在中华大地上被无数人传唱，道出了中华人民对天下一体，万民同心的美好向往。但试看今日神州之河山，四方分裂，礼崩乐坏，群雄割据。各地伪政权实行着他们的“霸道”。\n\n四海的百姓都陷入到痛苦和绝望之中，无不希羡着华北平原礼法有序，歌舞升平的现状；无不仰慕着北京政府鸣凤在竹，白驹食场的仁政。是时候了，作为中华大地唯一的“王道”，我们将讨伐这些僭主，将人民从他们手中解放出来。"
 QIE_wushan_punish_jinyang: "伐晋阳之罪"
 QIE_wushan_punish_jinyang_desc: "长期以来山西政府都号称自己是中华大地上唯一合法的政府，但如今以[SHX.GetLeader]为首的土匪山贼虐待百姓，横征暴敛，酒池肉林的商纣旧事已被一个从山西逃荒而来的难民所揭露。我们无法容忍这样的行为，我们将彻底消灭盘踞在山西的非法政权！"
 QIE_wushan_punish_sichuan: "伐巴蜀之罪"
 QIE_wushan_punish_sichuan_desc: "长期以来四川政府都号称自己是中华大地上唯一合法的政府，但如今以[SZC.GetLeader]为首的土匪山贼虐待百姓，横征暴敛，酒池肉林的商纣旧事已被一个从四川逃荒而来的难民所揭露。我们无法容忍这样的行为，我们将彻底消灭盘踞在四川的非法政权！"
 QIE_wushan_punish_liangguang: "伐岭南之罪"
 QIE_wushan_punish_liangguang_desc: "长期以来四川政府都号称自己是中华大地上唯一合法的政府，但如今以[GXC.GetLeader]为首的土匪山贼虐待百姓，横征暴敛，酒池肉林的商纣旧事已被一个从两广逃荒而来的难民所揭露。我们无法容忍这样的行为，我们将彻底消灭盘踞在两广的非法政权！"
 QIE_wushan_punish_hunan: "伐荆楚之罪"
 QIE_wushan_punish_hunan_desc: "长期以来湖南政府都号称自己是中华大地上唯一合法的政府，但如今以[HNN.GetLeader]为首的土匪山贼虐待百姓，横征暴敛，酒池肉林的商纣旧事已被一个从两广逃荒而来的难民所揭露。我们无法容忍这样的行为，我们将彻底消灭盘踞在湖南的非法政权！"
 QIE_wushan_punish_fengtian: "伐黑水之罪"
 QIE_wushan_punish_fengtian_desc: "长期以来奉天政府都号称自己是北洋政府最后的堡垒，但如今以[FNG.GetLeader]为首的卖国政府与日本人之间的肮脏交易已被披露，他试图将东北地区拱手赠予日本人。我们无法容忍这样的行为，我们将彻底消灭盘踞在关外的伪政府，汉奸，外国人的走狗！"
 QIE_wushan_punish_lkmt: "伐吴越之罪"
 QIE_wushan_punish_lkmt_desc: "长期以来奉天政府都号称自己是北洋政府最后的堡垒，但如今以张作霖为首的卖国政府与日本人之间的肮脏交易已被披露，他试图将东北地区拱手赠予日本人。我们无法容忍这样的行为，我们将彻底消灭盘踞在关外的伪政府，汉奸，外国人的走狗！"
 QIE_wushan_restore_ethical_order: "恢复伦理纲常"
 QIE_wushan_restore_ethical_order_desc: "儒家伦理是中华文明与国家建设的基石，在过去十几年中我们接受了西方思想，忽视了自己祖先传下来的珍贵宝物。现在是时候重新在社会中宣扬我们的优秀文化了。"
 QIE_wushan_enforce_salvationist_legal_code: "推行《救世约法》"
 QIE_wushan_enforce_salvationist_legal_code_desc: "早在共和革命之前，我国就有诸如《大清刑律》和《大清民律》之类的司法与宪法原则。只是由于之前共和国人士卑鄙无耻的窃国行为，这些基于我国国情制定的法律并未能实际投入实践。我们将在社会上推行继承了它们的新法律《救世约法》。"
 QIE_wushan_salvationist_legal_code: "《救世约法》"
 QIE_wushan_salvationist_legal_code_desc: "早在共和革命之前，我国就有诸如《大清刑律》和《大清民律》之类的司法与宪法原则。只是由于之前共和国人士卑鄙无耻的窃国行为，这些基于我国国情制定的法律并未能实际投入实践。我们将在社会上推行继承了它们的新法律。在经过了一段时间的交接期之后，在我们统治的地区都已开始正式实行《救世约法》。"
 QIE_wushan_revived_enyin_system: "死灰复燃的恩荫制度"
 QIE_wushan_revived_enyin_system_desc: "旧有恩荫网络在新政下再次活跃，短期内稳固了秩序，却拖累了政务效率。"
 QIE_wushan_contact_elites_tt: "§C通过我们建立的恩荫制度给予一些知识分子好处，我们或许可以收买他们为我们发声。§!"
 QIE_wushan_temporary_friendly_ties: "我们与世界暂时的友善关系"
 QIE_wushan_temporary_friendly_ties_desc: "我们的新生政权现在如此弱小，过去的政府给我们留下的是一个如同废墟一般的国家。为了改善现状，我们最好的选择就是在外交层面上对强权们示以友好。列强们看上了我们土地之下的矿产和我们充沛的人力资源，而我们或许可以利用这些换取到对我们有利的东西……\n\n§R一旦开战，救世新教将撕去这幅伪装§!"
 QIE_wushan_siyi_translation_institute: "四夷编译院"
 QIE_wushan_siyi_translation_institute_desc: "汇集诸方译员与学人，译介海外典籍，作为救世新教对外认知与宣传的枢纽机构。"
 QIE_wushan_jiang_establish_the_editing_and_translation_department_tt: "§C我们将得以翻译海外博物典籍，§R在可预见的将来，编译院也能派上用场。§!"
 QIE_wang_jinghui_academy_upgrade: "镜慧公学（扩编）"
 QIE_wang_jinghui_academy_upgrade_desc: "在编译司的支援下，镜慧公学得以系统引介海外知识体系，形成更高效的工业与电子研究网络。"
 QIE_wushan_china_united_again_next_step_tt: "§R中华已经统一，我们将决定我们的下一步计划§!"
 QIE_wushan_blades_sigils_and_thunderfire: "大刀，神符与五雷火枪"
 QIE_wushan_blades_sigils_and_thunderfire_desc: "救世新教的乡勇编组在符箓与火器并行的信念下成形。它并非现代化军队，却足以在乱局中撕开一道缺口。"
 QIE_wushan_negotations_with_YCP: "为崭新中华的大步向前"
 QIE_wushan_negotations_with_YCP_desc: "教统和中国青年党的代表都承认，如今的华北政府需要对国营企业和军事工业开展一场轰轰烈烈的大改革。为了祛除满清勋贵和军阀旧疾。我们已和YCP携手。"
 QIE_wushan_negotitations_with_CERA: "重要的是多数人的幸福"
 QIE_wushan_negotitations_with_CERA_desc: "长期以来的军阀混战使得我们的农村地区十分脆弱。教统十分赞同CERA对大片遭废弃的乡村土地的重视。"
 QIE_wushan_negotitations_with_MP: "确保本国企业家的利益"
 QIE_wushan_negotitations_with_MP_desc: "我们不得不承认，这些勋贵在之前较为宽松的时期依靠资本建立了大量非德控企业。"
 QIE_wushan_ycp_one_year_special_plan: "青年党的一年特别计划"
 QIE_wushan_ycp_one_year_special_plan_desc: "青年党以一年为限推动统筹建设与产业整顿，试图在政治与工业之间建立新的效率秩序。"
 QIE_wushan_rural_revival_movement: "乡土复兴运动"
 QIE_wushan_rural_revival_movement_desc: "通过整合地方社团、乡绅资本与基层建设资源，政府试图在一年内快速提升乡土地区的承载能力与生产基础。"
 QIE_wushan_subsidize_domestic_enterprises_first: "以贴补本国企业优先"
 QIE_wushan_subsidize_domestic_enterprises_first_desc: "政府将财政资源优先投入本国企业，通过贴补与政策倾斜提升其生存与扩张能力。"
 QIE_debt_negotiation_ycp_betrayed_tt: "§R这将使青年党人认为受到了背叛！§!"
 QIE_debt_negotiation_mp_betrayed_tt: "§R这将使宗社党企业主认为受到了背叛！§!"
 QIE_cancel_completely_ycp_resolve_tt: "§C我们向青年党人展示了我们的决心！§!"
 QIE_debt_negotiation_mp_env_tt: "§C我们令宗社党企业主相信健全的经商环境即将到来！§!"
 QIE_wushan_chawei_commissioner: "察微都统"
 QIE_wushan_chawei_commissioner_desc: "察微机关负责统筹基础反间与密探调度，建立起新政权的情报骨架。"
 QIE_wushan_full_power_chawei_commissioner: "全权察微都统"
 QIE_wushan_full_power_chawei_commissioner_desc: "江朝宗将察微机关升格为全权部门，赋予其更强的缉谍、反渗透与拘捕权限。"
 QIE_wushan_special_mandate_chawei_commissioner: "特命察微都统"
 QIE_wushan_special_mandate_chawei_commissioner_desc: "吴佩孚主导下的特命察微机关更强调情报网扩张与后方治安稳控。"
 QIE_wushan_rebuild_enyin_temporary: "重建特奏恩荫补官制度"
 QIE_wushan_rebuild_enyin_temporary_desc: "恩荫补官制度重建初期，人事与财政体系尚处磨合，短时扰动难免；但其政治动员能力正在迅速恢复。"
 china_events.70.d.wushan: "我国已有数千载之历史。两千年来，中国一直是亚洲的中心，无数小国仰慕其文明之光。然而，这个曾欲传承万世的帝国在上个世纪却陷入了剧烈动荡。大清朝虽然将中国的疆域扩张到了新的高度，但欧洲帝国主义的侵略却使帝国坠入前所未有的低谷。更糟糕的是，冥顽不灵的日本人在甲午战争中给予清朝沉重打击。神器倾覆之际，中国人民对帝制丧失了信心。\n\n1911年10月10日，这一天永远地改变了我国的命运。驻武昌新军中的革命党人发动叛乱反抗满清统治，辛亥革命由此爆发。革命浪潮席卷南方，而北方则在钦差大臣袁世凯的掌控下继续忠于清朝。然而，洞悉时势的袁世凯同意废黜幼帝溥仪，以换取大总统之位。起初，袁世凯被迫与革命者妥协，但他巧妙地将其边缘化，并不断扩张北洋系的势力。然而，他的复辟野心最终适得其反，引发了新的军阀混战时代。\n\n北伐失败后，分裂的时代宣告结束。吴佩孚、曹锟、孙传芳三位大帅为神州大地带来了和平，以宽仁之举迎回皇帝，开启了和平的新纪元。然而，1936年直系秩序崩溃，地方战乱再次爆发。历史已经证明，如今的政权如此短命完全是因为统治者放弃了传承千年的道德文明，转而开始谈论政法等等旁门左道。\n\n随着救世新教掌握了华北平原的广袤土地，重生的国家开始着手治理这个饱受科学，民主和那些外来思想毒害的国家。10月10日让我们记住了不脚踏实地，盲目追随外国鬼子的可悲下场，唯有中华传统美德方能指引我们治愈这片破碎的山河，中兴华夏！"
 china_events.70.option.d: "幸运的是，我们终究摆脱了它。"
 chinese_traditionalist: "§O礼教派§!"
 china_faction_alignment_name_traditionalist_china: "§O礼教派§!§Y阵营§!"
 china_faction_tenets_title_traditionalist_china: "§O礼教派§!§Y理念§!"
 china_faction_tenets_traditionalist_china_desc: "§L礼教派是中国最奇特的一群民族主义者与传统主义者，他们总体上是反动，反现代，反科学的。这一派的组织构成相当松散，思想来源也极为繁杂：其中既有守旧士绅、儒学名流，也有厌恶共和政治的旧官僚，以及在西化浪潮中感到惶恐不安的青年学人。大体而言，他们相信西方世界在遥远的过去也曾拥有过某种类似儒家文明的道德根基，只是在现代性的推进中将其逐渐遗失。而更加可憎的是，这套已经堕落的思想又随着列强的炮舰传入中国，反过来污染了本应高尚而自足的中华传统。\n\n因此，礼教派号召重新恢复传统文明，尤其是以儒家礼教为核心的道德秩序。在他们看来，中国面对一切危机的根本都是因为整个社会已经背离了维系天下的伦理根基。只要礼崩乐坏仍在继续，那么无论任何政治体制都无法给中华文明带来复兴。\n\n以辜鸿铭为代表的相关学者坚信，西方人之所以认定东方人野蛮落后，恰恰是因为东方人没有像西方人那样野蛮。西方拥有机枪和大炮，他们凭借这些摧毁了中国旧有的政治秩序，并将有毒的知识散播给中国青年。\n\n然而，礼教派的反西方并不意味着他们拒绝一切西方器物。恰恰相反，他们相信终有一日，当中国人也能制造同样精良的枪炮，并将炮口转向“洋鬼子”之时，西方世界便将在自己发明的暴力之下接受审判。§R到那时，人们就会意识到，真正胜利的是孔孟之道本身。§!"
