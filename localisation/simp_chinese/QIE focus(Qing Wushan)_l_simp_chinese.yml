 QIE_wushan_power: "天命未失，代帝监国"
 QIE_wushan_power_desc: "事情发展完全在意料之外，谁能想到一场由保皇派策划的政变最后却引发了一场出人意料的反政变？如今救世新教正在将自己变形成一个政府内阁，在这政权交接尚未平稳的时期，最幸运的莫过于许多成员都曾在旧北洋政府担任过职务。"
