 QIE_work_for_rice: "以工作换取大米"
 QIE_work_for_rice_desc: "通过组织化的贫民工厂体系，政府将赈济与劳动绑定，以维持城市秩序与基础生产。"
 QIE_work_for_247_rice: "以不舍昼夜换取大米"
 QIE_work_for_247_rice_desc: "在昼夜轮转的高压工时制度下，赈济工厂将流民劳动力彻底纳入连续生产体系，以产能换取秩序。"
 QIE_wushan_charity_relief: "慈善救济"
 QIE_wushan_charity_relief_desc: "慈善网络在短期内缓解了社会燃眉之急，但其维持成本与政治代价同样沉重。"
 QIE_wushan_theocratic_authority_1: "新教权力：人微言轻"
 QIE_wushan_theocratic_authority_1_desc: "救世新教初掌大权，名义可传于市井，政令却仍受旧官僚与旧军系掣肘。新秩序已开始发声，但尚不足以压过旧时代回响。"
 QIE_wushan_theocratic_authority_2: "新教权力：渐入中枢"
 QIE_wushan_theocratic_authority_2_desc: "随着教团网络渗入行政中枢与地方治理，新权力开始形成制度惯性。反对声仍在，但其阻滞效力已明显削弱。"
 QIE_wushan_theocratic_authority_3: "新教权力：一言九鼎"
 QIE_wushan_theocratic_authority_3_desc: "当乩谕成为秩序来源，教团意志便与国家机器完成耦合。旧有合法性让位于新的政治神学，政令执行与动员能力同步增强。"
 QIE_wushan_chaotic_big_tent: "混乱的大帐篷"
 QIE_wushan_chaotic_big_tent_desc: "救世新教暂时容纳了军阀、士绅、门生与地方团体等多股势力。它带来了一定调度弹性，却也使军事协同与战役规划陷入持续摩擦。"
