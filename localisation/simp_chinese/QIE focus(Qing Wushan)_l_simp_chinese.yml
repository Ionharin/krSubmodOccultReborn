 QIE_ws_jiang_chao_zong: "江朝宗"
 QIE_eight_mighty_dragon_scripture: "八威龙文"
 QIE_eight_mighty_dragon_scripture_desc: "赤明开图，运度自然；元始安镇，敷落五篇；赤书玉字，八威龙文；保制劫运，使天长存。\n\n乩坛已重开于燕京，但龙文仍停留在诵读与誓愿之中。教众记其名而未尽知其义，官府借其威而未得其实。此刻的八威龙文，只是风暴前的一卷空白天书。"
 QIE_eight_mighty_dragon_scripture_taixi: "八威龙文：泰西"
 QIE_eight_mighty_dragon_scripture_taixi_desc: "龙文西传，先入市井与工场。救世新教以“济世”之名吸纳外邦技艺，将慈善、工务与军需缝合为一体：机器昼夜不息，仓廪得以充盈，民众在动员中学会服从。\n\n“泰西”并非弃夏从夷，而是借其器、取其法、役其力，使新政权在喧嚣与钢铁之间站稳脚跟。"
 QIE_eight_mighty_dragon_scripture_zhongtu: "八威龙文：中土"
 QIE_eight_mighty_dragon_scripture_zhongtu_desc: "龙文还本中土，复以礼乐纲常为骨。乩坛话语不再止于劝善，而是化为秩序：乡绅与士人重归朝列，民心在“正名”与“安分”中渐次归拢，政令由此得以贯通上下。\n\n“中土”之义，在于以华夏旧典驯服乱世新权，使国家不只能够运转，更能被相信。"
 QIE_eight_mighty_dragon_scripture_longzhang: "八威龙文：龙章"
 QIE_eight_mighty_dragon_scripture_longzhang_desc: "及至龙章既成，泰西之器与中土之道终于并轨。工场、官署与乩坛同声相应，战时可聚众力，平时可养民生；外来之术不再漂浮，旧日之礼不再迟钝，二者俱为国家所用。\n\n此时的八威龙文，已非一纸符箓，而是一整套统御天下的章程：能召集，能生产，能安民，亦能定乱。"
 QIE_wang_jinghui_academy: "镜慧公学"
 QIE_wang_jinghui_academy_desc: "以赈济与教化为名而设的新式学术机构，汇聚工务、电子与基础科学人才，为救世新教的国家建设提供持续智力支撑。"
 QIE_wushan_madan_spirit: "马丹"
 QIE_wushan_madan_spirit_desc: "军中以强行攻势为先，强调敢战与速决。此法能在短期内提升前线冲击能力与部署效率，却也使部队防御韧性与战斗损耗承受更高代价。"
 QIE_wushan_human_tide_spirit: "聚兵成塔"
 QIE_wushan_human_tide_spirit_desc: "救世新教强调以密集兵员与持续训练维持前线韧性。部队成军速度与组织耐受得到再塑，但高强度动员同样带来更大的经验磨损。"
 QIE_wushan_elite_soldiers_spirit: "精兵干戚"
 QIE_wushan_elite_soldiers_spirit_desc: "救世新教以精练军制重塑骨干部队，强调精兵先行与核心战力保存。此举可有效降低实战损耗，但长期强化训练也将延长部队成军周期。"
 QIE_wushan_zhili_arsenal_state_modifier: "直隶救世武备局"
 QIE_wushan_zhili_arsenal_state_modifier_desc: "救世新教在直隶设立了统筹军需、产线与工务调配的武备机构，区域工业动员效率因此得到显著提升。"
 QIE_jingchun_army_bureau: "救世景纯真人军机局"
 QIE_jingchun_army_bureau_desc: "以乩坛训诫整编旧式军伍，景纯真人军机局主张以严密组织与持续练兵弥补装备与制度短板。军中纪律与协同有所提升，但为维持这套体系，社会稳定将付出一定代价。"
 QIE_jingchun_army_bureau_upgraded: "救世景纯真人军机局"
 QIE_jingchun_army_bureau_upgraded_desc: "军机局完成制度整训后，旧伍不再只是维持秩序的武装，而成为可持续动员的主力。其步兵战斗效能与练兵效率显著提高，但社会仍需承担这套体系的治理成本。"
 QIE_jingchun_army_bureau_tank_upgraded: "救世景纯真人军机局"
 QIE_jingchun_army_bureau_tank_upgraded_desc: "军机局在装甲化建设下完成转型，重心转向机动作战与突破协同。其装甲兵战力与整训效率明显提升，同时仍保留高压整军所带来的组织代价。"
 QIE_buddhism_stage_2: "千叶莲华"
 QIE_confucism_stage_2: "乐只君子"
 QIE_jesus_stage_2: "外邦人的光"
 QIE_mohammad_stage_2: "以没落时的星宿盟誓"
 QIE_wushan_events.6.t: "焚香"
 QIE_wushan_events.6.desc: "借着直系军阀对八省联合的崩溃袖手旁观，和谐社团的秩序如沙塔般瓦解的现状，救世新教趁势接管了北京的行政系统。然而，随着教统从虚职变为实权，这“慈善组织”内部的权力天平，终于彻底失衡。\n江朝宗与吴佩孚自政变以来便分坐吕祖阁东西两侧的厢房，表面仍同赴扶乩，暗中已各施神通。为维持教众面前的和睦假面，每月的例行降鸾仍是必须到场的表演。今夜由慈智居士担任乩手，请纯阳真人吕祖下降。参与扶乩的各人都手持仙香，在此地，仙香的品质就是权力与地位的无声宣言。江朝宗手中那支，是从日本旧友处凭重金得来的伽罗金刚香，紫烟沉厚，如苍龙蟠柱；吴佩孚所持的，则是从山东曲阜孔林采制的古柏香，清瘦挺拔，似君子临风。\n\n正值此时，乩盘上的沙迹开始游走。一笔一划，殿中众人屏息，寂静如坟。吕祖降笔，赐诗四句：\n\n“东海水深不可航，西山月暗路偏长。欲知天命归何处，且看谁人焚此香。”\n\n最后一笔落下，乩盘戛然而止。满殿无人敢出声。只有香火明灭，两柱烟柱笔直上升，在梁上交缠，如同二龙相斗，难分胜负。此刻，不知是何人心思疏漏，竟忘记掩好门窗，一股夜风从阁外钻入，不疾不徐，却精准地扑向该去的地方。"
 QIE_wushan_events.6.a: "伽罗香灭，金刚不护其主"
 QIE_wushan_events.6.b: "柏香中折，圣人不度其途"
 QIE_wushan_events.6.c: "双香同烬，乩语不成真谶"
 QIE_wushan_events_6_a_tt: "江朝宗与他的日本友人之间的密约最终未能成功。吴佩孚将成为救世新教唯一的领袖。"
 QIE_wushan_events_6_b_tt: "明经学会的儒冠，抵不过东瀛的金刚之烟。江朝宗将成为救世新教唯一的领袖。"
 QIE_wushan_events_6_c_tt: "风停了。什么都没发生。"
 QIE_two_leaders_bonus_1: "供于堂中的独一教统"
 QIE_two_leaders_bonus_2: "立于堂下的两位使者"
 QIE_wushan_debt_repayment: "债务偿还"
 QIE_wushan_debt_repayment_desc: "账簿尚未清空，喘息已然可贵。政府以牺牲部分民生与社会情绪为代价，换取了短暂的财政秩序与信用续命。"
 QIE_wushan_events.7.t: "债务清偿完毕"
 QIE_wushan_events.7.desc: "最后一笔到期款项已如约划拨，旧债条目自总账上逐一勾销。压在案头多时的本息清单终于合上，财政部得以暂时卸下这副沉重枷锁。"
 QIE_wushan_events.7.a: "无债一身轻"
