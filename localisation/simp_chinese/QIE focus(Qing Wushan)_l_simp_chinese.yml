 QIE_wushan_where_is_puyi_decisions_tt: "如今中国已归于一统，民众对我们政府的信心也来到了前所未有的水平。但是我们的政府从建立之初就存在着一个致命的问题：尽管我们一直以皇帝正在养病搪塞各方势力，并且或多或少地自污，暗示我们把皇帝监禁了起来。但真相是在1936年的政变中，爱新觉罗·溥仪跑出了乾清宫之后就再也没有回来。不论他在哪里，如果他出现了，我们的政权合法性都会受到极大的打击。现在当务之急是搜寻神州大地，找到溥仪，活要见人，死要见尸。"
