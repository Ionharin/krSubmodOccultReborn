 QIE_wushan_bop_support_jiang_desc: "消耗政治点协调鸾务，权力平衡将向江朝宗一侧移动。"
 QIE_wushan_bop_support_wu: "安置游氓为民兵团"
 QIE_wushan_bop_support_wu_desc: "消耗指挥点调度军务，权力平衡将向吴佩孚一侧移动。"
