 QIE_german_technology_desc: "外国投资者和工程师因为我们的债务违约仓促离开了我国，但他们没办法把所有文件都带回去，况且在我们短暂的合作时光里，这些外国人已向我们的工人和工程师传授了许多现代工业要领，借助这些文件，我们便能自己开动起这些机器。"
 QIE_collaborate_with_german_companies_desc: "德国人依然是我们的最大投资人，比起亚洲地区其他不甚稳定的国家，德国资产和我国之间存在着天然的亲和力，只要稍加游说，让这些德国资产加大对我们的投资并不是一件难事。我国政府将向这些企业授予政府合同，以确保我们之间的合作平等而稳定，并且具有可预见的充沛利润。"
 QIE_free_schools_for_poor_desc: "觉是轩学堂于南京朝天宫创办，是救世新教专门资助孤贫无力子弟的小学夜校。"
