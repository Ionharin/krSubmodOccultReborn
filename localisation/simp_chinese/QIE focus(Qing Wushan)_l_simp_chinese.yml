 QIE_ws_normal_events.1.t: "政府的伪装"
 QIE_ws_normal_events.1.desc: "我们高尚的正义战争事业已经开始！现在我们再也不需要靠伪装成一个亲外友善的政府来获取外国资本支持了——当战争开始，他们一定会争先恐后地逃离这里。我们将顺势接管那些由于时局动荡离开这里的企业家们的产业，但谁来运营它们变成了一个问题。"
 QIE_ws_normal_events.1.a: "让宗社党人去做。"
 QIE_ws_normal_events.1.b: "看看青年党的能力。"
 QIE_ws_normal_events.1.c: "帝国宪政会将好好利用它们。"
 QIE_ws_normal_events.1.d: "什么党派？这些是救世新教的财产。"
 QIE_ws_normal_events.2.t: "我们的战争计划遭遇变故！"
 QIE_ws_normal_events.3.t: "来自北京的救济"
 QIE_ws_normal_events.3.desc: "今天早上，一支身穿直系军服的小股部队出现在了陕西和四川的交界线上。我们的士兵一开始认为这是北京政府的突然袭击，但事情很快水落石出。原来是中央政府的援助到了。就像[SZC.GetLeader]之前听说的那样，如今的中央政府已被名为救世新教的慈善团体控制，早在1925年，川黔湘鄂赣五省大饥荒爆发时，救世新教就曾向四川提供过援助。而如今他们掌握了政治实体，其援助数量比起上一次有过之而无不及！感谢他们的帮助，我们的饥荒问题得到了极大的缓解。"
 QIE_ws_normal_events.3.a: "但代价是什么？"
